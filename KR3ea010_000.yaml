front:
  text: 序丹溪朱氏云素問載道之書也詞簡而義深去古漸遠衍文錯簡仍或有之故非吾儒不能讀信哉言也余蚤承箕裘之業奉先考藍溪公之庭訓而治斯經顓主王太僕次注矻矻葄枕十餘年矣然間有於經旨未愜當者又有厝而不及註釋者雖經嘉祐閣臣之校補猶未能精備焉於是採擇馬蒔吳昆張介賓等諸家之說更依朱氏之言參之於經傳百氏之書以補其遺漏正其紕繆至文字同異釋言訓義凡可以闡發經旨者簡端行側細字標識久之至側理殆無餘地矣迨庚戌冬擢於侍醫公私鞅掌呼吸不遑遂投之櫥中不復為意辛酉秋以忤旨被黜而就外班遽為閒散是以再取而翻之欲有所改補奈何年逾半百雙眸昏澀不能作蠶頭書因竊不量荒陋別為繕錄釐成八卷名曰素問識如其疑義則舉眾說不敢決擇是非諸家註解與王舊說雖異其旨亦可以備一解者並採而載之雖未能撣斯道之至賾鉤經文之深義然視之明清諸注句外添意鑿空臆測以為得岐黃未顯之微言者其於講肄之際或有資於稽考歟嗚呼先考逝矣而六年於今其將質誰藁初完不禁廢卷而三嘆也文化三年丙寅歲秋九月十有一日書於柳原新築丹波元簡廉夫
