body:
  text: 卷一上古天真論篇第一吳云此篇言保合天真則能長有天命乃上醫治未病也志云上古謂所生之來天真天乙所生之真元也簡按易繫辭上古穴居而野處又上古結繩而治老子云其中有精其精甚真莊子漁父篇真者精誠之至也荀子真積力久黃庭經曰積精纍氣以為真昔在書堯典序昔在帝堯聰明文思光宅天下孔穎達正義云鄭玄雲書以堯為始獨云昔在使若無先之典然也詩云自古在昔言在昔者自下本上之辭言昔在者從上自下為稱故曰使若無先之者據代有先之而書無所先故云昔也弱而能言史記正義引潘嶽哀弱子篇其子未七旬曰弱吳云弱始生百日之稱未知所本幼而徇齊高雲徇循同簡按禮記曲禮十年曰幼通雅云史黃帝幼而徇齊注徇迅也齊疾也家語作睿齊大戴禮作慧齊智按爾雅宣徇遍也徇乃徇之訛言聖哲遍知而神速也考王徇訓疾馬本作徇齊並非也西都賦注引孔安國尚書傳注徇循也長而敦敏鄭注樂記敦厚也王注訓信未見所據成而登天成王注為鼎之成未允馬雲史記正義以十五為成則不宜曰登天若訓為道之成則登天亦或有之張云謂治功成登天史記家語大戴禮並作聰明蓋從昔在黃帝至此略記帝始末為小序猶書序耳此篇全元起本在第九卷王移冠篇首固宜矣張以登天為升遐禮記檀弓告喪曰天王登遐易明夷初登於天竹書紀年曰帝王之歿曰陟陟升也謂升天也而黃帝登雲天出於莊子史記封禪書載鼎湖騎龍之事而論衡子華子辨其虛誕蓋其説之來遠矣故馬吳諸注皆從王説天師馬雲天乃至尊無對之稱而稱之為師又曰天師簡按黃帝稱天師見莊子徐無鬼韓詩外傳及説苑云黃帝即位宇內和平思見鳳凰之象以召天老天老蓋天師耳皆度百歲馬雲度越也簡按玉篇度與渡通過也人將失之耶千金作將人失之耶岐伯漢司馬相如傳詔岐伯使尚方注張揖曰岐伯者黃帝太醫屬使主方氣也又藝文志大古有岐伯俞柎吳云岐國名伯爵也簡按又有雷公而未知黃帝時有五等之爵對曰甲乙序例云諸問黃帝及雷公皆曰問其對也黃帝曰答岐伯之徒皆曰對簡按朱子論語注云凡君問皆稱孔子對曰者尊君也其知道者馬雲凡篇內言道者五乃全天真之本也和於術數馬雲法天地之陰陽調人事之術數術數所該甚廣如呼吸按蹺及四氣調神論養生養長養收養藏之道生氣通天論陰平陽祕陰陽應象大論十損八益靈樞本神篇長生久視本篇下文飲食起居之類簡按廣雅數術也莊子天道有術數存焉釋文引李注云數術也史記倉公傳問善為方數者索隱云數音術數之數抱朴子云夫仙人以藥物養身以術數延命王注欠詳起居有常家語王肅注起居猶動靜也以酒為漿吳云古人每食必啜湯飲謂之水漿以酒為漿言其飲無節也簡按周禮有漿人孟子簞食壺漿漢鮑宣傳漿酒藿肉張衡思玄賦斟白水為漿孝子傳輦義漿以給過客皆其證也以妄為常吳云上古之人不妄作勞今則以妄為常言其不慎動也醉以入房漢藝文志房中者情性之極至道之際是以聖王制外樂以禁內情而為之節文説文房室在旁也以耗散其真新校正引甲乙耗作好似是今甲乙作耗不知持滿范蠡云持滿者與天荀子宥坐篇子路云持滿有道乎夫上古聖人之教下也皆謂之潘之恆黃海云皆謂之三字句法甚妙前人注多不解愚以為謂之者語之也語之云何也即下八字是也言聖人之教不擇人而皆語之以避虛邪賊風之有時惟通文意者自解之不必令俗辨時即八節八風之時注解是簡按據潘氏此説不必依全元起太素而改易字句自通恬惔虛無老子曰恬淡為上莊子曰恬惔無為淮南子曰靜漠恬淡所以養性也和愈虛無所以養德也李善洞簫賦注廣雅曰恬靜也説文曰憺安也又曰倓安也蓋惔淡淡倓通用美其食新校正云別本美一作甘簡按此蓋本於老子千金亦作甘其民故曰朴新校正云曰作日為是又唐人日曰二字同一書法詳見於顧炎武金石文字記嗜欲甲乙嗜作色愚智賢不肖靈本藏篇云無愚智賢不肖無以相倚也故合於道新校正云全元起作合於道數千金同人年老衛氣失常篇人年五十以上為老曲禮説文並云七十曰老天數然也吳云天畀之數汪云天癸之數也女子七歲褚氏云男子為陽陽中必有陰陰之中數八故一八而陽精升二八而陽精溢女子為陰陰中必有陽陽之中數七故一七而陰血升二七而陰血溢陽精陰血皆飲食五穀之實秀也天癸張云天癸者天一之氣也諸傢俱即以精血為解然詳玩本篇謂女子二七天癸至月事以時下男子二八天癸至精氣溢瀉是皆天癸在先而後精血繼之分明先至後至各有其義焉得謂天癸即精血精血即天癸本末混淆殊失之矣夫癸者天之水乾名也故天癸者言天一之陰氣耳氣化為水因名天癸其在人身是謂元陰亦曰元氣人之未生則此氣蘊於父母是為先天之元氣第氣之初生真陰甚微及其既盛精血乃王故女必二七男必二八而後天癸至天癸既至在女子則月事以時下在男子則精氣溢瀉蓋必陰氣足而後精血化耳陰氣陰精譬之雲雨云者陰精之氣也雨者陰氣之精也未有云霧不布而雨雪至者亦未有云霧不濃而雨雪足者然則精生於氣而天癸者其即天一之氣乎可無疑矣質疑録云天癸者天一所生之真水在人身是謂元陰雲云簡按甲乙作天水吳氏諸證辨疑婦人調經論云天癸者天一生水也當確張説耳管子云人水也男女精氣合而水流形家語云男子八月而生齒八歲而齔二八十六歲而化女子七月生齒七歲而齔二七十四而化又見大戴禮韓詩外傳云男子八歲而齠十六而精化小通女子七歲而齔十四而精化小通通雅云小通言人道也亦可以互證焉又按王注任沖流通經血漸盈應時而下天真之氣降與之從事故云天癸也此似指為月事馬氏因譏之然應象大論調此二者王注調謂順天癸性而治身之血氣也知其意亦似與張意略符焉馬氏直為陰精張氏已辨其誤志聰高氏並云天癸天一所生之癸水也乃全本於張注薛氏原旨云天癸者非精非血乃天一之真故男子亦稱天癸亦復同太衝脈新校正云太素甲乙作伏沖簡按衝脈起於胞上循脊裡為經絡之海伏沖之名蓋因此歟陰陽離合論王注太衝者腎脈與衝脈合而盛大故曰太衝月事濟人論云靈祕曰女子自生日起至五千四十八日而天癸至由是身中血脈周流如地之水脈浸潤乃一月一經外應潮候出月令廣義每月令按五千四十八日約十三年半真牙簡按真與齻通儀禮既夕禮右齻左齻疏云齻謂牙兩畔最長者也釋文齻丁千反後魏書徐之才傳武成生齻牙之才拜賀曰此是智牙生智牙者聰明長壽丈夫大戴禮丈者長也夫者扶也言長制萬物者也王充論衡云人形一丈正形也名男子為丈夫又云不滿丈者失其正也六八陽氣衰竭於上張云陽氣亦三陽氣也甲乙無竭字並似是頒白馬雲頒斑同簡按孟子頒白者趙岐注頒斑也頭半白斑斑者也形體皆極東京賦馬足未極薛注極盡也受五臟六腑之精簡按此正與主不明則十二官危十一臟取決於膽心者五臟六腑之大主也文法同乃能瀉白虎通云腎之為言瀉也以竅瀉也筋骨解墮馬雲懈惰同簡按甲乙作懈惰禮月令季秋之月行春令則暖風來至民氣解惰不過盡八八馬雲此言年老而有子者王注以為所生之男女其壽止於八八七七之數者非韓氏醫通云男八歲至六十四女七歲至四十九即大衍自然之數簡按陽主進陰主退天道之常理蓋大衍之數五十有五加九之陽數則為六十四乃進之極也減六之陰數則為四十九乃退之極也故男女真陰至於此而盡矣亦天地之常數也真人説文真仙人變形而登天也從匕目八所以乘載之徐鍇曰真者仙也化也匕者化也反人為匕從目鹵莽不能識隱也八乘風雲也莊子云真人伏戲黃帝不得友淮南子云真人者性合於道能登假於道精神反於至真是謂真人提挈天地淮南子提挈天地而委萬物高誘注一手曰提挈舉也至人莊子云不離於真謂之至人又云至人無已神人無功聖人無名文子云天地之間有二十五人也上五有神人真人道人至人聖人次五有德人賢人智人善人辨人云云淳德張云淳厚也簡按思玄賦何道真之淳純注不澆曰淳八遠之外淮南地形訓云九州之外乃有八殥亦方千里八殥之外乃有八紘亦方千里注殥猶遠也被服章高雲服衣也章冠也張云五服五章尊德之服皋陶謨曰天命有德五服五章哉簡按孔安國注云五服天子諸侯卿大夫士之服也尊卑彩章各異高注以章為章甫殷冠之義誤也此三字新校正為衍文當然耳舉不欲觀於俗觀古玩切高雲其舉動也不欲觀於習俗是也以恬愈為務淮南子云恬愈無矜注恬愈無所好憎也辨列星辰書堯典曆象星辰注辰日月所交會之地也左傳昭七年日月之會是謂辰王注非是逆從陰陽張云陽主生陰主死陽主長陰主消陽主升陰主降故賢人逆從之王注近迂將從上古張云將隨也簡按漢書郊祀歌九夷賓將四氣調神大論篇第二高刪大論二字云君臣問答互相發明則曰論無君臣之問答則曰篇余皆仿此吳云此篇言順於四時之氣調攝精神亦上醫治未病也簡按司馬遷云春生夏長秋收冬藏此天地之大經也弗順則無以為紀綱故四時之大順不可失宋薑鋭著養生月録一卷採本篇首一段文附逐月服餌藥方尊生者宜識之發陳發散陳敷之義張訓陳為故然據下蕃秀容平等則以氣象而言王注為是萬物以榮爾雅木謂之華草謂之榮廣步於庭志云廣寬也緩也簡按倉公曰車步廣志以適骨肉血脈巢源作闊步於庭被髮莊子云老聃新沐方將被髮而干史記箕子披髮陽狂春氣之應吳云天道發生人事應故曰應夏為寒變志云木傷而不能生火故於夏月火令之時反變而為寒病簡按巢源作夏變為寒華英張云言神氣也秋為痎瘧張云心屬火王於夏夏失所養故傷心心傷則暑氣乘之至秋而金氣收斂暑邪內郁於是陰欲入而陽拒之故為寒火欲出而陰束之故為熱金火相爭故寒熱往來而為痎瘧簡按痎瘧即瘧耳詳見於瘧論冬至重病簡按據前後文例四字恐剩文容平志云容盛也萬物皆盛實而平定也簡按容盛也見説文即盛受之義非盛實之謂王馬張併為容狀之容乃與發陳蕃秀閉藏自異旨聖濟經注云容而不迫平而不偏是謂容平此説似是五常政大論以金平氣為審平説苑曰秋者天之平與雞俱興志云雞鳴早而出塒晏與雞俱興與春夏之早起少遲所以養秋收之氣也冬為飧泄張云肺傷則腎水失其所生故當冬令而為腎虛飧泄簡按飧本作餐又作餐説文餐吞也玉篇飧水和飯也釋名飧散也投水於中自解散也列子説符注餐水澆飯也蓋水穀雜下猶水和飯故云飧泄也若伏若匪宋本匪作匿無今詳以下七字注簡按匿得押韻春為痿厥吳云腎氣既傷春木為水之子無以受氣故為痿厥痿者肝木主筋筋失其養而手足痿弱也厥無陽逆冷也清淨光明者也淨馬本張本作靜李云當作靜簡按天氣清淨以下至未央絶滅王注為言天以例人馬吳張並同特志聰云上節論順四時之氣而調養其神然四時順序先由天氣之和如天地不和則四時之氣亦不正矣故以下復論天地之氣焉今考經文王注雖取義深奧卻似混淆不明當以志聰説為得焉雲霧不精詩疏云有云則無露無雲乃有露爾雅云天氣下地氣不應曰雺地氣發天不應曰霧精晴同史天官書天精而景星見注精即晴漢書京房傳陰霧不精高雲精猶極也未詳何義交通不表萬物命故不施王吳志高並以表下為句馬張李則以命下為句吳云陰陽二氣貴乎交通若交通之氣不能表揚於外則萬物之命無所施受無所施受則名木先應而多死張云獨陽不生獨陰不成若上下不交則陰陽乖而生道息不能表見於萬物之命故生化不施簡按吳説似是故固同菀藁張云菀郁同馬雲藁稿同簡按詩小辨菀彼柳斯釋文菀音郁志云菀茂木也藁禾稈也誤未央絶滅張云央中半也陰陽既失其和則賊風暴雨數為殘害天地四時不保其常是皆與道相違故凡稟化生氣數者皆不得其半而絶滅矣簡按詩小雅夜未央注夜未半也王訓央為久未見所出身無奇病吳云謂無寒變痎瘧飧泄痿厥之類也馬雲本經有奇病論大奇病論簡按自天氣者清淨至生氣不竭一百二十四字與四氣調神之義不相干且文意不順承疑他篇錯簡也心氣內洞馬雲內洞者空而無氣也靈五味論有辛走氣多食之令人洞心正與內洞之義相似簡按外臺引刪繁論載本篇文作內消肺氣焦滿張云肺熱葉焦為脹滿也簡按蓋謂肺脹喘滿等證王云焦謂上焦誤也獨沉甲乙作濁沉新校正云太素作沉濁簡按據上文焦滿甲乙為是吳云腎氣獨沉令人膝䯒重是也滑云沉痼而病也太陰不收少陰不藏簡按以太陽少陽例推之此以時令而言之乃太陰少陰疑是互誤靈陰陽系日月云心為陽中之太陽肺為陽中之少陰肝為陰中之少陽脾為陰中之至陰腎為陰中之太陰春秋繁露云春者少陽之選也夏者太陽之選也秋者少陰之選也冬者太陰之選也春夏養陽秋冬養陰高雲夫四時之太少陰陽者乃萬物之根本也所以聖人春夏養陽使少陽之氣生太陽之氣長秋冬養陰使太陰之氣收少陰之氣藏養陽養陰以從其根簡按高氏此解貫通前章尤為切當王注諸家及朱彥修説並似失章旨焉千金脾勞門云春夏養陽秋冬養陰以順其根本矣肝心為陽脾肺腎為陰逆其根則伐其本云云與高意符焉神仙傳魏武帝問養生大略封君達對曰聖人春夏養陽秋冬養陰以順其根以契造化之妙全本此篇浮沉生長之門馬雲言生長則概收藏滑云浮沉猶出入也苛疾禮記疾痛苛癢鄭注苛疥也管子常之巫審於死生能去苛病注煩苛之病楊慎云苛小草也出説文今但知為苛刻之苛蓋苛疾煩苛之小疾王云苛者重也張云苛虐也皆為苛罰苛政之苛吳云痾同尤非也愚者佩之李冶古今黈云王注聖人心合於道故勤而行之愚者性守於迷故佩服而已冰説非也佩背也古字通用果能佩服於道是亦聖人之徒也安得謂之愚哉滑云佩當作悖吳云佩與悖同古通用簡按古今黈之説是不治已病治未病靈逆順篇上工治未病不治已病七十七難金匱要略首篇甲乙經五臟變腧篇皆可參考鑄兵宋本兵作錐志高亦同並誤也生氣通天論篇第三夫自古通天者王注六節臟象云通天者謂元氣即天真也然形假地生命惟天賦故奉生之氣通繫於天稟於陰陽而為根本也寶命全形論曰人生於地懸命於天天地合氣命之曰人四氣調神大論曰陰陽四時者萬物之終始也死生之本也此其義也簡按此解頗明備生之本本於陰陽志云凡人有生受氣於天故通乎天者乃所生之本天以陰陽五行化生萬物故生之本本乎陰陽也簡按吳以生字接上句未穩貼六合高誘注淮南云孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合故曰六合一曰四方上下為六合九州淮南墜形訓云神農大九州桂州迎州神州等是也至黃帝以來德不及遠惟於神州之內分為九州王注所載九州見書禹貢十二節志云骨節也兩手兩足各三大節簡按王注為十二經非也春秋繁露云天數之微莫若於人人之身有四肢每肢有三節三四十二十二節相待而形體立矣天有四時每一時有三月三四十二十二月相受而歲數終矣六節臟象論無五臟十二節五字此節之義當考靈邪客篇淮南天文訓其氣三高雲凡人之生各具五行故其生五五行之理通貫三才故其氣三簡按六節臟象論云故其生五其氣三三而成天三而成地三而成人此其氣三成三才則高注難從而王馬吳並云天氣地氣運氣張則云三陰三陽俱未允焉太平經云元氣有三名太陽太陰中和出後漢書襄楷傳注其氣三或此之謂與楊上善太素注云太素分為萬物以為造化故在天為陽在人為和在地為陰出弘決外典鈔三十一難楊玄操注云天有三元之氣所以生成萬物人法天地所以亦有三元之氣以養身形六十六難虞庶注云在天則三元五運相因而成在人則三焦五臟相因而成也素問曰其氣三其生五此之謂也數犯此者志云人稟五行之氣而生犯此五行之氣而死有如水之所以載舟而亦能覆舟故曰此壽命之本也蒼天之氣張云天色深玄故曰蒼天簡按詩彼蒼者天王為春天誤傳精神張吳並云傳受也此謂自傷氣之削也馬吳諸注傷下句簡按據王注八字一句為是陽氣者若天與日馬雲本篇所重在人衛氣但人之衛氣本於天之陽氣惟人得此陽氣以有生故曰生氣通天惟聖人全此陽氣苛疾不起常人則反是焉靈樞禁服篇云審察衛氣為百病母者信哉本篇凡言陽氣者七諄諄示人以當全此陽氣也不彰高雲若失其所則運行者不周於通體旋轉者不循於經脈故短折其壽而不彰著於人世矣簡按史記五帝本紀帝摯立不善崩索隱曰古本作不著音張慮反猶不著明陽因而上高雲天氣清淨明德惟藏故天之默運於上也當以日光明是故人身之陽氣因之而上陽因而上其體如天衛外者也其體如日此陽氣之若天與日也因於暑汗王注云此則不能靜慎傷於寒毒至夏而變暑病也此説非也朱震亨詳辨之當考格致餘論煩則喘喝靜則多言張云暑有陰陽二證陽證因於中熱陰證因於中寒此節所言言暑之陽者也故為汗出煩躁為喘為大聲呼喝若其靜者亦不免於多言蓋邪熱傷陰精神內亂故言無倫次也汗出而散張云熱病篇曰暑當與汗皆出勿止此之謂也簡按張云此言暑之陰者非也志云天之陽邪傷人陽氣兩陽相搏故體如燔炭陽熱之邪得吾身之陰液而解故汗出而散也高雲若傷暑無汗則病燥火之氣故體如燔炭因於濕首如裹濕熱不攘朱氏格致餘論云濕者土濁之氣首為諸陽之會其位高而氣清其體虛濁氣熏蒸清道不通沉重而不爽利似乎有物以蒙冒之失而不治濕鬱為熱熱留不去大筋緛短者熱傷血不能養筋故為拘攣小筋弛長者濕傷筋不能束骨故為痿弱因於濕首如裹各三字為句文正而意明高雲大筋連於骨內緛短則屈而不伸小筋絡於骨外弛長則伸而不屈朱氏新定章句因於寒體若燔炭汗出而散因於暑汗煩則喘喝靜則多言因於濕句首如裹句濕熱不攘句大筋緛短小筋弛長緛短為拘弛長為痿因於氣為腫云云簡按馬張志高並循原文而釋吳及九達薛氏原旨等從朱氏改定弛長弛宋本作弛按弛弛同説文弓解也張璐曰先搐瓜蒂散次與羌活勝濕湯因於氣為腫張云衛氣營氣臟腑之氣皆氣也一有不調皆能致病因氣為腫氣道不行也簡按高雲氣猶風也陰陽應象云陽之氣以天地之疾風名之故不言風而言氣因於氣為腫者風淫末疾四肢腫也此注難從震亨云脫簡誤四維相代高雲四維相代者四肢行動不能彼此借力而相代也簡按馬張並以四維為四肢是也王注筋骨血肉未允志聰汪昂並云四時也亦未詳何據痹論云尻以代踵脊以代頭四維相代與此同義震亨以為衍文誤陽氣者煩勞則張王氏溯洄集云夫陽氣者人身和平之氣也煩勞者凡過於動作皆是也張主也謂亢極也精陰氣也闢積猶積疊謂怫鬱也衣褶謂之襞積者亦取積疊之義也積水之奔散曰潰都猶堤防也汩汩水流而不止也夫充於身者一氣而已本無異類也即其所用所病而言之於是乎始有異名耳故平則為正亢則為邪陽氣則因其和以養人而名之及其過動而張亦即陽氣亢極而成火耳陽盛則陰衰故精絶水不制火故亢火鬱積之甚又當夏月火旺之時故使人煩熱之極若煎迫然氣逆上也火炎氣逆故目盲耳閉而無所用此陽極欲絶故其精敗神去不可復生若堤防之崩壞而所儲之水奔散滂流莫能以遏之矣夫病至於此是壞之極矣王氏乃因不曉都字之義遂略去此字而謂之若壞其可乎哉又以此病純為房患以脹為筋脈䐜脹以汩汩為煩悶皆非是也簡按聖濟總録載人參散治煎厥氣逆頭目昏憒聽不聞目不明七氣善怒人參遠志赤茯苓防風各二兩芍藥麥門冬陳皮白朮各一兩上為末每服三錢水一盞半煎至八分去滓溫服不計時候日再服闢積闢與襞同司馬相如傳襞積褰皺師古注襞積即今之裙褶高雲重復也汪昂云如衣襞積並本於王履之解張云病也誤潰潰乎若壞都馬雲都所以坊水簡按禮檀弓汙其宮而豬焉鄭玄注豬都也南人謂都為豬酈道元水經注水澤所聚謂之都亦曰瀦張高為都城之都誤汩汩乎汩汩考韻書音聿從子曰之曰水流也又奔汩疾貌卷末釋音古沒切音骨煩悶不止也此從日月之日書洪範汩陳其五行注汩亂也義蓋取於此又考韻書汩波浪聲又湧波也由此觀之汩汩義不太遠然於壞都則汩字似襯大怒則形氣絶馬雲形氣經絡阻絶不通奇病論云胞之絡脈絶亦阻絶之義非斷絶之謂高本形下句注云形者悻悻然見於其面也氣絶者怒則氣上不接於下也簡按高注誤薄厥吳云薄雷風相薄之薄汪云薄迫也簡按聖濟總録赤茯苓湯治薄厥暴怒怒則傷肝氣逆胸中不和甚則嘔血鼽衄赤茯苓人參桔梗陳皮各一兩芍藥麥門冬檳榔各半兩上為末每服三錢水一盞生薑五片同煎至八分去滓溫服不計時候其若不容馬雲胸腹䐜脹真若有不能容物者矣吳云縱而不收其若不能為容止矣志云筋傷而弛縱則四體若不容我所用也簡按吳志似是王意亦當如此汗出偏沮馬雲人當汗出之時或左或右一偏阻塞而無汗則無汗之半體他日必有偏枯之患吳云沮止也張云沮傷也壞也志高並云濕也簡按沮王為沮泄之義諸注不一考千金作袒又養生門云凡大汗勿偏脫衣喜得偏風半身不遂巢源引養生方同靈刺節真邪云虛邪偏客於身半其入深內居榮衛榮衛稍衰真氣去邪氣獨留發為偏枯乃其作袒似是下文曰汗出見濕曰高粱之變曰勞汗當風皆有為而發疾者其義可見也痤痱説文痤小腫也玉篇癤也韓非子彈痤者痛巢源云腫一寸至二寸癤也痱玉篇熱生小瘡巢源云人皮膚虛為風邪所折則起隱疹寒多則色赤風多則色白甚者癢痛搔之則成瘡又巢源有夏月沸瘡蓋痱即沸從疒者痤詳下文王注高粱孟子膏粱之味趙岐注細粱如膏者也朱注膏肥肉粱美谷簡按山海經都廣之野爰有膏菽膏稻膏黍膏稷郭璞注言味好皆滑如膏外傳曰膏粱之子劉會孟云嘉穀之米炊之皆有膏蓋趙注較優王注與趙同足生大丁足新校正讀為饒吳為能張為多潘楫醫燈續焰云足生者必生也併為是春秋繁露云陰陽之動使人足病喉痹足字用法正與此同巢源云丁瘡初作時突起如丁蓋故謂之丁瘡令人惡寒四肢強痛兼忉忉然牽疼一二日瘡便變焦黑色腫大光起根𩊅強全不得近痠痛皆其候也受如持虛張云熱侵陽分感發最易如持空虛之器以受物皶王注俗曰粉刺粉刺見肘後千金作粉滓巢源云嗣面者麵皮上有滓如米粉者是也又外臺有粉皻玉篇皻與皶同字書齇粗㾴臚皻並是查字巢源又云查疽隱脈赤起如今楂樹子形亦是風邪客於皮膚血氣之所變生也是即外臺所謂面皻䩅其時生鼻上者謂之酒皶與王注粉刺之皶自異志云面鼻赤瘰也此亦面皶䩅與王注異王注按豆即豌豆見唐六典注柔則養筋高雲上文大怒氣絶至血菀而傷筋故曰陽氣者精則養筋所以申明上文陽氣不柔而筋無所養也大僂吳云為寒所襲則不能柔養乎筋而筋拘急形容僂俯矣此陽氣被傷不能柔筋之驗簡按脈要精微曰膝者筋之府屈伸不能行則僂附筋將憊矣大僂義正同高雲背突胸窩乃生大僂此乃龜背恐非是瘻馬雲鼠瘻之屬志云金匱所謂馬刀俠癭簡按説文頸腫也慧琳藏經音義引考聲云瘻久瘡不瘥曰瘻巢源有九瘻三十六瘻李梴入門云瘻即漏也經年成漏者與痔漏之漏相同但在頸則曰瘰漏在痔則曰痔漏又云凡癰疽久則膿流出如缸甕之有漏留連肉腠王注久瘀內攻結於肉理知肉腠即肉理金匱云腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之文理也儀禮公食大夫禮載體進奏注奏謂皮膚之理也又鄉飲酒禮皆右體進腠注腠理也陰陽應象大論王注腠理謂滲泄之門高雲肉腠或空或突而如嶁而難愈也汪以四字接下句而釋之云寒氣留連於肉腠之間由俞穴傳化而薄於臟腑則為恐畏驚駭此陽氣被傷不能養神也此説恐非是俞氣化薄吳云俞輸同有傳送之義馬雲各經皆有俞穴此非井滎輸經合之輸凡一身之穴皆可曰俞邪氣變化依薄傳為善畏及驚駭之疾畏主心腎陰陽應象云喜傷心恐勝喜又恐傷腎思勝恐駭主肝言金匱真言云其病發驚駭簡按王以俞為背俞恐非也營氣不從馬雲唯陽氣不固則營氣者陰氣也營氣不能與衛氣相順而衛氣逆於各經分肉之間亦生癰腫之疾矣吳云不從不順也肉理腠理也簡按樓氏綱目改定乃生大僂營氣不從逆於肉理乃生癰腫陷脈為瘻留連肉腠俞氣化薄傳為善畏樓云營氣不從逆於肉理乃生癰腫十二字舊本元誤在及驚駭之下夫陽氣因失衛而寒氣從之為僂然後營氣逆而為癰腫癰腫失治然後陷脈為瘻而陷留連於肉腠焉蓋其所改定雖不知古文果然否其説則頗明備故附存於此魄汗吳云魄陰也陰汗不止張云汗由陰液故曰魄馬雲肺主藏魄外主皮膚故所出之汗亦可謂之魄汗也簡按數説並誤魄白古通禮記內則白膜作魄膜淮南修務訓云奉一爵酒不知於色挈一石之尊則白汗交流戰國策鮑彪注白汗不緣暑而汗也楚策陰陽別論魄汗未藏王注流汗未止形弱而氣爍馬雲魄汗未盡穴腧未閉形體弱而氣消爍乃外感風寒致穴腧已閉當發為風瘧瘧論言瘧之為證非獨至秋有之四時皆能成瘧也簡按王注有至於秋秋陽復收之言故論及之風瘧此即瘧耳必非有一種風瘧者金匱真言云秋善病風瘧又云夏暑汗不出者秋成風瘧刺瘧云風瘧發則汗出惡風瘧論云夫痎瘧皆生於風俱可證也故風者百病之始也張云凡邪傷衛氣如上文寒暑濕氣風者莫不緣風氣以入故風為百病之始上下不並吳云陽謂之上陰謂之下陽中有陰陰中有陽謂之並言風寒為病之久則邪氣傳變陽自上而陰自下謂之不並是水火不相濟陰陽相離簡按王解並字為交通與吳之意符焉良醫王充論衡云醫能治一病謂之巧能治百病謂之良故良醫服百病之方治百人之疾陽氣當隔馬雲隔者乖隔不通之謂也簡按隔非噎隔之隔王馬並引三陽結謂之隔恐非也反此三時志云平旦日中日西也形乃困薄馬雲未免困窘而衰薄矣起亟也吳改為守也馬雲營氣藏五臟之精隨宗氣以運行於經脈中而外與衛氣相表裡衛氣有所應於外營氣即隨之而起夫是之謂起亟也張云亟即氣也陰陽應象曰精化為氣即此藏精起氣之謂亟音氣志云陰者主藏精而陰中之氣亟起以外應陽者主衛外而為陰之固也汪云起者起而應也外有所召則內數起以應也如外以順召則心以喜起而應之外以逆召則肝以怒起而應之之類也簡按數説未知孰是汪解似易曉焉且王意亦似當然並乃狂張云並者陽邪入於陽分謂重陽也簡按與王注異義同意陽不勝其陰高雲陰寒盛也陰寒盛則五臟氣爭爭彼此不和也陳陰陽張云猶言鋪設得所不使偏勝也吳云陳設也簡按王陳讀循未詳所據氣立如故張云人受天地之氣以立命故曰氣立然必陰陽調和而後氣立如故首節所謂生之本於陰陽者正此兩節之謂簡按王云真氣獨立似明切焉風客淫氣王注痹論云淫氣謂氣之妄行者簡按説文淫浸淫隨理也徐云隨其脈理而浸漬也馬雲風來客之浸淫以亂營衛之氣則風薄而熱起似不妥貼因而飽食張云此下三節皆兼上文風客淫氣而言也風氣既淫於外因而飽食則隨客陽明云云簡按下文有三因字故有此説腸澼為痔吳云腸中澼沫壅而為痔簡按續字彙澼腸間水蓋本於本篇而釋者竊考澼本是癖以其腸間闢積之水故從水作澼外臺癖飲或作澼飲與莊子潎澼洸之澼義迥別腸澼二字素靈中凡十見多指赤白滯痢而言唯本篇云腸澼為痔蓋古腸垢膿血出從穀道之總稱王下一而字云腸澼而為痔吳乃擴其意以釋之固是也張云為腸澼為痔而下痢膿血也此似鹵莽讀去者馬雲其腸日常澼積漸出肛門而為痔此豈以澼為襞之義乎難從因而強力吳張並從王注而為強力入房馬志高則為強用其力簡按下文云腎氣乃傷則王注似為得矣陽密乃固巢源作陰密陽固出十二卷冷熱病候考下文云陽強不能密陰氣乃絶則巢源誤志云此總結上文之義而歸重於陽焉是謂聖度高雲上文云聖人陳陰陽內外調和故復言因而和之志云是謂聖人調養之法度因於露風馬雲此上文見霧露之謂王注以露為裸體者非志云露陰邪也風陽邪也在天陰陽之邪傷吾身之陰陽而為寒熱病矣張云因露於風者寒邪外侵陽氣內拒陰陽相薄故生寒熱簡按張注與王意稍同洞泄陰陽應象作飧泄論疾診尺作後泄腸澼知洞泄即是飧泄邪氣臟腑病形云洞者食不化下嗌還出甲乙作洞泄蓋洞筒同説文筒通簫也徐云通洞無底漢元帝吹洞簫注與筒同水穀不化如空洞無底故謂之洞泄巢源洞泄者痢無度也水穀痢候引本篇文詳論之當參考又見小兒洞泄下利候王氏準繩云餐泄水穀不化而完出是也史記倉公傳迵風太平御覽作洞風即此也或飲食太過腸胃所傷亦致米穀不化此俗呼水穀利也邪氣留連蓋至夏之謂高雲邪氣留連至夏乃為洞泄痎瘧千金作痎瘧説具於瘧論秋傷於濕上逆而咳張云濕土用事於長夏之末故秋傷於濕也秋氣通於肺濕鬱成熱則上乘肺金故氣逆而為咳嗽簡按溯洄集云濕乃長夏之令何於秋言蓋春夏冬每一時各有三月故其令亦各就其本時而行也若長夏則寄旺於六月之一月耳秋雖亦有三月然長夏之濕令每侵過於秋而行故曰秋傷於濕秋令為燥然秋之三月前近於長夏其不及則為濕所勝其太過則同於火化其平氣則又不傷人此經所以於傷人止言風暑濕寒而不言燥也或問余曰五運六氣七篇所敘燥之為病甚多何哉余曰運氣七篇與素問諸篇自是兩書作於二人之手其立意各有所主不可混言王冰以為七篇參入素問中本非素問元文也余今所推之義乃是素問本旨當自作一意看此當只以秋髮病為論濕從下受故於肺為咳謂之上逆夫肺為諸氣之主今既有病則氣不外運又濕滯經絡故四肢痿弱無力而或厥冷也陰陽應象大論所謂冬生咳嗽既言過時則與本篇之義頗不同矣簡按安道此論極精茲揭其要當熟玩全篇痿厥張云太陰陽明論曰傷於濕者下先受之上文言因於濕者大筋緛短小筋弛長緛短為拘弛長為痿所以濕氣在下則為痿為厥痿多屬熱厥則因寒也溫病論疾診尺作疸熱溯洄集云寒者冬之令也冬感之偶不即發而至春其身中之陽雖始為寒邪所郁不得順其漸升之性然亦必欲應時而出故發為溫病也又云春為溫病者蓋因寒毒中人肌膚陽受所郁至春天地之陽氣外發其人身受郁之陽亦不能出故病作也韓祗和曰冬時感寒鬱陽至春時再有感而後發余謂此止可論溫病之有惡寒者耳其不惡寒者則亦不為再感而論發也故仲景曰太陽病發熱而渴不惡寒者為溫病是也馬雲熱論曰凡病傷寒而成溫者先夏至者為病暑陰陽應象大論云冬傷於寒春必病溫傷寒論云冬感於寒至春變為溫病則溫之為義明矣楊玄操釋五十八難之溫病以為是疫癘之氣者非也肝氣以津馬雲肝氣津淫而木盛張云津溢也脾氣乃絶志云肝多津液津溢於肝則脾氣乃絶其轉輸矣簡按即是本王注意大骨氣勞馬雲即上節之所謂高骨也玉機真藏論亦謂之大骨汪昂云高骨腰間命門穴上有骨高起張云勞困劇也喘滿漢石顯傳憂滿不食注滿悶同王注令人心悶蓋滿讀為悶也胃氣乃厚簡按王注脾氣不濡胃氣強厚此蓋脾約證傷寒論曰趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約麻子仁丸主之是也張云脾氣不濡則胃氣留滯故曰乃厚厚者脹滿之謂已覺欠理汪昂云按酸鹹甘辛言其害而不及其利也味苦言其利而未及其害也古文不拘一例不必穿鑿強解是以胃氣厚為利甚誤沮弛張云沮壞也志云遏抑也簡按王訓潤恐非是精神乃央新校正云央乃殃也馬雲央者半也四氣調神論有未央絶滅此言精神僅可至半也簡按二説並通王訓久恐誤又按五味偏過生疾其例不一言脾氣者二言心氣者亦二肝氣腎氣胃氣各一而不及肺氣未詳何理抑古文誤邪湊理廣雅湊聚也汲冢周書周於中土以為天下之大湊蓋會聚元真之處故謂之湊以其在肌肉中又從肉作腠文心雕龍湊理無滯吳注舉痛論云腠汗孔也理肉紋也瘧論汗空疏腠理開知是以腠為汗孔者誤氣骨以精宋本作骨氣高雲五味和則腎主之骨以正肝主之筋以柔肺主之氣心主之血以流脾主之湊理以密誠如是也則有形之骨無形之氣皆以精粹可謂謹道如法生氣通天而長有天命矣金匱真言論篇第四馬雲靈樞二十五人篇有金匱藏之其匱從木義蓋同也簡按漢高帝紀如淳云金匱猶金縢也師古曰以金為匱保慎之義天有八風靈九宮八風篇大弱風謀風剛風折風大剛風凶風嬰兒風弱風也以上八風蕭吉五行大義引太公兵書與呂覽及白虎通所載異經有五風馬雲風論有五臟風豈八風之外復有五風乎八風發其邪氣入於五臟之經而發病已簡按吳云經風論也非是所謂得四時之勝者吳接上句云此所謂得四時之勝而變病也簡按以下三十二字文義不順承恐他篇錯簡此一節又見六節臟象論王氏補文中俞吳云輸同五臟之氣至此而轉輸傳送也簡按經文俞輸腧通用玉篇腧五臟腧也史記五臟之輸注經穴也項氏家説云腧象水之竇即窬字也見難經匯考病在臟王馬張並云心臟志云夏時陽氣發越在外臟氣內虛故風氣乘虛而內薄病在四肢馬雲上文言腰股而此言四肢者以四肢為末如木之枝得寒而凋故不但腰股為病而四肢亦受病也高雲支肢同餘篇仿此故春善病鼻丸衄志云以下三故字皆頂上文東風生於春節而言高本衄作衄注云音忸今訛衄非簡按詩鄘風女子善懷箋善猶多也鼻丸作鼽為是説文鼽病寒鼻窒也釋名鼻塞曰鼽鼽久也涕久不通遂至窒塞也禮月令民多鼽嚏呂覽作鼽窒高誘注鼽齆鼻也靈經脈篇實則鼽窒虛則鼽衄王氏乃為洟鼻夷同鼻液也之義未詳所據衄説文鼻出血也篇海衄通作衄説文無衄字高氏改用俗字非秋善病風瘧高雲秋病肩背俞在肩背故秋善病風瘧風瘧者寒栗而肩背振動也簡按瘧論云邪客於風府循膂而下衛氣一日一夜大會於風府可見瘧邪自肩背始也肩背振動之解欠詳冬善病痹厥馬雲冬氣者病在腰股又在四肢故痹病厥病從之而生矣按蹺史記扁鵲傳鑱石橋引索隱云橋謂按摩之法説苑子越扶形子遊矯摩靈病傳篇喬摩灸尉蓋蹺九兆切與矯通橋喬並同易説卦坎為矯輮疏使曲者直為矯使直者曲為輮蓋蹺乃按摩矯揉之謂王注似迂樓氏綱目云按蹺二字非衍文其上下必有脫簡即冬不藏精者春必溫病之義也春不病頸項吳本無春字簡按前文無病頸項之言此五字恐剩文仲夏不病胸脅吳本無仲字非飧泄而汗出也此六字新校正云疑剩文是李冶古今黈云按本經生氣通天論云春傷於風夏乃洞泄夏傷於暑秋為痎瘧秋傷於濕冬為痿厥冬傷於寒春必病溫由是而言春夏秋冬無論啓閉政宜隨時導引以開通利導之但勿發泄使至於汗出耳竊疑本經當云冬不按蹺春必鼽衄或病頸項春不按蹺仲夏必病胸脅長夏必病洞泄寒中夏不按蹺秋必風瘧秋不按蹺冬必痹厥其飧泄而汗出也一句飧字當析之為勿令二字如此則辭旨俱暢可為通論矣大抵導引四時皆可為之惟不得勞頓至於汗出而苟勞頓至於汗出則非徒無益或反以致他疾不特於閉藏之時為不可雖春夏發生長育之時亦不可王太僕不悟本經舛漏堅主冬不按蹺謂按蹺則四時俱病蓋為紙上語所牽而肆為臆説也利害所繫甚重豫於是乎有辨簡按李説反似肆為臆説然其理固不可掩故備録此故藏於精者春不病溫張云人身之精真陰也為元氣之本精耗則陰虛陰虛則陽邪易犯故善病溫此正謂冬不按蹺則精氣伏藏陽不妄升則春無溫病又何慮乎鼽衄頸項等病簡按傷寒論太陽病發熱而渴不惡寒者為溫病程應旄注云太陽初得之一日即發熱而渴不惡寒者因邪氣早已內蓄其外感於太陽特其發端耳其內蓄之熱固非一朝一夕矣蓋自冬不藏精而傷於寒時腎陰已虧一交春陽發動即病未發而周身經絡已莫非陽盛陰虛之氣所布濩所云至春發為溫病者蓋自其胚胎受之也夏暑汗不出者秋成風瘧吳云冬宜閉藏失之則如上條所論夏宜疏泄逆之而汗不出則暑邪內伏遇秋風悽切金寒火熱相戰為瘧張云以上二節一言冬宜閉藏一言夏宜疏泄冬不藏精則病溫夏不汗泄則病瘧陰陽啓閉時氣宜然此舉冬夏言則春秋在其中矣此平人脈法也吳云脈法猶言診法也馬雲此皆因時為病脈亦宜知乃平病人之脈法也張云脈法者言經脈受邪之由然也簡按以上三説並屬曲解新校正云詳此下義與上文不相接蓋疑其有闕文者良然平旦四書脈云平者中分之意乃天地晝夜之平分也平明平曉義同説文旦明也從日見一上一地也簡按顧炎武日知録云平旦者寅也可疑李云平旦至日中自卯至午也是黃昏月令廣義云日落天地之色玄黃而昏昏然也又曰昏黃簡按日知録云黃昏者戌也亦可疑李云日中至黃昏自午至酉也合夜簡按猶暮夜言日暮而合於夜也蓋定昏之謂淮南子日至虞淵是謂黃昏至於蒙谷是謂定昏李云合夜至雞鳴自酉至子也此乃以黃昏合夜為一其以相去不遠均為酉刻也馬則為靈營衛生會篇所云合陰之義然合陰即人定亥也張則為子前並不可從雞鳴張云子前為陰中之陰子後為陽中之陽李云雞鳴至平旦自子至卯也簡按小學紺珠日知録之類並以醜為雞鳴今張李二氏以子為雞鳴者因以一日分四時而子午當二至卯酉當二分日出為春日中為夏日入為秋夜半為冬也雖雞未嘗以子而鳴然理固不得不然矣背為陽腹為陰張云人身背腹陰陽議論不一有言前陽後陰者如老子所謂萬物負陰而抱陽是也有言前陰後陽者如此節所謂背為陽腹為陰是也似乎相左觀邵子曰天之陽在南陰在北地之陰在南陽在北天陽在南故日處之地剛在北故山處之所以地高西北天高東南然則老子所言言天之象故人之耳目口鼻動於前所以應天陽面南也本經所言言地之象故人之脊骨肩背峙於後所以應地剛居北也矧以形體言之本為地象故背為陽腹為陰而陽經行於背陰經行於腹也天地陰陽之道當考伏羲六十四卦方圓圖圓圖象天陽在東南方圖象地陰在西北其義最精燎然可見簡按程子曰一身之上百理具備甚物是沒底背在上故為陽胸在下故為陰至如男女之生已有此象膀胱三焦王引靈樞文與宣明五氣注同今靈樞中無所考本藏篇云腎合三焦膀胱本輸篇云三焦者足少陽太陰之所將太陽之別也此與王所引義略同三焦詳義出五臟別論冬病在陰夏病在陽高雲冬病在陰腎也下文云陰中之陰腎也夏病在陽心也下文云陽中之陽心也知冬病在陰夏病在陽則知陰中之陰陽中之陽矣春病在陰秋病在陽高雲春病在陰肝也下文云陰中之陽肝也秋病在陽肺也下文云陽中之陰肺也知春病在陰秋病在陽則知陰中之陽陽中之陰矣雌雄張云即牝牡之謂吳云五行皆有雌雄如甲為雄乙為雌肝為雌膽為雄也志云雌雄臟腑也相輸應也吳云轉輸傳送而相應也志云輸應交相授受也收受吳云五方之色入通五臟謂之收五臟各藏其精謂之受張云言同氣相求各有所歸也東方青色入通於肝白虎通云肝木之精也東方者陽也萬物始生故肝象木色青而有枝葉開竅於目白虎通云肝目之為候何目能出淚而不能納物木亦能出枝葉不能有所內也五行大義云肝者木臟也木是東方顯明之地眼目亦光顯照了故通乎目其病發驚駭新校正疑為衍文是據下文例當云故病在頭其味酸洪範木曰曲直曲直作酸鄭注木實之性正義云木生子實其味多酸五果之味雖殊其為酸一也是木實之性然也月令春云其味酸是也其畜雞五行大義云鄭玄雲雞屬木此取其將旦而鳴近寅木故又振羽翼有陽性也賈誼新書云雞東方之牲也其穀麥月令鄭注云麥實有孚甲屬木上為歲星五行大義云歲星木之精其位東方主春以其主歲故名歲星簡按上上聲是以春氣在頭也坊本氣誤作風簡按據文例當云知病之在筋其音角月令正義云角是扣木之聲漢律曆志云角者觸也陽氣蠢動萬物觸地而生也其數八月令鄭注云數者五行佐天地生物成物之次也易曰天一地二天三地四天五地六天七地八天九地十而五行自水始火次之木次之金次之土為後木生數三成數八但言八者舉其成數正義云按尚書洪範云一曰水二曰火三曰木四曰金五曰土故其次如是也鄭注易繫辭云天一生水於北地二生火於南天三生木於東地四生金於西天五生土於中按原文此語再見其一此下有以益五行生之本句陽無耦陰無配未得相成地六成水於北與天一併天七成火於南與地二並地八成木於東與天三並天九成金於西與地四並地十成土於中與天五並也是鄭氏之意但言八者舉其成數者金木水火以成數為功是以知病之在筋也推余方之例此八字繫於錯出當在上為歲星之後其臭臊馬雲禮月令其臭膻膻與臊同簡按月令正義云通於鼻者謂之臭在口者謂之味臭則氣也説文臊豕膏臭也膻羊氣也五行大義云春物氣與羊相類南方赤色入通於心白虎通云心火之精南方尊陽在上卑陰在下禮有尊卑故心象火色赤而鋭也開竅於耳汪昂云耳為腎竅然舌無竅故心亦寄竅於耳是以夜臥聞聲而心知也簡按此似曲説而亦有理其味苦洪範火曰炎上炎上作苦月令夏云其臭焦其味苦鄭注焦氣之味正義云火性炎上焚物則焦焦是苦氣其畜羊月令春食麥與羊鄭注羊火畜也時尚寒食之以安性也簡按王云言其未非其谷黍志云黍糯小米也性溫而赤色故為心之谷簡按五行大義云黍色赤性熱又云黍舒散屬火上為熒惑星五行大義云熒惑火之精其位南方主夏以其出入無常故名熒惑是以知病之在脈也張云心主血脈也其音徵漢律曆志云徵者祉也萬物大盛蕃祉也中央黃色入通於脾張云土王四季位居中央脾為屬土之義其氣相通簡按白虎通云脾土之精故脾象土色黃也故病在舌本志云靈樞曰脾者主為衛使之迎糧視唇舌好惡以知吉凶是脾氣之通於舌也高雲靈樞經脈篇云脾是動則病舌本強故病在舌本簡按前文例當云病在脊其味甘洪範土爰稼穡稼穡作甘鄭注甘味生於百穀正義谷谷是土之所生故甘為土之味也月令云其味甘其臭香是也其畜牛月令中央鄭注牛土畜也正義云易坤為牛是牛屬土也簡按王注牽強其谷稷張云稷小米也粳者為稷糯者為黍為五穀之長色黃屬土簡按月令中央食稷與牛鄭注稷五穀之長上是鎮星五行大義云鎮星土之精其位中央主四季以其鎮宿不移故名鎮星漢天文志填星中央季夏土其音宮漢律曆志云宮者中也居中央暢四方唱始施生為四聲之經其數五志云五土之生數也土居五位之中故獨主於生數簡按沈括筆談云洪範五行數自一至五先儒謂之此五行生數各益以土數以為成數以謂五行非土不成故水生一而成六火生二而成七木生三而成八金生四而成九土生五而成十簡按此皇氏之説見月令正義云此非鄭義今所不取唯黃帝素問土生數五成數亦五蓋水火木金皆待土而成土更無所待故止一五而已畫而為圖其理可見為之圖者設木於東設金於西火居南水居北土居中央四方自為生數各並中央之土以為成數土自居其位更無所並自然止有五數蓋土不須更待土而成也合五行之數為五十則大衍之數也此亦有理今考土舉生數而水火金木舉成數者不特本經已禮月令亦然沈氏何不及此其臭香五行大義云元命苞曰香者土之鄉氣香為主也許慎云土得其中和之氣故香西方白色入通於肺白虎通云肺金之精西方亦金成萬物也故象金色白開竅於鼻白虎通云鼻出入氣高而有竅山亦有金石纍積亦有孔穴出雲布雨以潤天下雨則云消鼻能出納氣也故病在背吳云上言秋氣者病在背其味辛洪範金曰從革從革作辛鄭注金之氣正義云金之在火別有腥氣非苦非酸其味近辛故辛為金之氣味月令秋云其味辛其臭腥是也其畜馬周禮六牲馬其一也穆天子傳有獻食馬之文郭璞注云可以供廚膳者其谷稻志云稻色白而秋成故為肺之谷詳出湯液醪醴太白星五行大義云太白金之精其位西方主立秋金色白故曰太白其音商漢律曆志云商者章也物成章明也其臭腥五行大義云西方殺氣腥也許慎云未熟之氣腥也西方金之氣象此北方黑色入通於腎白虎通云腎水之精北方水故腎色黑開竅於二陰白虎通云水陰故腎雙竅為之候能瀉水亦能流濡故病在溪張兆璜云溪者四肢之八溪也冬氣伏藏故溪為之病八溪見五臟生成篇謂肘膝腕也簡按上文云冬氣者病在四肢此説得之其味鹹洪範水曰潤下潤下作咸鄭注水滷所生正義云水性本甘久浸其地變而為滷滷味乃咸月令冬云其味鹹其臭朽是也其畜彘月令冬鄭注彘水畜也揚雄方言云豬北燕朝鮮之間謂之豭關東西或謂之彘其谷豆月令夏鄭注菽實孚甲堅合屬水上為辰星五行大義云辰星水之精其位北方主冬是天之執正出入平時故曰辰星其音羽漢律曆志云羽者宇也物藏聚萃宇覆之也其臭腐月令冬其臭朽鄭注云水之臭正義云水受惡穢故有朽腐之氣五行大義云水受垢濁故其臭腐朽也故善為脈者吳云脈猶言診也一逆一從馬雲反四時者為逆順四時者為從志云此總結經脈之道生於五臟連於六腑外合五方五行陰陽六氣表裡循環有順有逆高雲一逆一從診脈法也由舉而按是為逆從按而舉是為從簡按數説未知孰是高注似鑿非其人勿教非其真勿授張云氣交變大論曰得其人不教是謂失道傳非其人漫泄天寶此之謂也高雲非其人勿教人難得也非其真勿授真難遇也得人得真自古難之勿教勿授自古祕之金匱真言此之謂也陰陽應象大論篇第五吳云天地之陰陽一人身之血氣應象者應乎天地而配乎陰陽五行也陰陽者天地之道也淮南子云天地之襲精為陰陽陰陽之專精為四時四時之散精為萬物綱紀詩大雅綱紀四方傳張之為綱理之為紀疏綱者網之大繩紀者別理絲數變化之父母月令正義云先有舊形漸漸改者謂之變雖有舊形忽改者謂之化又天地陰陽運行則為化春生冬落則為變又自少而壯自壯而老則為變自有而無自無而有為化書泰誓曰天地萬物父母神明之府也淮南泰族訓云其生物也莫見其所養而物長其殺物也莫見其所喪而物亡此之謂神明治病必求於本志云本者本於陰陽也人之臟腑氣血表裡上下皆本乎陰陽而外淫之風寒暑濕四時五行亦總屬陰陽之二氣致於治病之氣味用針之左右診別色脈引越高下皆不出乎陰陽之理故曰治病必求其本簡按此句諸家並衍王義而志聰注最為明備積陽為天積陰為地高雲陰陽者天地之道也故積陽為天積陰為地陰靜陽躁高雲陰陽者萬物之綱紀故陰靜陽躁靜而有常則為綱躁而散殊則為紀陽生陰長陽殺陰藏高雲陰陽者生殺之本始故陽生而陰長陽殺而陰藏簡按王注神農曰與天元紀大論文同此二句諸家殊義如李氏則舉三説然新校正説最為確當陽化氣陰成形高雲陰陽者變化之父母故陽化氣陰成形言陽化而為氣陰變而為形李云陽無形故化氣陰有質故成形馬雲陽化萬物之氣而吾人之氣由陽化之陰成萬物之形而吾人之形由陰成之寒極生熱熱極生寒李云冬寒之極將生春夏之熱冬至以後自復而之干也夏熱之極將生秋冬之寒夏至以後自姤而之坤也馬雲吾人有寒寒極則生而為熱如今傷寒而反為熱證者此其一端也吾人有熱熱極則生而為寒如今內熱已極而反生寒栗者此其一端也清氣在下則生飧泄馬雲熱氣主陽陽主上升而不凝故清氣生焉清氣生陽宜在上今反在下則生飧泄蓋有降而無升也簡按聖濟總録云內經曰清氣在下則生飧泄又曰久風為飧泄夫脾胃土也其氣衝和以化為事今清濁相干風邪之氣久而干故沖氣不能化而食物完出夕食謂之飧以食之難化者尤在於夕食故不化泄出也謂之飧泄此俗所謂水穀利也今考説文云飧餔也從夕甫聲是與飧字自異總録夕食之説未見所出詳義已見於前濁氣在上則主䐜脹馬雲濁氣主陰宜在下今反在上則生䐜脹蓋有升而無降也張云䐜脹胸膈滿也簡按聖濟總録云內經曰濁氣在上則生䐜脹夫清陽為天濁陰為地二者不可相干今濁氣在上為陰氣干擾而清陽之氣鬱而不散所以䐜塞而脹滿常若飽也廣韻䐜昌真切肉脹起也陰陽反作病之逆從也吳云反作倒置也逆從不順也張云作為也志云此吾人之陰陽反作氣之逆從而為病也此論陰陽體位各有上下馬雲按自陽化氣以下即當著人身説者觀下清氣濁氣之為在下在上生病口氣緊頂則陽化氣四句不得泛説簡按千金腎臟門云陰陽翻作陽氣內伏陰氣外升知是反翻通雨出地氣云出天氣高雲地氣上為云而曰云出天氣自上而下然後自下而上也天氣下為雨而曰雨出地氣從下而上然後從上而下也陰陽上下既神且明簡案性理大全朱子云雨如飯甑有蓋其氣蒸郁而汗下淋漓則為雨清陽出上竅馬雲如涕唾氣液之類濁陰出下竅馬雲如汙穢溺之類清陽發腠理濁陰走五臟志云清陽之氣通會於腠理而陰濁之精血走於五臟五臟主藏精者也清陽實四肢濁陰歸六腑志云四肢為諸陽之本六腑者傳化物而不藏此言飲食所生之清陽充實於四肢而渾濁者歸於六腑也飲食之有形為濁飲食之精氣為清簡按以上三段對言清陽濁陰而其義各殊王注不太明陽為氣陰為味張云氣無形而升故為陽味有質而降故為陰此以藥食氣味言也味歸形形歸氣張云歸依投也出詩曹風毛傳五味生精血以成形故味歸於形形之存亡由氣之聚散故形歸於氣志云陰為味陰成形地食人以五味以養此形故味歸形陽化氣諸陽之氣通會於皮膚肌腠之間以生此形故形歸氣氣歸精精歸化張云氣者真氣也所受於天與穀氣並而充身者也人身精血由氣而化故氣歸於精精者坎水也天一生水為五行之最先故物之初生其形皆水由精以化氣由氣以化神是水為萬物之原故精歸於化簡按家語云男子十六精化小通通雅小通言人道也併為化生之義又按上文云陽為氣陰為味吳云臊焦香腥腐為氣酸苦甘辛鹹為味此固然矣故形歸氣氣歸精精食氣氣生形氣傷精之氣字似與五味對言而為五氣之氣然至下文精化為氣氣傷於味而窮矣故姑從張氏之義精食氣形食味張云食如子食母乳之義氣歸精故精食氣味歸形故形食味馬雲所謂氣歸精者以精能食萬物之氣也精賴氣而生猶云食此氣耳主物之氣言所謂味歸形者以形能食萬物之味也形賴味而滋猶云食此味耳化生精氣生形馬雲所謂精歸化者以化生此精也化為精之母故精歸於化耳所謂形歸氣者以氣生此形也氣為形之父故形歸於氣耳指人身之氣言簡按以上四句乃解前文四句之義故馬氏下所謂字而釋之精化為氣張云謂元氣由精而化也上文既雲氣歸精是氣生精也而此又曰精化氣是精生氣也二者似乎相反而不知此正精氣互根之妙以應上文天地雲雨之義也李云氣本歸精氣為精母也此雲精化為氣者精亦能生氣也如不好色者氣因以旺也氣傷於味張云上文曰味傷形則未有形傷而氣不傷者如雲味過於酸肝氣以津脾氣乃絶之類是皆味傷氣也馬雲凡物之味既能傷人之形獨不能傷人之氣乎左傳晉屠蒯曰味以行氣壯火之氣衰少火之氣壯馬雲氣味太厚者火之壯也用壯火之品則吾人之氣不能當之而反衰矣如用烏附之類而吾人之氣不能勝之故發熱氣味之溫者火之少也用少火之品則吾人之氣漸爾生旺而益壯矣如用參耆之類而氣血漸旺者是也壯火食氣氣食少火馬雲何以壯火之氣衰也正以壯火能食吾人之氣故壯火之氣自衰耳何以少火之氣壯也正以吾人之氣能食少火故少火之氣漸壯耳壯火散氣少火生氣馬雲惟壯火為能食人之氣此壯火所以能散吾人之氣也食則必散散則必衰故曰壯火之氣衰惟吾人之氣為能食少火之氣此少火所以能生吾人之氣也食則必生生則必壯故曰少火之氣壯按此節分明論萬物有陰陽氣味而吾人用之有為泄為通為發泄為發熱及衰壯生散之義王注不明與前後陰陽氣味俱無著非本篇之大旨也簡按壯火少火承上文發熱以喻之氣薄喻少火厚喻壯火馬注為穩貼汪氏則訾馬注云是桂附永無用之期也蓋概論已再按張氏輩漫然以火為陽氣其義雖似精微與前後文不相承接故不可從矣陰勝則陽病陽勝則陰病張云此下言陰陽偏勝之為病也陰陽不和則有勝有虧故皆能為病簡按馬以此以下接前文為氣味大過生病之義志同並不可憑重寒則熱重熱則寒張云此即上文寒極生熱熱極生寒之義蓋陰陽之氣水極則似火火極則似水陽盛則隔陰陰盛則隔陽故有真寒假熱真熱假寒之辨此而錯認則死生反掌重平聲寒傷形熱傷氣張云寒為陰形亦屬陰寒則形消故傷形熱為陽氣亦屬陽熱則氣散故傷氣氣傷痛形傷腫吳云氣無形病故痛血有形病故腫風勝則動馬雲振掉搖動之類寒勝則浮吳云寒勝則陽氣不運故堅痞腹滿而為虛浮濕勝則濡瀉集韻濡儒遇切音孺沾濕也奇效良方云泄瀉人為一證耳豈知泄泄漏之義時時溏泄或作或愈瀉者一時水去如注泄赤水玄珠云糞出少而勢緩者為泄漏泄之謂也糞大出而勢直下不阻者為瀉傾瀉之謂也簡明醫要云濡瀉糞或若水考王注即水穀利與飧泄無別寒暑燥濕風此五氣配四時中央也左傳六氣陰陽風雨晦明乃別是一家之言內經無六氣之説而運氣家五氣之外加火配乎三陰三陽以為六氣夫火者五行之一豈有其理乎化五氣高雲心氣主喜肝氣主怒脾氣主悲肺氣主憂腎氣主恐以生喜怒悲憂恐喜怒傷氣寒暑傷形張云喜怒傷內故傷氣寒暑傷外故傷形舉喜怒言則悲憂恐同矣舉寒暑言則燥濕風同矣簡按壽夭剛柔云風寒傷形憂恐忿怒傷氣暴怒傷陰暴喜傷陽莊子在宥云人大喜耶毗於陽大怒耶毗於陰陰陽並毗四時不至寒暑之和不成樓英云此上二節經旨似有相矛盾既曰寒暑傷形又曰寒傷形熱傷氣者何也蓋言雖不一而理則有歸夫喜怒之傷人從內出而先發於氣故曰喜怒傷氣也寒暑之傷人從外入而先著於形故曰寒暑傷形也分而言之則怒之氣從下上而先發於陰故曰暴怒傷陰喜之氣從上下而先發於陽故曰暴喜傷陽寒則人氣內藏則寒之傷人先著於形故曰寒傷形暑則人氣外溢則暑之傷人先著於氣故曰熱傷氣也滿脈去形張云言寒暑喜怒之氣暴逆於上則陽獨實故滿脈陽亢則陰離故去形此孤陽之象也脈經曰諸浮脈無根者死有表無里者死其斯之謂重陰必陽重陽必陰張云重者重疊之義謂當陰時而復感寒陽時而復感熱或以天之熱氣傷人陽分天之寒氣傷人陰分皆謂之重蓋陰陽之道同氣相求故陽傷於陽陰傷於陰然而重陽必變為陰證重陰必變為陽證如以熱水沐浴身反涼涼水沐浴身反熱因小可以喻大下文八句即其徵驗此與上文重寒則熱寒極生熱義相上下所當互求故曰王子芳云引生氣通天論之文以證明之也春必病溫宋本作溫病簡按論疾診尺云寒生熱熱生寒此陰陽之變也故曰冬傷於寒春必生疸熱云云正與此節同義張云按此四節春夏以木火傷人而病反寒秋冬以寒濕傷人而反熱是即上文重陰必陽重陽必陰之義秋傷於濕汪昂云喻嘉言改作秋傷於燥多事端絡張云端正也絡聯絡之義高雲端直絡橫也論理人形至皆有表裡馬雲人有形體則論理之如骨度脈度等篇人有臟腑則列別之如靈樞經水腸胃海論等篇人有經脈則端絡之如經脈等篇脈有六合則通會之如經別等篇氣穴所發各有其處且有其名如氣穴論溪谷屬骨皆有所起如氣穴氣府骨空等篇分部逆從各有條理如皮部論等篇四時陰陽盡有經紀如本篇下節所云外內之應皆有表裡如血氣形志有太陰與陽明為表裡之謂志云分部者皮之分部也皮部中之浮絡分三陰三陽有順有逆各有條理也肝生筋五行大義云元命苞曰筋有枝條象於木也其在天為玄易文言天玄而地黃據下文例在天以下二十三字繫於衍文且與肝臟不相干宜刪之在色為蒼蒼草色也王謂薄青色可疑在聲為呼志云在志為怒故發聲為叫呼簡案王云亦謂之嘯蓋嘯蹙口而出聲也唐孫廣有嘯旨之書恐與叫呼不同在變動為握張云握同搐搦筋之病志云變動臟氣變動於經俞也握者拘急之象筋之證也在志為怒志云肝者將軍之官故其志在怒悲勝怒下文屬憂於肺據文例此悲當作憂新校正之説未允當心生血志云血乃中焦之汁奉心神而化赤故血者神氣也心主舌五行大義云火於五行不常見也須之則有不用則隱如舌在口內開口即見閉口則藏在體為脈説文脈血理分邪行體中者從派從血脈脈或從肉脈籀文玉篇脈莫革切血理也一曰筋脈脈同上五行大義云脈是血之溝渠通流水氣在變動為憂張云心藏神神有餘則笑不足故憂志云心獨無俞故變動在志心氣並於肺則憂在竅為舌吳云舌惟有竅故辨百味簡按此説奇當從王義熱傷氣苦傷氣二氣字依太素作脈義極穩脾生肉五行大義云肉是身上之土地在聲為歌志云脾志思思而得之則發聲為歌在變動為噦張云噦於決切厄逆也馬雲靈樞口問篇帝有問噦問噫之異王注以噦為噫者非宣明五氣篇志注噦厄逆也噦噦車鑾聲言厄聲之有倫序故曰噦簡按説文噦氣牾也楊上善解為氣忤蓋同義氣忤坊本作氣折宋本作忤是西方生燥志云西方主秋金之令故其氣生燥肺生皮毛管子云肺生革在聲為哭虞庶注難經云肺屬金金商也商傷也主於秋秋愁也故在志則悲哭此之謂也秋者愁也出尚書大傳熱傷皮毛寒勝熱據太素熱作燥寒作熱熱作燥為是在聲為呻張云氣鬱則呻吟腎之聲也志云呻者伸也腎氣在下故聲欲太息而伸出之寒傷血燥勝寒據太素血作骨燥作濕為是張云若以五行正序當云濕勝寒但寒濕同類不能相勝故曰燥勝寒也諸所不同如此蓋因其切要者為言也此説卻難憑咸傷血據太素血作骨為是左右者陰陽之道路也志云在天地六合東南為左西北為右陰陽二氣於上下四旁晝夜環轉而人之陰陽亦同天地之氣晝夜循環故左右為陰陽之道路水火者陰陽之徵兆也馬雲王注釋天元紀大論云徵信也驗也兆先也言水火之寒熱彰信陰陽之先兆也吳云陰陽不可見水火則其有徵而兆見者也陰陽者萬物之能始也能始二字難解高雲易曰坤以簡能乾知大始出於繫辭原文云乾知大始坤作成物乾以易知坤以簡能宋注知猶主也文少異此之謂也今姑從之腠理閉高閉作開簡按若作開則至下文汗不出而窮矣俯仰馬雲喘息粗氣不得其平故身為之俯仰俯俯也張云喘粗不得臥故為俯仰俯俯俯同音僕又音免煩冤馬雲冤音婉張云冤鬱而亂也高雲屈抑也簡按楚辭蹇蹇之煩冤王逸注冤屈也能冬不能夏馬雲能音耐禮記禮運聖人耐以天下為一家其耐作能蓋古以能耐通用靈陰陽二十五人篇亦有能作耐簡按家語食水者善遊能寒漢朝錯傳能暑能寒身寒汗出張云陽衰則表不固故汗出脈要精微論亦曰陽氣有餘為身熱無汗陰氣有餘為多汗身寒身常清集韻清與清同寒也更勝之變張云更勝迭為勝負也即陰勝陽病陽勝陰病之義病之形能也吳云病之見證謂之病形能冬能夏謂之病能馬雲帝以法陰陽為問而伯以陰陽偏勝為病者言之正以見陰陽不可不法也簡按吳説誤能與態同詳見病能論七損八益王注欠詳諸家亦無確説本邦前輩所解殆似得經旨因備録於下曰天真論云女子五七陽明脈衰六七三陽脈衰於上七七任脈衰此女子有三損也丈夫五八腎氣衰六八陰氣衰於上七八肝氣衰八八腎氣衰齒落此丈夫有四損也三四合為七損矣女子七歲腎氣盛二七天癸至三七腎氣平均四七筋骨堅此女子有四益也丈夫八歲腎氣實二八腎氣盛三八腎氣平均四八筋骨隆盛此丈夫有四益也四四合為八益矣不知用此則早衰之節也吳云知七損八益盛衰之期而行持滿之道則陰寒陽熱二者可調不知用此則早衰之節次也下文遂言早衰之節簡按王注用謂房色義難曉年四十吳云此言早衰之節也志云男子以八為期故四十而居半簡按五八腎氣始衰乃二八八八之中故謂半也陰痿吳云痿與萎同草木衰而萎也陰痿陰事弱也簡按巢源作陰萎漢書膠西於王端傳陰痿一近婦人病數月師古注痿音萎氣大衰千金作氣力大衰故同出而名異耳吳云同得天地之氣以成形謂之同出有長生不壽之殊謂之名異簡按千金無故字老子第一章此兩者同出而異名同謂之玄智者察同愚者察異高雲察同者於同年未衰之日而省察之智者之事也察異者於強老各異之日而省察之愚者之事也身體輕強王弘義云上文曰體重耳目不聰明此節曰耳目聰明身體強健又見其陰陽互相資益之妙恬憺之能千金能作味從欲快志於虛無之守千金作縱欲快志得於虛無之守張云從欲如孔子之從心所欲也快志如莊子之樂全得志也虛無之守守無為之道也天不足西北淮南天文訓昔者共工與顓頊爭為帝怒而觸不周之山天柱折地維絶天傾西北故日月星辰移焉地不滿東西故水潦塵埃歸焉河圖括地象云西北為天門東南為地戶注天不足西北是天門地不滿東南是地戶天有精地有形馬雲在上為天其氣至精在下為地其體成形簡按春秋繁露氣之清者為精莊子形本生於精天有八紀高雲春夏秋冬二分二至八節之大紀也地有五里高雲五里東南西北中五方之道里也馬雲里當從理簡按里理蓋古通用不必改上配天以養頭靈邪客篇天圓地方人頭圓足方以應之中傍人事志云節五味適五志以養五臟之大和天氣通於肺張云天氣清氣也謂呼吸之氣清氣通於五臟由喉而先入肺太陰陽明論曰喉主天氣地氣通於嗌甲乙嗌作咽張云地氣濁氣也謂飲食之氣濁氣通於六腑由嗌而先入胃嗌咽也太陰陽明論曰咽主地氣其義皆同嗌音益穀氣通於脾甲乙千金及五行大義谷作榖簡按王注谷空虛諸家亦為山谷之氣蓋地氣既為水穀之氣若以谷為榖則義相重故從原文然其説率屬牽強宜從甲乙等而為水穀之氣榖谷古通用漢王莽傳榖風迅疾注即穀風也為水注之氣張云言水氣之注也如目之淚鼻之涕口之津二陰之尿穢皆是也雖耳若無水而耳中津氣濕而成垢是即水氣所致氣至水必至水至氣必至故言水注之氣簡按外臺引刪蘩論作水注之於氣又五行大義引本經作九竅為水法天之紀用地之理則災禍去矣今由此則注乃法之訛氣乃紀之誤而之上有天字文義似順承矣然法天之紀用地之理則災禍去矣三句與下文故不法天之紀不用地之理則災禍至矣三句雖語意相反然卻是重復蕭氏引他書文極為精核不知是古文果如此否張氏以倒字法釋之頗覺允當姑從之暴氣象雷趙府本熊本氣作風馬雲一本作暴風於雷字不通宜從氣字張云天有雷霆火鬱之發也人有剛暴怒氣之逆也故語曰雷霆之怒水穀之寒熱吳云五味貴於中和寒則陰勝熱則陽勝陽勝生熱陰勝生寒皆能害乎腸胃也簡按王説執拘從陰引陽從陽引陰志云陰陽氣血外內左右交相貫通故善用針者從陰而引陽分之邪從陽而引陰分之氣簡按義見靈樞終始禁服四時氣篇及六十七難以右治左以左治右張云繆刺之法也以我知彼志云以我之神得彼之情見微則過宋本則作得高雲過失也病始於微萌而得其過失之所在簡按張云則度也蓋讀為測者非徐云從陰引陽二句言在上者治下在下者治上以我知彼欲體察也以表知里達內外也過與不及總結上文觀夫陰陽左右表裡之過與不及也善用針者不待病形已具方知過與不及若微見徵兆便知其過其明如此用針豈有危殆哉善診者馬雲診視驗也診之為義所該者廣凡望聞問切等法皆可以言診也簡按孔平仲雜説云診不止脈也視物可以為診後漢王喬傳詔尚方診視是也審清濁而知部分吳云色清而明病在陽分色濁而暗病在陰分又面部之中有五部以五行之色推之視喘息聽音聲張志引金匱要略詳解之當參考觀權衡規矩而知病所主甲乙規上有視字主作生按尺寸觀浮沉滑澀謂按尺膚而觀滑澀按寸口而觀浮沉也尺非寸關尺之尺古義為然以治無過甲乙治下有則字為五字一句是也因其輕而揚之徐云因從其所因也因其邪氣輕浮於表而用氣輕薄之劑而發揚之如傷寒一二日用葛根之類是也因其重而減之張云重者實於內故宜減之減者瀉也因其衰而彰之張云衰者氣血虛故宜彰之彰者補之益之而使氣血復彰也形不足者溫之以氣張云此正言彰之之法而在於藥食之氣味也以形精言則形為陽精為陰以氣味言則氣為陽味為陰陽者衛外而為固也陰者藏精而起亟也故形不足者陽之衰也非氣不足以達表而溫之精不足者陰之衰也非味不足實中而補之簡按諸注以形為陰故於溫之之義而支矣張注詳備今從之其高者因而越之馬雲謂吐之使上越也竭之張云竭祛除也謂滌蕩之疏利之可以治其下之前後也李云承氣抵當之類徐云如濕氣勝而為濡瀉等證用五苓散之類又如積痢在下而為裡急後重等證用承氣湯牽牛散之類引而竭之也中滿者瀉之於內吳云中滿腹中滿也此不在高不在下故不可越亦不可竭但當瀉之於內消其堅滿是也李云內字與中字照應漬形以為汗吳云謂天氣寒腠理密汗不易出則以辛散之物煎湯漬其形體覆而取汗也徐云熱邪內郁宜於汗解因其腠理乾燥而汗不得出者以溫水微漬形體使之腠理滋潤以接其汗之出也今用熱湯圍浴而出汗者是也其在皮者汗而發之張云前言有邪者兼經絡而言言其深也此言在皮者言其淺也滑云二汗只是一義然漬字輕發字重也簡按滑注似與經旨相乖矣其慓悍者按而收之吳云慓悍卒暴也按謂按摩也言卒然暴痛慓悍之疾則按摩而收之收謂定其慓悍也簡按張以按為察李為制伏酸收用如芍藥之義並非審其陰陽以別柔剛李云審病之陰陽施藥之柔剛簡按柔劑剛劑見史倉公傳此説為是血實宜決之張云決謂泄去其血如決水之義氣虛直觢引之甲乙觢作掣吳云觢掣同氣虛經氣虛也經絡之氣有虛必有實處宜掣引其實者濟其虛者刺法有此張云掣挽也氣虛者無氣之漸無氣則死矣故當挽回其氣而引之使復也如上氣虛者升而舉之下氣虛者納而歸之中氣虛者溫而補之是皆掣引之義簡按張注雖明鬯不如吳氏之於經旨而切矣字書觢音誓牛兩角豎者名觢
