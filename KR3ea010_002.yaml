body:
  text: 卷二陰陽離合論篇第六馬雲陰陽者陰經陽經也其義論離合之數故名篇此與靈樞根結篇相為表裡其要一也吳云其要則本於一陰一陽也張云一即理而已志云寒暑往來陰陽出入總歸於太極一氣之所生簡按吳注為得矣萬物方生方今也詩秦風方何為期鄭箋方今以何時為還期也命曰陰中之陽吳云言天地生物之初陰陽之判如此簡按此節舉陰中之陰陰中之陽者即為次節論人身中有陰中之陰陰中之陽之起本陽予之正吳云予與同簡按予王讀為施意正同志云予我也可謂強解矣天地四塞張云四塞者陰陽痞隔不相通也亦數之可數吳云數上如字下上聲張同簡按馬雲俱上聲恐非是張云凡如上文者皆天地陰陽之變也其在於人則亦有陰中之陽陽中之陰上下表里氣數皆然知其數則無不可數矣數推測也三陰三陽之離合張云分而言之謂之離陰陽各有其經也並而言之謂之合表裡同歸一氣也聖人南面而立張云云聖人者崇人道之大宗也南面而立者正陰陽之向背也簡按易說卦聖人南面而聽天下嚮明而治禮郊特牲君之南鄉答陽之義也後曰太衝張云人身前後經脈任脈循腹裡至咽喉上頤循面入目衝脈循背裡出頏顙其輸上在於大杼分言之則任行乎前而會於陽明沖行於後而為十二經脈之海出於動輸篇海論痿論又逆順肥瘦云衝脈者五臟六腑之海也故前曰廣明後曰太衝合言之則任沖名位雖異而同出一原通乎表裡此腹背陰陽之離合也結於命門張云下者為根上者為結志云按靈樞根結篇曰太陽根於至陰結於命門命門者目也陽明結於顙大顙大者鉗耳也少陽結於蔥籠蔥籠者耳中也太陰根於隱白結於太倉少陰根於湧泉結於廉泉厥陰根於大敦結於玉英簡按此經余經不言結故志詳註之名曰陰中之陽張云此以太陽而合於少陰故為陰中之陽然離則陰陽各其經合則表裡同其氣是為水藏陰陽之離合也下仿此中身而上名曰廣明吳云言所謂前曰廣明者指中身而上言之中身而下則非也厥陰之表名曰少陽志云太陽之氣在上故曰少陰之上兩陽合明曰陽明在二陽之間而居中土故曰太陰之前厥陰處陰之極陰極於裡則生表出之陽故曰厥陰之表蓋以前為陽上為陽表為陽也曰上曰前曰表者言三陽之氣也名曰陰中之少陽張云所謂少者以厥陰氣盡陰盡而陽始故曰少陽太陽為開陽明為闔少陽為樞張云此總三陽為言也太陽為開謂陽氣發於外為三陽之表也陽明為闔謂陽氣在於內為三陽之裡也少陽為樞謂陽氣在表裡之間可出可入如樞機也然開闔樞者有上下中之分亦如上文出地未出地之義而合乎天地之氣也志云開闔者如戶之扉樞者扉之轉牡也舍樞不能開闔舍開闔不能轉樞是以三經者不得相失也摶而勿浮宋本摶作搏簡按王注搏擊於手當從宋本史倉公傳三陰俱搏者如法不俱搏者決在急期義與此同高雲摶音團聚凝一而弗浮志云摶者園也高勿作弗並誤中為陰吳云中腹中也腹中為脾衝脈在脾之下高雲由外陽內陰之義而推論之然則中為陰中亦內也太陰坤土在內而居中也簡按馬雲人身之中半非也陰之絕陽名曰陰之絕陰馬雲乃陰經中之絕陽絕陽者純陰也名曰陰之絕陰絕陰者盡陰也簡按靈系日月篇云兩陰交盡故曰厥陰厥通作蹶漢食貨志天下財產何得不蹶師古注蹶盡竭也史記倉公傳厥陰作蹶陰又晏子春秋云陰冰厥陽冰厚五寸併為王注之左證矣徐刪陰之絕陽四字似是張云本篇所言惟足經陰陽而不及手經者何也觀上文云天覆地載萬物方生未出地者命曰陰處名曰陰中之陰則出地者名曰陰中之陽蓋言萬物之氣皆自地而升也而人之腰以上為天腰以下為地言足則通身上下經氣皆盡而手在其中矣故不必言手也然足為陰故於三陽也言陰中之陽於三陰也言陰中之陰然則手經亦有離合其在陽經當為陽中之陽其在陰經當為陽中之陰可類推矣𩅞𩅞熊音中高雲𩅞沖同蓋本於新校正別本簡按𩅞字書並引本經不釋其義篇海云音中字彙補云一本作沖沖非以𩅞音沖也王注為往來之義必有所據通雅云忡忡猶沖沖也古素問作𩅞𩅞忡仲憂貌出詩召南沖沖行也出廣雅義不相涉蓋依音而漫解者陰陽別論篇第七吳云此篇言陰陽與常論不同自是一家議論故曰別論簡按有五臟別論經脈別論吳義為長馬雲據篇中有別於陽者知病處也等語則別當彼劣切非也四經十二從馬雲四經者肝心肺腎為四經而不言脾者寄旺於四經之中也十二從者手有三陰三陽足有三陰三陽而十二經脈之行相順而不悖也吳云十二從十二支也十二支不復主事但從順於四經故曰十二從也張云從者即手之三陰從臟走手等義簡按四經雖無明據當從王注如十二從則從王吳之義為十二辰十二支則至人有二字而窮矣若依馬張之說而為三陰三陽則至下文云應十二脈而窮矣宜置於闕如之例凡陽有五五五二十五陽高雲凡陽有五肝心脾肺腎皆有和平之陽脈也五五二十五陽者肝脈應春心脈應夏脾脈應長夏肺脈應秋腎脈應冬春時而肝心脾肺腎之脈皆有微弦之胃脈夏時而肝心脾肺腎之脈皆有微鉤之胃脈長夏而肝心脾肺腎之脈皆有微緩之胃脈秋時而肝心脾肺腎之脈皆有微毛之胃脈冬時而肝心脾肺腎之脈皆有微石之胃脈是五五二十五陽所謂陽者胃脘之陽也志云所謂二十五陽者乃胃脘所生之陽氣也胃脘者中焦之分主化水穀之精氣以資養五臟者也四時五臟之脈皆得微和之胃氣故為二十五陽也簡按王注為人迎之氣誤別於陽者知病處也吳云言能別於陽和之脈則一部不和便知其部有病是能知乎病處也別於陰者知死生之期吳云別真臟之陰脈者則知其死於克賊持於相生如肝病真陰脈見死於庚辛心病真陰脈見死於壬癸下文肝至懸絕急十八日死之類皆是也三陽在頭三陰在手張云三陽在頭指人迎也三陰在手指氣口也太陰陽明論曰陽明者表也為之行氣於三陽蓋三陽之氣以陽明胃氣為本而陽明動脈曰人迎在結喉兩旁一寸五分故曰三陽在頭又曰足太陰者三陰也為之行氣於三陰蓋三陰之氣以太陰脾氣為本然脾脈本非氣口何云在手如五臟別論曰五味入口藏於胃以養五臟氣而變見於氣口氣口亦太陰也故曰三陰在手上文以真臟胃氣言陰陽此節以人迎氣口言陰陽簡按此本於王注更為詳備而汪心谷則以手足三陰三陽經解之以毀王注其理益晦汪說出古今醫統內經要旨滑云三陽當作二陽謂結喉兩旁人迎脈以候足陽明胃氣三陰謂氣口以候手太陰肺氣也胃為五臟之本肺為百脈之宗也此說亦有所見故附於此馬志高並本於汪氏以經脈流注解之吳則為三部九候之義並不明晰別於陽者知病忌時別於陰者知死生之期滑云二句申前說或直為衍文亦可所謂陰陽者吳云所謂世所謂也意若曰此眾謀之陰陽非吾之所謂陰陽也簡按上文既云所謂陰者真臟也所謂陽者胃脘之陽也而此亦云所謂陰陽者故吳有此解然考其語勢似不必然矣真脈之臟脈滑作真臟之脈要旨汪氏云真脈之臟脈者謂真臟脈之至數以分五臟之屬也肝至懸絕急滑云愚謂懸絕如懸絲之微而欲絕也王注如懸物之絕去似指代脈言也要旨汪氏云至脈之應也懸絕止絕也急勁也張云懸絕急者全失和平而弦搏異常也志云懸絕者真臟孤懸而絕無意氣之陽和也急者肝死脈來急益勁如張弓弦也簡按張志之解似是脾至懸絕四日死高雲土位中央灌溉四旁上火下水左木右金土氣不能四應故四日死簡按王注不及脾獨死於生數之義故取高說而補之馬論天干之五行相剋其間多有不合宜遵王意二陽之病發心脾張云二陽陽明也為胃與大腸二經然大腸小腸皆屬於胃故此節所言則獨重在胃耳蓋胃與心母子也人之情欲本以傷心母傷則害及其子胃與脾表裡也人之勞倦本以傷脾臟傷則病連於腑故凡內而傷精外而傷形皆能病及於胃此二陽之病所以發於心脾也簡按王履云腸胃有病心脾受之發心脾猶言延及於心脾也滑云青田老人謂心脾當作肺脾下文風消脾病息賁者肺病深為有理今詳經文張注為是不得隱曲女子不月張云不得隱曲陽道病也夫胃為水穀氣血之海主化營衛而潤宗筋如厥論曰前陰者宗筋之所聚太陰陽明之所合也痿論曰陰陽總宗筋之會會於氣衝而陽明為之長然則精血下行生化之本惟陽明為最今化原既病則陽道外衰故不得隱曲其在女子當為不月亦其候也王氏注曰夫腸胃發病心脾受之心受之則血不流脾受之則味不化然心脾何以受腸胃之病未免牽強不可不察隱曲二字本經見者凡五皆指陽道為言以類察之可得其義吳云俯首謂之隱鞠躬謂之曲簡按吳說未見明據今從張注要旨云汪氏質疑注肢體為之勁急而不能伸曲也吳蓋本此風消諸家皆仍王注為枯瘦之義獨汪心谷為上消渴風消二字他無所考未知孰是今兩存之聖濟總錄載治方出第十三卷息賁馬雲賁奔同喘息上奔痰嗽無寧此非肺積之息賁乃喘息而賁張云胃病則肺失所養故氣息奔急氣竭於上由精虧於下敗及五臟故死不治腨㾓張云足肚痠疼曰腨㾓簡按列子心㾓體煩㾓煩郁也與此義殊索澤樓英云索澤即仲景所謂皮膚甲錯也簡按諸注皆從王義吳獨作索睪注云睪音高索引也睪腎丸也控睪二字內經中凡四見或云腰脊控睪未有單言控睪而為病名者則吳說不為得矣頹疝馬雲與㿗同簡按㿗㿉同本作隤詩周南我馬虺隤爾雅作虺頹釋名云陰腫曰隤氣下隤也又曰疝言詵也詵詵然引小腹急痛也乃經脈篇㿉疝脈解篇疝五色篇㿉陰並同一切經音義云丸頹又作㾽陰病也原病式云㿗疝小腹控卵腫急絞痛也朱震亨云㿗疝其形陰囊腫縋如升如斗不癢不痛是也吳云頹頑也頹疝腎丸大而不疼頑然不害者也頹墜也今訓頑未見所據心掣吳云心引而動也張云心動不寧若有所引名曰心掣志云心虛而掣痛簡按聖濟總錄云心火胥應而不寧其動若掣者乃其證也馮兆張錦囊秘錄云古無怔忡之名名曰心掣者是也下文曰其傳為膈志說似是隔張云以木乘土脾胃受傷乃為隔證如邪氣臟腑病形篇曰脾脈微急為膈中風論曰胃風之狀食飲不下鬲塞不通上膈篇曰食飲入而還出者皆隔之謂簡按王注欠詳驚駭張云肝胃二經皆生驚駭如金匱真言論曰東方通於肝其病發驚駭經脈篇曰足陽明病聞木聲則惕然而驚背痛馬雲二經之脈胃自頭以行於足肝自足走腹皆無與於背者而此曰背痛意者陰病必行於陽也張云背痛者手足陽明之筋皆夾脊也汪昂云按四經皆與背無涉而云背痛未詳噫馬雲氣轉也又飽出息也脈解篇所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故上走心為噫也口問篇寒氣客於胃厥逆從下上散復出於胃故曰噫觀此則胃心之病宜發為噫張云噫噯氣也詳見宣明五氣篇欠馬雲氣相引也經脈篇胃脈為病有數欠宣明五氣九針論皆曰腎為欠今曰善欠者胃之病也張云欠呵欠也簡按說文欠張口氣悟也象氣從兒上出之形風厥張云風厥之義不一如本篇者言二陽一陰發病名曰風厥言胃與肝也其在評熱病論者言太陽少陰病也在五變篇者曰人之善病風厥漉汗者肉不堅腠理疏也簡按又見史倉公傳心滿簡按滿懣同善氣志云善氣者太息也心系急則氣道約故太息以伸出之簡按禮記勿氣鄭注謂不鼻息也乃志聰之義為得矣馬吳張高並不注三陽三陰發病志云太陽太陰之為病也太陽為諸陽主氣而主筋陽氣虛則為偏枯陽虛而不能養筋則為痿脾屬四肢故不舉也痿易張云痿弱不支左右相掉易也馬雲左右變易為痿也簡按俱非也易是狂易之易不如平常也王注是鼓一陽曰鉤志云鉤當作弦此論四經之脈以應四時也鼓動也一陽之氣初升故其脈如弦之端直以應春生之氣也高同鼓陽勝急曰弦志云弦當作鉤陽氣正盛故其脈來盛去悠如鉤之急以應夏熱之氣也高同鼓陽至而絕曰石志云至者為陽陽氣伏藏故脈雖鼓至而斷絕以應冬藏之氣也滑云當作鼓陰至而絕此四者蓋亦真臟脈也簡按鼓陽作鼓陰近是然以四者為真臟脈恐非陰陽相過曰溜志云溜滑也陰陽相遇其脈則滑長夏之時陽氣微下陰氣微上陰陽相遇故脈滑也此言人有四經以應四時之氣也張云陰陽相過謂流通平順也脈名曰溜其氣來柔緩而和應脾脈也簡按志以溜為滑本於吳注馬雲溜作流靈本輸篇溜於魚際其義主流蓋溜流古通不必改字滑云如水之溜而不收即下文關格之類非又按鼓一陽以下二十九字與上下文不相順接是它篇錯簡在此爾起則熏肺使人喘鳴張云此兼表裡以言陰陽之害也表裡不和則或為臟病陰爭於內也或為經病陽擾於外也魄汗未藏者表不固也四逆而起者陽內竭也其至正不勝邪則上熏及肺今人氣喘聲鳴此以營衛下竭孤陽上浮其不能免矣陰之所生和本曰和吳本上和字下句注意與王同張云陰者五臟之真陰也陰之所以生者以臟氣和臟氣之和以陰陽之和也不和則為爭為擾為剛為淖而病由興矣志云陰之所生之陽脈與所本之陰脈相和而始名曰和高雲獨陽不生獨陰不長陰之所生和本曰和言陰之所以能生萬物者以陰和而復本於陽和也簡按此二句旨義尤幽深不能輒領會故舉數說爾淖則剛柔不和吳云此言偏陰之害淖謂陰氣太過而潦淖也張云淖謂寒濕妄行陰氣勝也簡按行針篇血氣淖澤滑利春秋繁露夫物愈淖而愈易變動搖盪也淮南原道訓甚淖而滒注滒亦淖也饘粥多沉者曰滒淖廣韻奴教切說文泥也一切經音義引字林濡甚曰淖吳張為陰氣有餘之義為是志高並云淖和也誤本經釋音淖音淘水朝宗於海此以淖為𣶃𣶃即俗作潮亦誤不過四日而死簡按馬張依新校正之說死作已是志高仍原文云以陽臟相生而傳故不過四日之偶數而死以陰臟相剋而傳故不過三日之奇數而死也以三四奇偶之數固然死者猶云生陽其義不通闢陰簡按王注闢並乃闢讀為僻僻偏也而上闢水升之解未允張云闢放闢也土本制水而水反侮脾水無所畏是謂闢陰此說似是馬雲乘所不勝陰以侮陰謂之闢陰吳云闢邪辟也腎為水脾為土土勝水為正今腎水反侮於脾不得其正故曰闢陰此解亦未允結陽者腫四肢馬雲結者氣血不疏暢也吳云陽手足六陽也其脈行於四肢之表若有結邪則四肢脈氣壅滯故腫聖濟總錄云夫熱勝則腫而四肢為諸陽之本陽結於外不得行於陰則邪熱菀於四肢故其證為腫況邪在六腑則陽脈不和陽脈不和則氣留之以其氣留故為腫也犀角湯犀角玄參連翹柴胡升麻木通沉香射干甘草芒硝麥門冬上水煎結陰者便血一升馬雲營氣屬陰營氣化血以奉生身惟陰經既結則血必瘀蓄而初結則一升再結則二升三結則三升結以漸而加則血以漸而多矣聖濟總錄云夫邪在五臟則陰脈不和陰脈不和則血留之結陰之病以陰氣內結不得外行血無所稟滲入腸間故便血也地榆湯地榆甘草縮砂仁水煎陰陽結斜馬雲斜邪同靈動輸篇有少陰之大絡循陰股內廉邪入膕中則古蓋斜邪通用志云結斜者偏結於陰陽之間也簡按志注非吳張高並同馬義石水馬雲陰氣多而陽氣少即陰盛陽虛也則陽不能入之陰而內之所聚者為石水靈邪氣臟腑病形篇云腎脈微大為石水起臍以下至小腹腄腄然上至胃脘死不治張云石水沉堅在下簡按金匱要略云石水其脈自沉外證腹滿不喘尤怡注石水水之聚而不行也因陰之盛而結於少腹故沉而不喘張氏醫通云越脾加朮湯發之消馬雲按此篇止謂消至脈要精微論有癉成為消中奇病論有轉為消渴靈邪氣臟腑病形篇本經通評虛實論皆曰消癉氣厥論有肺消膈消種種不同其間各有所指隔馬雲俗亦謂之干隔簡按上文王注隔塞不便而此亦云隔塞而不便瀉則似云便閉之證志高作膈水馬雲平人氣象論頸脈動喘疾咳曰水目裹微腫如臥蠶起之狀曰水又曰足脛腫曰水靈水脹篇水始起也目裹微腫如新臥起之狀又宣明五氣論靈九針論皆曰下焦溢為水此皆本篇所謂水也喉痹張云痹者閉也簡按春秋繁露云陰陽之動使人足病喉痹痹者閉也本出於中藏經陰搏陽別吳云此以下論脈也簡按王注以陰陽為尺寸諸家皆從之而高特云言陰氣過盛搏擊於內不與陽和似乎別出此不以脈候而解者蓋以經文無脈字也脈分尺寸昉乎難經而靈素所無故以陰陽為尺寸者其無稽尤甚然徵之於後世有與王注符者儒門事親載胡王之妻病臍下積塊嘔食麵黃肌瘦而不月或謂之乾血氣治之無效戴人見之曰孕也其人不信再三求治於戴人與之平藥以應其意終不肯下毒藥後月到果胎也人問何以別之戴人曰尺脈洪大也素問陰陽別論所謂陰搏陽別之脈試之於今往往有驗王義雖與經旨相左實不可廢焉李云言陰脈搏動與陽脈迥別也陰陽二字所包者廣以左右言則左為陽右為陰以部位言則寸為陽尺為陰以九候言則浮為陽沉為陰舊說以尺脈洪實為陰與寸陽脈迥別似矣然則手少陰脈動甚亦在寸也何取於陽別之旨乎故必會通諸種陰陽而後可決也三因方云搏者近也陰脈逼近於下陽脈別出於上陰中見陽乃知陽施陰化法當有子也簡按婦人良方亦與此說同似未妥腸闢簡按王為開腸洞泄之義拘矣馬吳諸家並從新校正作澼吳云陰陽指尺寸而言虛謂脈來浮而無根也腸澼後泄血沫也是陽加於陰謂之汗張云陽言脈體陰言脈位汗液屬陰而陽加於陰陰氣泄矣故陰脈多陽者多汗陽虛陰搏諸本作陰虛陽搏是當改夕時死吳云水火俱搏謂之陰陽爭夕時不陰不陽邪爭之會也故死平旦死宋本馬本無平旦二字趙府本熊本吳張本並有之張云平旦者木火王極而邪更甚故死三日死張云三陽手太陽小腸足太陽膀胱也水一火二故死在三日其死之速者以既搏旦鼓陽邪之盛極也三陰三陽俱搏吳云三陰脾及肺也三陽小腸及膀胱也四經皆無陽和之氣故脈來俱見急搏心腹滿發盡吳云心病於上脾病於中小腸膀胱病於下故今心腹皆滿盡極也發盡脹滿之極也簡按志作心滿腹發盡非隱曲不利簡按高釋上文云不得為房幃之隱曲也而至此章則云小腸之火氣發泄已盡不得有所隱曲也隱幽隱曲曲匿與上文不得隱曲不同也未知何義如王注亦於上文則以隱蔽委曲釋之於此章則云便瀉也如張注則云陰道不利也蓋推張之意凡下焦運化之用總謂之隱曲然則二便通利亦在其中歟王注風論與前節同五日死吳云五為土數萬物所歸今四經俱病三焦俱傷故不能逃乎五日也其病溫高雲以陽明之陽而見溫熱之病陽亢津竭故死不治病溫二字熊本吳本作氣濫吳云口氣臭敗則清陽已絕簡按字書濫溢也故以氣濫為口臭甚奇不過十日死馬雲十日者地四生金天五生土止九日而十則九日之餘也靈蘭秘典論第八吳云靈臺蘭室黃帝藏書之所秘典秘藏典籍也十二臟張云臟藏也六臟六腑總為十二分言之則陽為腑陰為臟合言之則皆可稱臟猶言庫藏之藏所以藏物者如宣明五氣篇曰心藏神肺藏魄之類是也簡按下篇有十一臟之稱周禮有九臟莊子有六臟可見其無定名焉相使貴賤張云相使者輔相臣使之謂貴賤者君臣上下之分吳云清者為貴濁者為賤遂言簡按王注六節藏象云遂盡也遂言二字見家語心者君主之官也簡按靈邪客篇云心者五臟六腑之大主精神之所舍荀子解蔽篇云心者形之君也神明之主也出令而無所受令淮南子云夫心者五臟之主也所以制使四肢流行血氣五行大義引本經作主守之官云心為主守之官神明出者火者南方陽光暉人君之象神為身之君如君南向以治易以離為火居太陽之位人君之象人之運動情性之作莫不由心故為主守之官神明所出也說文官吏事君也玉篇官宦也肺者相傅之官五行大義云肺為相傅之官治節出者金能裁斷相傅之任明於治道上下順教皆有禮節肺於五臟亦治節所出治節馬雲凡為治之節度從是而出焉張云節制也靈五癃津液別云五臟六腑心為之主肺為之相肝者將軍之官五癃津液別篇云肝為之將師傅篇云肝者主為將吳云肝氣急而志怒故為將軍之官簡按奇病論云肝者中之將也取決於膽肝膽為表裡故肝出謀發慮而膽為之斷決也日知錄云春秋傳昭公二十八年豈將軍食之而有不足正義曰此以魏子將中軍故謂之將軍及六國以來遂以將軍為官名蓋其元起於此管子立政篇將軍大夫以朝官吏膻中者臣使之官張云按十二經表裡有心包絡而無膻中心包之位正居膈上為心之護衛脹論曰膻中者心主之宮城也李云貼近君主故稱臣使臟腑之官莫非王臣此獨泛言臣又言使者使令之臣如內侍也滑云膻徒旱切上聲濁字說文云肉膻也音同袒褐之袒云膻中者豈以袒裼之袒而取義耶簡按滑注屬曲解韓詩外傳舜甑盆無膻注膻即今甑篦所以盛飯使水火之氣上蒸而後飯可熟謂之膻猶人身之膻中也義太明切李高及汪昂但云膻中即心包絡非蓋二者雖在上焦膻中則無形之宗氣心包絡則包心之血絡豈可概而為一乎薛雪云膻中亦名上氣海為宗氣所積之處心包絡包為膜心君之宮室絡為膜外之巷術心君之城府也一為密勿之地一是畿甸之間臣使之義著焉膻中者宮室外之城府也此說近是喜樂出焉吳云膻中氣化則陽氣舒而令人喜樂氣不化則陽氣不舒而令人悲愁是為喜樂之所從出也李云喜笑屬火此云喜樂出焉其配心君之府較若列眉矣脾胃者倉廩之官五行大義無胃字荀子富國篇楊倞注谷藏曰倉米藏曰廩遺篇刺法論云脾為諫議之官知周出焉三因方作公正出焉脾為諫議大夫出於千金方及胡悟五臟圖說大腸者傳道之官本輸篇及五行大義引河圖大腸為傳道之腑韓詩外傳大腸者轉輸之腑也三十五難大腸傳瀉行道之腑也馬雲道導同小腸者受盛之官本輸篇三十五難韓詩外傳及五行大義引河圖並云小腸者受盛之腑也化物出焉張云小腸居胃之下受盛胃中水穀而分清濁水液由此而滲於前糟粕由此而歸於後脾氣化而上升小腸化而下降故曰化物出焉高雲受胃之濁水穀未分猶之受盛之官腐化食物先化後變故化物由之出焉腎者作強之官伎巧出焉高雲腎藏精男女構精鼓氣鼓力故腎者猶之作強之官造化生人伎巧由之出焉吳云伎音技作強作用強力也伎多能也巧精巧也簡按高注仍王義似是李云腎處北方而主骨宜為作強之官水能化生萬物故曰伎巧出焉五行大義云腎為作強之官伎巧出者水性是智智必多能故有伎巧巧則自強不息也古今黈云技雖不至於道亦遊於藝者之所貴巧雖未至於神亦妙萬物而為言不作強則何以得之故知作強者乃精力之謂以上三說略與王旨差姑存之俟考三焦決瀆之官吳云決開也瀆水道也上焦不治水濫高原中焦不治水停中脘下焦不治水蓄膀脹故三焦氣治則為開決溝瀆之官水道無泛溢停蓄之患矣簡按本輸篇三焦者中瀆之腑也水道出焉五行大義云三焦處五臟之中通上下行氣故為中瀆腑也又引河圖云三焦孤立為內瀆之腑說文瀆溝也今據倉廩傳道受盛等之例而考之決疑是中或云央誤荀子入其央瀆注中瀆也如今人家出水溝也膀胱者州都之官張云膀胱位居最下三焦水液所歸是同都會之地故曰州都之官簡按本輸篇二十五難及五行大義引河圖云膀胱為津液之腑韓詩外傳膀胱湊液之腑也周禮地官五黨為州鄭注州二千五百家人四縣為都津液藏焉氣化則能出矣張云膀胱有下口而無上口津液之入者為水水之化者由氣有化而入而後有出是謂氣化則能出矣營衛生會篇曰水穀俱下而成下焦濟泌別汁循下焦而滲入膀胱正此謂也然氣化之原居丹田之間是名下氣海天一元氣化生於此元氣足則運化有常水道自利所以氣為水母知氣化能出之旨則治水之道思過半矣蕭京軒岐救正論云夫三焦既主相火水道之出無非稟氣以為決也不曰能出而曰出焉蓋氣本自化不待化於氣而始能出也今津液主水膀胱司水水不自化而化於氣此陰以陽為用未免少費工夫故不曰出焉而曰則能出矣語意之次又包許多妙用十二官趙獻可醫貫云玩內經註文即以心為主愚謂人身別有一主非心也謂之君主之官當與十二官平等不得獨尊心之官為主若以心之官為主則下文主不明則十二官危當云十一官矣蓋此一主者氣血之根生死之關十二經之綱維也呂東莊評云十二官各有所司而惟心最貴心得其職則十二官皆得其宜猶孟子謂耳目之官不思而蔽於物心之官則思思則得之蓋心與百體分言之則各有所官統言之則心為百體之主即此義也故曰君主之官曰主明文義自見若謂別有一主則心已不可稱君主豈主復有主乎又謂下文當云十一官不當云十二官此拘牽句字而不求其義也即以經文例之六節臟象論云凡十一臟取決於膽五臟六腑膽已在內則宜云十臟而云十一臟又將別有一膽耶靈樞邪客篇曰心者五臟六腑之大主精神之所舍如趙氏言亦止應云四臟六腑之大主矣又豈心非其心耶趙氏欲主張命門為一身之要未嘗無說而必穿鑿經文附會之卻不可為訓凡論學論醫皆不可如此其宗大危高雲宗祧且危簡按說文宗尊祖廟也白虎通云宗者何謂也宗者尊也為先祖主宗人之所尊也至道在微高雲承上文大危之意而言至道在微上文大危乃人心惟危之義此至道在微乃道心惟微之義道惟微也故變化無窮既微且變則人孰知其原窘乎哉消者瞿瞿吳云窘窮也乎哉嘆辭張云瞿瞿不審貌謂十二官相失則精神日消瞿瞿然莫審其故誠哉窘矣馬雲瞿音履禮檀弓瞿瞿如有求而弗得注云眼目速瞻之貌彼不知此養生之法者有消而無長瞿瞿然驚顧擬而議之窘迫哉此消者瞿瞿也簡按詩東方未明篇狂夫瞿瞿傳無守之貌禮玉藻視容瞿瞿注驚遽不審貌張注本之張馬注義並通吳志高俱仍王注以消為消息之義豈有此理耶且王以瞿瞿訓勤勤未見所出太素作濯濯廣雅濯濯肥也一曰娛遊也閔閔之當馬雲閔閔者說文以為病與傷通也唯不知其要則閔閔然獨當其病孰知何法為善耶張云閔閔憂恤也謂能憂人之憂而恤人之危者又孰足以當其明哲之良哉蓋甚言知道之少也簡按馬引說文有訛閔愍通故張以憂恤釋之二說並不妥王為深遠之義必有所本毫釐孫子算經蠶吐絲為忽十忽為一絲十絲為一毫十毫為一釐其形乃制馬雲唯心為君主之官有以制此形耳張云積而不已而形制益多也高雲道之形體乃制制正也精光之道大聖之業志云精純粹也光光明也高雲心主神明猶之精光之道也主明下安猶之大聖之業也齋戒簡按王引韓說見易上繫辭聖人以此齋戒注周禮膳夫王日一舉齋日三舉論語齋必變食而不飲酒不茹葷出莊子靈蘭之室馬雲靈樞刺節真邪篇外揣篇皆藏此室文王有靈臺語有芝蘭之室俱異常之謂志云心之宮也簡按志注非是傳保高雲以傳後世而保守弗失焉六節臟象論篇第九馬雲篇內首問六六之節後又問臟象何如故名篇高論上加大字云大論二字舊本誤傳四氣調神下今各改正簡按此篇論運氣與天元紀大論等義同故高雲爾不可從也篇內自岐伯對曰昭乎以下至孰多可得聞乎七百一十八字新校正云全元起注本及太素並無疑王氏之所補也今考篇中多論運氣他篇所無且取通天論自古通天者云云其氣三三十一字與三部九候論三而成天云云四十五字湊合為說其意竟不可曉又且立端於始云云十二字全襲左傳文公元年語明是非舊經之文故今除之不及釋義運氣別是一家無益於醫術前賢諸論詳載於匯考及解精微論後六六之節張云天有上下四方是為六合地有正隅中外是為九宮此乾坤合一之大數也凡寰中物理莫不由之故節以六六而成歲人因九九以制會簡按諸傢俱仍王注獨張注如此若果如其言則當云六之節九制會而不可云六六九九王義為得矣人以九九制會吳云黃鐘之數起於秬黍以九重之而制律制度制量制衡會會通也古者天子巡狩會諸侯必同其律同其度同其量同其衡謂之會通此人之所制也志云蓋人有九竅九藏地有九州九野以合三而成天三而成地三而成人故先言人以九九制會而後言地以九九制會也簡按王注及吳志解未允會蓋周禮天官少宰要會之會鄭注月計曰計歲計曰會家語執轡篇天一地二人三三三如九九九八十一蓋九九八十一數之極故曰人以九九制會三百六十五節邪客篇云歲有三百六十五日人有三百六十節呂覽云三百六十六日人亦有四肢五臟九竅三百六十六節子華子云一人之身為骨凡三百有六十精液之所朝夕也大神靈問吳云神靈指天地陰陽而言志注同簡按王注似允當嗜欲不同吳云五臟各有嗜欲聲色臭味各有所通而入五臟也諸注並同今從之天食人以五氣吳云五氣非徒臊焦香腥腐而已此乃地氣非天氣也蓋謂風氣入肝暑氣入心濕氣入脾燥氣入肺寒氣入腎當其不亢不害則能養人人在氣交之中以鼻受之而養五臟是天食人以五氣也簡按吳注似是而卻非下文云五氣入鼻藏於心肺若如吳說則當云藏於五臟張仍王注固有以也蠡海集云人之水溝穴在鼻下口上一名人中蓋居人身天地之中也天氣通於鼻地氣通於口天食人以五氣鼻受之地食人以五味口受之穴居其中故名之曰人中五色修明王注修潔分明蓋以為修飾之修也靈小針解五色循明古書修循多通用以養五氣張云胃藏五味以養五臟之氣神之變也新校正云全元起本並太素作神之處為是靈本神篇云生之來謂之精兩精相搏謂之神五行大義云心藏神者神以神明照了為義言心能明瞭萬事神是身之君象火淮南子云神者心之寶也其華在面張云心主血脈血足則面容光彩脈絡滿盈故曰其華在面陽中之太陽九針十二原篇云陽中之太陽心也陰陽系日月篇云心為陽中之太陽魄之處也靈本神篇云並精而出入者謂之魄陽中之太陰十二原篇云陽中之少陰肺也新校正為是精之處也本神篇云生之來謂之精陰中之少陰十二原篇云陰中之太陰腎也系日月篇云腎為陰中之太陰新校正為是簡按張注引刺禁論規新校正之說為強解焉魂之居也本神篇云隨神往來者謂之魂簡按左傳昭七年子產曰人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽至於神明杜注魄形也陽神氣也孔穎達正義云人稟五常以生感陰陽以靈有身體之質名之曰形有噓吸之動謂之為氣形氣合而為用知力以此而強故得成為人也其初人之生也始變化為形形之靈者名之曰魄也既生魄矣魄內自有陽氣氣之神者名之曰魂也魂魄神靈之名附形之靈為魄附氣之神為魂也附形之靈者謂初生之時耳目心識手足運動啼呼為聲此則魄之靈也附氣之神者謂精神性識漸有所知此則附氣之神也孝經說曰魄白也魂芸也白明白也芸芸動也形有體質取明白為名氣唯噓吸取芸動為義蓋精亦神也爽亦明也精是神之未著爽是明之未昭關尹子云魂藏肝魄藏肺五行大義引老子經亦同韓詩外傳云精藏腎神藏心魂藏肝魄藏肺志藏脾說文魂陽氣也魄陰神也俱與本經之義相發焉以生血氣簡按上文云心其充在血脈又云肺者氣之本而又於肝云以生血氣最可疑宜依上文例刪此四字從太素而補入其色與味三焦膀胱簡按五臟別論云夫胃大腸小腸三焦膀胱此五者天氣之所生也本臟篇云腎合三焦膀胱又云密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄經文並言三焦膀胱如此又五行大義論腎命門云猶如三焦膀胱俱是水腑不妨兩號今以大義之言參諸經文三焦膀胱乃是一腑靈蘭秘典云三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉蓋以通行水道之用謂之三焦其實專指下焦而言以收藏津液之體謂之膀胱此云名曰器則正有名有狀之三焦與靈樞如漚如瀆如霧之三焦此乃與三十一難所論同手少陽三焦經脈所行之三焦各各不同凡經論中有三三焦詳見於張氏質疑錄當參考王三陽亦有三焦論其旨略與張意同出於傷寒綱目營之居也張云營者水穀之精氣也水穀貯於六腑故為營之所居簡按靈營氣篇云營氣之道內谷為寶谷入於胃氣傳之肺流溢於中布散於外精專者行於經隧常營無已痹論云營氣者水穀之精氣也營衛生會篇云營氣出於中焦皆其義也入出者也李云胃受五穀名之曰入脾與大小腸三焦膀胱皆主出也四白簡按李杲云四白當作四紅非四盛以上為格陽靈終始禁服並云人迎四盛且大且數名曰溢陽溢陽為外格王引正理論與傷寒論平脈法之文同四盛以上為關陰終始禁服並云脈口四盛且大且數名曰溢陰溢陰為內關四倍以上為關格終始禁服並云人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期張云俱盛四倍以上謂盛於平常之脈四倍也物不可以過盛盛極則敗凡脈盛而至於關格者以陰陽離絕不能相營故致羸敗此本吳注諸家作贏為盈義極盡也精氣天稟也言不能盡其天年而夭折也脈度篇曰邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣大盛則陰不利陰脈不利則血留之血留之則陰氣盛矣陰氣大盛則陽氣不能榮也故曰關陽氣大盛則陰氣弗能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死也世人病此不少歷代醫師相傳謬甚夫所謂關格者陰陽痞絕不相營運乖羸離敗之候也故人迎獨盛者病在三陽之腑也寸口獨盛者病在三陰之臟也或見於人迎或見於氣口皆孤陽之逆候實真陰之敗竭也無陰則無根而孤陽浮露於外耳凡犯此者必死無疑是皆酒色傷精所致又以人迎在頭系陽明表脈故人迎倍大者曰格陽寸口在手系太陰里脈故寸口倍大者曰關陰陰陽互極抗拒不通故名關格不可易也若在尺為關在寸為格難經平脈法及李杲朱震亨並從前諸注皆如此關則不得小便格則吐逆丹溪纂要竟立關格門為病名特言膈食與癃閉耳非此之謂也簡按蓋關格言表裡陰陽痞絕之候張氏仍馬注發其餘義尤為明確然脈要精微論曰陰陽不相應病名曰關格史記倉公曰切其脈肝氣濁而靜此內關之病也則謂之關格為脈體而非病名可耶張氏醫通立關格門辨馬張二家之誤尤詳當參考不能極於天地之精氣滑云過乎中也蓋極者中也不及則不得為中太過亦不得為中簡按此說太異五臟生成篇第十心之合脈也張云心主血血行脈中故合於脈吳云心主血而藏神脈則血體而神用故心合脈其主腎也吳云其以之為主而畏者腎也志云心主火而受制於腎水是腎乃心臟生化之主故其主腎也凝泣熊音上兼陵反結也下音澀不滑也馬雲泣澀同吳同楊慎外集云素問脈泣則血虛又云寒氣入經而稽遲泣而不行又云多食鹹則脈凝泣而變色泣音義與澀同按說文沴音麗水不利也沴與淚同泣亦水不利也泣與澀同亦可互證胝䐢而唇揭吳云肉粗疏胝䐢而唇掀揭也張云胝皮厚也手足駢胝之謂通雅云胝皮肉生繭不仁也䐢脯也簡按巢源有四肢發胝候廣韻胼胝皮上堅也䐢集韻仄遇切皺也蓋胝䐢者斂縮之義肉在皮里肉之斂縮不可得而見唇為肉之外候以其掀揭而知肉之斂縮故言肉胝䐢而唇揭若為胼胝之類則不通此五味之所合也五臟之氣簡按當從太素也字移氣下故色見吳故改敗非草茲志云茲蓐席也草茲者死草之色青而帶白也簡按爾雅釋器蓐謂之茲郭注公羊傳曰屬負茲茲者蓐席也史記倉公傳望之殺然黃察之如死青之茲俱可以確志聰之解耳馬王諸家以滋釋之果然則豈枯澤之色乎並不可從黃如枳實張云黃黑不澤也黑如炱千金翼炱下有煤字五行大義作水苔非赤如衃血說文衃凝血也蟹腹蟹黃見本草李時珍云腹中之黃應月盈虧如以縞裹朱脈經縞作綿禹貢厥篚玄纖縞孔傳玄黑繒縞白繒纖細也小爾雅繒之精者曰縞通雅縞子虛賦注縞鮮支今所謂素硟以石輾繒色光澤也詩豳風我朱孔陽為公子裳毛傳朱深纁也孔氏疏士冠禮裳注云凡染絳一入謂之縓再入謂之頳三入謂之緟朱則四入矣硃色深於緟故云朱深纁也志云榮色隱見於皮膚之間有若縞裹者也裹紅說文紅帛赤白色釋名紅絳也白色之似絳者裹紺說文紺帛深青揚赤色釋名紺含也青而含赤色也簡按王注薄青不知何據馬注本於說文栝樓實馬雲樓蔞同裹紫說文紫帛青赤色論語皇疏北方間色諸脈者皆屬於目大惑論云五臟六腑之精氣皆上注於目而為之精口問篇云目者宗脈之所聚也此四肢八溪之朝夕也張云四肢者兩手兩足也八溪者手有肘與腋足有骻與膕也此四肢之關節故稱為溪朝夕者言人之諸脈髓筋血氣無不由此出入而朝夕運行不離也邪客篇曰人有八虛皆機關之室真氣之所過血絡之所遊即此之謂一曰朝夕即潮汐之義言人身血氣往來如海潮之消長早曰潮晚曰汐者亦通吳云朝夕會也古者君臣朝會謂之朝夕會謂之夕謂脈髓筋血氣五者與四肢八溪相為朝夕而會見也簡按張前說似允當蓋溪者筋骨罅隙之謂王充論衡云投一寸之針布一丸之艾於血脈之溪篤病有瘳肝受血而能視李氏脾胃論肝作目指受血而能攝說文攝引持也莊子胠篋云必攝緘縢固扃鐍攝字之義與此同張云按血氣者人之神也而此數節皆但言血而不言氣何也蓋氣屬陽而無形血屬陰而有形而人之形體以陰而成如九針篇曰人之所以生成者血脈也營衛生會篇曰血者神氣也平人絕谷篇曰血脈和則精神乃居故皆言血者謂神依形生用自體出也為痹王注𤸷字釋音音頑廣韻痹也字彙手足麻痹也簡按痹病所指極廣故加𤸷字明其麻痹之痹後世頑麻頑痹之頑本是𤸷字蓋依音同而稱之者志云金匱要略曰血痹病從何得之師曰汗出臥不時動搖加被微風遂得之汗出者言衛氣之虛於外也臥則衛歸於陰出則血行於外加被風吹則血凝於皮膚而為痹矣要略云血痹外證身體不仁如風痹狀志以痹為血痹王則為𤸷痹義互相發焉不得反其空馬雲空與孔同不得反其空穴志云空骨空也骨空者節之交三百六十五穴會絡脈之滲灌諸節者也血行於皮膚不得反循於穴會故為痹厥也吳張仍王注簡按志注似與下文相順承大谷十二分張云大谷者言關節之最大者也在手者肩肘腕在足者踝膝腕四肢各有三節是為十二分分處也按此即上文八溪之義夫既曰溪何又曰谷如氣穴論曰肉之大會為谷小會為溪肉分之間溪谷之會以行榮衛以會大氣是溪谷雖以小大言而為氣血之會則一故可以互言也上文單言之故止云八溪此節與下文小溪三百五十四名相對為言故云大谷也諸注王馬吳同以大谷十二分為十二經脈之部分者皆非志云分者肉分而有紋理也小溪三百五十四名張云小溪者言通身骨節之交也小針解曰節之交三百六十五會者絡脈之滲灌諸節者也簡按子華子云一身之為骨凡三百六十五節即此義也志云名穴名也蓋肉分之間而有交會交會之處而有穴名也馬吳張俱依王注四改三志高仍舊文非是少十二俞吳云俞十二經之俞也十二俞不在三百五十三名之內故言少十二俞張云謂十二臟之俞如肺俞心俞之類是也此除十二俞皆通於臟氣者不在小溪之列馬同高雲十二俞即大谷十二分是也簡按新校正云別本及全元起本太素俞作關知高注尤是衛氣之所留止張云凡此溪谷之會本皆衛氣留止之所若其為病則亦邪氣所客之處也簡按諸家仍王義張注似允緣而去之張云治以針石必緣其所在取而去之緣因也簡按諸家仍王義張注似允先建其母吳云建立也母應時胃氣也如春脈微弦夏脈微鉤長夏脈微軟秋脈微毛冬脈微石謂之中和而有胃氣土為萬物之母故謂之母也若弦甚則知其病始於肝鉤甚則知其病始於心軟甚則知其病始於脾毛甚則知其病始於肺石甚則知其病始於腎故曰欲知其始先建其母馬雲母者五臟相乘之母也張云母病之因也不知其母則標本弗辨故當先建其母如下文某臟某經之謂高雲母病本也簡按吳主王義似是五脈經脈別論云五脈氣少胃氣不平三陰也徵四失論云診不中五脈巔疾脈要精微論云厥成為巔疾過在馬雲過者病也凡內經以人之有病如人之有過誤故稱之曰過脈要精微論云故乃可診有過之脈此非過與不及之過亦非經過之過乃指病而言也吳云過責其過也言有上件病證責其過在少陰巨陽志云實者邪實虛者正虛是以頭痛巔疾乃邪氣實於上而使正氣虛於下也蓋邪之中人始於皮毛氣分留而不去則轉入於經是以過在巨陽少陰之經而甚則入腎蓋經絡受邪則內干臟腑矣簡按下文云病在膈中過在手巨陽少陰則知吳義長矣徇蒙招尤吳徇作眴云眴音眩目動也目半合謂之蒙全合謂之冥尤斿同招尤搖動不定也張云徇亦作巡行視貌蒙茫昧也招掉搖也尤甚也目無光則矇昧不明頭眩動則招尤不定滑云徇蒙招尤當作眴矇招搖眴蒙謂目瞬動而矇昧下文目冥是也招搖謂頭振掉而不定也要旨同簡按本事方招尤作招搖沈承之云尤與搖同徇蒙者如以物蒙其首招搖不定皆暈之狀也志高並云徇眴同眴眩古字通見揚雄劇秦美新文蓋徇眴同眩也尤搖同不必改字也張氏醫通云徇蒙招尤目瞑耳聾肝虛風動也六君子加鉤藤羌防芎歸甘菊目冥高雲冥瞑同支鬲胠脅吳云支支離而痛也張云支隔塞也志云支支絡鬲內膈也簡按支技同王注六元正紀支痛云支拄妨也諸注並非廣雅胠脅也咳嗽上氣吳云聲出於肺謂之咳咳而連聲謂之嗽上氣浮腫也張云上氣喘急也簡按周禮天官疾醫職嗽上氣鄭注上氣逆喘也吳以上氣為浮腫誤咳嗽詳義見於咳論脈之小大滑澀浮沉簡按邪氣臟腑病形云調其脈之緩急小大滑澀四難云浮沉長短滑澀俱舉脈之大綱而言之耳五臟相音張云相形相也音五音也相音如陰陽二十五人篇所謂木形之人比於上角之類又如肝音角心音徵脾音宮肺音商腎音羽若以勝負相參臧否自見五而五之二十五變凡耳聰心敏者皆可意會而識也簡按王不釋相字得張注而義明志云五臟之相合於五音發而為聲此亦主王注也馬雲人有相與音雖見於外而五臟主其中吳云相音五音相為循環也俱義未允赤脈之至也吳赤下句馬雲赤白青黃黑之下俱當讀診人之色已赤矣及其脈之至也湧盛如喘之狀張云此下即所以合脈色也心痹簡按鄭玄易通卦驗注云痹者氣不達為病王注蓋本於此喘而浮脈經浮下有大字注云喘疑作濡驚有積氣吳云上虛肺自虛也下實心在肺下而為邪謂之實也蓋肺金不足則心火乘其虛而克賊之驚心實而驚肺受火邪失其治節故有積氣在胸中簡按諸注以驚為上虛吳獨以為實恐非甲乙作為積氣在胸中蓋積氣在胸中心神不安故驚似義易通喘而虛馬雲其脈喘當為虛吳云有積氣在胸中令人喘而虛也志云膻中之正氣反虛故為虛喘也簡按王注以喘為病吳志從之為是矣寒熱張云金火相爭金勝則寒火勝則熱也吳同志云臟真高於肺主行榮衛陰陽陰陽虛乘則為往來之寒熱也使內高雲得之醉而使邪氣之內入也簡按此解不通長而左右彈甲乙而下有弦字脈經彈下有診曰二字張云言兩手俱長而弦強也彈搏擊之義厥疝高雲腹中脾部也有厥氣乃土受木克土氣厥逆而不達也土受木克故不名曰脾痹名曰厥疝疝肝病也簡按脾痹見四時刺逆從論女子同法高雲女子無疝肝木乘脾之法則同也志云男女氣血相同受病亦屬同法故於中央土臟而曰女子同法者欲類推於四臟也簡按志注鑿矣得之疾使四肢汗出當風吳云脾主四肢胃主四末疾使四肢則勞而汗易出風乘土虛客於其部故見上件諸證高雲得之疾猶言得之外疾簡按高注牽強上堅而大張云上言尺之上即尺外以候腎也志云上堅者堅大在上而不沉也汪昂云上字未解簡按諸注未允汪以為未詳實然五色之奇脈簡按據甲乙衍之奇脈三字面青目青目青諸本作目赤當改五臟別論篇第十一馬雲別如字此乃五臟之別是一論故名篇吳同方士文選七發方術之士李善注孔安國論語注云方道也女子胞張云子宮是也簡按漢外戚傳善臧我兒胞師古注謂胎之衣也此即胞衣又倉公傳風癉客脬正義脬亦作胞此即膀胱而其為子宮之義者史傳無所考然胞衣每兒化成膀胱不限女子明是子宮矣質疑錄云陰陽別論云女子胞氣厥論云胞移熱於膀胱五味篇云衝脈任脈皆起於胞中凡此胞字皆音包以子宮為言也靈樞云膀胱之胞薄以懦音拋以溲脬為言也奇恆之腑高雲奇異也恆常也言異於常腑也其氣象天張云轉輸運動象天之氣高雲傳導水穀變化而出猶之天氣之所生也從上而下故其氣象天從上而下故瀉不藏魄門魄粕通莊子天道篇古人之糟魄已夫音義司馬雲爛食曰魄一云糟爛為魄本又作粕蓋肛門傳送糟粕故名魄門王注恐鑿矣氣口張云氣口之義其名有三手太陰肺經脈也肺主諸氣氣之盛衰見於此故曰氣口肺朝百脈脈之大會聚於此故曰脈口脈出太淵其長一寸九分故曰寸口是名雖三而實則一耳簡按倉公傳太陰之口亦謂寸口為五臟主經脈篇曰經脈者常不可見也其虛實也以氣口知之經脈別論曰權衡以平氣口成寸以決死生之分難經一難曰十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之法何謂也然寸口者脈之大會五臟六腑之所終始故法取於寸口也六腑之大源也靈五味篇云胃者五臟六腑之海也玉版論云胃者水穀氣之海也甲乙林億等注云稱六腑雖少錯於理相發為佳氣口亦太陰也馬雲五味入口藏於胃而得脾以為之運化致五臟之氣無不藉之資養則是脾者足太陰也肺者手太陰也其氣本相為流通而氣口亦手太陰耳張云氣口屬肺手太陰也布行胃氣則在於脾足太陰也經脈別論曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺然則胃氣必歸於脾脾氣必歸於肺而後行於臟腑營衛所以氣口雖為手太陰而實即足太陰之所歸故曰氣口亦太陰也簡按馬張所解其理雖詳備而考之經文似不太明李中梓診家正眼刪亦字出於胃變見於氣口吳云五臟六腑之氣味皆出於胃熏蒸於肺肺得諸臟腑之氣轉輸於經故變見於寸口高雲五臟六腑之氣味始則五味入口藏於胃繼則脾氣轉輸氣味皆出於胃循經脈而變見於氣口簡按出字全本作入而王注亦云谷入於胃然據吳高注意不必改入字其義自明五氣入鼻藏於心肺張云上文言五味入口藏於胃者味為陰也此言五氣入鼻藏於心肺者氣為陽也鼻為肺之竅故心肺有病而鼻為之不利觀此兩節曰味曰氣皆出於胃而達於肺既達於肺亦必變見於氣口故氣口獨為五臟主簡按吳云風暑濕燥寒天之五氣也誤察其下適其脈吳云下謂二便也張云適測也簡按當從太素補上字候字下文其病下補能字拘於鬼神者史記扁鵲云信巫不信醫六不治也異法方宜論篇第十二吳云異法者治病不同其法方宜者五方各有所宜砭石南史王僧孺傳全元起欲注素問訪王僧孺以砭石答曰古人以石為針必不用鐵說文有此砭字許慎云以石刺病也東山經云高氏之山多針石郭璞云可以為砥針治癰腫春秋美疢不如惡石服子慎注石砭石也季世無復佳石故以鐵代之耳簡按山海經高氏之山其上多玉其下多箴石吳任臣廣注程良孺曰或云金剛鑽即其物也陵居馬雲倚高陵以為居而耐受乎風志云高平曰陸大陸曰阜大阜曰陵出爾雅釋地依山陵而居故多風簡按當從志注褐薦吳云薦草𮖡也簡按詩豳風無衣無褐何以卒歲注褐毛布也古今黈云薦席也草亦得以言薦莊子齊物論麋鹿食薦薦即草也王注細草蓋本莊子華食簡按王注酥酪骨肉之類骨當作膏張志並作膏毒藥張云毒藥者總括藥餌而言凡能除病者皆可稱為毒藥汪機云藥謂草木蟲魚禽獸之類以能攻病皆謂之毒簡按說文毒厚也害人之草往往而生藥治病草從艸樂聲而周禮天官醫師聚毒藥以共醫事鄭注毒藥之辛苦者藥之物恆多毒賈疏藥之辛苦者細辛苦參雖辛苦而無毒但有毒者多辛苦藥中有毒者巴豆狼牙之類是也藥中有無毒者人參芎藭之類是也直言聚毒藥者以毒為主也以上皆與王注同吳志高為有毒之藥誤矣考本草藥物產於川蜀者極多此從西方之一證其地高陵居張云地高陵居西北之勢也其民樂野處而乳食張云野處乳食北人之性胡地至今猶然高雲居常居也處暫處也其民樂野處有時不欲居高也曠野多獸故樂野處而乳食臟寒主滿病張云地氣寒乳性亦寒故令人臟寒臟寒多滯故生脹滿等病簡按臟寒不必生滿病甲乙無滿字為是灸炳簡按諸本炳作焫當改熊音如劣反燒也張云如瑞切玉篇焫而悅切燒也與爇同水土弱塚語云堅土之人剛弱土之人柔食胕張云胕腐也物之腐者如鼓鮓曲醬之屬是也致理熊音致音治密也九針高雲靈樞九針論黃帝欲以微針通其經脈微針小針也岐伯論小針而及於九針故曰九針者亦從南方來簡按九針十二原帝問無用砭石欲以微針通其經脈而岐伯答以始於一終於九則微針即是九針對砭石而言非九針之外有微針志云微針者其鋒微細淺刺之針也恐非是痿厥寒熱高雲不勞則四肢不強故其病多痿厥食雜則陰陽乖錯故其病多寒熱導引按蹺張云蹺即陽蹺陰蹺之義蓋謂推拿溪谷蹺穴以除疾病也熊音蹺音喬簡按張注牽強不可從詳義見金匱真言論莊子陸氏釋文李云導氣令和引體令柔從中央出也高雲四方會聚故曰來中央四布故曰出移精變氣論篇第十三吳云移易精神變化臟氣如悲勝怒恐勝喜怒勝思喜勝悲思勝恐導引營衛皆其事也高雲導引之謂移振作之謂變簡按當從王注祝由熊音祝去聲音咒馬雲鄭澹泉吾學編述我朝制云太醫院使掌醫療之法院判為之貳凡醫術十三科曰大方脈曰小方脈曰婦人曰瘡疾曰針灸曰眼曰口齒曰接骨曰傷寒曰咽喉曰金鏃曰按摩曰祝由按摩以消息導引之法除人八疾祝由以祝禁袚除邪鬼之為厲者二科今無傳愚今考巢氏病源各病皆有按摩之法三國志孫策時于吉言知祝由法今民間亦有之張云祝咒同由病所從生也故曰祝由志云對神之辭曰祝由從也言通祝於神明病從而可愈已簡按王注祝說病由蓋亦取義於祝說於神明也書無逸疏以言告神謂之祝請神加殃謂之詛或作咒靈賊風篇云先巫者因知百病之勝先知其病之所從生者可祝而已也說苑云上古之為醫者曰苗父苗父之為醫也以菅為席以芻為狗北面而祝發十言耳請扶而來輿而來者皆平復如故隋唐有咒禁博士咒禁師詳見六典千金翼載禁咒諸法聖濟總錄云符禁乃祝由之法然上古治病祝由而已以其病微淺故其法甚略後世病者滋蔓而所感既深符印祝詛兼取並用禳卻厭勝而不可以已要之精神之至與天地流通惟能以我齊明妙於移變是乃去邪輔正之道也據以上數說其為祝詛病由之義可知也而元陳櫟著素問祝由辨云書泰誓篇曰祝降時喪孔氏注祝斷也今以祝訓斷謂但斷絕其受病之由正與上文移精變氣相照應轉移自己之精神變改其所感受陰陽風雨晦明之六氣而斷絕其受病之由則其病自已如病由於寒則斷其寒而暖之病由於熱則斷其熱而涼之祝斷其由如所謂拔其本塞其源意義豈不顯然明白乎禱祈祝詛自是素問之大禁如曰拘於鬼神者不可與言至德亦是無知者之所為豈醫家事耶此說似有理而卻非實儒者之見耳陳辨見新安文獻志三十五卷內無眷慕之累高雲眷慕眷戀思慕也外無伸官之形吳云伸官求進於官也張云伸屈伸之情官利名之累高雲引伸五官以為恭敬也簡按吳注近是今之世不然宋本今上有當字志本高本同決嫌疑曲禮云夫禮者所以定親疏決嫌疑僦貸季王六節藏象注引八素經序云天師對黃帝曰我於僦貸季理色脈已三世矣羅泌路史云神農立方書乃命僦貸季理色脈對察和劑以利天下色以應日脈以應月張云色分五行而明晦是其變日有十干而陰晴是其變故色以應日脈有十二經而虛實是其變月有十二建而盈縮是其變故脈以應月常求其要則其要也張云常求色脈之要則明如日月而得其變化之要矣高雲色主氣為陽故色以應日脈主血為陰故脈以應月以陰陽之常求其色脈之要則得其大要也草蘇草荄之枝本末為助馬雲蘇者葉也荄者根也枝者莖也荄為本枝葉為末即後世之煎劑也張同志云蘇莖也荄根也草蘇之枝莖之旁枝也草荄之枝根之旁根也蓋以蘇荄為本而旁枝為末也簡按方言蘇草芥也江淮南楚之間曰蘇自關而西或曰草或曰芥陸氏釋文云蘇草也考聲云荄草莖也方言東齊謂根曰荄說文草根也通雅云紫者曰紫蘇荏曰白蘇水蘇曰雞蘇荊曰假蘇積雪草曰海蘇石香薷曰石蘇蘇亦辛草之總名今詳經文馬注似允當而王注蘇字下句釋蘇為煎未見所據不知日月張云王注即以日月為解然本篇所言者原在色脈故不知色脈則心無參伍之妙診無表裡之明色脈不合者孰當舍證以從脈緩急相礙者孰當先此而後彼理趣不明其妄孰甚此色脈之參合不可少故云日月也不審逆從張云有氣色之逆從見玉版要論有四時脈急之逆從出平人氣象論玉機真臟論有脈證之逆從同上凶凶張云好自用而孟浪也簡按左傳僖二十八年曹人凶懼杜云凶凶恐懼聲漢書翟方進傳群下凶凶用之不惑張云察病之要道在深明色脈之精微而不至惑亂簡按極脈惑則得國並押韻逆從到行馬雲到當作倒張云到倒同去故就新乃得真人吳云去故去其故日之邪就新養其新生之氣即移精變氣之事也如此是得上古真人之道張云此戒人以進德修業無蹈暮世之轍而因循自棄也去故者去其舊習之陋就新者進其日新之功新而又新則聖賢可以學至而得真人之道矣簡按張注與王意略同似穩帖新人亦押韻者因得之張云一者本也因者所因也得其所因又何所而不得哉志聰云因其情意而得之也簡按下文云數問其情以從其意王注似有所據得神者昌失神者亡高雲一似閉戶塞牖其心專系之病者數問其病情以從其志意情意之中神所居也有病而得神則生失神則死故得神者昌失神者亡審察其神則得其因得其因則得其要矣馬雲天年篇云失神者死得神者生師傳篇云帝曰守一勿失岐伯曰生神之理與此義同簡按昌亡押韻靈終始篇敬之者昌慢之者亡呂覽古樂篇賢者以昌不肖者亡湯液醪醴論篇第十四五穀簡按五穀其說不一金匱真言論麥黍稷稻豆臟氣法時論粳米小豆麥大豆黃黍九針論無小豆有麻周禮五穀養其病鄭注麻黍稷麥豆月令春食麥夏食菽中央食稷秋食麻冬食黍如醫經當以金匱真言論所載為正湯液及醪醴熊音醪醴上音勞下音禮酒味厚曰醪味薄曰醴張云湯液醪醴皆酒之屬韻義云醅酒濁酒曰醪詩詁云酒之甘濁而不泲者曰醴然則湯液者其即清酒之類歟簡按扁鵲傳上古之時醫有俞跗應邵注黃帝時醫也治病不以湯液醴灑按灑釃通說文釃下酒也一曰醇也蓋灑與醴無太異湯液醪醴連稱者如此則張以為清酒之類似不誣焉何剡云湯液謂煎煮湯藥然下文明言當今之世必齊毒藥則湯液非煎煮湯藥可知也而漢書藝文志湯液經法十六卷未知所謂湯液何物至皇甫謐甲乙序則云伊尹以元聖之才撰用神農本草以為湯液此乃為煎煮湯藥之義也後世湯藥之說本於此醪說文汁滓酒也廣韻濁酒醴說文酒一宿熟也玉篇甜酒也前漢楚元王傳元王每置酒常為穆生設醴顏注醴甘酒也少鞠多米一宿而熟稻米楊泉物理論稻者溉種之總稱顏師古刊謬正俗云稻是有芒之谷故於後通呼粳稬總謂之稻孔子曰食夫稻周官有稻人之職漢置稻米使者此並非指屬稻稬之一色簡按說文及本草專指糯以為稻得師古之說始明志云帝以五穀為問是五穀皆可為湯液醪醴以養五臟而伯答以中央之稻米稻薪蓋謂中谷之液可以灌養四臟故也考金匱真言論以稻為秋谷則此說不知何據炊以稻薪以宋本作之馬張本同高下之宜此下宋本及諸本有故能至完伐取得時八字此本系脫落當補簡按詩豳風十月獲稻呂覽孟冬紀命大酋秫稻必齊曲糵必時湛饎必潔水泉必香陶氣必良火齊必得王注稻以冬採蓋本於此鑱石針艾熊音鑱上衫反小針也馬雲鑱沮銜反靈九針論第一曰鑱針張云鑱銳也簡按扁鵲傳鑱石橋引注仕咸反謂石針也此連言針艾當從史注針石道也吳云言用針石者乃治病之道道猶法也若精神不加進志意不舒展則徒法不能以自行故病不可得而愈也簡按志聰以精神不進之精神為工之精神以今精神壞去之精神為病者之精神高則為工之與病者之精神並不可從蓋此段當從全元起本改數字義尤明備極微極精吳云言微渺易治之時張云極微者言輕淺未深極精者言專一未亂斯病也治之極易高雲微猶輕也精猶細也守其數吳云數度也簡按呂覽高注數術也兄弟遠近吳云遠近猶言親疏也高雲或疏而遠或相親而近其音聲可以日聞於耳五色可以日見於目而病至不愈者亦何其閒暇之甚而不早為之計以至病成而逆乎五臟陽以竭馬雲以已同吳張以作已津液充郭張云郭形體胸腹也脹論云夫胸腹臟腑之郭也吳云郭當作鞟高雲郭廓同空廓也簡按上膈篇云積聚守於下管衛氣不營則腸胃充郭由此則高注為是其魂獨居張云魄也陰之屬形雖充而氣則去故其魄獨居也簡按王注未允四極急吳云四肢腫急簡按王注脈數恐非形施於外簡按玉篇施張也王注施張本於此新校正非平治於權衡張云平治之法當如權衡者欲得其平也且水脹一證其本在腎其標在肺如五臟陽已竭魄獨居者其主在肺肺主氣氣須何法以化之津液充郭孤精於內其主在腎腎主水水須何法以平之然肺金生於脾腎水制於土故治腫脹者必求脾肺腎三臟隨盛衰而治得其平是為權衡之道也高雲權秤錘也衡平也腐穢充塞五臟不和故當平治於權衡如秤物而得其平也簡按張高雖與王義異亦當存一說去宛陳莝馬雲宛積也陳莝陳草也吳云積者謂之菀久者謂之陳腐者謂之莝也張云莝斬草也吳云其水氣之陳積欲如斬草而漸除之也簡按音釋莝音銼斬也熊音莝粗臥反斬草也說文莝斬芻也當從張義王注原本蓋作莖字故引全本校之溫衣滑云當作溫之微動四肢令陽氣漸次宣行乃所以溫之也或云作溫表謂微動四肢令陽氣漸次宣行而溫於表也張云溫衣欲助其肌表之陽而陰凝易散也簡按張注是鬼門張云汗空也肺主皮毛其藏魄陰之屬也故曰鬼門簡按通天論氣門乃閉王注氣門謂玄門蓋氣鬼古通淨腑張云膀胱也上無入孔而下有出竅滓穢所不能入故曰淨腑張氏醫通云開鬼門之劑麻黃羌活防風柴胡蔥白及柳枝煎洗潔淨腑之劑澤瀉木通通草防己葶藶茯苓豬苓秋石代鹽去菀陳莝之劑商陸大戟甘遂芫花牽牛宣布五陽之劑附子肉桂乾薑吳茱萸精以時服張云服行也志云精以時復矣巨氣乃平馬雲巨氣大氣也即正氣也志云巨氣者太陽之氣也簡按當從馬注玉版論要篇第十五吳云古之帝王聞一善道著之方策以紀其事謂之玉版簡按賈誼新書云書之玉版藏之金櫃置之宗廟以為後世戒漢司馬遷傳金櫃玉版圖籍散亂如淳注玉版刻玉版書為文字也揆度奇恆馬雲病能論云揆度者切度之也奇恆者言奇病也所謂奇者使奇病不得以四時死也恆者得以四時死也所謂揆者方切求之也言切求其脈理也度者得其病處以四時度之也道在於一馬雲一者何也以人之有神也吳張同神轉不回馬雲回者卻行而不能前也玉機真臟論云帝曰吾得脈之大要天下至數五色脈變揆度奇恆道在於一神轉不迥迥則不轉乃失其機至數之要迫近以微著之玉版藏之臟腑每旦讀之名曰玉機此篇用回字彼從迴義當參考張云回逆而邪也簡按回迴同字至數之要迫近以微高雲至數之要迫近而在於色脈以微而在於神機色脈神機可以著之玉版容色吳云容面容也簡按全本作客色近是在其要高雲在察也所謂色變者面容之色見於上下左右當各察其淺深順逆之要簡按在察也見爾雅釋詁湯液主治十日已高雲湯液者五穀之湯液十日已者十干之天氣周而病可已即移精變氣論所謂湯液十日以去八風五痹之病者是也必齊主治二十一日已高雲齊合也即湯液醪醴論所謂必齊毒藥攻其中者是也二十日則十干再周二十一日再周環復其病可已馬雲齊後世作劑醪酒主治百日已馬雲醪酒者入藥於酒中如腹中論有雞矢醴之謂高雲醪酒乃熟谷之液其性慓悍滑疾運行榮衛通調經脈故百日病已百日則十干十周氣機大復也百日盡已吳云言至於百日之期則命盡而死張云百日盡則時更氣易至數盡而已上節言病已此言命已也不可混看高雲盡已氣血皆終也簡按王林二家注並誤上為逆下為從馬雲色見於上病勢方炎故為逆色見於下病勢已衰故為從靈五色篇云其色上行者病益甚其色下行如雲徹散者病方已女子右為逆左為從志云按方盛衰論云陽從左陰從右蓋男子之血氣從左旋女子之血氣從右轉是以男子之色見於右而從左散者順也女子之色見於左而從右散者順也陰陽反他張云作舊作他誤也今改之反作如四氣調神論所謂反順為逆也在權衡相奪張云謂度其輕重而奪之使平猶權衡也高雲奪其逆於右者從左逆於左者從右如湯液主治必齊主治醪酒主治皆權衡相奪之義簡按馬為察脈之浮沉之義非奇恆事也揆度事也張云陰陽反作者即奇恆事也權衡相奪者即揆度事也搏脈痹躄寒熱之交張云搏脈為邪盛正衰陰陽乖亂之脈故為痹為躄為或寒或熱之交也簡按王以寒熱之交為搏脈痹躄之病由然與下文之例不合當從張注脈孤為消氣張云脈孤者孤陰孤陽也孤陽者洪大之極陰氣必消孤陰者微弱之甚陽氣必消故脈孤為消氣也高雲脈者氣血之先脈孤則陽氣內損故為消氣孤謂弦鉤毛石少胃氣也虛泄為奪血張云脈虛兼泄者必亡其陰故虛泄為奪血也高雲虛泄謂脈氣內虛不鼓動也簡按吳本泄作澀非孤為逆虛為從高雲脈孤而無胃氣而真元內脫故為逆虛泄而少血液則血可漸生故為從行奇恆之法高雲人有奇恆之病而揆度其脈是行奇恆之法也八風四時之勝吳云八風八方之風四時春夏秋冬也勝各以所王之時而勝也終而復始主氣不變也言天之常候如此高雲八方之風主四時各有所勝如東風主春木而勝土南風主夏火而勝金西風主秋金而勝木北風主冬水而勝火四隅中土而勝八風四時之勝各主其時循環無端故終而復始逆行一過不復可數吳云過差也張云設或氣令失常逆行一過是為回則不轉而至數繁亂無復可以數計矣過失也喻言人之色脈一有失調則奇恆反作變態百出亦不可以常數計也此則天人至數之論要在逆從之間察其神而畢矣診要經終論篇第十六天氣始方吳云方謂氣方升也歲方首也人事方興也高雲方猶位也正月二月天氣從陰而陽故天氣始位簡按廣雅方大也正也王注蓋本此天氣正方吳云正方者以時正暄也生物正升也歲事正興也高雲天氣由東而南始正其位水伏宋本作冰復諸本同吳云冰復者冰而復冰凝寒之極也志云冰復者一陽也高雲復猶伏也水冰氣伏故冰復簡按王注伏藏於水明是古本作水伏地氣合吳云合閉而密也志云地出之陽復歸於地而與陰合也散俞馬雲各經分散之穴也四時刺逆從論云春氣在經脈此散俞者即經俞也以義推之春之經脈當在肝膽經也肝之經穴在中封穴膽之經穴在陽輔穴張云即諸經之散穴也簡按馬注恐拘高雲絡脈之散俞蓋與王意同分理馬雲紋理也亦肝膽經之分理也吳云謂黑白分肉之理高雲分肉之腠理也甚者傳氣間者環也吳云病甚者久留其針待其傳氣日一周天而止少瘥而間者暫留其針伺其經氣環一周身而止張云傳布散也環周也病甚者針宜久留故必待其傳氣病稍間者但候其氣行一周於身約二刻許可止針也簡按王馬以傳氣為傳其所勝之義高以間為虛實相間之謂並誤絡俞張云謂諸經浮絡之穴以夏氣在孫絡也盡氣閉環吳云捫閉其穴伺其經氣循環一周於身約二刻許張云閉環謂去針閉穴須氣行一周之頃也高雲夏氣開張故淺刺絡俞若盡傳其氣反閉其環轉之機而痛病必下入矣簡按高注非是痛病必下吳云蓋夏氣在頭刺之而下移也循理吳云循理以指循其肌肉之分理也高雲循皮膚之紋而刺之簡按王注為是刺俞竅於分理於馬本作於注云於字當與字張云孔穴之深者曰竅冬氣在骨髓中故當深取俞竅於分理間也志云分理者分肉之腠理乃溪谷之會溪谷屬骨而外連於皮膚是以春刺分理者外連皮膚之腠理也冬刺俞竅於分理者近筋骨之腠理也簡按不必於作與散下吳云以指按之散其表氣而後下針張云或左右上下散布其針而稍宜緩也簡按張仍王注是法其所在馬雲正以法其人氣之所在以為刺耳入淫骨髓高雲春刺夏分心氣妄傷心合脈故脈亂脈亂則氣無所附故氣微脈亂氣微邪反內入故入淫骨髓志云少陽主骨厥陰不從標本從少陽中見之化故入淫骨髓也簡按以下四時刺逆之變猶是月令春行夏政等之災異不過示禁戒於人耳不嗜食又且少氣高雲夫脈亂必令人不嗜食蓋食氣入胃濁氣歸心淫精於脈也不但氣微又且少氣筋攣逆氣環為咳嗽高雲春刺秋分肺氣妄傷筋攣肝病也筋攣逆氣肝病而逆於肺也張云逆氣者肝氣上逆也環周也秋應肺故氣周及肺為咳嗽也時驚又且哭張云肝主驚故時驚肺主悲憂故又且哭邪氣著臟張云冬應腎腎傷則邪氣內侵而著臟故令人脹馬雲著著同高雲著舊本訛著今改簡按著著俗字又且欲言語志云肝主語故欲言語也簡按宣明五氣篇曰五氣所病肝為語解墮馬雲解懈同墮惰同心中欲無言吳云肺主聲刺秋分而傷肺故欲無言惕惕如人將捕之吳云恐也恐為腎志肺金受傷腎失其母虛而自恐也少氣時欲怒張云夏傷其腎則精虛不能化氣故令人少氣水虧則木失所養而肝氣強急故欲怒也志云陽氣外張故令人少氣善怒也惕然欲有所為起而忘之張云傷肝氣也心失其母則神有不足故令人惕然且善忘也志云秋主下降刺春分是反導其血氣上行故令人惕然且善忘也洒洒時寒志云冬主閉藏而反傷之則血氣內散故令人寒慄也簡按志注本於四時刺逆從論為是眠而有見馬雲而當作如張云肝藏魂肝氣受傷則神魂散亂故令人慾臥不能眠或眠而有見謂怪異等物也簡按而如古通如詩小雅垂帶而厲箋云而如也春秋星隕如雨是也不必改字環死吳云心為天君不可傷損刺者誤中其心則經氣環身一周而人死矣凡人一日一夜營衛之氣五十度周於身以百刻計之約二刻而經氣循環一周也簡按諸注以環為環周一日之義然據上文間者環也則吳義似長矣張云按刺禁論所言五臟死期尤為詳悉但與本節稍有不同此節止言四臟獨不及肝必脫簡耳中鬲者皆為傷中張云鬲膜前齊鳩尾後齊十一椎心肺居於鬲上肝腎居於膈下脾居在下近於鬲間鬲者所以鬲清濁分上下而限五臟也五臟之氣分主四季若傷其鬲則臟氣陰陽相亂是為傷中故不出一年死知逆從也張云知而避之者為從不知者為逆是謂反也布憿馬雲憿當作𢅎布巾也張吳本作𢅎高作繳志云憿定也以布定著於胸腹滑云𢅎如纏繳也簡按字書𢅎又作繳音皎玉篇脛行縢也集韻脛布也本草有繳腳布李時珍云即裹腳布古名行縢乃滑注似是字書無憿字志聰依王注形定之解牽強瘈瘲熊音瘈胡計反瘲子用反馬雲反折瘈瘲謂手足身體反張而或急為瘈或緩為瘲高雲手足抽掣也簡按瘈又作瘛玉機真藏論曰筋脈相引而急病名曰瘛王注筋脈受熱而自跳掣故名曰瘛熊音尺世反瘈同說文瘛小兒瘈瘲病也又𤸪引縱曰𤸪別作痸漢藝文志有金創瘛瘲方王符潛夫論掣縱皆與此同義明理論云瘈者筋脈急也瘲者筋脈緩也急者則引而縮緩者則縱而伸或縮或伸動而不止者名曰瘈瘲俗謂之搐者是也此說得之其色白吳本白作黑志云色白者亡血也津液外脫則血內亡矣張云靈終始篇曰其色白絕皮乃絕汗目睘絕系馬雲目睘者猶俗云眼圈也其所謂系者即大惑篇之所謂系也吳睘作環注云目環轉旁視也高作寰注云謂目之寰字與眼系相絕不相維繫也簡按睘音釋音瓊說文作睘目驚視也韻會葵營切音瓊張志並依王注為是先青白高雲刺禁論云刺中膽者一日半死色先青白者日半之前先見木受金刑之色乃死矣口目動作張云牽引歪斜也志高同簡按王注目睒睒字典晶熒貌韓愈東方半明詩太白睒睒而鼓頷也未詳何義善驚陽明脈解篇云陽明之病聞木音則惕然驚不仁吳云不知疼痛若不仁愛其身者高雲不仁者身冷膚硬馬雲不知痛癢也簡按王注痹論云不仁者皮頑不知有無也程氏遺書云醫家以不認痛癢謂之不仁人以不知覺不認義理為不仁譬最近馬注本於程子上下不通吳云腎開竅於二陰故令閉既脹且閉則上不得食下不得便上下不通心腎隔絕而終矣高雲手經足經不相貫通則上下不通簡按當從吳義腹脹閉張云足太陰脈入腹屬脾故為腹脹閉手太陰脈上膈屬肺而主呼吸故為不得息脹閉則升降難不得息則氣道滯故為噫為嘔嘔則氣逆於上故為面赤不逆則痞塞於中故為上下不通不逆則上下不通張云不逆則痞塞於中故為上下不通脾氣敗則無以制水故黑色見於面中熱據王注謂胸熱也此十二經之所敗也張云手足六經各分表裡是十二經也靈終始篇文與此同脈要精微論篇第十七平旦張云平旦者陰陽之交也陽主晝陰主夜陽主表陰主裡凡人身營衛之氣一晝一夜五十周於身晝則行於陽分夜則行於陰分迨至平旦復皆會於寸口營衛生會篇曰平旦陰盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而陰受氣矣故診法當於平旦初寤之時陰氣未動陽氣未散滑云愚謂平旦未勞於事是以陰氣未擾動陽氣未耗散有過之脈馬雲蓋人之有病如事之有過誤故曰有過之脈全經仿此張云有過言脈不得中而有過失也切脈動靜張云切者以指按索之謂切脈之動靜診陰陽也簡按望聞問三者臨病人乃可知焉唯脈非切近其體膚不能診之故謂之切脈王以切近解之為是楊玄操難經注切按也精明馬雲王注為足太陽經睛明穴由下文所以視萬物別黑白等語觀之則主目言為正蓋精明主神氣言舍目亦無以見之況末云則精衰矣豈精衰之精尚可以穴言乎孟子曰存乎人者莫良於眸子胸中正則眸子瞭焉者是也吳云目中眸子精神也參伍張云以三相較謂之參以伍相類謂之伍蓋彼此反觀異同互證而必欲搜其隱微之謂易曰參伍以變錯綜其數通其變即此謂也出上繫辭滑云以色脈臟腑形氣參合比伍也簡按荀子曰窺敵制勝欲伍以參又曰參伍明謹施賞刑楊倞注云參伍猶錯雜也血之府也李云營行脈中故為血府然行是血者實氣為之司也逆順篇云脈之盛衰者所以候血氣之虛實則知此舉一血而氣在其中即下文氣治氣病義益見矣上盛則氣高下盛則氣脹吳云脈之升者為上上盛則病氣高高粗也脈之降者為下下盛則病氣脹張云上盛者邪壅於上也氣高者喘滿之謂下盛者邪滯於下故腹為脹滿簡按諸家以上下為寸尺之義而內經有寸口之稱無分三部而為寸關尺之說乃以難經以降之見讀斯經並不可從此言上下者指上部下部之諸脈詳見三部九候論氣高全本作氣鬲史記倉公傳氣鬲病使人煩懣食不下時漚沫代則氣衰馬雲脈來中止不能自還者為代代則正氣已衰故不能自還也猶人負重以至中途而力乏不前欲求代於人者耳張云脈多變更不常者曰代氣虛無主也簡按馬注仍王義而申明傷寒論脈經之旨者史倉公云不平而代又云代者時參擊乍躁乍大也張守節正義云動不定曰代此可確張說也代脈有三義見張氏脈神草澀則心痛馬雲脈來如刀刮竹出虞庶而往來甚難者曰澀澀則心血不足而有時作痛也張云澀為血少氣滯故為心痛渾渾革至如湧泉張云革至如皮革之堅硬也志云革至者扃易於平常也高雲革至如湧泉應指雜還之意汪機云愚謂此則溢脈類也與仲景弦大虛芤之革不同簡按文選七發注渾渾波相隨貌革集韻音殛急也禮檀弓夫子之病革矣甲乙脈經乍綽綽詩傳寬也義相乖綿綿張云綿綿如寫漆出辨脈篇及如弓弦之斷絕者皆真氣已竭故死高雲軟散無倫之意詩大雅疏微細之辭精明五色吳云精明見於目五色顯於面皆為氣之光華白裹朱宋本脈經白作帛沉本脈經作綿馬雲白當作帛諸本作白非張云白裹朱隱然紅潤而不露也赭張云代赭也色赤而紫說文赭赤土也蒼璧白虎通璧者外圓象天內方象地爾雅肉倍好謂之璧地蒼脈經作炭張云地之蒼黑枯暗如塵其壽不久也吳云精微象見言真元精微之氣化作色相畢見於外更無藏蓄是真氣脫也故壽不久高本夫精明者所以視萬物云云二十九字移其去如弦死下非傷恐者吳云傷悲傷恐懼也傷為肺志恐為腎志蓋肺氣不利則悲濕土刑腎則恐也張云傷恐者腎受傷也志云恐為腎志如腎氣不藏而反勝於中則傷動其腎志矣簡按推下文例者字當在言下終日乃復言志云氣不接續也傷寒論曰實則譫語虛則鄭聲鄭聲者重語也門戶不要張云要約束也幽門胃下口闌門大腸小腸之會魄門皆倉廩之門戶門戶不能固則腸胃不能藏所以泄利不禁脾臟之失守也五臟者身之強也吳本作五腑注云下文所言五腑者乃人身恃之以強健簡按吳注似是高接前段為五臟者中之守也之結語恐非頭者精明之府張云五臟六腑之精氣皆上升於頭以成七竅之用故頭為精明之府高雲人身精氣上會於頭神明上出於目故頭者精明之府頭傾視深吳云視深視下也又目陷也張云頭傾者低垂不能舉也視深者目陷無光也背者胸中之府馬雲胸在前背在後而背懸五臟實為胸中之府張云背乃臟俞所繫故為胸中之府肩隨樓氏綱目作肩垂腎將憊矣熊音憊蒲拜反病也吳云憊與敗同壞也僂附吳云僂曲其身也附不能自步附物而行也簡按馬附讀為俯為是左傳昭七年正考父一命而僂再命而傴三命而俯杜注俯共於傴傴共於僂又㾈同說文㾈俛病也廣雅㾈短也岐伯曰反四時者云云張云此言四時陰陽脈之相反者亦為關格也禁服篇曰春夏人迎微大秋冬寸口微大如是者命曰平人以人迎為陽脈而主春夏寸口為陰脈而主秋冬也若其反者春夏氣口當不足而反有餘秋冬人迎當不足而反有餘此邪氣之有餘有餘者反為精也春夏人迎當有餘而反不足秋冬寸口當有餘而反不足此血氣之不足不足者日為消也如春夏人迎應太過而寸口之應不足者反有餘而為精秋冬寸口應太過而人迎之應不足者反有餘而為精是不足者為精也春夏寸口應不足而人迎應有餘者反不足而為消秋冬人迎應不足而寸口應有餘者反不足而為消是有餘者為消也應不足而有餘者邪之日盛應有餘而不足者正必日消若此者是為陰陽相反氣不相營皆名關格簡按此一頃三十九字與前後文不相順承疑是它篇錯簡且精消二字其義不大明姑從張注脈其四時動甲乙無其字請言其與天運轉大也高雲人之陰陽升降如天運之環轉廣大故曰請言其與天運轉大也彼秋之忿為冬之怒成無己注傷寒例云秋忿為冬怒從肅而至殺也馬雲按彼春之暖四句又見至真要大論張仲景傷寒論引之脈與之上下馬雲上下者浮沉也以春應中規高雲所以與之上下者春時天氣始生脈應軟弱浮滑則圓轉而中規之度矣馬雲規者所以為圓之器也春脈軟弱輕虛而滑如規之象圓活而動夏應中矩馬雲矩者所以為方之器也夏脈洪大滑數如矩之象方正而盛秋應中衡張云衡平也秤橫也秋氣萬物俱成平於地面故應中衡而人脈應之所以浮毛而見於外也冬應中權張云權秤錘也冬氣閉藏故應中權而人脈應之所以沉石而伏於內也凡茲規矩權衡者皆發明陰陽升降之理以合乎四時脈氣之變象也簡按淮南時則訓云制度陰陽大制有六度天為繩地為準春為規夏為衡秋為矩冬為權雖與此章有不同者而以規矩權衡配四時當時已有其說不唯醫經也知脈所分張云期而相失者謂春規夏矩秋衡冬權不合於度也知脈所分者謂五臟之脈各有所屬也分之有期者謂衰王各有其時也知此者則知死生之時矣故知死時時別本作期始之有經吳云始之有經常之道簡按始之以下三十三字甲乙無之又是知陰盛則夢以下七十八字亦同新校正有誤置之說今刪此一百字則文意貫通似甲乙為正論夢一節見靈淫邪發夢篇及列子穆王篇與天地如一易曰天道虧盈而益謙地道變盈而流謙上盛簡按王注上上聲諸家讀如字下盛簡按王注下去聲諸家讀如字夢予熊音予上聲與同虛靜為保簡按甲乙作寶蓋保葆寶古通用史記留侯世家見谷城山下黃石取而葆之注史記珍寶字皆作葆徵四失論從容之葆泛泛乎吳云泛泛然充滿於指簡按說文泛浮也通作汎蟄蟲熊音蟄直力反蟲藏也知外者終而始之馬雲能觀其色而驗之有終始生克之異此仍王意吳云切脈之道有終有始始則浮取之終則沉取之浮以候外沉以候內終而始之謂既取其沉復察於浮浮沉相較高注同張云內言臟氣臟象有位故可按而紀之外言經氣經脈有序故可終而始之簡按靈終始篇終始者經脈為紀張義似允故曰熊本吳本無此二字此六者馬雲春夏秋冬內外六者張同高雲內外按紀終始持脈之大法法下甲乙有也字當消環自已馬雲若軟而散則剛脈漸柔當完一周之時而病自已矣吳消下句志高同志云靈樞云心脈微小為消癉蓋心液不足則火鬱而為消渴之病心藏神得神機環轉而病自已也按甲乙環作渴脈經同高同張云軟散者心氣將和也消盡也環周也謂期盡一周而病自已矣愚按搏擊之脈皆肝邪盛也肝本屬水而何五臟皆畏之蓋五臟皆以胃氣為本脈無胃氣則死凡木強者土必衰脈搏者胃多敗故堅搏為諸臟所忌茲心脈搏堅而長者以心臟之胃氣不足而邪有餘也搏之微則邪亦微搏之甚則幾於真臟矣故當以搏之微甚而察病之淺深後四臟者仿此汪昂云志聰注消謂消渴非徐氏要旨云搏堅皆為大過軟而散皆為不及五臟各因大過不及而病也當病灌汗灌脈經作漏吳云汗多如灌水也張云肺虛不斂汗出如水至令不復散發也張云汗多亡陽故不可更為發散也脈經發下無也字注云六字疑衍色不青滑云當作其色青簡按此說非是當從王注色澤張云肝木不足脾濕勝之濕在肌膚故顏色光澤志云金匱要略云夫病水人面目鮮澤蓋水溢於皮膚故其色潤澤也溢飲金匱要略云飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲易入肌皮腸胃之外滑云易當作溢簡按以理推之宜云肌皮之中腸胃之外而肌皮即是腸胃之外故云爾脈經亦易作溢折髀吳云折傷其髀筋損血傷故見肝木之脈諸注仍王義食痹痹下脈經有髀痛二字吳云謂食積痹痛也簡按至真要大論王注云食痹謂食已心下痛陰陰然不可名也不可忍也吐出乃止此為胃氣逆而不下流也又張云食痹者食入不化入則悶痛嘔汁必吐出乃止李氏醫宗必讀有治法其軟散脈經軟下有而字色不澤者志云五臟元真之氣脾所主也濕熱太過則色黃脈盛而少氣矣其不及當病足脛腫脾氣虛故足腫也若水狀而非水病故其色不澤其色黃而赤張云邪脈干腎腎必衰其色黃赤為火土有餘而腎不足折腰吳云傷折其腰損其肉與脈肉病故黃脈病故赤也簡按刺腰痛論云解脈令人腰痛如引帶如折腰狀以此觀之吳說似是但以黃赤分肉與脈恐非心疝聖濟總錄云夫臟病必傳於腑今心不受邪病傳於腑故小腸受之為疝而痛少腹當有形也世之醫者以疝為寒濕之疾不知心氣之厥亦能為疝心疝者當兼心氣以治之方具於九十四卷大奇論云心脈搏滑急為心疝四時刺逆從論云滑則病心風疝邪氣臟腑病形篇云心疝引臍小腹鳴心為牡臟靈順氣一日分為四時篇亦有此文張云牡陽也心屬火而居於膈上故曰牡臟簡按吳本牡作牝注云牝陰也大誤靈樞肺為牝臟寒熱簡按寒熱蓋虛勞寒熱之謂即後世所稱風勞下文云沉細數散者寒熱也次篇云寸口沉而喘曰寒熱及靈論疾診尺篇寒熱病篇風論等所論皆然又喻昌醫門法律以以下五條為胃風變證各處一方誤甚癉成為消中馬雲癉者熱也吳云癉熱邪也積熱之久善食而飢名曰消中簡按王注奇病論云癉謂熱也此章冠濕字非是漢書嚴助傳南方暑濕近夏癉熱師古注癉黃病也誤王充論衡云人形長七尺形中有五常有癉熱之病深自克責猶不能愈又云天地之有湛也何以知不如人之有水病也其有旱也何以知不如有癉疾也左傳荀偃癉疽哀三年史記風癉肺消癉及本經消癉癉瘧之類皆單為熱之義熊音癉多滿反俗作疸病黃也尤誤厥成為巔疾吳云巔癲同古通用氣逆上而不已則上實而下虛故令忽然癲僕今世所謂五癇也張云或為疼痛或為眩僕而成頂巔之疾也一曰氣逆則神亂而病癲狂者亦通簡按楊玄操注難經云癲顛也發即僵仆倒地故有癲蹶之言樓氏綱目云以其病在頭巔故曰癲疾是知癲癇之癲厥成癲疾眩冒癲疾之巔一疾也王太僕誤分癲為二疾獨孫真人始能一之樓以癲巔為一疾固是以巔為頭巔之義不可從五臟生成篇頭痛巔疾下虛上實奇病論云人生而有病巔疾者方盛衰論氣上不下頭痛巔疾並是癲疾當從吳注久風為飧泄志云風乃木邪久則內干脾土而成飧泄矣故曰春傷於風邪氣留連乃為洞泄筋變骨痛變諸本作攣當改張云此言諸病癰腫而有兼筋攣骨痛者也諸家以癰腫筋攣骨痛釋為三證殊失經意觀下文曰此寒氣之腫則其所問在腫義可知矣寒氣之腫八風之變也張云惟風寒之變在經所以兼筋骨之痛今有大項風蛤蟆瘟之屬或為頭項咽喉之癰或為肌肉之腫正此類也高雲此寒氣之腫言癰腫之生於寒也八風之變言筋攣骨痛之生於風也以明病之所生即病之所變也以其勝治之愈也志云以五行氣味之勝治之而愈也如寒淫於內治以甘熱如東方生風風生木木生酸辛勝酸之類徵其脈吳云徵驗也其色蒼赤張云蒼者肝腎之色青而黑也赤者心火之色心主血也脈見弦沉而色蒼赤者筋骨血脈俱病故必當為毀傷也簡按蒼說文草色也青而黑未知何據濕若中水也張云凡毀傷筋骨者無論不見血已見血其血必凝其經必滯氣血凝滯形必腫滿或如濕氣在經而同於中水之狀也高雲毀傷筋骨應不見血若已見血則心氣並傷如汗出身濕若中於水水從汗孔而傷其心氣也吳本肝與腎以下二十五字移於腎脈搏堅而長云云至令不復也下注云肝與腎脈並至謂搏堅而長又沉石也其色當蒼黑今見色蒼赤則非肝腎病當病毀傷不見血蓋筋傷則色蒼脈傷則色赤若已見血則其搏堅而長或為濕飲其脈沉下或為水也簡按此一節與上下文不相順承疑有脫誤尺內兩旁則季脅也簡按王注尺內謂尺澤之內也此即診尺膚之部位平人氣象論云尺澀脈滑尺寒脈細王注亦云謂尺膚也邪氣臟腑病形篇云善調尺者不待於寸又云夫色脈與尺之相應如桴鼓影響之相應也論疾診尺篇云尺膚澤又云尺肉弱十三難云脈數尺之皮膚亦數脈急尺之皮膚亦急史記倉公傳亦云切其脈循其尺仲景云按寸不及尺皆其義也而其所以謂之尺者說文尺十寸也人手卻十分動脈為寸口十寸為尺尺所以指尺規矩事也從屍從乙乙所識也周制寸尺咫尋常仞諸度量皆以人之體為法徐鍇曰家語曰布指知尺舒肱知尋大戴禮云布指知寸布手知尺舒肱知尋明是尺即謂臂內一尺之部分而決非寸關尺之尺也寸口分寸關尺三部昉於難經馬張諸家以寸關尺之尺釋之與經旨差矣今據王義考經文圖左方以候腹中張志高並以中字屬下句為中附上是也左外以候肝內以候膈何夢瑤醫碥云按心肺肝腎臟也反候於外胸中膈膜包裹此臟者也反候於內恐傳寫之誤當以胃外脾內例之易其位為是簡按此說有理然舊經文果如此否亦難必矣前以候前後以候後簡按前者臂內陰經之分也後者臂外陽經之分也論疾診尺篇云肘前獨熱者膺前熱肘後獨熱者肩背熱即其義也王以左為前以右為後諸家並從其說非也上附上右外以候胃宋本胃作肺諸本同當改膝脛足中事也甲乙無足字粗大者簡按此下以脈象而候陰陽邪正之盛虛與尺膚之義自別來疾去徐滑氏診家樞要云來者自骨肉之分而出於皮膚之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也簡按吳張仍滑氏上實下虛吳云脈自尺部上於寸口為上自寸口下於尺部為下簡按寸尺亦難經以後之見不可從厥巔疾馬雲其病當為厥疾及巔疾焉吳云為厥逆癲僕之疾高雲氣惟上逆上而不下故為巔疾猶言厥成為巔疾也為惡風也故中惡風者吳云陰實陽虛不任風寒故令惡也張云惡上去聲下入聲志云風為陽邪傷人陽氣在於皮膚之間風之惡厲者從陽而直入於裡陰是以去疾下實陽虛陰盛為惡風也高雲惡風癘風也簡按二惡字入聲志注是少陰厥也張云沉細者腎之脈體也兼數則熱陰中有火也故為少陰之陽厥寒熱也高雲熱有陰陽申明有脈沉細而數散者非粗大有餘之陽熱為陰盛陽虛之寒熱也簡按此亦虛勞寒熱也高注為是而又有陰虛火動其脈沉細數散者必不可執一矣諸浮不躁者張云脈浮為陽而躁則陽中之陽故但浮不躁者皆屬陽脈未免為熱若浮而兼躁乃為陽極故當在手在手者陽中之陽謂手三陽經也此與終始篇人迎一盛病在足少陽一盛而躁病在手少陽義同諸細而沉者張云沉細為陰而靜則陰中之陰故脈但沉細者病在陰分當為骨痛若沉細而靜乃為陰極故當在足在足者陰中之陰謂足三陰經也數動一代吳云數陽脈也陰固於外陽戰於內則脈厥厥動搖名曰動脈五來一止七來一止不復增減名曰代是為陽結故病為滑泄下利又為便膿血也汪昂數讀為去聲注云馬注數字讀作入聲數為熱故便血非志云陽熱在經故脈數動熱傷血分故便膿血經血下泄故一代也諸過者吳云過脈失其常也陰陽有餘馬雲若滑澀兼見而陰陽俱有餘則陽有餘為無汗陰有餘為身冷宜二證皆見也簡按滑澀相反豈有二脈俱見之理乎推而外之內而不外張云此下言察病之法當推求於脈以決其疑似也凡病若在表而欲求之於外矣然脈則沉遲不浮是在內而非外故知其心腹之有積也推音吹諸釋作推動之推者非簡按吳馬諸家仍王注以推為推動之義汪機遂以推為診脈之一法見於脈訣刊誤附錄並不可從推而內之外而不內張云凡病若在裡而欲推求於內矣然脈則浮數不沉是在外而非內故知其身之有熱也推而上之上而不下張云凡推求於上部然脈止見於上而下部則弱此以有升無降上實下虛故腰足為之清冷也推而下之下而不上張云凡推求於下部然脈止見於下而上部則虧此以有降無升清陽不能上達故為頭項痛也按此二節甲乙經以上而不下作下而不上下而不上作上而不下似與上文相類而順但既曰下而不上則氣脈在下何以腰足反清且本經前二節反言之後二節順言之也一反一順兩得其義仍當以本經為正簡按以上四節張註明備今從之志云推詳也推詳其脈氣之偏於外內上下也是亦本於張義耳按之至骨脈氣少者高雲若按之至骨不應於指脈氣少者此陰盛陽虛生陽之氣不能上行當腰脊痛而身有痹病也承上文上下外內之病而言診脈亦有外內上下之法也以上答帝知病乍在內乍在外之問者如此平人氣象論篇第十八吳云平人氣血平調之人氣脈氣象脈形也平人調經論云陰陽勻平以充其形九候若一命曰平人終始篇云形肉血氣必相稱也是謂平人一吸脈亦再動高本刪亦字醫統同簡按靈動輸篇一呼脈再動一吸脈亦再動甲乙引作一呼脈亦再動一吸脈亦再動閏以大息張云常人之脈一呼兩至一吸亦兩至呼吸定息謂一息既盡而換息未起之際也脈又一至故曰五動閏余也猶閏月之謂言平人常息之外間有一息甚長者是為閏以太息而又不止五至也簡按張注詳備與難經符但難經以一呼再動一吸再動呼吸之間又一動為定息五動張則以一息四動兩息之間又一動為五動此為少異焉李云一息四至呼吸定息脈五動者當其閏以大息之時也馬及志高並同此說不可從果如其言則宜云閏以大息呼吸脈五動噫何倒置經文而釋之也常以不病甲乙病下有之人二字以調之為法甲乙無為法二字曰少氣馬雲難經以為離經脈由正氣衰少故脈如是也吳云是為虛寒三動而躁馬雲難經亦以為離經脈是六至而躁躁者動之甚也王注以躁為煩躁靈樞終始禁服等篇有一倍而躁二倍而躁等語則躁本言脈不言病也張云躁者急疾之謂尺熱曰病溫張云言尺中近臂之處有熱者必其通身皆熱也脈數躁而身有熱故知為病溫高雲脈躁疾而尺膚熱則曰病溫簡按王注以尺為寸關尺之尺馬亦從之非脈滑曰病風張云數滑而尺不熱者陽邪盛也故當病風然風之傷人其變不一不獨在於肌表故尺不熱者脈法曰滑不澀也往來流利為血實氣壅簡按壽夭剛柔篇云病在陽者命曰風病在陰者命曰痹此章與痹對言亦謂偏風之屬脈四動以上曰死張云一呼四動則一息八至矣況以上乎難經謂之奪精四至曰脫精五至曰死六至曰命盡是皆一呼四至以上也故死乍疏乍數高雲一呼脈四動以上則大過之極脈絕不至則不及之極乍疏乍數則錯亂之極故皆曰死人無胃氣曰逆張云如玉機真臟論曰脈弱以滑是有胃氣終始篇曰邪氣來也緊而疾穀氣來也徐而和是皆胃氣之謂大都脈代時宜無太過無不及自有一種雍容和緩之狀者便是胃氣之脈胃而有毛脈經作有胃而毛下並同張云是為賊邪以胃氣尚存故至秋而後病後皆仿此臟真散於肝吳云肝氣喜散春時肝木用事故五臟天真之氣皆散於肝但代無胃曰死張云長夏屬土雖主建未之六月然實兼辰戌丑未四季之月為言也代更代也脾主四季脈當隨時而更然必欲皆兼和軟方得脾脈之平若四季相代而但弦但鉤但毛但石是但代無胃見真臟也故曰死簡按吳馬並仍王注以代為止恐與經旨左矣軟弱有石曰冬病張云石為冬脈屬水長夏陽氣正盛而見沉石之脈以火土氣衰而水反乘也故至冬而病簡按推前文例石當是弦冬病當是春病弱甚曰今病馬雲弱當作石張同云長夏石甚者火土大衰故不必至冬今即病矣新校正云按甲乙經弱作石簡按今甲乙弱作軟脈經作石推前文例弱當是弦志高從王義臟真濡於脾吳云濡澤也脾氣喜濡澤長夏之時脾土用事故五臟真氣皆濡澤於脾毛而有弦曰春病吳本毛作胃張云弦為春脈屬木秋時得之以金氣衰而木反乘也故至春木王時而病簡按推前文例當是胃而有鉤曰夏病弦甚曰今病張云秋脈弦甚是金氣大衰而木寡於畏故不必至夏今即病矣簡按推前文例當是鉤甚以行營衛甲乙以作肺石而有鉤曰夏病張云鉤為夏脈屬火冬時得之以水氣衰而火反侮也故至夏火王時而病汪昂云鉤當作軟弱簡按推上文例當是胃而有弱曰長夏病鉤甚曰今病張云冬脈鉤甚是水氣大衰而火寡於畏故不必至夏今即病矣簡按推上文例當是弱甚曰今病而軟弱有石曰冬病以下與春夏其例不同蓋錯綜其意欲人彼此互推知其由也必不文字訛誤焉其動應衣脈宗氣也甲乙衣作手脈下有之字沈氏經絡全書曰虛里乳根穴分也俗謂之氣眼顧英白曰乳根二穴左右皆有動氣經何獨言左乳下蓋舉其動之甚者耳非左動而右不動也其動應手脈宗氣也素問本無二義馬玄臺因坊刻之誤而謂應衣者言病人肌肉瘦弱其脈動甚而應衣也亦通始讀素問則心竊疑之至讀甲乙經而疑遂釋然簡按五味篇曰大氣積於胸中命曰氣海邪客篇曰宗氣積於胸中皆此義也通雅云宗尊一字孝經宗祀注尊祀王云宗尊也此乃古訓應衣當從甲乙而作應手若應衣則與下文何別張云前言應衣者言其微動似乎應衣可驗虛里之胃氣此言應衣者言其大動真有若與衣俱振者此臆度之見不考甲乙之失耳盛喘數絕張云若虛里動甚而如喘或數急而兼斷絕者由中氣不守而然故曰病在中簡按馬吳志以喘為病證非結而橫有積矣張云胃氣之出必由左乳之下若有停阻則結橫為積故凡患癥者多在左肋之下因胃氣積滯而然如五十六難曰肝之積名曰肥氣在左脅下者蓋以左右上下分配五行而言耳而此實胃氣所主也吳云脈來遲時一止曰結橫橫格於指下也言虛里之脈結而橫是胃中有積簡按橫蓋謂其動橫及於右邊張注以結橫不為脈象恐非絕不至曰死志云胃腑之生氣絕於內也宗氣泄也吳云宗氣宜藏不宜泄乳下虛里之脈其動應衣是宗氣失藏而外泄也馬雲乳下之動應衣者予曾見其人病終不治張云虛里跳動最為虛損病本故凡患陰虛勞怯則心下多有跳動及為驚悸慌張者是即此證人止知其心跳而不知為虛里之動也但動之微者病尚微動之甚者病則甚亦可因此以察病之輕重凡患此者當以純甘壯水之劑填補真陰夫谷入於胃以傳於肺五臟六腑皆以受氣是由胃氣而上為宗氣也氣為水母氣聚則水生是由肺氣而下生腎水也今胃氣傳之肺而腎虛不能納故宗氣泄於上則腎水竭於下腎愈虛則氣愈無所歸氣不歸則陰愈虛矣氣水同類當求相濟故凡欲納氣歸原者惟有補陰以配陽一法簡按許氏本事方云王思和曰今心怯非心鬆也胃之大絡名曰虛里絡胸膈及兩乳間虛而有痰則動此張注所未論及故表而出之中手促上擊者馬雲寸口之脈中醫人之指而促上來擊者是肩背在上故其脈促上也名曰肩背痛簡按據馬注促上謂促於魚上而搏擊吳以為結促之促志以為浮而搏擊並乖經旨寒熱及疝瘕少腹痛馬雲下文脈急者曰疝瘕少腹痛據理此處及疝瘕少腹痛六字為衍簡按當從新校正沉而橫曰脅下有積甲乙橫下有堅字無有積二字張云橫急數也志云橫橫逆言脈之形象非謂病也簡按橫謂寸口脈位橫斜於筋骨間張志恐非沉而喘甲乙沉作浮脈滑浮而疾者甲乙作脈浮滑實大脈急者吳云急弦急也是為厥陰病脈張云弦急者陰邪盛故為疝瘕少腹痛疝瘕甲乙作疝㿗曰病無他張云雖曰有病無他虞也高雲無他變也不間臟張云五十三難曰七傳者死間臟者生七傳者傳其所勝也間臟者傳其所生也皆此之謂考之呂氏注曰間臟者間其所勝之臟而相傳也心勝肺脾間之脾勝腎肺間之肺勝肝腎間之腎勝心肝間之肝勝脾心間之此謂傳其所生也今不間臟而傳其所克故曰死間去聲臂多青脈張云血脫則氣去氣去則寒凝凝泣則青黑故臂見青色言臂則他可知矣即診尺之義志云診視也論診尺必先視臂之脈色解㑊釋音㑊音亦熊同高雲解懈同㑊音亦餘篇解㑊同猶懈怠志云懈惰也杭世駿道古堂集云解㑊二字不見他書解即懈㑊音亦倦而支節不能振聳憊而精氣不能檢攝筋不束骨脈不從理解解㑊㑊不可指名非百病中有此一症也內經言此者凡五平人氣象論云尺脈緩澀謂之解㑊王氏注佇不可名佇困弱也按宋書明恭王皇后傳後在家為佇弱婦人玉機真臟論云冬脈太過則令人解㑊此從脈起見也刺瘧論云足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚此從瘧起見也刺要論云刺骨無傷髓髓傷則銷鑠胻酸體解㑊然不去矣四時刺逆從論云夏刺經脈血氣乃竭令人解㑊此從刺而究其極也要皆從四末以起見如經所言墮怠小變其辭而意較微眇爾宋景濂送葛醫師序不得其解篁南江氏輯名醫類案引葉氏錄驗方以為俗名發痧之證別列一門武斷極矣余嘗見有此病發必神思躁擾少腹痛靈素未嘗言及與解㑊之義毫不干涉殆大繆矣簡按王注據刺瘧論解之然此少陽瘧之狀而非解㑊之義馬吳張並仍王注皆不可從但志高及杭氏之說為穩貼解㑊字亦見論疾診尺篇云尺肉弱者解㑊也蓋解㑊即懈惰懈倦之謂四時刺逆從論解㑊診要經終論作解惰刺瘧論解㑊巢源作解倦此可以證也㑊即亦字從人者與易通王注氣厥論云食亦者謂食入移易而過不生肌膚亦易也甲乙引氣厥論作食㑊骨空論易髓無孔王注云易亦也此可以證㑊亦同而與易通也而易謂變易其平常神農本草蜣螂條狂易證類音羊誤漢書外戚傳云素有狂易病師古注狂易者狂而變易常性也陰陽別論偏枯痿易王注易謂變易常用而痿弱無力也大奇論跛易偏枯王注血氣變易為偏枯也知是解易即解惰變易平常之義矣滑云一說作解極謂懈倦之極也未知何據虞氏正傳云解者肌肉解散㑊者筋不束俗呼為砂病內經名解㑊實非真砂病也此說亦太誤安臥脈盛曰脫血馬雲安臥者不能起也脈盛者火愈熾也火熱則血妄行故謂之脫血高雲安臥猶嗜臥尺澀脈滑謂之多汗吳云尺部肌膚澀是皮毛失其津液也脈來滑陰火盛也陽盛陰虛故為多汗陰陽別論曰陽加於陰謂之汗簡按王以脈為尺脈張同並誤脈尺粗熊本無脈字吳同當刪謂之熱中簡按王注謂下焦中也非馬雲熱氣在腹謂之熱中也目裹微腫宋本裹作里吳同志高作內並非胃疸簡按疸癉同即前篇所謂消中後世所稱中消渴也馬雲谷疸志云黃疸並非面腫曰風馬雲水證有兼風者其面發腫蓋面為諸陽之會風屬陽上先受之故感於風者面必先腫不可誤以為止於水也評熱論水熱穴論論疾診尺篇皆名曰風水王注以為胃風者非及考風論胃風之狀並無面腫之說簡按金匱要略云面目腫大有熱名曰風水又云腰以上腫當發汗足脛腫曰水吳云脾胃主濕腎與膀胱主水其脈皆行於足脛故足脛腫者為水簡按金匱要略云腰以下腫當利小便婦人手少陰脈動甚者妊子也趙府本妊作任熊吳張並同張云心脈動甚者血王而然王啟玄雲云蓋指心經之脈即神門穴也其說甚善任妊同孕也簡按論疾診尺亦曰女子手少陰脈動甚者妊子知是全本作足少陰者未為得王以動為厥厥動搖之動脈馬以妊子為男子皆誤未有臟形馬雲未有正臟之脈相形而他臟之脈反見春夏脈宜浮大今反沉細而瘦秋冬脈宜沉細今反浮大而肥此即所謂逆四時也玉機真臟論云未有臟形於春夏而脈沉澀秋冬脈浮大名曰逆四時與此義同志云未有春弦夏鉤秋毛冬石之臟形簡按吳張為真臟之脈形非命曰反四時也吳刪四時二字馬雲是皆難治之證猶脈之反四時也王注為衍文殊不知古人以彼形此則未必非取譬之意王注當是新校正簡按馬注似傅會肝不弦腎不石也張云人生所賴者水穀故胃氣以水穀為本而五臟又以胃氣為本若脈無胃氣而真臟之脈獨見者死即前篇所謂但弦無胃但石無胃之類是也然但弦但石雖為真臟若肝無氣則不弦腎無氣則不石亦由五臟不得胃氣而然與真臟無胃者等耳志云弦鉤毛石胃氣所生之真象也真象見者謂胃氣已絕故死然五臟之真象乃胃腑精氣之所生精氣絕則肝不弦腎不石而又帶鉤彈石之死脈見矣高雲至春而肝不微弦至冬而腎不微石也簡按高仍王義近是謝縉翁及袁表校本脈經作肝但弦心但鉤脾但弱肺但毛腎但石也未知據何本太陽脈至張云此言人之脈氣必隨天地陰陽之化而為之卷舒也太陽之氣王於穀雨後六十日是時陽氣太盛故其脈洪大而長也馬雲按王注扁鵲脈法亦後世假託之言耳王注當是新校正簡按新校正扁鵲脈法出於脈經呂廣說出於七難注太陽脈云云八字吳本移於陽明後仿於七難之例也少陽脈至張云少陽之氣王於冬至後六十日是時陽氣尚微陰氣未退故長數為陽疏短為陰而進退未定也陽明脈至張云陽明之氣王於雨水後六十日是時陽氣未盛陰氣尚存故脈雖浮大而仍兼短也此論但言三陽而不及三陰諸家疑為古文脫簡者是也及閱七難所載則陰陽俱全三陽與此皆同至謂太陰之至緊大而長少陰之至緊細而微厥陰之至沉短而敦此三陰三陽之辨乃氣令必然之理蓋陰陽有更變脈必隨於時也琅玕張云符瑞圖曰玉而有光者說文曰琅玕似珠簡按禹貢厥貢惟球琳琅玕孔傳琅玕石而似珠爾雅釋地西北之美者有崑崙虛之璆琳琅玕焉郭注琅玕狀如珠也山海經曰崑崙山有琅玕附李時珍云在山為琅玕在水為珊瑚微曲汪機云偃曲乃略近低陷之意數至之中而有一至似低陷不應指也張云喘喘連屬急促相仍也其中微曲即鉤多胃少之義吳云不能如循琅玕之滑利矣前曲後居吳本居作倨張云前曲者謂輕取則堅強而不柔後居者謂重取則牢實而不動如持革帶之鉤而全失充和之氣是但鉤無胃也故曰心死簡按丁德用注十五難云後居倨而不動勁有故曰死也王注居為不動蓋讀為倨故吳直改之倨踞同漢書高祖箕踞張耳傳作箕倨踞蹲也故為不動之義厭厭聶聶吳云翩翻之狀浮薄而流利也馬雲恬靜之意如落榆莢十五難落作循莢作葉甲乙同馬雲輕虛以浮之意張云輕浮和緩貌即微毛之義也李時珍云榆有數十種莢榆其木甚高大未生葉時枝條間先生榆莢形狀似錢而小色白成串俗呼榆錢後方生葉不上不下如循雞羽吳云不上下則非厭厭聶聶翩翻流利之形矣如循雞羽澀而難也高雲如循雞羽極輕極虛不若榆莢之落也馬雲雞羽兩旁雖虛而中央頗有堅意所以謂之病也簡按玉機真臟論秋病脈曰其氣來毛而中央堅兩旁虛此謂太過王注蓋本於此而馬衍其義如風吹毛簡按毛草也左傳隱三年澗溪沼沚之毛丁德用十五難注云風吹毛者飄騰不定無歸之象招招馬雲招迢同迢迢然長竿末梢最為軟弱揭之則似弦而甚和所以謂之平也張云揭高舉也高揭長竿梢必柔軟即和緩弦長之義招招猶迢迢吳意同志云以手相呼曰招招招乍伏之象高雲柔和而起伏也簡按集韻迢迢高貌義難葉志注本於詩邶風招招舟子之疏尤得其解急益勁甲乙脈經急下有而字和柔相離如雞踐地張云和柔雍容不迫也相離勻淨分明也如雞踐地從容輕緩也此即充和之氣亦微軟弱之義是為脾之平脈實而盈數如雞舉足張云實而盈數強急不和也如雞舉足輕疾不緩也前篇言弱多胃少此言實而盈數皆失中和之氣故曰脾病汪機云雞踐地形容其輕而緩也如雞舉足言如雞走之舉足形容脈來實而數也踐地與舉足不同踐地是雞不驚而徐行也舉足是被驚時疾行也況實數與輕緩相反彼此對看尤見明白難經以此為心病志云雞足有四爪踐地極和緩形容脾土之灌溉四臟雞舉足拳而收斂不能灌溉於四臟也簡按汪志並鑿如鳥之喙宋本鳥作烏甲乙同張云喙音誨嘴也如鳥之距張云距權與切雞足鉤距也如屋之漏如水之流脈經流作陷張云如屋之漏點滴無倫也如水之流去而不反也是皆脾氣絕而怪脈見如鉤張云冬脈沉石故按之而堅若過於石則沉伏不振矣故必喘喘累累如心之鉤陰中藏陽而得微石之義莫善昌云琅玕石之美者鉤乃心之脈也心脈如循琅玕腎脈如鉤者心腎水火之氣互相交濟者也如引葛馬雲葛根相附而引之不接按之大堅則石而不和所以謂之病也張云堅搏牽連也高雲如引葛藤之上延散而且蔓不若鉤之有本矣如奪索吳云兩人爭奪其索引長而堅勁也志云如引葛而更堅勁矣辟辟如彈石高雲辟辟來去不倫也如彈石圓硬不軟也此但石無胃故曰腎死張云難經十五難所載平病死脈視之本經異同顛倒意者其必有誤或別有所謂耶且難經之義原出本論學者當以本經為主高本上文肝見庚辛死云云三十二字移於如彈石曰腎死之後似文脈順承
