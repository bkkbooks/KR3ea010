body:
  text: 卷三玉機真臟論篇第十九馬雲第六節有曰名曰玉機內又論真臟脈故名篇春肝如弦肝諸本作脈當改下同善忘志云經曰氣並於上亂而喜忘高雲肝脈太過則令人善忘傷寒論云本有久瘀血故令喜忘簡按馬吳張仍王注作善怒是巔疾甲乙作癲疾詳義見於脈要精微其氣來不盛去反盛張云言來則不足去則有餘即消多長少之意故扁鵲於春肝夏心秋肺冬腎皆以實強為太過病在外虛微為不及病在內辭雖異而意則同也簡按新校正引難經文謂與素問不同故張有此説膚痛為浸淫甲乙膚作骨非吳云浸淫熱不得去浸漬而淫邪熱漸深之名今之蒸熱不已是也簡按宋玉風賦夫風生於地起於青蘋之末浸淫溪谷漢書五王傳師古注浸淫猶漸染也當從王義志云浸淫膚受之瘡火熱盛也此據金匱浸淫瘡為解亦非氣泄張云心氣不足而煩心虛陽侵肺而咳唾下為不固而氣泄高雲氣泄後氣下泄也中央堅兩旁虛吳云中央堅浮而中堅也張同簡按何氏醫碥云虛猶散也惟兩旁散而中央不散與上所謂去散者異矣慍慍然脈經作溫溫熊音慍慍音醞含怒意馬雲不舒暢也簡按蓋此方書所謂背膊倦悶之謂吳張並云悲鬱貌非下聞病音張云謂喘息則喉下有聲也志云虛氣下逆則聞呻吟之病音吳下改及字簡按下字不穩姑從張義沉以摶故曰營摶當作搏諸本作搏注同吳云營營壘之營兵之守者也冬至閉藏脈來沉石如營兵之守也馬張並同簡按王注如營動未詳高本搏作摶云摶聚也誤其去如數吳云其實未數也蓋往來急疾類於數耳張云動止疾促營之不及也蓋數本屬熱而此真陰虧損之脈亦必緊數然愈虛則愈數原非陽強實熱之數故云如數則辨析之意深矣心懸如病飢張云真陰虛則心腎不交故令人心懸而怯如病飢也䏚釋音音蒸熊本作眇音亡沼反一目小也誤馬吳音眇張音秒甲乙注音停通雅云今唐韻韻會字彙日月燈皆遺䏚字當音渺小便變甲乙變下有黃赤二字張云變者謂或黃或赤或為遺淋或為癃閉之類由腎水不足而然逆從之變異也馬雲循四時之序謂之曰從其有過與不及而為諸病者謂之曰逆吳云脈逆其順則變異為病高同如鳥之喙新校正云喙別本作啄簡按難經脾者中州也其平和不可得見衰乃見耳來如雀之啄如水之下漏是脾之衰見也據平人氣象論鋭堅如鳥之喙作喙為是重強馬雲重平聲脾不和平固為強矣而九竅不通則病邪方盛名曰重強此皆脾之惡可見也吳云其不及則無沖和土氣五臟氣爭而令九竅不通名曰重強言邪勝也張云重強不柔和貌沉重拘強也高雲是脾病而上下四旁皆病故名曰重強強不和也簡按諸説不知孰是瞿然禮檀弓曾子聞之瞿然鄭注云驚變也高雲驚顧貌再拜而稽首吳本刪而字玉機吳云以玉為機象天儀者也其機斡旋不息今曰神轉不回則亦玉機之斡旋耳是故名之張云玉機以璇璣玉衡可窺天道而此篇神理可窺人道故以並言而實則珍重之辭也舍於其所生張云舍留止也三月若六月若三日若六日張云病不早治必至相傳遠則三月六月近則三日六日五臟傳遍若三月而傳遍一氣一臟也六月而傳遍一月一臟也三日者晝夜各一臟也六日者一日一臟也臟惟五而傳遍以六者假令病始於肺一也肺傳肝二也肝傳脾三也脾傳腎四也腎傳心五也心復傳肺六也是謂六傳是順傳所勝之次簡按據新校正此七字王注錯出宜刪去馬吳諸家以為原文非風者百病之長也風論骨空論靈五色篇通天篇亦有此語出食志云食氣入胃散精於肝肝氣逆故食反出也高同發疸馬雲發而為疸疸者熱也吳云疸熱中之名所謂疸成為消中是也腹中熱煩心而出黃亦詳疸之為證耳志云疸火疸也風淫濕土而成熱故濕熱而發疸也簡按志聰蓋以疸為丹廣韻火疸小兒病也危氏得效方以疸為丹毒知是起於宋元則不可從出黃張云肌體出黃志云火熱下淫則溺黃簡按下文有出白之語志注似是冤熱馬雲煩冤作熱高雲冤熱熱極無伸也簡按高以冤為冤屈之義非出白吳云白淫濁也簡按痿論云入房太甚宗筋弛縱發為筋痿及為白淫此即出白也盅吳云蟲蝕陰血之名蟲蝕陰血令人多惑而志不定名曰蠱惑故女惑男亦謂之蠱言其害深入於陰也此名曰蠱其亦病邪深入令人喪志之稱乎簡按左傳昭元年醫和曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志又曰女陽物而晦時淫則生內熱惑蠱之疾趙孟曰何謂蠱對曰蠱淫溺惑亂之所生也於文皿蟲為蠱谷之飛亦為蠱在周易女惑男風落山謂之蠱皆同物也瘛熊音尺世反瘈同詳義見診要經終篇馬雲音異後世作瘈吳云心主血脈心病則血燥血燥則筋脈相引而急手足拘攣病名曰瘛張同簡按馬以瘈為後世字非滿十日法當死吳云天干一周五臟生意皆息故死法當三歲死滑云三歲當作三日夫以肺病而來各傳所勝至腎傳心法當十日死及腎傳之心心復傳肺正所謂一臟不復受再傷者也又可延之三歲乎吳本歲作噦注云當五歲氣衰之時三噦則死昂云此亦言其大較耳吳注改三歲作三噦欠理怒則肝氣乘矣志云肝當作肺悲則肺氣乘矣志云肺當作肝悲當作思簡按悲不必改及其傳化趙府本熊本及作反吳同大骨枯藁大肉陷下張云大骨大肉皆以通身而言如肩脊腰膝皆大骨也尺膚臀肉皆大肉也肩垂項傾腰重膝敗者大藏之枯藁也尺膚既削臀肉必枯大肉之陷下也馬雲大骨者即生氣通天論所謂高骨也愚嘗見一人有腎衰之疾果於腰骨高起寸余此大骨枯藁故也簡按張注是期六月死張云三陰虧損死期不出六月六月者一歲陰陽之更變也若其真臟已見則不在六月之例可因克賊之日而定其期矣簡按大骨枯藁云云凡五項王注配於五臟釋之諸家則漫然為五臟敗注今細玩之不若王義為得矣內痛引肩項吳云心臟又壞矣張云病及心經較前已甚破䐃釋音䐃音郡集韻渠隕切音窘馬雲䐃者肉之分理也吳云䐃肘膝髀厭高起之處病人為陰火所灼晝夜不安其身轉側多則䐃肉磨裂簡按靈壽夭剛柔篇云肉䐃堅而有分者肉堅王注似是史嵩音釋腹中䐃脂原出玉篇高雲肌腠曰肉脂膏曰䐃真臟見十月之內死滑云真臟見恐當作未見若見則十月之內當作十日之內馬吳諸家並云月當作日肩髓內消志云肩髓者大椎之骨髓上會於腦是以項骨傾者死不治也真臟來見諸家從新校正來作未急虛身中卒至吳云急虛暴絶也中邪氣深入之名卒至卒然而至不得預知之也高雲急虛正氣一時暴虛也身中外邪陡中於身也卒至客邪卒至於臟也五臟絶閉吳云絶氣絶也閉九竅塞也毛折吳云率以毛折死者皮毛得衛氣而充毛折則衛氣敗絶是為陰陽衰極故死志云夫脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精而後行氣於臟腑是臟腑之氣欲絶而毛必折也責責然高雲不流通也如循薏苡子張云短實堅強而非微鉤之本體本草圖經云薏苡實青白色形如珠子而稍長故人呼為薏苡珠子小兒多以線穿如貫珠為戲陶氏云交趾者最大彼土呼為簳珠辟辟然高雲硬而呆實無胃氣也簡案辟辟如彈石又見平人氣象論色澤以浮張云澤潤也浮明也顏色明潤者病必易已也明告之張云明告病家欲其預知吉凶庶無後怨懸絶沉澀高雲懸絶無根或沉澀不起者是無胃氣病在中脈實堅病在外脈不實堅張云與上文平人氣象論者似乎相反但上文云病在中脈虛言內積之實者脈不宜虛也此云病在中脈實堅言內傷之虛者脈不宜實堅也前云病在外脈澀堅言外邪之盛者不宜澀堅以澀堅為沉陰也此言病在外脈不實堅言外邪方熾者不宜無力以不實堅為無陽也四者之分總皆正不勝邪之脈故曰難治詞若相反理則實然新校正以謂經誤特未達其妙耳簡按馬吳諸家亦從原文為與平人氣象論別一義然考經文不若新校正以為誤之妥貼矣五實死薛云五實五虛具者皆死然氣虛至盡盡而死者理當然也若五實者何以亦死蓋邪之所湊其氣必虛不脫不死仍歸於氣盡耳然虛實俱有真假所當辨耳悶瞀釋音瞀音茂吳音務張云昏悶也一曰目不明高雲悶郁也瞀目不明也簡按靈經脈篇交兩手理瞀銅人注引太素注云瞀低目也玉篇目不明貌楚辭九章中悶瞀之忳忳王逸注煩亂也考數義張為昏悶似是三部九候論篇第二十吳據全元起改為決死生論衆多博大志云離合真邪論曰余聞九針九篇夫子乃因而九之九九八十一篇余盡通其意矣此蓋言先立針經八十一篇論九針之道然衆多博大不可勝數故願聞要道吳以黃帝問曰余聞九針於夫子以下九十九字為冗文屬子孫馬雲屬囑同張云屬付也著之骨髓馬雲著著同張云著紀也歃血馬雲歃孟子云束牲載書而不歃血簡按左傳正義云凡盟禮殺牲歃血告誓神明若有背違欲令神加殃咎使如此牲也禮曲禮疏割牲左耳盛以珠盤又取血盛以玉敦用血為盟書書成乃歃血讀書熊音歃音霎更立宋本立作互馬志並同九野吳云九州之分野張云即洛書九宮禹貢九州之義簡按淮南原道訓上通九天下貫九野高誘注云九天八方中央也九野亦如之又天文訓天有九野九千九百九十九隅去地五億萬里注云九野九天之野也王注據爾雅未允有下部有中部有上部吳本作有上部有中部有下部指而導之乃以為真張云必受師之指授庶得其真也高雲必以指循切而按導之乃為部候之真簡按張注似是真當質王注有禮曰疑事無質質成也之文明是字之誤吳本直改作質蓋據王注兩額之動脈張云額旁動脈當頷厭之分足少陽脈氣所行也簡按馬以為瞳子髎聽會等處非兩頰之動脈張云即地倉大迎之分足陽明脈氣所行也耳前之動脈張云即和髎之分手少陽脈氣所行也形藏四志云胃與大腸小腸膀胱藏有形之物也高同簡按形藏四諸家並仍王義然頭角耳目口齒理不宜謂之藏考周禮天官疾醫職云參之以九藏之動鄭注正藏五又有胃膀胱大腸小腸志注有所據今從之去其血脈馬雲去其脈中之結血吳云謂去其瘀血之在脈者蓋瘀血壅塞脈道必先去之而後能調其氣之虛實也如參舂高雲此上彼下彼上此下不相合也目內陷者死張云五臟六腑之精氣皆上注於目而為之精目內陷者陽精脫矣故必死吳移下文足太陽氣絶者其足不可屈伸死必戴眼十六字次於目內陷者死之下獨熱者病獨寒者病簡按諸家不注蓋熱乃滑之謂寒乃緊之謂志云寒熱者三部皮膚之寒熱也恐非是獨陷下者病志云沉陷而不起也獨大獨疾獨熱者大過也獨小獨遲獨陷下者不及也以左手足上上甲乙手下有於左二字無一上字吳改作以左手於病者足上上去踝庶右手足甲乙庶作以無足字並與新校正所引異吳改作以右手取病者足諸家皆仍原文釋之志云此候生陽之氣以知病之死生也張云手足之絡皆可取而驗之手踝之上手太陰肺絡也足踝之上足太陰脾絡也肺藏氣而主治節脾屬土而主灌溉故可取之以察吉凶簡按諸家隨文詮釋雖其義略通然不若文字甲乙為正而注意以吳為允其應馬雲凡曰應者應醫工之指下也蠕蠕然熊音蠕而兗切蟲行貌張云謂其軟滑而勻和也渾渾然馬雲當作混混不清也簡按混渾古通用淆雜也老子渾兮其如濁不必改字是以脫肉甲乙無是以二字似是身不去者簡按馬注刺要論體解㑊然不去矣云不能行動而去也張云不能動搖來去也乃並仍王注志云邪留於身而不去者死也非其脈代而鉤高雲代者乍疏之象也代而鉤者乍數之象也承上文乍疏乍數而言若其脈代而鉤者乃經絡內外不通故病在絡脈不死也一候後則病志云一候不應是天地人之氣失其一矣故主病高雲脈有浮中沉三候一候後者浮以候之脈不應指不應則病矣簡按以三部為浮中沉昉於難經便取而釋之非先知經脈吳云經常不病之脈以平旦死吳云平旦之際昏明始判之時陰陽交會之期也故寒熱交作之病以斯時死以日夕死張云日夕者一日之秋也風木同氣遇金而死高雲病風者秋金肅殺之氣病於肺也日夕乃申酉之時肺金主氣肺臟病故以日夕死七診雖見簡按七診諸家仍王義為前文獨小獨大等之義無復異論而志云七診謂沉細懸絶盛躁喘數寒熱熱中病風病水土絶於四季也乃至下文風起之病似七診之病而窮矣熊宗立脈決云七診者診宜平旦一也陰氣未動二也陽氣未散三也飲食未進四也經脈未盛五也絡脈調勻六也氣血未亂七也張則謂此七者焉得皆謂之診總之一平旦診法耳後世遂爾謬傳竟致失其本原矣似七診之病而非也張云風者陽病也故偶感於風則陽分之脈或大或疾經月者常期也故適值去血則陰分之脈或小或遲或為陷下此皆似七診之脈而實非也皆不可以言死然則非外感及經月之病而得七診之脈者非吉兆也脈候亦敗者死矣張云此承上文而言風氣經月之病本非七診之類若其果系脈息證候之敗者又非不死之比簡按王以脈候為脈應張則為脈息證候王注似是以上下逆從循之張云上下逆從各因其次以治之也簡按循蓋因循病之所在而治之義與上文切循其脈之循自異孫絡病者治其孫絡血靈脈度篇云經脈為里支而橫者為絡絡之別者為孫盛而血者疾誅之簡按新校正引甲乙絡病者治其絡血無二孫字今甲乙無血字在奇邪馬雲其有奇邪者不正之邪適然所中者吳云奇邪奇經之邪張云奇邪者不入於經而病於絡也邪客大絡則左注右右注左其氣無常處故常繆刺之簡按馬在讀為有留瘦不移吳改瘦作廋注云廋論語人焉廋哉之廋匿也言病邪留匿而不移簡按通評虛實論瘦留著滑改瘦作廋吳亦從之並似不穩節而刺之張云凡病邪久留不移者必於四肢八溪之間有所結聚故當於節之會處索而刺之志高同簡按當從王注見通之新校正引甲乙是瞳子高者張云瞳子高者目上視也戴眼者上視之甚而定直不動也馬雲此章二十五字為第八節之脫簡吳直移之於前文足太陽氣絶者云云之後手指及手外踝上五指留針馬雲王注以為錯簡者是也愚疑是第七節中手徐徐然下之脫簡簡按此一句吳以為血實於上之治法志高並以為刺手太陽而補足太陽之治俱不可從經脈別論篇第二十一馬雲別彼劣切內言太陽陽明少陽太陰少陰厥陰之脈各有分別故名篇吳云言經脈別有所論出於常談之外也簡按馬注五臟別論云別如字此乃五臟之別是一論此解為是而於陰陽別論卻讀為彼劣切乃與此篇並誤脈亦為之變乎張云脈以經脈血氣統言之也志云脈乃血氣之府氣逆則喘血液為汗故帝問脈而伯答其喘汗焉夜行則喘出於腎吳云此下四條言喘後五條言汗氣血之分也腎受氣於亥子故夜行則勞骨損陰喘出於腎淫氣病肺張云淫氣者陰傷則陽勝氣逆為患也肺腎為母子之臟而少陰之脈上入肺中故喘出於腎則病苦於肺有所墮恐喘出於肝簡按恐為腎志王謂生於肝未知何據諸家亦欠詳度水跌僕馬雲度渡同跌音迭僕音付搖體勞苦汗出於脾吳云搖體勞苦用力勤作也脾主四肢故汗出於脾高雲傷脾主之肌肉故汗出於脾不言肺者以汗皆出於肺主之皮膚也濁氣歸心張云濁言食氣之厚者也如陰陽清濁篇曰受谷者濁受氣者清是也心主血脈故食氣歸心則精氣浸淫於脈也行氣於府吳府上增玄字注云毛屬肺氣脈屬心血毛脈合其精則行氣於玄府是為衛氣玄府腠理也志云血獨盛則淡滲皮膚生毫毛夫皮膚主氣經脈主血毛脈合精者血氣相合也六腑為陽故先受氣高雲皮毛百脈合肺輸之精而行氣於六腑也簡按馬張仍王注以腑為膻中其義雖詳備以膻中為腑經無明文況下文云留於四臟志高之義似是故姑從之吳添玄字玄府腠理也大誤玄府汗空也與腠理自異府精神明留於四臟高雲六腑之精合心藏之神明留於肺肝脾腎四臟也馬雲始行於手太陰肺經通於心肝脾腎之四臟而四臟之精皆其所留是氣也李云留當作流吳云四臟形之四臟一頭角二耳目三口齒四胸中也簡按吳注誤歸於權衡吳云言其平等而無低昂也高雲權衡稱物而得其平也言脈之浮沉出入陰陽和平氣口成寸汪昂云此脈之所由來也氣口亦名寸口百脈之大要會也馬注與魚際相去一寸故名成寸張注分尺為寸按脈前為寸後為尺中為關此云成寸蓋兼關尺而言之也醫者由此察脈知病以決人之死生也李云臟腑既平必朝宗於氣口成一寸之脈以決死生也飲入於胃馬雲按飲入於胃以下乃言飲而不言食李東垣脾胃論朱丹溪纂要書不考上文為食乃改為飲食入胃則於下輸膀胱水精四布之義大背矣殊不知上文之食含蓄飲義而下文之飲必難以兼食也何諸醫書皆宗李朱而不考經旨矣遊溢吳云遊流行也溢湧溢也張云遊浮遊也水精四布五經並行張云水因氣生氣為水母凡肺氣所及則水精布焉然水名雖一而清濁有分清者為精精如雨露濁者為水水如江河故精歸五臟水歸膀胱而五經並行矣五經五臟之經絡也陰陽揆度馬雲五臟並行乎水精真有合於四時五臟及古經陰陽揆度等篇之常義也志云揆度度數也總結上文而言經脈之道合於四時五行之次序陰陽出入之度數以為經脈之經常太陽臟獨至高雲三陽主六腑腑能藏物亦謂之臟張云此言臟氣不和而有一臟太過者氣必獨至諸證不同針治亦異也吳云獨見太陽脈象下文象三陽而浮是下輸馬吳張並云膀胱經之輸穴束骨腎經之輸穴太溪高雲太陽之脈起於足小指之至陰故當取之下輸俞輸穴也重並也志云兩陽合於前故曰陽明陽明之獨至是太少重並於陽明陽盛故陰虛矣當瀉陽補陰取之下輸馬吳張並云陽明之輸陷谷太陰之輸太白高雲陽明之脈起於足大指次指之厲兌故當取之下輸蹻前卒大取之下輸馬吳張並云卒猝同下輸謂臨泣也高雲少陽起於足小指次指之竅陰故亦當取之下輸一陽之過也馬雲過者病也張云此釋獨至之義為一臟之太過舉少陽而言則太陽陽明之獨至者其為三陽二陽之太過可知也一陽少陽也五脈氣少徵四失論云診不中五脈吳云五臟皆受氣於脾而後治若胃氣不調於脾則諸脈皆失其母無以受氣故氣少也宜治其下輸馬吳張並云補足陽明之陷谷瀉足太陰之太白一陽獨嘯少陽厥也馬張據新校正一陽作二陰少陽作少陰張云獨嘯獨熾之謂蓋嘯為陽氣所發陽出陰中相火上炎則為少陰熱厥而陽並於上故心肝脾肺四脈為之爭張而其氣則歸於腎故曰獨嘯志云夫氣激於喉中而濁謂之言氣激於舌端而清為之嘯蓋氣鬱而欲伸出之簡按嘯説文吹聲也詩箋蹙口而出聲唐孫廣嘯旨云氣激於舌而清謂之嘯王云耳中鳴如嘯聲馬吳依之於義不允當從張注宜治其經絡馬張並云太陽經穴崑崙絡穴飛揚少陰經穴復溜絡穴大鐘厥陰之治也張云治主也真虛悁心張云肝邪獨至真氣必虛木火相干故心為悁痛高雲真虛猶言真假悁憂也言厥陰治之真假當憂心以審之即太陰之用心省真也簡按悁與腨悁陰陽別論之悁同義高注迂僻不可從調食和藥治在下輸張云調和藥食欲其得宜用針治之乃在下輸厥陰之輸名曰大沖愚按此篇何以知其皆言足經蓋以下輸二字為可知也亦如熱論篇傷寒言足不言手之義又如諸經皆言補瀉而惟少陽一陰不言者以少陽承三陽而言一陰承三陰而言因前貫後義實相同虛補實瀉皆可理會也至若一陰調食和藥一句蓋亦總結上文而言不獨一經為然古經多略當會其意象三陽而浮也張云太陽之象三陽者陽行於表陽之極也故脈浮於外志云象者像也三陽陽盛之氣也言太陽臟脈象陽盛之氣而浮也一陽臟者滑而不實也馬雲少陽為陽之裡陰之表所謂半表半裡者是也其臟為陽之初生故脈體滑而不實象一陽之為初陽也象大浮也馬雲陽明雖為太陽之裡而實為少陽之表比之滑而不實者則大而浮矣倣佛乎太陽之浮也言伏鼓也馬雲太陰則入於陰分脈雖始伏而實鼓擊於手未全沉也腎沉不浮也馬雲二陰雖相搏而至然腎脈沉而不浮也由是觀之則厥陰為沉之甚又非二陰比矣張云詳此明言二陰之脈象而前無二陰之至前有一陰之至而此無一陰之脈信為古經之脫簡而上文一陽少陽之誤即此節也吳云此篇自太陽臟獨至以下言經脈證象自是一家故云別論臟氣法時論篇第二十二法四時五行而治志云法於四時五行而為救治之法高雲診治之五行者金木水火土也白虎通云五行言行者欲言天行氣之義也漢藝文志云五行者五常之形氣也釋名云五行者五氣也於其方各施行也尚書正義云五行即五材也言五者各有材幹也謂之行者若在天則五氣流行在地則世所行用也卒聞之馬雲卒盡也素問靈樞言願卒聞之者甚多其義仿此肝苦急吳云肝為將軍之官志怒而急急則自傷而苦之矣宜食甘以緩之則急者可平也馬雲凡飲食藥物皆然心苦緩吳云心以長養為令志喜而緩緩則心氣散逸自傷其神矣急宜食酸以收之脾苦濕吳云脾以制水為事喜燥惡濕濕勝則傷脾土宜食苦以燥之肺苦氣上逆吳云肺為清虛之臟行降下之令若氣上逆則肺苦之急宜食苦以泄肺氣腎苦燥急食辛以潤之張云腎為水臟藏精者也陰病者苦燥故宜食辛以潤之蓋辛從金化水之母也其能開腠理致津液者以辛能通氣也水中有真氣惟辛能達之氣至水亦至故可以潤腎之燥志云以上論五臟所主之時日及五苦五味以下論五臟之病有間甚之時日及五欲五補五瀉簡按王好古湯液本草有五臟苦欲補瀉藥味之例李中梓醫宗必讀有苦欲補瀉論當稽考開腠理致津液通氣也滑云此一句九字疑元是注文持於冬汪機云愚謂執持堅定也猶言無加無減而平定也下晡玉篇晡申時也簡按史記天官書旦至食食至日昳日昳至餔餔至下餔下餔至日入知是下晡在晡時之後日入之前吳以為申酉是也急食辛以散之吳云肝木喜條達而惡抑鬱散之則條達故食辛以散之用辛補之酸瀉之吳云順其性為補反其性為瀉肝木喜辛散而惡酸收故辛為補而酸為瀉也簡按辛金味也金剋木乃辛在肝為瀉而云用辛補之何蓋此節專就五臟之本性而言補瀉不拘五行相剋之常理也下文心之咸亦同心欲軟吳云心為火臟心病則剛燥矣宜食鹹以軟之蓋咸從水化故能濟其剛燥使軟也用鹹補之甘瀉之吳云心火喜軟而惡緩故咸為補甘為瀉也馬雲此乃因其性而治之耳溫食飽食吳溫作濕注云濕食水果之類高同云濕食水濕之食也張云溫言非熱防滯也簡按二説未詳孰是日昳書無逸疏昃亦名昳言日蹉跌而下謂未時也熊音昳音迭日昃也簡按吳云日昳戌也張云日晐曰昳並誤蓋晐乃昃之訛下晡靜簡按據前後文例當是云日中靜王注一本或云之説卻似有理然經文其例不一往往有如此者姑仍舊注夜半靜簡按據前後文例當是云日昳靜肺欲收張云肺應秋氣主收斂故宜食酸以收之焠㶼張云焠音翠㶼音哀焠㶼燒爆之物也韻會焠燒也荀子解蔽注焠灼也廣韻熱甚也腎欲堅張云腎主閉藏氣貴周密故腎欲堅宜食苦以堅之也高雲腎病則水泛故腎欲堅苦為火味故能堅也至於所生而持於甲乙作其非䀮䀮熊音䀮乎光反目不明也脅支滿周語注支拄也吳云支滿者兩脅支離而滿也志云支滿者少陰之支絡滿痛於脅下也並誤脅下痛甲乙作兩胠痛肩甲馬雲甲胛同舌下血者張云心主舌故取舌下血以瀉其實簡按甲乙無舌下二字近是其變病吳云如笑不休之類張云謂病屬少陰而證有異於前説者簡按王為嘔變未允郤中馬雲手少陰之郤陰郤穴也本於王注張云郤隙同高雲其變病者言始病心包之經脈今變病太陽之孫絡當刺郤中而取其血者郤中足太陽之委中乃膕中央之合穴也簡按據刺腰痛論郤中即委中刺瘧論太陽瘧刺郤中甲乙作膕中王引黃帝中誥圖經云委中主之古法以委中為郤中也似高注不可廢肌肉痿馬吳據新校正肌作飢是善瘈甲乙作善瘈瘲張云瘈手足掉掣也簡按玉機真臟論云筋脈相引而急病名曰瘛瘛瘈同甲乙添瘲字似非是少陰血者張云少陰腎脈也脾主濕腎主水水能助濕傷脾故當取少陰之血以泄其寒實如厥病篇治脾心痛者亦取腎經之然谷太溪義猶此也簡按馬吳並從王注覺允當尻陰股膝髀腨胻足皆痛馬本陰股二字句而注文則尻陰股各一字句未知孰是吳云肺為清虛之臟主呼出而升陽肺病則清陽陷於下部不能自升邪氣實而為痛耳簡按馬張仍王義今從之不能報息張云報復也不能報息謂呼吸氣短難於接續也足太陽之外厥陰內血者甲乙內下有少陰二字張云外言前也內言後也簡按甲乙增少陰二字義尤明白寢汗張云此腎經之實邪也腎主五液在心為汗而腎邪侮之心氣內微故為寢汗如脈要精微論曰陰氣有餘為多汗身寒即此之謂志云太陽之氣司表而下出於膀胱經氣逆則表氣虛故寢汗出而惡風憎風説文憎惡也王云憎謂深惡之可疑粳米靈五味篇作粳米飯粳粳同葵農書云葵陽草也為百菜之主備四時之饌小豆五味篇作麻藿説文藿叔之少也儀禮公食大夫禮注藿豆葉也黃黍張云即糯小米北方謂之黃米簡按本草有丹黍無黃黍齊民要術引郭義恭廣志云有濕屯黃黍蓋此謂黍中之黃者金匱真言論以黍為心之谷者乃丹黍耳農政全書云古所謂黍今亦稱黍或稱黃米即與張所指同毒藥攻邪鄭玄注周禮云毒藥藥之辛苦者藥之物恆多毒書曰藥不瞑眩厥疾不瘳賈公彥云藥之無毒亦聚之但藥物多毒故曰毒藥王應電云毒藥得天地之偏氣寒熱之性過甚者也人身有不和之氣須以偏勝之物攻之乃得其平五菜為充吳云充實於臟腑也或急簡按二字王不釋其義諸家亦然考前文無物性急者疑是衍文高特注云或急者肝苦急也兼言或急則心或苦緩脾或苦濕腎或苦燥肺或苦氣上逆皆在其中此説傅會不可從宣明五氣篇第二十三吳云宣發也五氣木火土金水也言五氣有入有病有並有惡有液有禁有發有亂有邪有藏有主有傷有應是篇皆發明之是謂五入馬雲此與靈樞九針論同但彼多淡入胃一句簡按周禮疾醫職云凡和春多酸夏多苦秋多辛冬多咸調以滑甘與此同義心為噫馬雲口問篇云噫出於胃三部九候論與此篇皆曰心為噫考脈解篇所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也經典之旨豈非二而一者耶張云噫噯氣也遍考本經絶無噯氣一證而惟言噫者蓋即是也簡按説文飽食息也禮內則不敢噦噫是也噫烏界切音隘若於希切音衣則為痛嘆聲與此異義噯字彙於蓋切音噯噯氣也蓋噯即噫俗字高雲噫微噯也非肝為語志云肝氣欲達則為語診要經終篇曰春刺冬分邪氣著臟病不愈又且欲言語此言春令之肝氣不舒故也高雲病氣在肝則為語語多言也簡按標曰五氣所病則王馬吳張之解並誤下文吞同脾為吞志云脾主為胃行其津液脾氣病而不能灌溉於四臟則津液反溢於脾竅之口故為吞咽之證簡按據志注吞即吞酸酢吞之謂平脈法云噫而吞酸食卒不下又云上焦不歸者噫而酢吞龔廷賢云吞酸與吐酸不同吞酸水刺心也吐酸者吐出酸水也是高雲吞舌本不和也未知何據腎為欠為嚏志云靈樞曰陽者主上陰者主下陽引而上陰引而下陰陽相引故數欠當瀉足少陰補足太陽口問篇蓋少陰之氣在下病則反逆於上而欲引於下欲引於下則欠反逆於上則嚏蓋腎絡上通於肺也簡按九針論無為嚏二字此疑衍文為噦為恐簡按為恐諸注未晰九針論無此二字疑是衍文下焦溢為水高雲下焦病不能決瀆則泛溢而為水簡按靈蘭祕典論云三焦者決瀆之官水道出焉此以下焦與胃大腸小腸膀胱膽並稱則下焦即靈蘭祕典論之三焦詳義見六節臟象論而為六腑之一彼此互考乃知六腑之三焦專指下焦而言也膀胱不利為癃馬雲靈蘭祕典論云膀胱者州都之官津液藏焉氣化則能出矣今曰不利則為癃癃者水道不通之病也張云本輸篇曰三焦者太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺蓋三焦為中瀆之腑水道之所由出故三焦亦屬膀胱也簡按三因方云淋古謂之癃名稱不同也癃者罷也淋者滴也今名雖俗於義為得簡按淋為小便病始見六元正紀大論癃乃溺閉之通稱馬注為得膽為怒張云怒為肝志而膽亦然者肝膽相為表裡其氣皆剛而肝取決於膽也高雲膽病鬱而不舒則為怒是謂五病志云謂病五臟五行之氣而六腑亦配合於五行簡按九針論云五臟氣心主噫肺主咳肝主語脾主吞腎主欠六腑氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水茲舉六腑之病而言五精者蓋以大腸小腸俱為泄歟五精所並吳云五精五臟之精氣也併合而入之也五臟精氣各藏其臟則不病若合而並於一臟則邪氣實之各顯其志張云並聚也高雲臟虛而精氣並之也精者陰精氣者陽氣簡按精氣乃水穀之精氣不必分陰陽矣並於肝則憂馬雲陰陽應象大論曰怒而茲曰憂者以肺氣得以乘之也高雲肝主怒今曰憂者上文膽為怒故此肝為憂怒為有餘憂為不足也樓云憂當作怒簡按九針論亦作憂並於脾則畏馬雲陰陽應象大論曰思而茲曰畏者蓋思過則反畏也高雲思慮者脾之精今曰畏者慮之至也樓云畏當作思簡按九針論亦作畏甲乙作飢與王注一經同五臟化液高雲化液者水穀入口津液各走其道五臟受水穀之精淖注於外竅而化為五液也心為汗吳云心主血汗者血之餘故汗為心液簡按營衛生會篇云奪血者無汗奪汗者無血三因方謂傷寒衄者為紅汗其意同焉肺為涕簡按諸字書以涕為目泣而醫家特為鼻液考説文洟又作𪖦鼻液也蓋𪖦涕通用玉篇𪖦他計切鼻𪖦禮內則不敢唾涕釋文云本又作洟脾為涎吳張並云涎出於口脾之竅也簡按證治準繩損傷門云兩臉涎囊知是涎出於口也腎為唾吳云唾出於廉泉二竅二竅挾舌本少陰腎脈循喉嚨挾舌本故唾為腎液高雲靈樞根結篇云少陰根於泉結湧於廉泉舌下竅也是腎為水臟從下而上液雖有五腎實主之是以五液皆咸咸水味也血病無多食鹹張云血得咸則凝結不流也五味論曰血與咸相得則凝骨病無多食苦志云腎主骨炎上作苦苦走骨者火氣下交於腎也骨病而多食之則火氣反勝矣此與並於心則喜並於腎則恐之義相同蓋心腎水火之氣時相既濟故所走互更其餘三臟是本臟之味而走本臟所主之筋肉也簡按靈五味論曰酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心正與此節同義九針論曰苦走血病在血無食苦咸走骨病在骨無食鹹此以本臟之味而言之是謂五禁九針論作五裁五行大義引黃帝養生經作五賊陰病發於骨張云骨屬腎腎者陰中之陰也吳馬並同陽病發於血張云血屬心心者陽中之陽也陰病發於肉張云肉屬脾脾者陰中之至陰也邪入於陽則狂馬雲生氣通天論曰陰不勝其陽則脈流薄疾並乃狂邪入於陰則痹吳云邪陰邪也痹痹論所謂五臟痹也陰邪入於陰是重陰也則為五臟痹也馬雲成𤸷痹也張云壽夭剛柔篇曰病在陰命曰痹九針論曰邪入於陰則為血痹搏陽則為巔疾張云搏擊也巔癲也邪搏於陽則陽氣受傷故為癲疾上文言邪入於陽則狂者邪助其陽陽之實也此言搏陽則為巔疾者邪伐其陽陽之虛也故有為狂為癲之異也九針論曰邪入於陽轉則為癲疾言轉入陰分故為癲也簡按搏薄同迫也馬吳注以巔疾為巔頂之疾並非徐氏經絡全書云搏當作傳不可從下文搏陰同癲狂判然兩疾而後世混稱難辨因舉數説而昭之五十九難云狂癲之病何以別之然狂疾之始發少臥而不飢自高賢也自辨知也自倨貴也妄笑好歌樂妄行不休是也癲疾始發意不樂僵仆直視是也楊玄操云狂病之候不愛眠臥不肯飲食自言賢智歌樂行走此是陽氣盛之所成故經言重陽者狂今世以此為癲病謬矣癲顛也發即僵仆倒地故有癲蹶之言陰氣大盛故不得行立而倒也今世以為癇病者誤矣陳氏雪潭居醫約云狂謂妄言妄走也癲謂僵仆不省也各自一症然經有狂癲疾者按厥論陽明之厥則癲疾欲走呼此癲似言狂有言狂互引癲者又言癲疾為狂者按見陰陽類論此則又皆狂癲兼病今病有狂言狂走頃時前後僵仆之類有僵仆後妄見鬼神半日方已之類是以狂癲兼病者也欲獨閉戶牖而處陰不勝其陽則脈流薄疾並此乃獨狂症也陳此説證之經文驗之病者頗為明晰搏陰則為喑張云邪搏於陰則陰氣受傷故聲為喑啞陰者五臟之陰也蓋心主舌而手少陰心脈上走喉嚨系舌本手太陰肺脈循喉嚨足太陰脾脈上行結於咽連舌本散舌下足厥陰肝脈循喉嚨之後上入頏顙而筋脈絡於舌本足少陰腎脈循喉嚨系舌本故皆主病喑也九針論曰邪入於陰轉則為喑言轉入陽分則氣病故為喑也樓氏綱目云喑者邪入陰部也經云邪搏陰則為喑又云邪入於陰搏則為喑然有二症一曰舌喑乃中風舌不轉運之類是也一曰喉喑乃勞嗽失音之類是也蓋舌喑但舌本不能轉運言語而喉咽音聲則如故也喉喑但喉中聲嘶而舌本則能轉運言語也唐慧琳藏經音義云喑者寂然而無聲啞者有聲而無説舌不轉也簡按吳云喑啞也張云為喑啞知是樓氏所謂舌喑琳音所謂啞也陽入之陰則靜簡按孫奕示兒編云之字訓變左傳遇觀之否言觀變為否也蓋陽病在外則躁若入而變陰則靜下文出之陽意同王訓之為往似未妥是謂五亂志云謂邪氣亂於五臟之陰陽簡按曰狂曰痹曰癲曰喑曰靜曰怒皆亂氣所致宜曰六亂然此篇專主五臟而立言故曰五亂皆同命死不治吳本無命字馬雲是謂五邪皆同名曰死不治耳高本同下句注云是謂五邪皆同言五臟受邪同於木受金刑之義命死不治志本亦同注云命者謂計其餘命生死之期期以月節克之不即死簡按從馬注為是腎藏志九針論志作精難經同久視傷血簡按五臟生成篇云諸脈者皆屬於目久視傷血者傷血脈也久臥傷氣張云久臥則陽氣不伸故傷氣久坐傷肉張云久坐則血脈滯於四體故傷肉久立傷骨志云久立則傷腰腎膝脛故傷骨久行傷筋志云行走罷極則傷筋五勞所傷志云勞謂太過也上古之民形勞而不倦簡按勞説文劇也從力熒省熒火燒冖用力者勞魯刀切爾雅釋詁勞勤也血氣形志篇第二十四此天之常數馬雲靈樞五音五味篇謂少陰常多血少氣厥陰常多氣少血九針篇謂太陰常多血少氣與此不同須知靈樞多誤當以此節為正觀末節出血氣之多少正與此節照應豈得為訛吳云諸經之血氣多少乃天之常數然也簡按氣血多少徐氏要旨以運氣釋之志高亦有解率似傅會此宜存而不論焉伺之所欲馬雲肝欲散心欲軟之類吳云如風寒暑濕燥火病人有惡之者有欲之黃伺察其所欲則知其病在何經矣簡按諸注與馬同當以馬為勝欲知背俞張云此亦取五臟之俞而量之有法也背俞即五臟之俞以其在足太陽經而出於背故總稱為背俞其度量之法先以草橫量兩乳之間中半摺折之又另以一草比前草而去其半取齊中折之數乃豎立長草橫置短草於下兩頭相拄象三隅乃舉此草以量其背令一隅居上齊脊中之大椎其在下兩隅當三椎之間即肺俞穴也大椎甲乙云在第一椎陷者中外臺云大椎平肩斜齊高大者是也仍不得侵項分取之則非也上接項骨下肩齊在椎骨節上是余穴盡在節下復下一度心之俞也張云復下一度謂以上隅齊三椎肺俞之中央其下兩隅即五椎之間心之俞也復下一度左角肝之俞也張云復下一度皆如前法遞相降也簡按馬雲第五椎間宜為膈俞穴今云然者誤此説卻非是謂五臟之俞吳云此取五臟俞法與甲乙經不合蓋古人別為一家者也張云此法與靈樞背腧篇及甲乙經銅人等書皆不相合其中未必無誤或古時亦有此別一家法也仍當以背腧篇及甲乙等書者為是病生於咽嗌張云形苦志苦必多憂思憂則傷肺思則傷脾脾肺氣傷則虛而不行氣必滯矣脾肺之脈上循咽嗌故病生於咽嗌如人之悲憂過度則喉嚨哽咽食飲難進思慮過度則上焦痞隔咽中核塞即其徵也簡按高雲咽納水穀嗌司呼吸是誤矣咽嗌俱納水穀太陰陽明論云喉主天氣嗌主地氣可以證也咽嗌今本甲乙作咽喝注云一作困竭據形苦志苦作困竭者極是百藥馬雲此與靈樞九針論同但彼曰甘藥者是而此曰百藥者誤高雲靈樞終始篇云陰陽俱不足補陽則陰竭瀉陰則陽脫如此者可將以甘藥不可飲以至劑即此義也簡按邪氣臟腑病形篇云陰陽形氣俱不足勿取以針而調以甘藥也益知上文咽嗌為困竭之誤形數驚恐馬雲世有形體勞苦數受驚恐則志亦不樂其經絡不通而不仁之病生高雲驚恐因驚致恐志之苦也經絡不通勞其經絡形之苦也形數驚恐經絡不通即上文形苦志苦也簡按形字可疑王吳張志並不注及據馬高注形下添一苦字義略通經絡不通九針論作筋脈不通不仁馬雲謂𤸷重而不知寒熱痛癢也張云頑痹軟弱也簡按不仁即神農本經死肌後世所謂木是𤸷乃頑痹後世所謂麻是二證不同然麻者必木木者多麻故王注以下並以𤸷痹釋之當與診要經終篇參看醪藥甲乙藥作醴寶命全形論第二十五馬雲篇內首節有盡欲全形故名曰寶命者以次節有懸命蓋非寶惜天命其形難以全耳四時之法成吳云是以四時之法成也高雲人之所以成同於四時之法成簡按高注誤夫鹽之味鹹者馬雲按王注以鹽味津泄者為喻陰囊濕弦絶者為喻肺傷木敷者為指肺病皆自人身言之非也此三者猶詩經之所謂興也上三句興下一句也唯楊上善之注獨合經義余深取之簡按吳以鹽味津泄為比腎氣施泄而遺精寢汗咳血之疾紛然弦絶者為肺病木敷者為肝脹張則以鹽味津泄為喻腎氣有損二陰不守弦絶者與吳同木敷者為肝肺之損且云敷內潰也發飄墮也木敷於外者凋殘之兆也皆不如楊義之為優矣志高依楊注而意少異滑云此段有缺誤木敷者其葉發太素作木陳者其葉落爭黑當作爭異壞府謂三者之病猶云崩壞之處也詳此文義若曰夫弦絶者其音嘶敗木陳者其葉落鹽之味鹹者其氣令器津液泄病深者其聲噦絶皮傷肉血氣爭異人有此三者是謂壞府毒藥無治短針無取蓋以弦絶況聲噦木落況絶傷津泄況血氣爭異也庶通錢潢傷寒溯源集云蓋此篇帝欲盡愈天下最深之病而伯對以病之深而將敗者豈能悉愈若留淫日深著於骨髓者如鹽之味鹹其氣味深入浸潤雖以瓷器之堅亦能滲透而津泄其滷液以譬邪氣之浸淫於筋骨臟腑之中而難於洗拔且腎為潤下鹹水之臟若下泄不固則腎之元陽精氣敗絶矣又如絲絃之將絶則其音破碎而嘶敗以譬脈之弦絶急者為肝氣將絶豈若木之敷榮者能生髮其枝葉乎所以病之深而難治者胃氣敗而脾絶聲必噦逆也謂之壞府者人身之軀殼所以藏五臟六腑如藏器之府靈樞脹論曰臟腑之在胸脅腹裡也若匱匣之藏禁器也若人而有此三臟之敗是謂壞府雖毒藥無能治短針不能取若徒用之適足以絶皮傷肉而無益也何也病情至此氣乖血死血氣爭黑而不可治也此篇經義自唐王太僕以來俱未之能解豈可引之以作證邪素問雖上古典墳義深難解其旨豈終晦乎二氏所注未知於經旨何如附以存一説嘶熊音西馬叫聲張云破聲曰嘶簡按前王莽傳大聲而嘶師古注嘶聲破也熊音誤耳王注嘶嗄玉篇嗄聲破當從王張是謂壞府張云府猶宮府也人之傷殘日久則形體損敗如此故謂之壞府簡按王引抱朴子今本無所考徐堅初學記引抱朴子云文摯愆筋以療危困仲景穿胸以納赤餅此但醫家猶能若是余念其痛心為之亂惑反甚志心下並句高同不可更代馬雲病離人身如更代而去也吳云更代更易時月也志同張云針藥罔效適甚其病欲施治無法可更故百姓聞之必反謂殘賊而害之也十二節馬雲人有十二經脈之節吳云天有六陰六陽人亦有六陰六陽以應之張同志云邪客篇曰歲有十二月人有十二節生氣通天論曰其氣九州九竅五臟十二節皆通乎天氣十二節者手足之十二大節也蓋天有陰陽寒暑以成歲人有十二節以合手足之三陰三陽十二經脈以應十二月也高雲人身手足十二骨節之氣開闔運行一如天晝開夜闔之陰陽也經天地陰陽之化馬雲經理其天地陰陽之化吳同當從王五勝漢津歷志孟康注五勝云五行相勝達虛實之數吳云數微甚之差也呿吟至微馬雲呿吟至微至細何其幽也露齒出氣之謂呿熊音呿丘加反張口也吳云雖呿吟之聲至微之疾猶秋毫之在於目察之無難也高雲呿吟之下得其至微秋毫纖悉畢在於目簡按通雅云吟即噤閉口也古吟吟噤通用呂覽重言篇君呿而不吟高誘注呿開吟閉史淮陰侯傳雖有舜禹之智吟而不言注吟巨蔭反音噤馬注非是日有長短諸本作短長簡按此節押韻當改虛實呿吟志云以呿吟之至微而知其虛實也簡按蓋雖萬物並至不可勝量然要之不過虛實開閉之理故問其方土得木而達簡按達王訓通然與代滅缺絶義相乖諸家不解可疑黔首共餘食吳云黔首黑髮之民餘食猶言備食張云黔首黎民也共皆也餘食猶食之棄余皆不相顧也志云共供同懸布天下者先立針經以示人而百姓止可力田以供租稅有餘粟以供養其於治針之道莫之知也楊慎丹鉛總録云李斯刻石頌秦曰黔首康定太史公因此語遂於秦紀謂秦更民曰黔首朱子注孟子亦曰周言黎民猶秦言黔首蓋因太史公之語也然祭統內經實先秦出黔首之稱恐不自秦始也按祭統當作祭義知毒藥為真張云治病之道針藥各有所宜若真知非藥不可而妄用針者必反害之如邪氣臟腑病形篇曰諸小者陰陽形氣俱不足勿取以針而調以甘藥也根結篇曰形氣不足病氣不足此陰陽氣俱不足也不可刺之志云毒藥所以攻邪者也如知之不真用之不當則反傷其正氣矣末世之刺也志高刺作制注云制制針之小大也非是道無鬼神吳云言其道足以補化工無復鬼神之能事矣張云得心應手取效若神所謂神者神在吾道無謂鬼神既無鬼神則其來其往獨惟我耳簡按莊子云獨往獨來謂之獨有蓋獨有刺之真者也無以形先汪機云不可徒觀其外形而遺其內氣之相得否吳云衆脈不見無真臟死脈也衆凶弗聞無五臟絶敗也外證內脈相得非徒以察形而已故曰無以形先可玩往來志云九針篇曰其來不可逢其往不可追知機之道者不挂以發不知機道叩之不發知其往來要與之期五虛勿近五虛五實見玉機真臟論勿志高並作弗高雲虛則不可針故曰弗近實則宜針故曰弗遠至其當髮間不容瞚張云發出針也瞚瞬同言針發有期或遲或速在氣機之頃不可以瞬息誤也簡按説文瞚開闔目數搖也徐鉉曰今俗別作瞬非是舒問切史扁鵲傳目眩然而不瞚集韻韻會並音舜釋音瞚音寅可疑甲乙作睻説文大目也太素作眴説文目動也並難通針耀而勻高雲勻圓活也手動若務者以手按穴似專一而不移針耀而勻者行針之時復光耀而圓活也視義吳云視針之義簡按離合真邪云用針無義反為氣賊觀適之變吳云適針氣所至也變形氣改易也見其烏烏見其稷稷張云此形容用針之象有如此者烏烏言氣至如烏之集也稷稷言氣盛如稷之繁也從見其飛言氣之或往或來如鳥之飛也然此皆無中之有莫測其孰為之主故曰不知其誰伏如橫弩起如發機張云血氣未應針則伏如橫弩欲其強鋭也血氣既應針則退如發機欲其迅速也劉熙釋名云弩怒也其柄曰臂似人臂也鉤弦者曰牙似齒牙也牙外曰郭為牙之規廓也下曰懸刀其形然也合名之曰機言機之巧也亦言如門戶之樞機開闔有節也古史考云黃帝作弩簡按杜思敬拔萃方引經文作彉弩孫子兵勢篇勢如彉駑説文彉弩滿也知是橫彉通用吳云橫不正也誤遠近若一馬雲氣來或遠或近正與病之淺深而合一吳云穴在四肢者為遠穴在腹背者為近取氣一也八正神明論篇第二十六馬雲內有八正虛邪之當避針法神明之當知此篇大義出自靈樞官能篇吳云神明謂日之寒溫月之虛盈時之浮沉皆神明所宰用針當審趨避也高雲合人形於天地四時陰陽虛實以為用針之法神乎神獨悟獨明故曰八正神明也用針之服簡按詩大雅昭哉嗣服毛傳云服事也王注本此官能篇云用針之服必有法則上視天光下司八正以避虛邪而觀百姓審於虛實無犯其邪八正之氣馬雲八正者八節之正氣也四立二分二至曰八正史記律書云律歷天所以通五行八正之氣注八正謂八節之氣以應八方之風衛氣沉吳及九達並此下補凝則難瀉沉則難行八字血氣始精張云精正也流利也月屬陰水之精也故潮汐之消長應月人之形體屬陰血脈屬水故其虛實浮沉亦應於月志云精純至也靈歲露篇云月滿則海水西盛人血既積肌肉充皮膚致毛髮堅腠理郤煙垢著月郭空則海水東盛人氣血虛其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落移光定位吳云日移其光氣易其舍宜因時定位張云日月之光移則歲時之位定高雲移光去陰晦而光明也定位日月中天而位定也故日月生而瀉張云日當作曰吳志高並作曰簡按移精變氣王注引此文作故曰知是作日者傳抄之訛星辰者所以制日月之行也吳云星謂二十八宿辰躔度之次也制裁也所以裁度日月之行次於某宿某度也志云岐伯曰歲有十二月日有十二辰子午為經卯酉為緯周天二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至心為陰出衛氣行篇蓋日月經天有南陸北陸之行有朔望虛盈之度故星辰者所以紀日月之行而人之營衛亦有陰陽虛實之應也八風之虛邪馬雲九宮八風篇云八風從其虛之邪來乃病人三虛相搏則為暴病兩實一虛則為淋露寒熱三虛謂乘年之衰逢月之空失時之和因為賊風所傷見歲露篇春秋冬夏之氣所在吳云所在如正月二月人氣在肝三月四月人氣在脾五月六月人氣在頭七月八月人氣在肺九月十月人氣在心十一月十二月人氣在腎經中言氣之所在不能盡同此其一也張取王吳兩説而避之勿犯也吳刪而字也字馬雲當避之而勿犯故曰天忌不可不知也熊本忌下句蓋依王注諸本無句先知針經馬雲針經者靈樞也第一篇九針十二原中有先立針經一語後世皇甫士安易靈樞以針經之名此以下歷解針經之辭也簡按以下歷解官能篇第三節之語凡九釋頗似韓非解老篇蓋古注釋之文如此觀其冥冥官能篇作窈冥髣佛簡按説文作倣佛曰仿相似也佛見不審也虛逢風吳九達並改逢其風簡按正邪王以為不從虛之鄉來吳因謂八風正氣之邪若逢虛氣則與虛邪無別故改虛作其今考經文正邪即虛邪之微者志引刺節真邪論正氣釋之恐非是刺節真邪云正氣者正風也從一方來非實風又非虛風也萌牙官能篇作萌芽馬吳並同張云救其萌牙治之早也瀉必用方官能篇云瀉必用員切而轉之其氣乃行雲云與此相反馬雲其辭雖不同大義則兩相通補必用員馬本員作圓注云圓者正以物之圓者可行可移張云員員活也行者行其氣移者導其滯凡正氣不足則營衛不行血氣留滯故必用員以行之補之簡按官能篇云補必用方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正此篇方字在語中非下針方正之義乃與圓字用法異排針吳云排謂經氣既至則內其針如排擁而入也張云排除去也志云排推也候其吸而推運其針高雲排轉也若風吹雲靈九針十二原云刺之道氣至而有效若風吹雲明乎若見蒼天九針之論不必存也馬雲九針之論涉於形迹特魚兔之筌蹄也烏足存哉離合真邪論篇第二十七馬雲內言經脈合於宿度經水及末有真氣邪氣等義故名篇吳云外邪入於正氣名曰合刺之瀉去其邪名曰離高同經水簡按王解經字恐非蓋經是經緯之經王注涇水靈經水篇甲乙並作清水新校正引甲乙亦作涇水者何隴起馬吳張並云隴隆同簡按隴壟同劉向傳丘隴項羽紀隴畝俱可證通雅云內經言夜半陰隴而日中陽隴而脈應之猶言擁起為隴而過此漸平迤也經之動脈志云虛風虛鄉之邪風也經之動脈謂經血之動於脈也言虛風之邪因而入客於經亦如經水之得風其至於所在之處亦波湧而隴起循循次序貌言邪在於經雖有時隴起而次序循行無有常處其行於脈中循循然甲乙無其行二字高雲其不因於邪則血氣之行於脈中循循然簡按此虛邪入而客者高為不因於邪恐非循循吳從王所引一本作輴輴馬雲似有次序之意不必輴輴音椿考字書義難葉論語循循然善誘人何注次序貌時大時小張云邪氣隨脈必至寸口有邪則隴起而大無邪則平和而小隨其所在而為形見故行無常處在陰與陽不可為度馬雲或在陽經或在陰經吳改與作在志云止可分其在陰與陽而不可為度數從而察之從甲乙作循轉針張云搓轉其針如搓線之狀慢慢轉之勿令太緊瀉左則左轉瀉右則右轉故曰捻針為故吳云故常法也高雲欲以得氣為復其故今從吳義大氣皆出高雲大氣針下所聚之氣也簡按王注大邪之氣注下文則云大經之氣何其言之不一當從高注捫而循之通雅云捫摸一字古無摸字即捫也切而散之馬雲謂以指切捫其穴使氣之布散也推而按之張云再以指揉按其肌膚欲針道之流利也高雲分擘其穴不使傾移彈而怒之馬雲以指屢屢彈之使病者覺有怒意使之脈氣填滿也張云以指彈其穴欲其意有所注則氣必隨之故脈絡䐜滿如怒起也簡按七十八難怒作努怒努通用莊子逍遙遊怒而飛外物篇草木怒生後漢第五倫傳鮮車怒馬皆努同抓而下之馬雲謂以左手之爪甲搯其正穴而右手方下針也七十八難抓作爪張云抓爪同簡按後後趙一傳針石運乎手爪太子賢注云古者以砭石為針凡針之法右手象天左手法地彈而怒之搔而下之此運手爪也蓋取此篇但抓作搔高雲抓猶引也未知何據通而取之甲乙取作散吳云通達其處然後取定其穴張云下針之後必候氣以取其疾外引其門簡按王引調經論文乃靈官能篇文其氣以至甲乙以作已馬雲以已同令神氣存甲乙神作真其寒溫未相得馬雲舍於經脈之中寒則血凝泣與血之溫尚未相得暑則氣淖澤與血之寒尚未相得張云邪氣寒正氣溫故不相得高雲未為寒病未為溫病其寒溫未相得時如湧波之初起也志云寒溫欲相得者真邪未合也故邪氣波隴而起來去於經脈之中而無有常處徐永時云真邪已合如真氣虛寒則化而為寒真氣盛熱則化而為熱邪隨正氣所化故曰寒溫未相得逢其沖志云逢迎也沖者邪盛而隆起之時也高雲邪氣衝突宜避其鋭逢甲乙作迎邪氣復至復甲乙作益其來不可逢吳云其邪之來不可逢其虛而取之蓋恐更傷其經氣也正此云無逢其沖之謂張云真氣不實迎而瀉之邪氣雖去真氣必太虛矣故曰其來不可逢也按小針解曰其來不可逢者氣盛不可補也彼言補此言瀉文若相反各有深義當兩察之大氣已過吳云大氣人氣也人氣應乎水刻異在靈樞志云大氣風邪之氣也高雲針下所聚之大氣已過而復瀉之則真氣外脫簡按上文云大氣皆出又云大氣留止高注為是其往不可追張云小針解曰其往不可追者氣虛不可瀉也不可挂以發小針解云不可挂以發者言氣有易失也吳云此上必有闕文此兩釋其義耳取邪之時不可毫髮間差張云欲瀉其邪在氣至之頃不可挂以發者言絲毫之不可失也志云挂挂同髮針吳云施針也若先若後吳云若先之則邪未至後之則虛其真病不可下張云下者降服之謂高雲下猶退也如扣椎吳云椎木瘤也張云椎木椎也頑鈍難入如扣椎之難也簡按木瘤未有所考溶溶釋音溶音容張云流動貌簡按説文水盛也逆而刺之溫血也吳云溫血毒血也張云凡取絡者必取其血刺出溫血邪必隨之而去矣故病可立已溫血熱血也簡按王注刺之下句恐非也志云若逆而刺之是謂內溫血不得散氣不得出三句出十二原篇高雲溫通調也略同王義不可從中腑吳云中腑胃也土主中宮故曰中腑調之中腑者言三部九候皆以沖和胃氣調息之張云中腑臟氣也凡三部九候脈證皆以臟氣為主氣順則吉氣逆則凶故調之中腑志高仍吳注大過且至吳云大邪為過也高雲大過死期也今從吳大經舉痛論云血泣不得注大經內著馬雲著著同不能久長張云殺人冥冥之中莫此為甚欲遺陰德於子孫者當以此為切戒高雲不能使人久長於人世也因不知因甲乙作固因加相勝志云不知六氣之加臨五運之相勝高同簡按蓋謂不知五勝之理反補之此則加相勝者乃釋邪攻正也與運氣之義迥別通評虛實論篇第二十八馬雲評論也內論病有虛實之義故名篇吳云通普也高雲猶言統論虛實也邪氣盛則實精氣守則虛張云邪氣有微甚故邪盛則實正氣有強弱故精奪則虛奪失也二句為病治之大綱其辭似顯其義甚微最當詳辨此以下論説精確醫家所宜識以文繁今省之李云盛則實者邪氣方張名為實證奪則虛者亡精失血用力勞神名為內奪汗之下之吐之清之名為外奪氣怯神疲名為虛證簡按邪氣之客於人身其始必乘精氣之虛而入已入而精氣旺與邪氣俱盛則為實如傷寒胃家實證是也若夫及邪入而客精氣不能與之相抗為邪氣所奪則為虛如傷寒直中證是也馬雲邪氣盛者外感也正氣虛者內傷也此説不可從氣逆者足寒也張云氣逆不行則無以及於四肢陽虛於下故足寒也餘臟皆如此馬雲此肺虛而非相剋之時則生如春秋冬是也如遇相剋之時則死如夏時之火是也餘臟虛者其生死亦如此而已夫帝問虛實而伯先以虛為對未及於實也張云一曰肺王於秋當秋而氣虛金衰甚也故死於義亦通寸脈急而尺緩簡按王云脈急謂脈口也而不解尺緩之義諸傢俱為尺中之脈非也論疾診尺篇云審尺之緩急小大滑澀邪氣臟腑病形篇云脈緩者尺之皮膚亦緩尺緩即尺膚緩縱之謂此節以脈口診經以尺膚診絡蓋經為陰為里乃脈道也故以脈口診之絡為陽為浮而淺故以尺膚診之義為明晰馬以經與寸為陽以絡與尺為陰此本於後世寸陽尺陰之説者與經旨相畔張則云本節之義重在經絡不在尺寸俱不知尺是尺膚之謂也下文脈口寒而尺寒尺熱滿脈口寒澀義並同吳尺緩改作尺脈緊尤誤故曰吳刪二字簡按以下止可以長久也三十一字疑是錯簡若移於下文滑則生澀則死也之下則文理順接焉脈口熱而尺寒也志云寒熱者尺寸之膚寒熱而應於經絡也絡脈外連皮膚為陽主外經脈內連臟腑為陰主內經云榮出中焦衛出下焦衛氣先行皮膚先充絡脈絡脈先盛衛氣已平營氣內滿而經脈大盛經脈之虛實也以氣口知之故以尺膚候絡而以寸候經高雲經氣有餘則脈口膚熱絡氣不足而尺膚寒也以寸膚候經以尺膚候絡簡按脈口熱依下文寒澀而推之謂脈滑也志高以尺為尺膚極是然以脈口為寸膚者經文中無明證秋冬為逆張云陽虛者畏陰勝之時馬雲秋冬屬陰合絡與尺簡按馬注誤尺熱滿志本熱作脈誤春夏死秋冬生也張云陰虛者畏陽勝之時按王氏曰春夏陽氣高故脈口熱尺中寒為順秋冬陽氣下故尺中熱脈口寒為順此説若為近理而觀內經論脈諸篇則但言陰陽浮沉隨氣候初未聞有以尺寸盛衰分四時也學者於此不辨恐反資多歧之惑馬雲春夏應經與寸簡按馬注亦誤灸陰刺陽刺陰灸陽張云此正以絡主陽經主陰灸所以補刺所以瀉也簡按王注陰陽經絡互誤吳馬遂為灸瀉刺補之解太誤志高皆仍張義今從之高雲此以灸刺通於上文則上文治主病者亦當通於此矣脈氣上虛尺虛簡按當從新校正下文歷舉脈虛氣虛尺虛之狀明是脫誤張志高仍舊文釋之義卻晦矣言無常張云脈要精微論曰言而微終日乃復言者此奪氣也志云宗氣虛而語言無接續也簡按志本於楊上善尺虛簡按謂尺膚脆弱論疾診尺篇云尺肉弱者解㑊安臥乃與步行恇然同義諸家以尺為寸關尺之尺誤恇然張云恇音匡恇然怯弱也説文恇怯也不象陰也吳云脈者血之府脈虛者亡血可知故云不象陰也張云脈虛者陰虧之象高雲若脈虛者浮泛於上有陽無陰不能效於陰也寒氣暴上張云此指傷寒之屬也實而逆則死張云邪盛者脈當實實而兼滑得陽脈也故生若見陰脈為逆故死按玉機真臟論云脈弱以滑是有胃氣命曰易治脈逆四時為不可治春秋則生冬夏則死張云脈之實滿邪有餘也手足寒者陰逆在下頭熱者陽邪在上陰陽乖離故為上實下虛之病春秋為陰陽和平之候得其和氣故可以生冬夏乃陰陽偏勝之時陽劇於夏陰劇於冬故死浮而澀吳云澀為無血浮而身熱為邪盛為孤陽此不必問其四時而皆死也馬雲此前後無問答之語疑為錯簡歟簡按據新校正注其為錯簡無疑焉其形盡滿志云形謂皮膚肌腠蓋經脈之內有有形之血是以無形之氣乘之肌腠之間主無形之氣是以有形之水乘之而為腫脹也高雲形身也滿猶實也簡按王吳以形為頭角耳目口齒胸中之形藏非也不應也簡按尺膚澀與脈急大堅不相應也邪氣臟腑病形篇云色脈與尺之相應也如桴鼓影響之相應也從者手足溫也張云四肢為諸陽之本故陽邪盛者手足當溫為順若手足寒冷則以邪盛於外氣虛於內正不勝邪所以為逆乳子而病熱吳云乳下嬰兒也張云此統言小兒之內外證也病熱脈懸小者陽證陰脈本為大禁寒則死簡按論疾診尺篇云嬰兒病頭毛皆逆上者必死大便赤飧泄脈小手足寒者難已溫易已乳子中風張云此言小兒之外感也風熱中於陽分為喘鳴肩息者脈當實大但大而緩則胃氣存邪漸退故生實而急則真臟見病曰進故死志云肩息者呼吸搖肩也風熱之邪始傷皮毛喘鳴肩息是風熱盛而內干肺氣宗氣故脈實大也簡按此後世所謂馬脾風之屬衛生寶鑑云風熱喘促悶亂不安俗謂之馬脾風腸澼便血吳云腸澼滯下也利而不利之謂便血赤利也馬雲腸澼者大小腸有所闢積而生諸證故腸澼為總名有等俗名腸風下血有糞前來者為近血糞後來者為遠血今茲腸澼便血凡下血皆是志云腸澼者邪僻積於腸間而為便利也經言陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則便血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則合併凝聚而積成矣是以腸澼便血者陰絡之血溢也腸澼下白沫者腸外之寒汁沫也腸澼下膿血者汁沫與血相搏併合而下者也夫便血陰泄於內也發熱陽脫於外也本經曰陰陽虛腸澼死此陰陽血氣之相離也張云腸澼一證即今之所謂痢疾也自仲景而後又謂之滯下按滯下之稱範汪諸方己載之見於外臺祕要仲景書無考張言恐杜撰身熱則死寒則生簡按病源候論血痢門舉此二句知巢氏以腸澼便血為血痢也脈沉則生脈浮則死高雲泄澼下白沫寒汁下泄脈沉則血氣內守故生脈浮則血氣外馳故死簡按病源候論云痢色白食不消謂之寒中也診其脈沉則生浮則死知巢氏以下白沫為寒痢也腸澼下膿血吳云赤白並下也馬雲邪氣臟腑病形篇謂之瘕泄難經謂之大瘕泄後世曰痢脈懸絶則死滑大則生高雲其脈懸絶則內脫生陽不升故死脈滑大則陰陽和合血氣充盛故生簡按病源候論膿血痢門引此二句知巢氏以下膿血為膿血痢也身不熱脈不懸絶高雲上文言身熱則死又言脈懸絶則死帝承上文之意而言身不熱脈不懸絶何如懸澀高雲懸絶之漸也簡按病源候論以身不熱以下二十四字載水穀痢門脈搏大滑吳云搏過於有力也此為肝實大為氣有餘滑為血有餘故久自已簡按吳注似是而至下文實則死窮矣虛則可治實則死汪云愚按上文云脈搏大滑久自已夫搏大滑似屬實也下文云虛則可治實則死上下文義似相反戾意恐搏大滑中兼有虛豁狀耶徐云虛則可治實則死與搏而滑大相反搏而滑非實也正滑泛而躍也故自已馬雲搏大滑中帶虛可治若帶實則邪氣有餘乃死候也簡按上文云堅急乃實之謂消疸張云消疸者三消之總稱謂內熱消中而肌膚消瘦也吳云消疸消中而熱善飲善食簡按脈要精微論云疸成為消中五變篇云熱則消肌膚故為消疸皆可以證脈實大病久可治滑云經言實大病久可治注意謂久病血氣衰脈不當實以為不可治又巢氏曰脈數大者生細小浮者死又云沉小者生實牢大者死前後所論甚相矛盾可見脈難盡憑必須參之以症方可以決其死生也徐云脈當微弱者生茲為實大者可治似相反也愚謂當時傳刻者之誤耳吳云脈實大則真氣未漓雖久可治脈懸小堅則胃氣已絶病久則死志云消疸五臟之精液虛於內也癲乃陰實於外故虛則可治疸乃精虛於內故實者可治簡按徐本於王義吳志雖似允當竟不如徐之診病有所徵也帝曰春亟治經絡志高並云帝曰當作岐伯曰簡按上文帝曰形度以下十六字王既謂錯簡也志高則以春亟以下為上文答語故改岐伯曰不可從亟王訓急音棘諸家並同此恐非是蓋孟子亟問亟饋鼎肉之亟音唭頻數也馬雲春時治病治其各經之絡穴經腧馬雲夏則治其各經之腧穴六腑志云治六腑者取之於合也胃合於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉蓋五臟內合於六腑六腑外合於原俞秋氣降收漸入於內故宜取其合以治六腑也少針石也張云冬寒陽氣閉塞脈不易行故當用藥而少施針石此用針之大法也不得頃時回吳云不得頃時遲回簡按回讀猶徘徊低徊之回俳回謂踟跦不進也低徊紆衍貌史記孔子贊低徊留之不能去遲緩之義吳注為得甲乙無時字三痏馬痏音賄張云刺瘢曰痏三痏三刺也志云痏者皮膚腫起之象針眼微腫如小瘡故曰痏也簡按説文痏疻痏也志説未見所據纓脈馬雲人迎水突氣舍等穴張同吳云不言其經者約而言之不必拘其經也掖癰甲乙掖作腋馬雲掖腋同簡按癰疽篇發於腋下赤堅者名曰米疽劉涓子鬼遺方云內疚疽發兩腋下及臂並兩手掌中後世外科書謂之腋發足少陽五馬雲淵液穴也張云淵腋輒筋也吳云足少陽膽經行於兩脅故掖腫刺之手心主三馬雲天地穴也大骨之會簡按馬仍王注志云謂臂骨交會之處尺澤間也當從王注暴癰筋軟簡按志云暴癰者言毒氣更深為毒凶暴誤也今從王注軟説文衣戚也廣雅縮也熊音如袞反縮也王注軟急即縮急也甲乙作濡馬雲軟同同吳云筋柔軟也並誤胞氣不足吳云陰汗不盡者是陰胞之氣不足太陽失衛故汗不止也簡按胞脬同所謂陰胞蓋指膀胱高為血海非也治在經輸張云如手太陰肺經太淵為輸之類也簡按馬以列缺為肺經之輸誤也甲乙經上有其字腹暴滿高雲腹中卒暴而滿太陰脾土病也按之不下既滿且硬不應指而下也太陽經絡者宋本作手太陽簡按王注太陽謂原本作為今改手太陽也知手字是後人所添志高從宋本誤王引中誥圖經文與甲乙全同胃之募也六十七難云五臟募皆在陰滑壽注在腹為陰則謂之募在背為陽則謂之俞募猶募結之募言經氣之聚於此也簡按吳呂廣撰募腧經見甲乙注李時珍八脈考釋音募音暮與膜同詳義見瘧論募原注此四字甲乙無蓋是衍文少陰俞馬雲腎俞穴此本屬足太陽膀胱經然曰少陰者以腎為足少陰也張云少陰俞即腎俞也腎為胃關故亦當取之系足太陽經穴去脊兩旁各一寸五分共為三寸圓利針高雲九針十二原論曰針大如氂且圓且鋭中身微大以取暴氣蓋腎俞兩旁不可深刺故用氂針泄腎臟之水氣以治腹滿霍亂志霍作藿未知何據吳云手揮霍而目瞭亂名曰霍亂簡按此屬臆解病源候論云霍亂者由人溫涼不調陰陽清濁二氣有相干亂之時其亂在於腸胃之間者因遇飲食而變發則心腹絞痛其有先心痛者先吐先腹痛者則先痢心腹並痛者則吐痢俱發霍亂言其病揮霍之間便致撩亂也文選文賦紛紜揮霍李善注揮霍疾貌刺俞旁五吳云謂背俞兩旁去脊中行三寸之穴各五痏簡按王諸家併為少陰俞旁志室十四椎兩旁相去脊中各三寸此承上文少陰俞而言然考之甲乙氣亂於腸胃發霍亂吐下篇首節載霍亂刺俞旁五云云不知士晏以俞為何俞可疑足陽明及上旁三簡按足陽明王為胃俞在十三椎下兩旁各一寸半張仍此馬則為胃倉即胃俞旁一寸五分上旁三王為腎俞之上故云胃俞穴馬張為胃倉之上故云胃舍穴十一椎下兩旁相去各三寸吳及志高不指言穴名未詳孰是癇驚志云癇瘈筋攣或外感六氣或內傷七情或飲食生痰或大驚卒恐病涉五臟故當取五脈簡按此小兒病也太素作驚癇甲乙亦作驚癇載小兒雜病中王符潛夫論云哺乳太多則必掣縱而生癇病巢源云癇者小兒病也十歲以上為癲十歲以下為癇徐嗣伯云大人曰癲小兒曰癇又巢源千金小兒門有三種痢曰驚癇食癇風癇可以證焉張曰癇音間癲病也高雲癇癲癇也驚震驚也並誤不知癇是後世所謂驚風聖惠方論辨之詳矣脈五吳云下文其五也各家並同王為陽陵泉非也針手太陰甲乙作手足太陰馬張並云刺經渠穴吳志高不指為某穴下三經同簡按不指為某穴者似是刺經太陽馬吳張經下絶句吳云凡言其經而不及其穴者本經皆可取不必拘其穴也馬雲刺手太陽小腸經穴各五痏當是其經穴陽谷也高據王注直改經作足簡按吳近是然太陽不言手足當從王義馬以經為經穴之經故云陽谷刺手少陰經絡旁者甲乙作手足少陰吳云著某經旁者非經非穴取其孫絡也馬雲刺手少陰心經絡穴通里然謂之絡旁則是手太陽小腸經支正穴也張云手少陰之經穴靈臺也在絡穴通里之旁故曰絡旁上踝五寸馬雲即足少陰腎經築賓穴也簡按張志高並仍王注此瀉木實也如刺腎經則乖理僕擊張云暴僕如擊也樓氏綱目云其卒然仆倒經稱為擊僕世又稱為卒中風是也簡按九宮八風篇云其有三虛而偏中於邪風則為擊僕偏枯矣樓説為長吳云暴僕為物所傷也志云癲癇之外實也俱屬臆解氣滿發逆吳云氣滿氣急而粗也發逆發為上逆也志云濁氣之在中也隔塞閉絶趙府本塞作則熊張同誤也風論云食飲不下鬲塞不通本神篇云愁憂者氣閉塞而不行吳云若隔而閉絶上下水穀不得通利則暴憂之所為也暴厥吳云暴氣上逆也聾偏塞閉不通吳偏下絶句注云偏偏枯也簡按當從王注內氣暴薄也吳云薄雷風相薄之薄擊蕩之稱也不從內外中風之病滑云膏粱之疾暴憂之病內氣暴薄此三者不從內外中風之病謂非外傷也以非外傷故為病留瘦住著不若風家之善行數多也吳同張云有病不從內而外中風寒藏蓄不去則伏而為熱故致燔爍消瘦此以表邪留薄而著於肌肉筋骨之間也簡按張從王注為勝下文云跖跛寒風濕之病也即外中風之屬而留著者則滑注不可從瘦留著滑云瘦當作廋如人焉廋哉之廋廋匿也廋匿住著不之去也吳仍此簡按改瘦作廋似僻跖跛馬雲跖音只跖同孟子雞鳴而起章盜跖從庶陳仲子廉士章從石義同也楚人謂跳曰跖跛音波易曰跛能履又音避國語云丘無跛吳云足前點步謂之跖一足偏引謂之跛張云足不可行謂之跖志云跖足也跛行不正而偏費也高雲跖踐履也跛不正也簡按跖跖通説文跖足下也又作跖跖跛乃漢書跖盩之義賈誼傳病非徒瘇也又苦跖盩注跖腳掌也盩戾也故王注云足跛而不可履也志仍此方氏通雅以跖盩為瘛瘲太疏耳鳴吳云陽明胃脈上耳前循髮際至顳顬故頭痛耳鳴為腸胃之所生張同簡按口問篇云胃中空宗脈虛而下溜脈有所竭故耳鳴決氣篇云液脫者耳數鳴據此數義王注為得矣太陰陽明論篇第二十九更逆更從張云病者為逆不病者為從簡按當從楊義陽道實陰道虛張云陽剛陰柔也又外邪多有餘故陽道實內傷多不足故陰道虛一曰陰道實則陽道虛矣所謂更虛更實者亦通志云陽剛陰柔故陽道常實陰道常虛繫辭曰陰陽之義配日月白虎通曰日之為言實也常滿有節月之為言闕也有滿有闕也所以有闕何歸功於日也簡按吳此下補陰道實陽道虛一句張引一曰蓋指吳注然考上文云陽者天氣也主外陰者地氣也主內則陽剛陰柔之解於文意較順陽受之則入六腑徐云此言賊風虛邪陽受之入六腑飲食起居陰受之入五臟與陰陽應象論天之邪氣害人五臟水穀寒熱害人六腑兩説相反其理安在此謂虛邪外傷有餘飲食內傷不足二者之傷互有所受不可執一而言傷也不時臥張云不能以時臥也故喉主天氣志云此節用八故字為陰陽異位故也上行極而下志云此言邪隨氣轉也人之陰陽出入隨時升降是以陽病在上者久而隨氣下行陰病在下者久而隨氣上逆上先受之簡按百病始生篇云清濕襲虛則病起於下風雨襲虛則病起於上辨脈篇云清邪中於上焦濁邪中於下焦正其義也張云上非無濕下非無風但受有先後耳曰先受之則後者可知矣不得至經馬雲胃氣不能自至於四肢之各經必因於脾氣之所運簡按至經從太素作徑至為勝長四臟馬雲長掌同主也著胃高雲著昭著也胃土水穀之精昭著於外簡按馬雲著著同此從王注也高屬強解上下至頭足張云脾為臟腑之本故上至頭下至足無所不及又豈獨主一時而已哉足太陰者三陰也高雲厥陰為一陰少陰為二陰太陰為三陰故足太陰者三陰也為之行氣於三陰吳云為之為胃也三陰太少厥也脾為胃行氣於三陰運陽明之氣入於諸陰也為之行氣於三陽吳云為之為脾也行氣於三陽運太陰之氣入於諸陽也陰道不利吳云血道不滑利也高雲即脈道不利也簡按上文云脈道不利高注為長陽明脈解篇第三十吳云解釋也釋陽明脈為病之義主肉甲乙作肌肉簡按新校正云脈作肌誤惋甲乙作悶釋音惋烏貫切簡按集韻惋慍宛惌同音郁心所鬱積也即與王注符若烏貫切則為駭恨驚歎之義志云驚恐貌高雲驚顧也並乖經旨陽盛甲乙作邪盛罵詈韻會正斥曰罵旁及曰詈一切經音義云詈亦罵也今解惡言及之曰罵誹謗咒詛曰詈不欲食不欲食故妄走吳本十字改為歌二字簡按問語乃然當從吳
