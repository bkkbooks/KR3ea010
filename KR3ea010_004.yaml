body:
  text: 卷四熱論篇第三十一馬雲首言熱病者皆傷寒之類故即以熱論名篇今夫熱病甲乙外臺無今字傷寒之類也張云傷寒者中陰寒殺厲之氣也寒盛於冬中而即病者是為傷寒其不即病者至春則名為溫病至夏則名為暑病然有四時不正之氣隨感隨發者亦曰傷寒寒邪束於肌表則玄府閉陽氣不散越乃鬱而為熱故凡系外感發熱者皆傷寒之類馬雲水熱穴論帝問人傷於寒而傳為熱何也岐伯曰夫寒盛則生熱也又此處王注以傷寒論中至夏變為熱病之熱病強解甚非蓋未有傷於寒而不成熱者也非但至夏之熱病為然也簡按王引傷寒例文暑病作熱病五十八難云傷寒有幾其脈有變否然傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同知是中風傷寒濕溫熱病溫病古總稱之傷寒則王注不可廢巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也巨甲乙作太下同張云太陽為六經之長統攝陽分故諸陽皆其所屬太陽經脈覆於巔背之表故主諸陽之氣分志云屬會也謂太陽為諸陽之會滑本此二十字移於傷寒一日巨陽受之之下徐本同文義順承為勝資生經風府下引此節云然則風府者固傷寒所自起也北人皆以毛裹之南人怯弱者亦以帛護其項俗謂三角是也凡怯弱者須護項後可也傷寒一日巨陽受之張云按人身經絡三陽為表三陰為里三陽之序則太陽為三陽陽中之陽也陽明為二陽居太陽之次少陽為一陽居陽明之次此三陽為表也三陰之序則太陰為三陰居少陽之次少陰為二陰居太陰之次厥陰為一陰居少陰之次是三陰為里也其次序之數則自內而外故各有一二三之先後者如此又如邪之中人必自外而內如皮部論等篇曰邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟此所以邪必先於皮毛經必始於太陽而後三陰三陽五臟六腑皆受病如下文之謂也簡按吳此下補以其脈經頭項循腰脊九字不可從頭項痛腰脊強張云凡病傷寒者多從太陽始太陽之經云云與王注同故其為病如此仲景曰太陽之為病脈浮頭項強痛而惡寒新校正云甲乙太素作頭項與腰皆強簡按今甲乙作腰背強身熱張云傷寒多發熱而獨此云身熱者蓋陽明主肌肉身熱尤甚也邪熱在胃則煩故不得臥仲景曰陽明之為病胃家實也不得臥調經論云陽明者胃脈也其氣下行陽明逆不得從其道故不得臥也少陽主膽新校正引全元起太素甲乙並作主骨簡按病源亦作主骨只外臺作膽外臺引本篇文云出第九卷中考新校正此篇全本在第五卷蓋王氏改骨作膽而宋人依以改外臺也且靈經脈篇云膽主骨如陽明不云主胃而云主肉則理宜於少陽亦云主骨蓋太陽主皮膚陽明主肉少陽主骨從外而內殆是半表半裡之部分故改膽作骨於義為長張云邪在少陽者三陽已盡將入太陰故為半表半裡之經其經脈出耳前後下循胸脅故為脅痛耳聾等證仲景曰傷寒脈弦細頭痛發熱者屬少陽少陽之病口苦咽乾目眩也又曰太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱蓋邪在陰則寒邪在陽則熱邪在表則無嘔滿等證邪在裡則胸滿乾嘔不能食故成無己曰少陽之邪在半表半裡之間未入於臟者簡按據新校正全本太素臟作腑甲乙傷寒例亦作腑只外臺作臟恐是亦宋人所校改也考下文未滿三日者可汗而已其滿三日者可泄而已此言邪在三陽之表者可發汗在三陰之臟者可下之若推仲景之例則當作腑然本經治法表裡只有汗下二法故王改腑作臟義甚明顯而東垣李氏云藏非謂五臟之臟乃是藏物之藏出此事難知三陽王氏演而作熱論髒字說出傷寒綱目並屬強解志云藏者里也陰也言三陽之經絡皆受三陽邪熱之病然在形身之外而未入於裡陰可發汗而解也此解為勝四日太陰受之張云邪在三陽失於汗解則入三陰自太陰始也仲景曰傷寒脈浮而緩手足自溫者系在太陰太陰之為病腹滿而吐食不下自利益甚時腹自痛也簡按本經所論三陰病者即仲景所謂陽明胃家實證故下文云其滿三日者可泄而已仲景所論三陰病者乃陰寒之證此本經所未言及張引彼注此殆不免乖謬下少陰厥陰亦同絡於肺甲乙病源外臺無於字六日厥陰受之簡按方氏傷寒條辨云一日二日三四五六日猶言第一第二第三四五六之次第也大要譬如計程如此立個前程的期式約模耳非計日以限病之謂張云愚按傷寒傳變止言足經不言手經其義本出此篇如上文六節是也奈何草窗劉氏不明其理遂謬創傷寒傳足不傳手之說蓋傷寒者表邪也欲求外證但當察於周身而周身上下脈絡惟足六經則盡之矣手經無能遍也且手經所至足經無不至者故但言足經則其左右前後陰陽諸證無不可按而得而手經亦在其中不必言矣此本經所以止言足者為周身之表證也煩滿而囊縮簡按滿懣同說文懣煩也蓋煩懣乃煩悶也詳見生氣通天論喘滿注繆氏傷寒撮要云婦人亦有囊縮可辨但其乳頭縮者即是也李氏入門云在女子則陰戶急痛引小腹吳囊縮下補三陰經絡者皆受病已入於腑可下而已十六字此推三陽之例則經文似脫此等十餘字然以三陰稱腑尤為無謂若改作髒字僅通五臟不通則死矣高雲則猶即也結上文三陰受病非必四日太陰五日少陰六日厥陰故內之三陰外之三陽內之五臟外之六腑一日皆受其病致榮衛不行五臟不通即死矣較之兩感於寒不免於死者更甚也渴止不滿甲乙傷寒例並無不滿二字簡按上文不言腹滿此必衍文而嚏口問篇云陽氣和則嚏大氣皆去病日已矣調經論云瀉實者開其門而出大氣乃屈五色篇云大氣入臟腑者不病而卒死簡按俱謂大邪之氣高雲其不兩感於寒屬經脈之熱病皆以七日環復病衰而愈由此觀之則上文所云一日受二日受者乃循次言之非一定不移之期日也會悟聖經當勿以辭害志通其臟脈張云謂當隨經分治也志云謂手足三陰三陽之經脈高雲臟脈如上文太陰脾臟之脈少陰腎臟之脈厥陰肝臟之脈也可泄而已張云凡傳經之邪未滿三日者其邪在表故可以汗已滿三日者其邪傳裡故可以下吳此下補若其寒邪傳不以次與夫專經不傳表裡變易則隨證脈處治吐下汗和蚤暮異法三十二字云欲人通變云爾簡按王引傷寒論義頗明顯若欲人通變則有仲景傷寒論在焉豈三十二字所包括乎不啻添足殆亦僣妄薛氏原旨云按傷寒一證傳變無窮此不過言傳經之常而未及於變自仲景而後諸大家俱有名言可法學者所當盡讀而精思之然義多出於仲景於仲景書又當閉戶深求者也遺志云傷寒論曰大病瘥後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子五六枚蓋因傷寒熱甚之時而強食其食故有宿食之所遺也簡按遺是禮樂記遺音遺味之遺鄭玄注遺猶余也蓋與此同義童氏活人指掌辨疑雲遺字註解多不同活人書注謂便不禁也或云遺亡也其人必利不禁也此皆非是余謂遺者如以物遺人之遺即司馬公所謂積德以遺後人之遺是也言當少愈之時邪氣未盡去胃氣未盡復肉食者其後復病多食者其後遺病將痊而不得痊矣強食之甲乙無之字仲景云病人脈已解而日暮微煩者以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈又曰吐利發汗脈平小煩者以新瘥不勝穀氣故也調其逆從志云脈浮者以汗解之脈沉者以下解之此之謂調其逆從也高雲視其經脈之虛實調其陰陽之逆從食肉則復馬雲肉本性熱而難化所以熱病復生志云肉謂豕肉豕乃水畜其性寒冷是以多食則遺簡按當從馬注譫言甲乙外臺作譫語簡按譫又作讝並之廉切音詹考之字書義少異集韻譫多言也讝疾而寐語也然醫書則互用劉奎說疫為二義甚誤不知人六日死外臺作不知人則六日而死滑云六日當作三日下文可見徐同簡按下文云如是之後三日乃死則作六日者非字之誤謂至三日則少陽與厥陰俱病云云三陰三陽俱受病水漿不入昏不知人如是者三日凡於六日之際當死也三日乃死吳云故不知人三日六字為句張云如是之後三日乃死謂兩感傳遍之後復三日而死也蓋即六日之義高雲乃死非即死矣簡按朱氏活人書云兩感仲景無治法但云兩感病俱作治有先後傷寒下之後復下利不止身疼痛者急當救里宜四逆湯復身體疼痛清便自調者急當救表宜桂枝湯蓋本經三陰證並是仲景所謂胃家實不宜以彼而例此當考傷寒論病溫生氣通天論曰冬傷於寒春必病溫金匱真言論曰夫精者身之本也故冬藏於精者春不病溫仲景云太陽病發熱而渴不惡寒者為溫病詳見金匱真言論病暑滑云此病暑與病暍不同病暑即熱病也宜發汗病暍則不宜汗矣張云寒邪中人而成溫病暑病者其在時則以夏至前後言在病則以熱之微甚言故凡溫病暑病皆傷寒也簡按溫病暑病皆是熱病以時異其名耳考靈論疾診尺篇云冬傷於寒春生癉熱張云即溫熱之病其義可概見也為熱之微甚者恐非與汗簡按與予也玉函經總例云仲景曰不須汗而強與汗之者奪其津液又須汗而不與汗之者使諸毛孔閉塞刺熱篇第三十二張云按前篇悉言傷寒此篇名刺熱者蓋即所以治傷寒也但前篇分傷寒之六經此篇詳傷寒之五臟正彼此相為發明耳小便先黃志云先者謂先有此內因之熱而先見此證也肝主疏泄故小便赤黃倪朱龍曰先者謂先有此內熱之證未與外熱交爭也簡按據下文四臟之例先字當在小便上評熱病論云小便黃者小腹中有熱也腹痛多臥吳云肝脈抵小腹故腹痛肝主筋筋痿故多臥高雲腹小腹也木氣不達故多臥不得安臥高雲臥則血歸於肝肝病而血不歸也大汗吳云汗則陰陽和而愈矣志云正勝邪而外出也氣逆吳云逆為邪勝臟志云熱淫而反內逆也陰在內陽在外熱爭者陰陽交爭於外內之間陰出於外者生陰陽並逆於內者死故曰重逆員員甲乙作貢貢馬雲靡定也張同吳云小痛貌志云周轉也通雅云頭痛員員正謂作暈故今人言頭懸簡按考文義志注近是沖頭也甲乙頭下有痛字善嘔吳云心火炎上故善嘔顏青吳云脾病而肝乘之故見青色簡按靈五色篇曰庭者顏也王注下文云顏額也方言云東齊謂之顙汝穎淮泗之間謂之顏腰痛張云腰者腎之府熱爭於脾則土邪乘腎必注於腰故為腰痛淅然甲乙作悽悽然熊音淅音昔寒驚貌高雲淅然如水灑身之意簡按淅廣韻淅米也灑水之義正取於此身熱志云外感曰發熱從內而外曰身熱簡按此說無明證走胸膺背簡按王注腹中論云膺胸旁也頸項前也胸膺間也張亦云膺胸之兩旁高處也而說文云膺胸也考史趙世家云大膺大胸修下而馮知是胸膺有別說文疏矣出血如大豆立已高移此七字於下文腎熱病云云刺足少陰太陽之下而云此七字舊本在刺手太陰陽明下今改正於此注云承上文諸刺而言若出針之時出血如大豆則邪熱去而經脈和其病當立已簡按餘臟熱病不言出血獨於肺熱病而言之實為可疑高說近是苦渴吳云腎者水臟當火炎水乾之時故口渴而數飲項痛而強䯒寒且痠高雲邪正相持而熱爭爭於上則項痛而強爭於下則䯒寒者痠足下熱不欲言吳云腎主吸入腎病則吸微故令不欲言也志云不欲言者腎為生氣之原也高雲熱爭於中則不欲言澹澹然簡按說文澹水搖也王注不定義同馬雲無意味張云精神短少非是甲乙無此三字諸汗者至其所勝日汗出也甲乙汗上有當字出作甚高雲此衍文也下文云諸當汗者至其所勝日汗大出也誤重於此簡按今從高說而存下文顏先赤高雲心火居上故心熱病者顏先赤五色篇云庭者顏也庭猶額也三周張云反謂瀉虛補實也病而反治其病必甚其愈反遲三周者謂三遇所勝之日而後已高雲三周三日也簡按考王注凡六刻蓋二刻一周故為六刻此甚速當從張注以飲之寒水甲乙以作先刺足陽明而汗出止吳云不言孔穴而混言其經者取穴不泥於一但在其經酌之可也汗出止者經氣和也張云按寒熱病篇曰足陽明可汗出當是內庭陷谷二穴身重骨痛耳聾好瞑張云腎主骨在竅為耳熱邪居之故為身重骨痛耳聾熱傷真陰則志氣昏倦故好瞑仲景曰少陰之為病但欲寐也新校正引靈樞經見熱病篇眩冒吳云目前黑謂之眩目如蒙謂之冒少陰腎主骨骨之精為瞳子少陰熱故令眩冒簡按海論云髓海不足眩冒目無所見王注玉機真臟論云眩謂目眩視如轉也冒謂冒悶也志云按以上三節用十六先字蓋言有先於內者有先於外者皆當先治之胸脅滿繆刺論云邪客於足少陰之絡胸脅支滿刺足少陰少陽高雲眩冒而熱乃少陰腎精不升熱病之起於少陰也胸脅滿乃少陽經脈不和熱病之起於少陽也少陰為陰樞少陽為陽樞樞轉有乖而病熱故並刺之太陽之脈色榮顴骨熱病也張脈下句注云此下言兩感之脈色死期也榮發見也太陽之脈起於目內眥太陽之筋下結於頄故太陽熱病者赤色當榮於顴骨吳云榮華採之稱赤色是也簡按熱病篇云汗不出大顴發赤噦者死楊氏骨熱病連讀恐非當從王義榮未交吳榮作營注云營陰血也以其營守於中如軍之中營也張云與上節之榮不同蓋指營衛為言謂邪猶在衛未交於營其氣不深故曰今且得汗簡按榮即上文榮顴骨之榮交甲乙作夭下文同今從之與厥陰脈爭見吳云傷寒例云尺寸俱微緩者厥陰受病也爭見者謂表見陽熱之色里見厥陰之脈法曰陽病見陰脈者死故死期不過三日張云六經熱病之序其始太陽其終厥陰今終始爭見則六經兩感俱傳遍故當三日而死證之下文義尤明顯簡按弦少陽之脈王為厥陰之脈可疑其熱病此三字甲乙作熱氣二字少陽之脈色也簡按馬據新校正為衍文今從之與少陰脈爭見甲乙作手少陰簡按熱病無言手經者是誤死期不過三日甲乙作其死不過三日簡按新校正為王氏所足成非也張云如上文言太陽厥陰爭見者太陽為傳表之始厥陰為傳裡之終自始而終也此以少陽少陰爭見者少陽為傳表之終少陰為傳裡之始自終而始也言始言終則六經無不遍矣故不必言陽明太陰之爭見也簡按此說恐是傅會陽明太陰之爭見無不必言之理必為闕文熱病氣穴志云此言刺未病者當取之氣穴也氣穴者瀉五臟氣分之熱高雲熱病氣穴猶言熱病刺法馬雲三椎下間名身柱四椎下間無穴五椎下間名神道六椎下間名靈臺七椎下間名至陽張云三椎下者魄戶也四椎下旁膏肓也五椎下旁神堂也六椎下旁譩譆也七椎下旁膈關也簡按張添一旁字不可從氣穴即孔穴義具於氣穴論膈中熱甲乙作胃中熱志云胸中膈上乃心肺之宮城主胸中熱者瀉肺熱也膈中熱者瀉心熱也不曰心肺而曰胸中膈中者意言熱在氣分而不幹於臟真也榮在骶也吳云脊凡二十一椎此獨刺上之七椎而不及其下者蓋以上之七惟陽分也故主熱病下之七椎陰分也所以主榮血刺之則虛其陰故曰榮在骶也有不可傷之意張云蓋既取陽邪於上仍當補陰於下故曰榮在骶也高雲榮為陰主下若榮血之熱病其穴在脊骨盡處故曰榮在骶也簡按此一句難通諸注並不允項上三椎陷者中也張云此取脊椎之大法也項上三椎者乃項骨三節非脊椎也三椎之下陷者中方是第一節穴名大椎吳云此風府穴也言有取項上三椎者則陷中為是高雲申明三椎也從項上數之而為三椎也下間者椎下椎上陷者中也蓋大椎乃脊骨之第一椎從項上數之則大椎為三椎如是推之諸椎皆得矣志云此言五臟之熱入於經榮者當取之骨穴也脊骨之盡處曰骶謂如取榮穴當在骶而至項上之三椎陷者中而取之簡按此二句義未太明張高據王注而釋今姑從之甲乙陷上有骨字背腧篇云背中大腧在杼骨之端千金云大椎第一椎上陷中外臺同云杼骨之端云第一椎皆非項骨之謂牙車劉熙釋名云輔車或曰牙車或曰頰車或曰鼸車凡繫於車皆取在下載上物也評熱病論篇第三十三馬雲首二節論熱病故名篇後二節則論勞風腎風也陰陽交滑云交謂交錯也張云以陽邪交入陰分則陰氣不守故曰陰陽交汪昂云按五運行大論云尺寸反者死陰陽交者死蓋言脈也簡按倉公傳云熱病陰陽交者死即是無俾也汪機云愚謂穀氣化為精今不能食則精無所俾益高雲俾補益也簡按俾爾雅釋詁云使也說文云益也王本於爾雅汪高原於說文並通病而留者簡按新校正引甲乙作而熱留者今從之脈尚躁盛馬雲按靈樞熱病篇云熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死又曰熱病已得汗而脈尚躁盛此陰脈之極也死三死馬雲汗後輒復熱不能食者一死汗後脈尚躁盛者二死汗後反狂言失志者三死簡按王以不勝其病為二死考上文此乃謂汗出而脈尚躁盛之證故今從馬義志云病而留者一死也胃氣絕者一死也腎氣絕者一死也胃氣絕腎氣絕上文所不言此注非也風厥張云按風厥之義不一如本篇者言太陽少陰病也其在陰陽別論者云二陽一陰發病名曰風厥言胃與肝也在五變篇者曰人之善病風厥漉汗者肉不堅腠理疏也高雲承上文汗出復熱之死證復舉汗出煩滿之病以問之風為陽邪性主開發凡汗出而身發熱者風也汗乃陰液外出於陽今汗出而心煩胸滿不解者乃陰竭陽虛不相交濟是為厥也此因風致汗因汗致厥病名曰風厥簡按倉公傳云風蹶胸滿過入其陽陽氣盡而陰氣入陰氣入張則寒氣上而熱氣下故胸滿汗出與此少異巨陽主氣志云巨陽太陽也太陽之氣主表風為陽邪傷人陽氣兩陽相搏則為病熱少陰與太陽相為表裡陽熱在上則陰氣從之從之則為厥逆矣服湯張云即脈度篇所謂虛者飲藥以補之之意簡按藥湯古單謂之湯華佗傳為湯下之果下男形是也志云以助水津之汗似為白湯之謂誤也勞風張云因勞傷風也王氏曰勞謂腎勞也此固一說第勞之為病所涉者多恐不止於腎經耳馬雲細玩此節之辭似為醫經中之勞證簡按此一時勞而受風之證未見勞證咳出青黃涕而愈者則馬注難憑巢源風熱候云膚腠虛則風熱之氣先傷皮毛乃入肺也其狀使人惡風寒戰目欲脫涕唾出候之三日內及五日內不精明者是也七八日微有青黃膿涕如彈丸大從口鼻內出為善也若不出則傷肺變咳嗽唾膿血也即本節勞風也本節勞風張氏醫通詳論之文繁不錄當參看出咳嗽門葉文齡醫學統旨云勞風即痓之屬強上者似角弓反張也冥視者目開不見物也凡痓病皆同不識人或反視斜視也治法當與痓同又王好古醫壘元戎以此證為肺痿並誤也方具於聖濟總錄十三卷法在肺下吳云其受邪由於肺下蓋四椎五椎六椎之間也張同強上冥視簡按脈解篇云所謂強上引背者陽氣大上而爭故強上也王注強上謂頭項禁強也乃與此注同馬志從此吳張依楊義恐非也今千金作弦上而目眩蓋冥視即目眩之謂唾出如涕吳云肺中津液為風熱蒸灼稠黏故唾出若鼻中之涕肺主皮毛肺既受傷則臟真之氣不足以充皮毛故惡風而振寒也張氏醫通云唾出若涕者痰飲上溢之徵也簡按古無痰字此云唾出如涕謂吐黏痰也以救俯仰吳云肺下有風熱䐜脹俯與仰皆不利故必救其俯仰巨陽引精者吳云巨陽與少陰腎為表裡腎者精之府精陰體也不能自行必巨陽之氣引之乃能施泄故曰巨陽引精是為少壯人也水足以濟火故三日可愈中年者精雖未竭比之少壯則弱矣故五日可愈老年之人天癸竭矣故云不精不精者真陰衰敗不足以濟火故治之七日始愈張云風邪之病肺者必由足太陽膀胱經風門肺俞等穴內入於臟太陽者水之府三陽之表也故當引精上行則風從咳散若巨陽氣盛引精速者應在三日中年精衰者應在五日衰年不精者應在七日張氏醫通引下句云治此證者當急使巨陽之上引恐非咳出青黃涕千金涕上有濃字張云當咳出青黃痰涕而愈如下文者即引精之謂張璐云大如彈丸者乃久已支塞肺竅之結痰見邪蓄之盛也若鼻中出千金出下有為善二字王注蓄門即喉屋上通鼻之竅門也出靈營氣篇新校正失考不出則傷肺張云咳涕不出即今人所謂乾咳嗽也甚至金水枯竭虛勞之候故死腎風奇病論云帝曰有病痝然如有水狀切其脈大緊身無痛者形不瘦不能食食少名為何病岐伯曰病生在腎名為腎風簡按當與奇病論及風論參考面胕痝然甲乙然下有腫字吳云胕腫也張云胕浮腫也痝然失色貌志高並云腫貌簡按山海經竹山有草焉其名曰黃雚浴之已疥又可以已胕郭璞注云胕腫也可以證吳張之言矣馬及志則云胕者足面也蓋以其與趺通也而水熱穴論云上下溢於皮膚故為胕腫則豈足趺之義乎高則云皮里內外曰胕此因誤讀水熱穴論行於皮膚傳為胕腫之文俱不可從王注奇病論則云痝然謂面目浮起而色雜也與此注少異又注風論面痝然浮腫乃與本篇同廣韻痝莫江切病困並與此不相涉因疑痝即龐龐又作痝奇病論痝然馬本作龐而考說文痝石大貌一曰厚也玉篇大也知是痝然即痝然為腫大貌其從疒者乃疒攷𤶜之類張注非也壅害於言吳云面胕痝然壅者腎風並於上而令壅塞也故害於言張云壅重濁不清也病風則腎脈不利故壅害於言語簡按王吳以壅字接上句張則屬下句志高並仍此今從張義可刺不馬雲不否同時熱從胸背上至頭汗出手熱口乾苦渴馬本汗出手熱各二字句口乾苦渴四字句張本汗出手熱口乾苦渴各四字句高同志汗出以下各二字一句吳本與原本同簡按張本似是苦渴蓋謂口苦而渴下文云口苦舌乾不能正偃吳云偃仰臥也風水張云腎主水風在腎經即名風水志云病名風水者因風而動其水也高雲此腎風之病腎受風邪風行水渙故病名曰風水馬雲風水之證又見水熱穴論奇病論論疾診尺篇簡按本篇所謂風水者乃因腎風誤刺而變之稱猶傷寒論溫病發汗身灼熱者名風溫與水熱穴論等所論稍異水熱穴論云腎汗出逢於風傳為胕腫本之腎名曰風水金匱要略云風水其脈自浮外證骨節疼疼惡風又云寸口脈沉滑者中有水氣面目腫大有熱名曰風水論在刺法中張云水熱穴論也志高同邪之所湊說文湊水上人所會也玉篇競進也上迫肺也病能篇云人之不得偃臥者何也岐伯曰肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥也臥則驚志云胃絡上通於心陽氣入陰陰陽相薄故驚恐也高雲水氣凌心也病本於胃張云脾胃屬土所以制水土弱則寒水反侮之故腹中鳴而食不下也身重難以行張云胃主肌肉其脈行於足水氣居於肉中故身重不能行胞脈閉也張云胞即子宮馬雲愚觀月事不來似為婦人而論然男子之腎風諸證俱同惟此一證則有異耳逆調論篇第三十四高雲調調和也逆調逆其寒熱水火榮衛之氣不調和也寒熱逆調則為煩為痹水火逆調則為肉爍為攣節榮衛逆調則為肉苛臟氣逆調則為息喘也痹氣聖濟總錄云夫陽虛生外寒陰盛生內寒人身陰陽偏勝則自生寒熱不必外傷於邪氣也痹氣內寒者以氣痹而血不能運陽虛而陰自勝也故血凝泣而脈不通其證身寒如從水中出也方出於二十卷中吳云痹氣者氣不流暢而痹著也如炙如火吳云如炙自苦其熱如薰炙也如火人探其熱如探火也簡按當從太素之文下文同兩陽相得馬雲四肢屬陽風亦屬陽一逢風寒兩陽相得張同志云四肢者陽明之所主也兩陽陽明也兩陽合明故曰陽明相得者自相得而為熱也簡按馬注為是不能生長簡按穀梁傳云獨陰不生獨陽不長正此之義也內爍熊音爍書藥反以水為事志云腎氣勝者腎水之氣勝也以水為事者膀胱之水勝也謂其人水寒之氣偏勝簡按馬張仍王注為縱欲之義考文義恐不然腎脂枯不長高雲是人有寒者平素腎氣勝腎氣勝則以水為事故太陽陽氣衰太陽陽氣衰則為孤陰孤陰不長故腎脂枯不長一水不能勝兩火高雲七字在下誤重於此衍文也簡按此前注所未發今從此腎孤臟也高雲寒甚至骨宜凍慄矣所以不能凍慄者腎水生肝木肝為陰中之陽故肝一陽也少陰合心火心為陽中之陽故心二陽也腎為陰中之陰故腎孤臟也一陽二陽火也孤臟水也今一水不能勝二火故雖寒甚至骨而不能凍慄也寒在於骨病名曰骨痹骨痹者骨節拘攣是人當攣節也此言水火逆調而獨陽不生則為肉爍孤陰不長則為攣節也簡按諸家不知前文一水不能勝兩火七字衍文以陽盛陰虛為解故文理乖違不能貫通得高注而義始顯苛吳云苛胡歌切麻木不仁也張云頑木沉重之謂簡按王注𤸷重考𤸷頑同音廣韻𤸷𤸷痹五還切知是王氏以苛為頑麻之義說文苛小草也蓋麻痹者病在皮上尤細瑣者故取義於苛細曲禮疾痛苛癢可以見耳志云苛虐也謂近衣絮而苛虐如故也不可從營氣虛衛氣實也馬雲營氣者陰氣也運於內為陽之守故其氣虛衛氣者陽氣也運於外為陰之使故其氣實太陰陽明論曰陽道實陰道虛此即本節之義張云衛氣實者言肌肉本無恙也簡按下文云營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用則此七字不相冒恐是衍文前注似牽強不仁且不用張云不仁不知痛癢寒熱也不用不能舉動也簡按肉苛與不仁自有分以肉苛而頑麻故不知痛癢而不仁吳云不仁麻木頑痹也誤馬雲不仁者果核中有仁惟肉無所知則若有不能如仁有生意矣鑿亦甚肉如故也甲乙作肉如苛也馬雲其肉未必有減於昔也張云肌肉如故言肌肉本無恙也高雲肉苛如故也簡按答語無苛字當從甲乙之文曰死吳云志不足以帥形氣人雖猶存夭其生理矣死其一肢一肉是為死之徒也張云人之身體在外五志在內雖肌肉如故而神氣失守則外雖有形而中已無主若彼此不相有也故當死簡按吳以死為死肌之死張注似允當不得臥不得行滑云多一不字下經簡按史記倉公受脈書上下經於陽慶蓋此書也不安張云反覆不寧之謂今人有過於飽食或病脹滿者臥必不安此皆胃氣不和之故按上文所問不得臥而息無音者義亦同此故不復答息有音也張云病不在胃亦不在臟故起居如故氣逆於肺之絡脈者病淺而微故但為息有音耳上文所問有臥行而喘者義亦類此故不復答主臥與喘也張云水病者其本在腎其末在肺故為不得臥臥則喘者標本俱病也上文所問有不得臥不能行而喘者義類此節故不復答本篇所論喘息不得臥者有肺胃腎三臟之異在肺絡者起居如故而息有音也病之微者也在胃者不得臥而息有音也甚於肺者也在腎者不得臥臥則喘也又其甚者夫息有音者即喘之漸喘出於腎則病在根本矣故愈深者必愈甚凡虛勞之喘義亦猶此有不可不察也簡按首帝所問者六而岐伯所答者三王氏以為古之脫簡張則以為義自含蓄本無闕文而吳則補凡三條八十四字志云後人有言簡脫者有增補其文者聖人立言渾然櫽括或言在意中或意在言表奈何後學不細心體認而妄增臆論耶可謂知言矣瘧論篇第三十五馬雲瘧凌虐之義故名篇當與靈樞歲露篇七十九參看簡按劉熙釋名云瘧酷虐也凡疾或寒或熱耳而此疾先寒後熱兩疾似酷虐也夫痎瘧甲乙千金無痎字馬雲痎音皆後世從㾬誤也痎瘧者瘧之總稱也王注以為老瘧不必然痎瘧皆生於風則皆之一字凡寒瘧溫瘧癉瘧不分每日間日三日皆可稱為痎瘧也簡按廣雅云痎痁瘧也說文云痎二日一發瘧也蓋瘧多二日一發者因為之總稱耳王以為老瘧者其說蓋出於張文仲外臺獺肝等八味方傳屍病亦名痎瘧遁注骨蒸伏連殗殜是而其原因誤讀五十六難云咳逆㾬瘧連歲不已爾吳云痎亦瘧也夜病者謂之痎晝病者謂之瘧方言書夜市謂之痎市本乎此也方言書未知何等書閱青箱雜記豫章漫錄五雜俎等云蜀有痎市而間日一集如痎瘧之一發則其俗又以冷熱發歇為市喻也夜市之說無所考張云痎皆也瘧殘虐之謂瘧證雖多皆謂之虐故曰痎瘧李云凡秋瘧皆名痎即其皆生於風皆字知諸瘧之通稱也醫宗必讀不載秋瘧之說則云凡瘧皆名痎昔人之解非志與吳同而解生氣通天論則云陰瘧也高雲痎陰瘧也瘧陽瘧也以上數說俱無稽之言不可從孔穎達左傳正義云痎是小瘧痁是大瘧亦非本經之義畜作趙府本畜作蓄歲露篇作稸馬雲蓋稸即積之義故其旁皆從禾不發之謂畜發時之謂作伸欠張云伸者伸其四體邪動於經也欠呵欠也陰陽爭引而然簡按曲禮侍坐於君子君子欠伸撰杖履視日蚤莫鄭注以君子有倦意也前翼奉傳體病則欠伸動於貌馬雲伸當作呻呻為腎之聲誤也此論瘧之形狀專指寒瘧寒慄鼓頷汪云愚謂此節論瘧之形狀張云鼓者振悚之謂願聞其道馬雲道猶路也據下文有其道遠則此道當以路訓之陰陽相移也汪云此節論瘧之所以發寒熱也又為一章之大旨下發明此節也陽並於陰則陰實而陽虛高雲相移者相併之義如陽氣相移而並於陰則陰實而陽虛須知陰氣相移而並於陽則陽實而陰虛不言者省文也腰背頭項痛滑云此下當有少陽虛一節盧氏痎瘧論疏云不列少陽形證者以太陽為開陽明為闔少陽為樞而開之能開闔之能闔樞轉之也骨寒而痛張云陰勝則陽氣不行血脈凝滯故骨寒而痛終始篇曰病痛者陰也此營氣之所舍也張云皮膚之內腸胃之外蓋即經脈間耳營行脈中故曰此營氣之所舍也志云舍即經隧所歷之界分每有界分必有其舍如行人之有傳舍也此令人汗空疏吳云此字指暑氣言蓋陽氣主疏泄萬物故也盧氏云暑令人汗空疏腠理開者以暑性暄發致腠理但開不能旋闔耳不即病者時值夏出之從內而外衛氣仗此猶可捍禦高雲暑熱傷榮則肌表不和此令人汗孔疏而腠理開也空孔同得之以浴水氣舍於皮膚之內諸注浴下句吳云夏傷於暑陽邪也秋氣水氣陰邪也陰陽相薄寒熱相移是以瘧作馬雲夫暑熱伏於營而風寒居於衛營專在內無自而發衛行於外二邪隨之以出入焉志高浴水氣連讀非是與衛氣並居滑云言衛氣與營氣相併合也汪云從夏傷於暑至此原所以致瘧之故也張云新邪與衛氣並居則內合伏暑故陰陽相薄而瘧作矣高雲風水之氣舍於皮膚之內則與衛氣並居也簡按滑注誤此氣得陽而外出得陰而內薄滑云此氣指瘧馬雲衛氣者晝行於足手六陽經二十五度此邪氣者得陽而外出瘧之所以發也夜行於足手六陰經二十五度此邪氣者得陰而內入瘧之所以蓄也內外相薄隨衛而行是以一日一作也病之始末至是而備矣高雲瘧之發也必衛氣應乃作此衛氣得日陽而外出得夜陰而內薄內外相薄遇邪則發是以日作簡按此氣滑馬為瘧邪之氣高為衛氣未知孰是得陽之陽得陰之陰馬不解釋高則為日陽夜陰之義果然則瘧疾宜無夜發者此可疑焉滑以得陽之陽為榮中之陽以得陰之陰為榮其言糊塗不可從循膂而下張云膂呂同脊骨曰呂象形也一曰夾脊兩旁之肉曰膂下者下行至尾骶也簡按說文呂脊骨也廣雅膂肉也前說本於說文後說及王馬注原於廣雅據循膂而下語其為脊骨者於義為當大會於風府大上巢源有常字簡按王注熱論云風府入髮際同身寸之一寸此云二寸考甲乙千金等作二寸者誤二十五日靈樞甲乙太素全元起巢源作二十一日二十六日作二十二日馬雲此曰二十五日者連風府之項骨三椎而言彼曰二十一者除項骨言自大椎而始也故二十六日與二十二日亦不同吳同張云項骨三節脊骨二十一節共二十四節邪氣自風府日下一節故於二十五日下至尾骶復自後而前故於二十六日入脊內簡按志高二十五日作二十一日二十六日作二十二日據靈樞等也自風府始則不除項骨者似為有理而考諸書作二十五日二十六日者王所改正外臺亦作五六宋人所改今從志高徐廷璋活人針經云按甲乙經云大椎至尾骶共二十一顀此中只長三尺以三尺內折量取背上俞穴一法用繩墨取穴繩有舒縮不同取穴無准今以薄竹片點量取穴治病有準今精考二十一顀骨不至尾骶盡只至腰余穴盡已腰余穴第二十一顀下是腰余穴穴旁分開一寸五分是自環余穴穴下更有上髎次髎中髎下髎會陽五穴皆在二十一顀下直至會陽穴其穴交郄在尾骶骨兩旁則知二十一顀骨至腰余而盡今經二十一顀骨至尾骶骨而盡甚非也言長三尺此法亦不可準用今詳二十一顀下有四骨空在下相連直至尾骶盡以二十一顀又增四骨骨空共二十五據內經瘧論篇云瘧邪初出於風府在椎骨上其邪大椎為始日下一節二十五日尾骶盡處二十六日入於脊內據此經云即是二十一日下二十一節而盡自二十二日即下四骨空間至二十五日諸顀及骨空傳盡即入脊中以此論之其理甚明則知甲乙經云二十一顀至尾骶骨甚非也按此說太異蓋未考及靈樞漫爾立論而楊繼針灸大成背部圖亦載此論不知其出於何人也骶骨歲露篇作尾底簡按知是骶即底會意伏膂之脈歲露篇病源作伏沖甲乙作太衝簡按天真論太衝之脈盛甲乙太素作伏沖知是太衝伏沖伏膂皆一脈耳膂即呂脊骨王謂膂筋之間恐非上文日下一節王云節謂脊骨之節若以膂為筋則義相乖九日出於缺盆之中吳云氣上行無關節之窒故九日出於缺盆簡按缺盆非陽明胃經之缺盆骨度篇云結喉以下至缺盆中長四寸缺盆以下至𩩲𩨗長九寸骨空論云治其喉中央在缺盆中者本輸篇云缺盆之中任脈也名曰天突俱非胃經之缺盆乃指任脈天突穴而言耳其間日發者云云以下四十四字高移前為帝曰其間日而作者何也之答語置其氣之舍云云之上云此段舊本在故作日益早之下今改正於此簡按此一節乃前節答語其為錯簡明矣今從高注改定橫連募原簡按舉痛論及全本太素巢源作膜原舉痛論王注云膜謂膈間之膜原謂膈肓之原義未太明此云膈募之原系乃覺勝於彼注蓋膜本取義於帷幕之幕膜間薄皮遮隔濁氣者猶幕之在上故謂之幕因從肉作膜其作募者幕之訛爾太陰陽明論脾與胃以膜相連爾太素膜作募知此募幕互誤熊張並音暮張云諸經募原之氣內連五臟邪在陰分故道遠行遲志云募原者橫連臟腑之膏膜即金匱所謂皮膚臟腑之文理乃衛氣遊行之腠理也二家之說並不允當姑從王義當與舉痛論小腸膜原注參看不能與衛氣俱行甲乙衛氣作營氣非也不得皆出甲乙皆作偕似是故間日乃作也乃上病源外臺有蓄積二字此邪氣客於頭項云云以下八十八字外臺有此疑古註文衛氣之所發靈樞病源發作應簡按下文云衛氣應乃作發當作應邪氣之所合吳本及靈樞病源合作舍是風之與瘧也吳云風外受風邪也受風病作則無休時志云夫痎瘧皆生於風然病風者常在其處病瘧者休作有時故帝有此問馬雲風乃本經風論之風簡按馬注恐非也甲乙無也字相似靈樞病源似作與淒滄之水寒滑云水一作小馬雲當作小寒吳本作小寒張云淒滄之水寒謂浴水乘涼之類也因暑受寒則腠理閉汗不出寒邪先伏於皮膚之中得清秋之氣而風襲於外則病發矣志云風寒曰淒水寒曰滄簡按淒滄不必分風水靈師傳篇云寒無淒滄暑無出汗秋傷於風則病成矣生氣通天論云夏傷於暑秋為痎瘧金匱真言論云秋善病風瘧陰陽應象大論云夏傷於暑秋必痎瘧靈論疾診尺篇同周禮疾醫職秋時有瘧寒疾左傳定四年荀寅云水潦方降疾瘧方起寒瘧張云先受陰邪後受陽邪故先寒後熱人之患瘧者多屬此證簡按上文云瘧之始發也先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則內外皆熱此乃瘧之正證也李云溫瘧癉瘧皆非真瘧也知是寒瘧特真瘧耳溫瘧馬雲據後第十三節以冬中於風而發於春者為溫瘧則溫瘧非夏感於暑而發於秋者比也故今秋時之瘧惟先寒而後熱者最多要知溫瘧原非秋時有也煩冤千金作煩悶癉瘧志云癉單也謂單發於陽而病熱也聖濟總錄云單陽為癉萬氏育嬰家秘云經中只言癉俗稱為疸癉者單也謂單陽而無陰也簡按癉為單陽之義在癉瘧則可至脾癉膽癉消癉及癉成為消中等則不通焉王注為熱最為明確蓋癉乃燀之從疒者燀說文炊也廣韻火起貌國語周語火無炎燀癉之為熱其在於此耶金匱溫瘧主白虎加桂枝湯即本節癉瘧當並考經言出靈逆順第五十五篇下同渾渾之脈馬雲脈以邪盛而亂也張云陰陽虛實未定也簡按渾渾與脈要精微論渾渾同義謂脈盛也七發注渾渾波相隨貌先熱而渴吳改先作後簡按今驗先熱而汗出尋而發渴乃作先者是病極則復至王以至字連下句吳張同馬志高並據甲乙全本太素接上句汪昂云至字有連上句讀者言寒熱復至今從王氏必毀簡按靈逆順篇云方其盛也勿敢毀傷當從太素文為其氣逆也馬雲按後人用藥必當在瘧氣未發之前方有為效不但用針為然若瘧發而用藥則寒藥助寒熱藥助熱反無益而增其病勢矣此義當與靈樞逆順篇參看簡按上文云病逆此雲氣逆其義則一也祝茹穹心醫集云瘧疾每日如期而至名曰瘧信此當原症發散未可直攻未可截也或前或後此正氣漸旺邪將不容名曰邪衰方可截之正本節之理也瘧之且發也志云且者未定之辭言瘧之將發陰陽之將移必從四末始堅束其處吳云謂臑上也取血之法今北人行之張云其處謂四關之上也今北人多行此法砭出其血謂之放寒志云堅束其四末令邪在此經者不得入於彼經彼經之經氣不得出而並於此經簡按志注為允當千金作故氣未並先其時一食頃用細左索堅束其手足十指令邪氣不得入陰氣不得出過時乃解此亦一法真往太素作直往似是其應如何張云欲察其應瘧氣者甲乙氣字無邪氣與衛氣吳移與衛氣三字於下句作邪氣客於六腑而有時與衛氣相失文理始明客於六腑張云客猶言會也李云客猶會也邪在六腑則氣遠會希故間二日或休數日也志云六腑者謂六腑之膜原也臟之膜原而間日發者乃胸中之膈膜其道近六腑之膜原更下而遠故有間二日言至於數日也簡按考上文並無客於六腑之說疑是風府之訛此應四時者也吳云應當也張云夏傷於暑秋必病瘧此應四時者也反四時也吳云謂春時應暖而反大涼夏時應熱而反大寒秋時應涼而反大溫冬時應寒而反大熱瘧病異形職由此也志云非留蓄之邪乃感四時之氣而為病也以秋病者寒甚張云秋以盛熱之後而新涼束之陰陽相激故病為寒甚高雲秋傷於濕人氣始收故寒甚邪氣不能自出邪甲乙作寒氣復反入張云陽極而衰故復入於陰分故先熱而後寒名曰溫瘧張云按此以冬中於寒而發為溫瘧即傷寒之屬故傷寒論有溫瘧一證蓋本諸張兆璜云故先熱而後寒者名曰溫瘧其但熱而不寒者名曰癉瘧矣故字宜著眼高雲上文因寒瘧而及溫瘧故寒瘧詳而溫瘧略此問溫瘧而兼寒瘧故下文但論溫瘧而不復言寒瘧也不及於陰高據全本太素及作反注云上文溫瘧氣復反入故先熱後寒癉瘧其氣不反於陰故但熱而不寒命曰癉瘧馬雲此熱氣者內藏於心肺而外舍於分肉令人消鑠肌肉病命曰癉瘧由此觀之則癉瘧之所舍者肺與心耳李云肺素有熱氣藏於心即此二語火來乘金陰虛陽亢明是不足之症挾外邪而然故溫瘧癉瘧皆非真瘧也刺瘧篇第三十六暍暍然馬雲張仲景以暑證為暍而此云暍暍然者其熱似暑證之熱也郄中熊音郄乞逆反簡按與隙同解㑊巢源作解倦高雲猶懈惰樞轉不力也張云解懈也㑊跡也身體解㑊謂不耐煩勞形跡困倦也王氏即以寒不甚熱不甚為解然細詳之若有不然觀其云身體解㑊復云寒熱不甚分明各有所謂意本不同觀刺要論曰髓傷則銷鑠胻酸體解㑊然不去矣是豈非舉動解倦之謂乎及考㑊字不收於韻若音為亦殊無意味當從跡韻庶乎為妥簡按張辨駁王注固是然以亦為跡則屬臆解詳義見於平人氣象論寒不甚熱不甚張云病在半表半裡也刺足少陽吳云於少陽經穴刺之也馬高同張志仍王注先寒灑淅熊音灑淅上所丁反下音析寒驚貌高雲經脈篇曰足陽明是動則病洒洒振寒故足陽明之瘧令人先寒灑淅喜見日月光張云經脈篇曰陽明病至則惡人與火今反喜見之者陽明受陰邪胃之虛也足陽明跗上甲乙此下有調衝陽三字令人不樂好太息吳云脾脈病則不運不運則膻中之氣不化故不樂氣塞於膻中必噓出之而後利故好太息即取之甲乙此下有足太陰三字依上文例當有此三字多寒熱多巢源作久欲閉戶牖而處張云腎病則陰虛陰虛故熱多寒少病在陰者喜靜故欲閉戶牖而處其病難已甲乙此下有取太谿三字依上文例當有此三字張云腎為至陰之臟而邪居之故病深難已數便巢源作數小便意恐懼吳云肝不足也蓋肝有餘則怒不足則恐故承之曰氣不足悒悒說文悒不安也汪昂云按傷寒言足經而不及手經本篇論瘧亦言足而不及手經本不傳手乎抑足經可以該手經也篇後言腑瘧僅胃腑而不及他腑又豈以胃為六腑之長乎此事難知載李杲治足六經瘧方當並考心寒張云肺者心之蓋也以寒邪而乘所不勝故肺瘧者令人心寒高雲肺天也心日也肺瘧者令人心寒天日虛寒也簡按當從張注熱間善驚巢源無熱字張云心氣受傷故善驚如有所見欲得清水反寒多馬雲心熱則煩且甚故欲得水以救之惟其熱甚則反寒多蓋熱極生寒也吳云蓋陽並於里而煩心欲得清水則陰出之表無肌熱而外寒手少陰心之經也簡按據吳注則不必從太素而改字刺手少陰千金翼此下有是謂神門四字蒼蒼然太息甲乙無太息二字據下文如死者三字必剩文鳴已汗出志云濕熱下行則腸鳴上蒸則汗出也鳴已汗出者下行極而上也張云寒已而熱則脾氣行故腸中鳴鳴已則陽氣外達汗出而解也洒洒然甲乙作悽悽然宛轉大便難吳云宛似也轉傳送也言似乎傳送大便難出也馬雲宛轉則難於轉身也張云腰脊之痛苦於宛轉而大便難也簡按宛屈也轉運也此狀大便難也馬張並誤莊子天下篇推拍輐斷與物宛轉目眴眴然巢源目下有眩字外臺作身掉不定熊音眴許縣反吳云眴二音縣舜目欲瞑也仲景云少陰之為病但欲寐也亦是目眴眴然之意張云眴音眩眴眴然眩動貌目視不明水之虧也簡按當從張注詳見於五臟生成篇此事難知載李杲治五臟瘧方當並考胃瘧張云腑有六而此獨言胃者以胃為六腑之長也橫脈張云謂足內踝前斜過大脈則太陰之經蓋即商丘也吳云謂二經孫絡之橫者瘧發身方熱張云此下言諸瘧之刺法也身方熱者謂於未發之前熱將作也瘧之先熱者溫瘧也高雲此復申明胃瘧之義也簡按當從張注刺跗上動脈馬張俱云當是足陽明衝陽之穴瘧方欲寒張云寒之將發未發也滿大急張云陽邪之實也背俞吳云背為諸陽之府故刺背俞高雲五臟之俞皆在於背故刺背俞簡按張為五胠俞似是中針高雲不大不小之針也傍五胠俞各一馬雲譩譆去中行開三寸自附分魄戶膏肓神堂數至譩譆為第五故曰五胠俞吳云謂魄戶神堂譩譆膈關魂門也張云背為諸陽所出故當刺之即五胠俞也胠者脅也出於廣雅一曰旁開也莊子胠篋之胠水熱穴論曰五臟俞傍五以瀉五臟之熱即此謂也蓋此五者乃五臟俞傍之穴以其傍開近脅故曰傍五胠俞即魄戶神堂魂門意舍志室也簡按每穴在五臟俞之旁故以魄神魂意志命名焉志云傍倚也高雲胠脅旁連背處也五臟之俞在背兩行兩行之外復有兩行所謂胠也余並與張同簡按張註明確殆勝於王然胠兼開義而釋之恐非高注為是小實急張云陰邪勝也陰盛者生內寒故宜灸灸脛少陰刺指井志云艾名冰臺能於水中取火能啟陷氣之陽故當灸少陰脛下之太谿以啟經脈之生氣刺足小指之井穴以瀉經脈之實邪高雲先灸後刺助正散邪之法也簡按志以少陰為太谿與王異未知孰是瘧脈滿大急簡按志高以為申明前義非也今從新校正刪二十二字瘧脈緩大虛志云血氣兩虛也用藥張云針有瀉而無補故脈虛者不宜用針脈度篇曰盛者瀉之虛者飲藥以補之即此之謂過之高雲過其食頃之時則為失時失時而治治無益也簡按志云若太過之則又失其時矣故高仍王注暗斥其非諸瘧而脈不見甲乙而作如吳張並云邪盛氣逆而脈伏也志云此言邪在皮膚氣分者宜刺十指之井穴也瘧在氣分故不見於脈脈不見者謂不見滿大急之脈也高雲不見滿大急小實急緩大虛之脈也簡按吳張注為是赤如小豆志云邪在膚表氣分有傷澹滲皮膚之血故赤如小豆高雲身之皮膚赤點如小豆者盡取而刺之夫所出為井皮膚主表病不在脈故如是以刺之十二瘧張云如前之六經六臟也其發各不同時志云言厥陰與肝瘧陽明與胃瘧太陰與脾瘧少陰與腎瘧各有臟腑經氣之不同也簡按千金翼設黃岐問答見十二瘧鬼之說固屬荒誕焉二刺則知張云一刺之病氣雖衰猶未覺也故必再刺始知其效俠脊者志云胠俞背俞也吳云謂背俞之挾脊者馬張仍王廉泉也甲乙泉下有穴字簡按諸家為任脈之廉泉非也任脈廉泉只一穴不宜言兩脈此言足少陰廉泉也氣府論云足少陰舌下各一王注足少陰舌下二穴在人迎前陷中動脈前是曰舌本左右二也根結篇云少陰根於湧泉結於廉泉可以互證先必問倪朱龍云用三先字者謂邪或舍於頭項而又兼中於腰背或舍於腰背而又兼中於手足衛氣先至之處其病先發是一日之中或又有兩發之瘧也簡按此說近鑿先頭背痛者頭諸本作項當改手少陰陽明十指間張云手少陰陽明皆以井穴為言又刺十指間者各隨其所病之經也亦取井穴志云謂十指間之少衝商陽也高同簡按據新校正作手陰陽似是然下文云足陽明十指間則志說為是足陽明十指間志云十指間之厲兌也風瘧志云痎瘧皆生於風故論刺風瘧於後胕髓病張云其邪深伏故名曰胕髓病吳本胕作附高同注云按之不可痛在骨也髓藏於骨故名曰附髓病志云胕足面也倪仲宣云足胕乃陽明之部分此風木之邪賊傷胃土故名曰胕髓病簡按訓胕為跗太誤痛在於䯒安得謂之跗鑱針靈九針十二原篇云鑱針第一針頭大末銳以瀉陽氣絕骨簡案王以為陽輔張以為懸鐘考甲乙陽輔在足外踝上四寸輔骨前絕骨端如前二分懸鐘在足踝上三寸而按經中無懸鐘穴如陽輔則見本輸篇當從王注本輸篇云陽輔外踝之上輔骨之前及絕骨之端也又考四十五難髓會絕骨今邪伏而附於髓故針髓會之絕骨以祛其邪也身體小痛志云此言風瘧之病身體痛者高雲不若䯒痠痛甚也痛不在骨在太陽之通體刺至陰三字衍當依甲乙刪之諸陰之井志云蓋井穴乃經氣之交故邪在陽之氣分者宜瀉出其血病在陰之經而宜取陰之井者可間日一刺則邪氣自泄不必至於出血以泄真陰之氣瘧不渴張云不渴者內無邪邪在表耳故當刺足太陽渴而間日作張云渴則邪在表裡之間故當刺足少陽雜病篇曰瘧不渴間日而作取足陽明渴而日作取手陽明與此不同氣厥論篇第三十七馬雲末有故得之氣厥也則凡寒熱相移皆氣逆使然故名篇吳同腎移寒於肝肝字諸家據新校正改作脾今從之癰腫少氣吳云寒毒移於骨肉之間壅塞營衛或先腫後痛或先痛後腫皆曰癰腫少氣者腎以陰氣吸納今腎之陰氣移而並於脾則腎之陰氣微矣無以吸納故少氣張云腎中寒氣移於脾者乃為癰腫凡癰毒之病寒熱皆能為之熱者為陽毒寒者為陰毒蓋脾主肌肉得寒則氣聚而堅堅而不散則為腫為癰也一曰癰者壅也腎以寒水之氣反傳所勝侵侮脾土故壅為浮腫其義尤通少氣者寒盛則陽虛於下陽虛則無以化氣也簡按張注後說義為明晰懸壅作懸癰甲乙及孟子癰疽韓非作雍鉏之類古假借通用頗多馬志及高並仍王注為癰疽之義不可從隔中靈邪氣臟腑病形篇云隔中食飲入而還出後沃沫肺消張云心火不足則不能溫養肺金肺氣不溫則不能行化津液故飲雖一而溲則倍之夫肺者水之母也水去多則肺氣從而索矣故曰肺消門戶失守本元日竭故死不能治王氏注云云愚謂火爍於內者又安得飲一而溲二此注似為未妥簡按方出於聖濟總錄五十八卷湧水張云湧湧同湧水者水自下而上如泉之湧也水者陰氣也其本在腎其末在肺肺移寒於腎則陽氣不化於下陽氣不化則水泛為邪而客於大腸以大腸為肺之合也汪昂云癰腫狂膈肺消之症多屬火熱而經文俱云移寒若作熱解則下文又有移熱一段諸注隨證訓釋或言熱或言寒語雖不一義實難移竊謂移寒寒字當作受病之始言如隔塞多屬熱結若云膈症間有寒膈癰腫間有寒瘍而屬熱者多與狂顛肺消均當作寒久變熱解於義始通若下文移腎湧水則始終均屬陰寒也簡按汪昂蓋不見張注故有此等說恐未免附會湧水方具聖濟總錄七十九卷濯濯靈邪氣臟腑病形篇云大腸病者腸中切痛而鳴濯濯膈消馬雲一說膈證肺消當為二病張云膈上焦煩飲水多而善消也上文言肺消者因於寒此言膈消者因於熱可見消有陰陽二證不可不辨李氏蘭室秘藏云上消者舌上赤裂大渴引飲經云心移熱於肺傳為膈消是也簡按李以為上消渴是膈消方具於聖濟總錄四十九卷柔痓簡按柔者陰之義傷寒論太陽病發熱無汗反惡寒者名曰剛痓太陽病發熱汗出不惡寒者名曰柔痓成無己注痓字乃痙之誤蓋肺屬太陰腎屬少陰肺移熱於腎而發痙故曰柔痙活人書云柔痙又云陰痙是也馬張依王注云柔謂筋縱而無力也說文痙勁急也筋縱無力何得云痙於理太乖吳云柔多汗也亦誤腸澼死張云腎移熱於脾者陰火上炎也邪熱在下真陰必虧故傳為虛損腎本水臟而挾熱侮脾故名腸澼下利膿血陰虛反克則水土俱敗故死胞移熱於膀胱樓云胞謂女子之胞也吳云胞陰胞也在男則為精室在女則為血室張同簡按精室無所考當從樓說王履溯洄集云膀胱固為津液之腑又有胞居膀胱之中程式醫彀云胞本胞胎之胞履錯認為尿脬之脬卻乃牽合而傅會以膀胱聯而為一若有熱何待於移移者由他臟移至之謂是語相矛盾矣張五味篇注亦辨履之誤當考胞義詳於五臟別論口麇麇諸本作麋簡按古通用鹽鐵論麇鬲論衡麇爛並麋同然宋本以下並作麋當改志云小腸之下名曰闌門濟泌別汁滲入膀胱膀胱反移熱於小腸是以鬲腸不能下滲濕熱之氣反隨經上逆而口為之麋爛矣聖濟總錄云熱氣厥逆膀胱移熱於小腸胃之水穀不得傳輸於下故鬲塞不便上則令口生瘡而糜爛也大抵心胃壅熱則必熏蒸於上不可概用傅藥當求其本而治之方具於一百十七卷虙瘕張云小腸之熱下行則移於大腸熱結不散則或氣或血留聚於曲折之處是為虙瘕簡按顏氏家訓曰宓伏虙古來通字方具於聖濟總錄第五十卷瘕詳於大奇論注為沉馬雲伏瘕則沉其中也吳云為隱伏秘匿之瘕極其痛苦奔注如火之灼痛止則如不病之平人為患深沉不易求也張同志云沉痔也邪氣臟腑篇曰腎脈微澀為沉痔曰沉者抑上古之省文或簡脫耶諸家註釋皆以沉為伏瘕沉滯按經文用二為字是系二證不可並作一證論高本沉下有痔字注云痔字簡脫今補火熱下行而為沉痔簡按據二為字志高似是汪昂云沉疝字之誤非也儒門事親云夫婦人月事沉滯數月不行肌肉不減內經曰是名為瘕為沉也沉者月事沉滯不行也急宜服桃仁承氣湯加當歸大作劑料服不過三服立愈善食而瘦甲乙瘦作溲非也食亦甲乙作食㑊入作又在㑊字下簡按亦易也即跛易痿易狂易之易雖善食而不肥與平常變易故曰食易張云雖食亦病而瘦所以謂之食亦高同此訓為助字之亦乃非名病之義千金方云食多身瘦名曰食晦先取脾俞後取季脅蓋晦不見之義即食㑊也㑊字義詳見於平人氣象論樓氏綱目云食㑊者謂食移易而過不生肌膚亦易飢也東垣云善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削也方具於聖濟總錄四十七卷辛頞鼻淵吳良腦受其熱故令頞中辛辣鼻液如淵之流無止息也簡按玉篇頞鼻莖也釋名頞鞍也偃折如鞍也圖翼云頞音遏鼻梁亦名下極即山根也沈子祿云俗呼為鼻根頞或作齃蹙齃見史蔡澤傳高雲兩頞辛痠鼻兩旁曰頞非也千金方云夫鼻洞者濁下不止傳為鼽瞢瞑目故得之氣厥蓋鼻洞者鼻液洞下不止之義即鼻淵也張氏醫通云鼻淵鼻鼽當分寒熱若涕膿而臭者為淵屬熱清涼之藥散之若涕清而不臭者為鼽屬虛寒辛溫之劑調之衄衊甲乙衊作䁾廣韻䁾目赤也釋音衊莫結切簡按王注汗血見說文吳云鼻中出血謂之衄衊盛者為衄微者為衊未詳所據聖濟總錄云在鼻為衄在汗空為衊此誤讀王注以汙為汗也太疏故得之氣厥也簡按王以降諸家以為結總一篇之義然湧水癃溺血虙瘕食亦恐不得之氣厥乃謂辛頞鼻淵衄衊瞑目而已全本並此篇於厥論其名篇以氣厥者王所改定知此非總結之文也咳論篇第三十八吳云有聲之謂咳連聲之謂嗽不言嗽者省文也儒門事親云嗽與咳一證也後人或以嗽為陽咳為陰亦無考據且內經咳論一篇純說咳也其中無嗽字由是言之咳即嗽也嗽即咳也陰陽應象大論云秋傷於濕冬生咳嗽又五臟生成篇云咳嗽上氣又診要經終論云春刺秋分環為咳嗽又示從容篇云咳嗽煩冤者腎氣之逆也素問惟以四處連言咳嗽其餘篇中止言咳不言嗽乃知咳嗽一證也簡按釋名云咳刻也氣奔至出入不平調若刻物也嗽促也用力急促也吳意正與此符矣劉完素云咳謂無痰而有聲嗽謂無聲而有痰保命集李湯卿則辨之云無考據心印紺珠大是其寒飲食邪氣臟腑病形篇云形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行汪昂云皮毛受寒為外傷寒餐寒飲冷為內傷寒今人惟知外傷寒而不知有內傷寒訛為陰症者是也不讀內經烏能知此簡按內傷寒固有之然與陰症迥別各傳以與之張云如肝當受病於春以其時也然有非木令之時而肝亦病者正以肺先受邪而能傳以與之也凡諸臟腑之非時受邪者其義皆然汪昂云馬注作肺傳邪於五臟而咳李士材宗之謬觀篇首肺之令人咳篇後關於肺二語則咳之必由於肺明矣為泄為痛吳云上文言外內合邪故為病亦兼內外咳外證也泄里證也寒在表則身痛寒在裡則腹痛是兼乎內外者也簡按王注澀痢恐不必然乘秋則簡按據新校正全本太素無此三字然下文有乘春乘夏等語則全本太素繫於脫遺馬以下諸本並有之先受邪吳云曰先受之則次便及乎肺而為咳矣至陰高雲脾為陰中之至陰寄王四時乘至陰即其王時也簡按痹論以至陰遇此者為肌痹王注云至陰謂戊己月及土寄月也喘息有音病源外臺音下有聲字喉中介介如梗狀甲乙介介作喝喝新校正甲乙介介如梗狀作喝喝誤梗巢源作哽吳云介介堅梗而有妨礙之意志云臟腑病形篇曰心脈大甚為喉吤蓋喉乃肺之竅心火淫金故喉中介然如梗狀簡按西京賦注草木刺人為梗不可以轉轉則外臺作不可以轉側似是陰陰引肩背巢源作瘖瘖引肩髆馬雲按此事難知集李東垣治五臟咳方肺咳用麻黃湯心咳用桔梗湯肝咳用小柴胡湯脾咳用升麻湯腎咳用麻黃附子細辛湯雖未盡中病情姑備此以俟採擇長蟲張云蛔蟲也居腸胃之中嘔甚則隨氣而上出簡按巢源云長蟲蛔蟲也長一尺臟腑病形篇云脾脈微滑為蟲毒蛕蠍蚘蛕蛔並音回說文腹中長蟲關尹子云人之一身內包蟯蛔外蒸蟣蝨東方朔神異經云人腹中蛔蟲其狀如蚓此消穀蟲也多則傷人少則谷不消知蛔蟲常居腸胃中也嘔膽汁千金作清苦汁出四時氣篇云膽液泄則口苦胃氣逆則嘔苦故曰嘔膽咳而遺失志云失當作矢廉頗傳曰坐頃三遺矢簡按甲乙作矢為是病源作屎千金作糞三焦咳張云久咳不已則上中下三焦俱病出納升降皆失其和故腹滿不能食飲簡按王注為上中二焦馬注為手少陽之三焦恐非也此皆聚於胃關於肺馬雲夫五臟六腑之咳如此然皆聚之於胃以胃為五臟六腑之主也關之於肺以肺先受邪而後傳之於別臟別腑也使人多涕唾而面浮腫皆以氣逆於上故耳此乃臟腑咳疾之總語也簡按此解勝於王注張高並仍馬義治其俞志云咳在五臟當治其俞五臟之俞皆在於背欲知背俞先度其兩乳間以草度其背是謂五臟之俞灸刺之度也簡按此據血氣形志篇而諸家並原於本輸篇未詳何是治其合志云合治內腑故咳在六腑者取之於合胃合入於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉高同簡按此據邪氣臟腑病形篇而諸家並原於本輸篇亦未詳何是治其經志云浮腫者取肺胃之經脈以治之簡按上文曰俞曰合前注似是證治準繩並張氏醫通咳嗽門載增補素問五臟六腑咳治例當參看
