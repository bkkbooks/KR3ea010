body:
  text: 卷五舉痛論篇第三十九馬雲首篇悉舉諸痛以為問答故名篇吳據新校正改作卒痛必有驗於人國語楚語楚右尹子革曰民天之生也知天必知民矣必有厭於己張云厭足也高雲厭棄也棄其非而從其是也簡按張注為是要數極簡按玉版論要篇云至數之要迫近以微明明也宋本無一明字志高依此簡按考王注意宋本近是如發蒙解惑宋本如作而簡按蒙矇同刺節真邪論二曰發矇禮記仲尼燕居昭然若發矇矣又東方朔七諫幸君之發矇漢揚雄傳發矇廓然竇融傳曠若發矇晉顧愷之作啓矇記朱子有易學啓蒙詩毛傳有眸子而無見曰矇王充論衡云人未學問曰矇矇者竹木之類也並可以證王注未允稽遲説文稽留止也縮踡熊音踡貝員反踡局不伸也絀急釋音絀丁骨切張云絀屈曲也簡按廣韻絀竹律切音窋荀子非相篇緩急嬴絀注猶言伸屈也炅熊音古惠反煙出貌唐椿原病集云靈音翎小熱貌內經舉痛論云寒氣客於脈外引小絡而痛得靈則痛止注云靈熱也考篇韻中炅明也與熱無干查有靈是小熱貌恐傳寫者誤靈為炅未審是否宜當考讀考字典炅唐韻古迥切音穎説文見也廣韻光也靈廣韻郎丁切音靈字類小熱貌正字通俗靈字簡按熊唐並誤高雲炅炯同熱也集韻炯俱永切音憬炎蒸也字彙居永切通雅云靈素之炅當與熱同此説為得而不可按也滑云此當作痛甚不休也膜原之下簡按王注瘧論云募原謂膈膜之原系與此注異挾脊之脈張云挾脊者足太陽經也其最深者則伏沖伏膂之脈故按之不能及其處志云伏沖之脈也深者謂邪客於挾脊之衝脈則深在於腹之衝脈則浮於外而淺矣簡按衝脈有浮沉之別見於靈五音五味篇志注義長矣起於關元馬雲按骨空論云衝脈起於氣衝今曰關元者蓋任脈當臍中而上行衝脈挾臍兩旁而上衝則本起於氣衝而與任脈並行故謂之起於關元亦可也張云關元任脈穴在臍下三寸衝脈起於胞中出五音五味篇即關元也因之吳云氣從之也喘動應手馬雲發喘而動則應手而痛也志云人迎氣口喘急應手也簡按王吳張並不釋蓋此指腹中築動而言靈百病始生篇云其著於伏沖之脈者揣之應手而動是也喘或是與蠕通蠕音軟説文動也馬志注恐非也按之則熱氣至熱氣至則痛止矣滑云以上十三字不知何所指簡按高本此十三字移於第四對故按之痛止之下文脈貫通極是在下相引吳作上下相引非也小腸膜原之間簡按上文云腸胃之間膜原之下張云膜筋膜也原肓之原也腸胃之間膜原之下皆有空虛之處以原為肓之原恐誤百病始生篇云舍於腸胃之外募原之間又云著於腸胃之募原太陰陽明論云脾與胃以膜相連蓋臟腑之間有膜而相遮隔有系而相連接此即膜原也故王注瘧論云膈膜之原系馬注始生篇云腸胃之外膜原之間者即皮裡膜外也此説近是大經志云臟腑之大絡也簡按百病始生篇云其痛之時息大經乃代離合真邪論云反亂大經皆其義也宿昔而成積矣志云宿昔稽留久也高雲匪朝伊夕故痛於宿昔汪昂云按此即今之小腸氣也厥逆上泄吳云上泄吐湧也湧逆既甚陰氣必竭陰氣竭陽氣未入馬雲陰經之氣竭衛氣不得入故寒氣壅滯高雲陰氣竭於內陽氣虛於外不能即入於陰陰氣竭陽氣未入故卒然痛死不知人少間則陰氣竭而得復陽氣未入而得反乍劇乍蘇則生矣不得成聚張云水穀不得停留志云不成積聚而後泄腹痛也簡按王注為是熱氣留於小腸吳云此明腹痛而閉不通者簡按本篇敘腹痛一十四條屬熱者止一條余皆屬寒王氏證治準繩有説當參考又史載之方舉每證附以脈候及治方文繁不録宜參固盡有部簡按吳改固作面泥矣視其五色馬雲按靈樞五色篇第四節義與此同飧泄簡按甲乙太素作食而氣逆然經脈篇肝所主病嘔逆飧泄未必改字肺布葉舉志云肺臟布大而肺葉上舉簡按此據全注今從之上焦不通榮衛不散吳云二不字非也精卻吳云卻卻步之卻退也故氣不行矣新校正不作下考上文作下為是吳亦從之馬則云作下行者不知經脈之行故也張亦引本神篇憂愁者氣閉塞而不行而證之並難憑矣氣不行新校正引甲乙似是吳云氣榮衛表氣也亦通外內皆越馬雲人有勞役則氣動而喘息其汗必出於外夫喘則內氣越汗出則外氣越故以之而耗散也腹中論篇第四十心腹滿高雲心腹心之下腹之上也滿脹滿也旦食則不能暮食吳云是朝寬暮急張云內傷脾腎留滯於中則心腹脹滿不能再食鼓脹志云鼓脹者如鼓革之空脹也此因脾土氣虛不能磨谷故旦食而不能暮食以致虛脹如鼓也雞矢醴張云雞矢之性能消積下氣通利大小二便蓋攻伐實邪之劑也凡鼓脹由於停積及濕熱有餘者皆宜用之若脾腎虛寒發脹及氣虛中滿等證最所忌也誤服則死正傳云用羯雞矢一升研細炒焦色地上出火毒以百沸湯淋汁每服一大盞調木香檳榔末各一錢日三服空腹服以平為度又醫鑑等書云用干羯雞矢八合炒微焦入無灰好酒三碗共煎乾至一半許用布濾取汁五更熱飲則腹鳴辰巳時行二三次皆黑水也次日覺足面漸有皺紋又飲一次則漸皺至膝上而病愈矣此二法似用後者為便簡按聖濟總録治鼓脹旦食不能暮食雞屎醴法雞屎乾者上一味為末每用醇酒調一錢匕食後臨臥服宣明論雞屎醴散雞屎醴乾者炒大黃桃仁各等分上為末每服二錢水盞半生薑三片煎七分食前服此他有數方宜依證而擇用千金産後中風雞糞酒婦人良方引作雞屎醴雞糞一升熬令黃烏豆一升熬令聲絶勿焦以清酒三升半先淋雞糞次淋豆取汁一服一升溫服取汗一劑知二劑已吳云知效之半也已效之至也雖然其病且已時故當病氣聚於腹也吳已下句注云言雖是飲食不節時有病者但此病且已之後時有自然病者此由病氣聚於腹未盡已也病根未拔故亦復發焉簡按雖然諸注未妥吳注稍通時故當病氣甲乙作因當風氣無時字支滿張云滿如支膈也先聞腥臊臭馬雲金匱真言論肝其臭臊肺其臭腥張云肺主氣其臭腥肝主血其臭臊肺氣不能平肝則肝肺俱逆於上濁氣不降清氣不升故聞腥臊而吐清液也出清液簡按王注窈漏謂陰戶又見骨空論注此乃為白沃之屬也馬則非之為清涕從鼻出之義吳同考上文張注為吐清液者似是血枯婦人良方駱龍吉曰夫肝藏血受天一之氣以為滋榮者也其經上貫膈布脅肋今脫血失精肝氣已傷故血枯涸而不榮胸脅滿以經絡所貫也然妨於食則以肝病傳脾胃病至則先聞腥臊臭出清液則以肝病而肺乘之先唾血四肢清目眩時時前後血皆肝病血傷之證也中氣竭吳本竭下有及字馬雲醉以入房致使醉則損傷其中氣而竭絶入房則勞其肝氣而受傷蓋司閉藏者腎也司疏泄者肝也故入房不惟傷腎而且傷肝張云血枯者月水斷絶也致此之由其源有二一則以少時有所大脫血如胎産既多及崩淋吐衄之類皆是也一則以醉後行房血盛而熱因而縱肆則陰精盡泄精去則氣去故中氣竭也夫腎主閉藏肝主疏泄不惟傷腎而且傷肝及至其久則三陰俱虧所以有先見諸證如上文所云而終必至於血枯則月事衰少不來也此雖以女子為言若丈夫有犯前證亦不免為精枯之病則勞損之屬皆是也烏鯽骨諸本鯽作鰂簡按説文鰂烏鰂魚也又鰂或從即知鰂鯽一字本草作烏賊羅願云此魚有文墨可法則故名烏鰂鰂者則也骨名螵蛸象形也王所謂古本草經即證類白字文吳云烏鰂骨澀物也可以止血張云氣味鹹溫下行故主女子赤白漏下及血閉以上神農本經血枯其性澀故亦能令人有子李時珍云烏鰂骨厥陰血分藥也其味鹹而走血也故血枯血瘕經閉崩帶下痢厥陰本病也厥陰屬肝肝主血故諸血病皆治之藘茹張云藘茹亦名茹藘即茜草也氣味甘寒無毒能止血治崩又能益精氣活血通血脈按甲乙經及太素新校正俱作藘茹者非蓋藘茹有毒豈血枯者所宜皆未之詳察耳志云藘茹當茹藘高雲茹藘舊本誤藘茹今改簡按本草有䕡茹而無藘茹故新校正云當改藘作䕡然南齊王子隆年三十一而體過充壯常服蘆茹丸以自銷損證類本草䕡茹條引本篇王注文知是藘蘆䕡一音古通用張則以為茹藘一名考詩鄭風茹藘在阪爾雅茹藘蒨也郭注可以染絳邢疏一名地血齊人謂之茜別録茜根一名茹藘乃以為茹藘一名者非然血枯所用當是茹藘故志高並仍張注而改茹藘極是李時珍云茜根色赤而氣溫味微酸而帶咸色赤入營氣溫行滯味酸入肝而咸走血手足厥陰血分之藥也專於行血活血俗方用治女子經水不通以一兩煎酒服之一日即通甚效此可以為張注之左證矣四烏鰂骨一䕡茹諸家不釋聖濟總録烏賊魚骨去甲四兩䕡茹一兩婦人良方同此蓋謂藘茹用烏鰂骨四之一古法不必拘於稱量故云爾雀卵張云雀即麻雀也李時珍云俗呼老而斑者為麻雀簡按王注氣味主療見於別録遂云茲四藥用入房焉誤後飯吳云先藥後飯也高雲使藥下行而以飯壓之也鮑魚汁馬雲俗謂之醃魚滷張云鮑魚即今之淡乾魚也諸魚皆可為之惟石首鯽魚者為勝其氣味辛溫無毒通血脈益陰氣煮汁服之能同諸藥通女子血閉也以上四藥皆通血脈血主於肝故凡病傷肝者亦皆可用之李時珍云鮑魚別録既云勿令中咸即是淡魚無疑矣簡按婦人良方聖濟總録並云以鮑魚煎湯下以飯厭之馬以鮑魚為醃魚以汁為滷並誤千金翼治婦人漏血崩中鮑魚湯鮑魚當歸阿膠艾葉凡四味可見其有益陰之功也利腸中及傷肝也吳刪及傷肝也四字非小腹盛馬雲少腹盛滿皆有根吳云根病之所窮止也可治不馬雲不否同伏梁張云伏藏伏也梁強梁堅硬之謂按邪氣臟腑病形篇曰心脈微緩為伏梁在心下上下行時唾血又經筋篇曰手少陰之筋病內急心承伏梁故五十六難曰心之積名曰伏梁起臍上大如臂上至心下其義本此二篇然觀本節云齊上為逆齊下為從下節云環齊而病病名伏梁是又不獨以心積為伏梁也蓋凡積有內伏而堅強者皆得名之故本篇獨言伏梁者其總諸積為言可知也吳云伏梁言如潛伏之橋梁為患深著之名此與難經論伏梁不同彼為心之積是臟之陰氣也此為聚膿血是陽毒也裹大膿血志云裹大如囊之裹物而大也簡按此説迂僻不可從每切按之吳云謂以手切近而按之張云按抑也高雲每急切而按摩之必真氣受傷故致死此下則因陰馬雲其下與足之三陰而相因必有時亦下有餘之膿血志云此下謂少腹陰前後二陰也簡按當從志注生膈高雲當生膈挾胃脘之內癰簡按不必依王注生改出挾胃脘甲乙挾作依內癰吳云內潰之癰不顯於外也此久病也張云此非一朝夕所致者延積既久根結日深居齊下為從吳云齊臍同齊下之分大小腸膀胱之所部也皆能受傷即膿血穿潰而不繫人之生死故為從勿動亟奪馬雲不可輕動之也如上文切按之謂必數數瀉以奪之則可以漸減而不使之上迫耳吳云動動胃氣也動大便也亟數也奪謂下之也言勿得動胃氣行大便而數奪之也高雲勿動亟奪猶言勿用急切按摩以奪之不當亟奪而妄奪必真氣受傷而致死簡按高注允當今從之論在刺法中張云按伏梁一證即今之痞塊也欲治之者莫妙於灸髀股甲乙千金依腰股環齊王注奇病論云環謂圓繞如環也風根張云即寒氣也如百病始生篇曰積之始生得寒乃生厥乃成積即此謂也汪云此風根也四字疑衍或鬱而不已氣化為風故曰風根簡按張注義略通今從之肓之原在齊下吳云腔中無肉空腋之處名曰肓腋疑隙誤原源也臍下氣海也一名脖胦靈樞曰肓之原名曰脖胦出九針十二原此之謂也簡按吳釋肓乃似張解募原恐無明據左傳成公十年云疾居肓之上膏之下説文肓心下膈上也下上原錯今從左傳音義引傅氏左傳辨誤云杜云肓膈也心下為膏愚考素問刺禁篇云膈肓之上中有父母楊上善云心下膈上為肓曾親觀豬髒心膈之處方憶膈者隔也自膈以上皆心肺清潔之屬自膈以下皆腸胃汙濁之屬則心在上膈在下固矣而心下有微脂為膏膈上有薄膜為肓也其痹論又云皮膚之中分肉之間熏於肓膜注云肓膜謂五臟之間膈中膜也則正與心下之微脂相對益明矣傅此説太詳備可謂發前注所未發矣為水溺澀之病吳云水溺小便也志云蓋風邪之根留於臍下動之則風氣淫泆而鼓動其水矣水溢於上則小便為之不利矣高雲此伏梁之在氣分不同於裹大膿血之伏梁也簡按志水下句與諸注異高梁甲乙作膏梁詳出生氣通天論癲馬雲癲癲同簡按癲説文病也一曰腹脹也乃䐜從疒者而戰國策為癲狂之癲古通用可知矣第王多喜多怒之解太誤詳出宣明五氣篇甲乙作疽似是禁芳草石藥張云芳草辛香之品也石藥煅煉金石之類皆能助熱亦能銷陰凡病熱者所當禁用高雲熱中消中者精血內竭火熱消爍皆富貴人之病也富貴之人厚味自養今禁膏梁是不合其心富貴之人土氣壅滯宜升散其上鎮重其下今禁芳草石藥是病不愈簡按據張注禁上闕一不字慓悍熊音慓音票急也悍音汗猛也二字見陰陽應象大論更論甲乙作當愈甚三字膺腫頸痛胸滿馬雲膺頸胸腹皆在上中二焦也今膺腫頸痛胸滿腹脹則下氣上逆病名曰厥逆甲乙膺作癰簡按癰壅同詳見於氣厥論名厥逆張云此以陰並於陽下逆於上故病名厥逆須其氣並張云氣並者謂陰陽既逆之後必漸通也志云血氣合併也入則喑張云陽氣有餘於上而復灸之是以火濟火也陽極乘陰則陰不能支故失聲為喑虛則狂張云陽並於上其下必虛以石泄之則陽氣隨刺而去氣去則上下俱虛而神失其守故為狂也懷子之且生也志云且生者謂血氣之所以成胎者虛繫於腹中而無經脈之牽帶故至十月之期可虛脫而出簡按且生志意似指分娩之際而味經文殊不爾吳云生者無後患之意身有病汪昂云病字王注解作經閉按婦人懷子多有嘔惡頭痛諸病然形雖病而脈不病若經閉其常耳非病也無邪脈也張云身病者脈亦當病或斷續不調或弦澀細數是皆邪脈則真病也若六脈和滑而身有不安者其為胎氣無疑矣三陽之動動甲乙作盛張云陽脈者火邪也凡病熱者必因於陽故三陽之脈其動甚也人迎一盛少陽甲乙盛下有在字下同入陰也張云人迎足陽明脈所以候陽也如終始禁服六節臟象等篇俱詳明其義凡邪熱在表三陽既畢則入於陰分矣簡按吳入上補未字非陽入於陰張云頭主陽腹主陰陽邪在頭則頭痛及其入於陰分則腹為䐜脹也簡按吳陽上補始字贅刺腰痛論篇第四十一尻熊音苦高反簡案説文尻𦞠也從尸九聲廣雅尻臀也又增韻丘刀切脊梁盡處此與古義異當考如重狀重甲乙作腫太陽正經經別篇曰足太陽之正別入於膕中高據王注為是馬張以為崑崙穴誤循循然吳云循循漸也言漸次不可以俯仰也張云遲滯貌簡按離合真邪論云其行於脈中循循然當從吳注不可以顧甲乙顧上有左右二字成骨甲乙作盛骨吳云成骨之端陽關穴也張同志云膝外廉陽陵泉之下當作上有獨起之骨為成骨蓋足少陽主骨至此筋骨交會之處樓氏綱目云按此謂陽陵泉穴簡按甲乙陽關在陽陵泉上三寸犢鼻外陷者中陽陵泉在膝下一寸䯒外廉陷者中考王注二穴並不相當必是別穴沈氏釋骨云膝之上下內外皆以臏為斷成骨之旁䯒骨之端不至上旁膝膝乃䯒之訛也此説有理如有見者善悲吳云仲景所謂如見鬼狀是也善悲者陽明熱甚而神消亡也經曰神有餘則笑不休不足則悲此之謂也䯒前新校正云䯒甲乙作骭今甲乙作胻簡按䯒字書牛脊骨䯒説文脛端也廣雅脛也然本經䯒胻通用上下和之張云兼上下巨虛而言也志高同內踝上二痏高雲左右太溪二痏簡按當以復溜為正不可復也甲乙不上有虛字馬雲腎氣不可復也張同高雲出血太多至冬不可復藏也簡按據甲乙謂血虛不可復也如張弓弩弦吳云厥陰之脈抵少腹屬肝肝主筋肝病則筋急故令腰中如張弓弩弦刺厥陰之脈簡按新校正脈改絡經脈篇云足厥陰之別名曰蠡溝去內踝五寸別走少陽腨踵吳云腨足腹也腨踵足腹盡處也纍纍然吳云邪之所結如波隴在絡者善言默默然不慧簡按善言默默諸家注屬牽強當仍全本刪善字義始通志云不慧語言之不明矣簡按其病云云以下十五字與前四經腰痛之例不同恐是衍文解脈高雲解散也解脈周身橫紋之脈散於皮膚太陽之所主也志同簡按與王吳諸家少異膝筋肉分間志云太陽之委中穴也樓云愚按膝外廉筋肉分間即委陽穴是也郤外廉吳云郤膕中橫紋也廉稜也善恐吳云太陽之脈絡於腎腎志恐故善恐張同簡按有兩解脈全云恐誤未詳然考其證候及所刺穴道俱屬足太陽故王以降並無疑及者同陰之脈馬張仍王注吳云未詳然曰刺外踝絶骨之端則足少陽之脈所抵耳故王冰注為少陽之別絡簡按經脈篇云足少陽之脈直下抵絶骨之端吳證王注原於此志云蹺脈有陰陽男女陰陽經絡交併故為同陰之脈高雲陽蹺之脈從陰出陽故曰同陰並誤錘玉篇稱錘也廣雅權謂之錘其形垂也馬依太素作針張云如小錘居其中重而痛也簡按今從張注合腨下間去地一尺所新校正及馬張高併為承山穴志云陽維起於諸陽之會其脈發於足太陽金門穴在足外踝下一寸五分諸家並云一寸唯八脈考為一寸五分上外踝七寸會足少陽於陽交為陽維之郤見甲乙故當與太陽合腨下間而取之蓋取陽維之郤也郤上踝七寸是離地一尺所矣簡按陽交在脛外側不宜曰腨下間志注未為得矣所許同詳見通雅衡絡之脈志云此論帶脈為病而令人腰痛也衡橫也帶脈橫絡於腰間故曰橫絡之脈夫足之三陽循腰而下足之三陰及奇經之脈皆循腰而上病則上下不通陰陽間阻而為腰痛之證簡按此勝於舊注不可以俯仰甲乙作得俯不得仰為是郤陽筋之間甲乙筋之作之筋為是上郤數寸衡居馬張仍王注吳云郤陽浮郤委陽二穴也上郤數寸上於委中數寸也衡居令病人平坐也志云郤陽謂足太陽之浮郤高雲刺之在浮郤會陽大筋之間申明會陽之穴上浮郤數寸橫居臀下也簡按數説未允樓氏引王注云今詳委陽正在郤外廉橫紋盡處是穴非上郤也殷門上郤一尺是穴非數寸也蓋郤陽筋者按郤內外廉各有一大筋上結於臀今謂外廉之大筋故曰陽筋也上郤數寸於外廉大筋之兩間視其血絡盛者橫居為二痏出血此説極是甲乙別條有殷門主之病候與此同當參考會陰之脈馬雲會陰者本任脈經之穴名督脈由會陰而行於背則會陰之脈自腰下會於後陰其脈受邪亦能使人腰痛也高雲會陰在大便之前小便之後任督二脈相會於前後二陰間故曰會陰漯漯然甲乙作濈然熊音漯徒合反音踏張音磊簡按滀漯水攢聚貌見木玄虛海賦注飲已欲走高雲漯漯然汗出陰氣虛而陰液外注也汗乾令人欲飲飲已欲走陽氣虛而陽熱外馳也直陽之脈馬吳張並據王注高雲直陽太陽與督脈相合之脈也簡按任脈與督脈相合之脈蓋直值通用見於史記寧成傳遇也即兩脈會遇之義新校正直陽之脈即會陰之脈是也王注骨空論云任脈衝脈督脈者一源而三歧也以任脈循背者謂之督脈自少腹直上者謂之任脈是以背腹陰陽別為名目爾知是二脈分歧之處即其會遇之地故名之會陰亦名直陽耳志云會陽節後當有刺條刺直陽之前宜有腰痛或簡脫與抑督與任交病在陰而取之陽耶此説近是然未察直陽即會陰也蹺上郤下五寸甲乙五寸作三所高雲三痏者刺陽蹺之申脈太陽之郤中又蹺上郤下各相去五寸之承山皆有血絡橫居視其盛者刺其血由此言之則蹺與郤及蹺上郤下但刺橫居之血絡不必拘於穴也飛陽之脈馬雲本足太陽經穴名也此穴為足太陽之絡別走少陰吳張同高雲飛陽陰維之脈也陰維之脈起於足少陰之築賓今曰飛陽者經脈篇云足太陽之別名曰飛陽去踝七寸別走少陰是飛陽乃別出於太陽而仍走少陰也簡按高志仍王注考經脈篇飛陽在去踝七寸且在少陰之後而下文云在內踝上五寸又云少陰之前乃知飛陽非太陽經之飛陽也下文云陰維之會亦知飛陽是非陰維之脈也蓋此指足厥陰蠡溝穴經脈篇云足厥陰之別名曰蠡溝去內踝五寸別走少陽從陰經而走陽經故名飛陽義或取於此歟前注恐誤怫怫然張云言痛狀如嗔憤也內踝上五寸甲乙作二寸簡按王注為復溜故新校正據甲乙改二寸馬張高並云築賓穴簡按考甲乙諸書築賓穴云在內踝上腨分中而不云在五寸則其説難憑少陰之前簡按復溜築賓俱是少陰經穴若依前注之前二字屬衍文陰維之會簡按甲乙云築賓陰維之郤在足內踝上腨分中此謂刺內踝上五寸與陰維之會二穴王意亦爾昌陽之脈馬雲昌陽系足少陰腎經穴名又名復溜足少陰之脈其直行者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中故昌陽之脈令人腰痛其痛引膺以膺即胸之旁也張吳同簡按甲乙復溜一名昌陽下文云舌卷不能言亦少陰所注故爾今從馬注反折吳云少陰合於太陽故反折內筋馬雲以復溜在內筋中為二痏其穴在踝上大筋之前太陰經之後踝上二寸所張云內筋筋之內也即復溜穴簡按志高俱據王為交信蓋復溜交信並在內踝上二寸止隔一條筋前是復溜後是交信而此云昌陽之脈當從馬張大筋前太陰後甲乙無前太陰三字當是脫文散脈馬雲愚於此節散脈有疑何王注便以為足太陰之地機遍考他處又無散脈之説但按地機穴亦治腰痛不可俯仰故且從王注耳吳云散脈陽明別絡之散行者也高雲衝脈也衝脈起於胞中秉陰血而淡滲皮膚一如太陽通體之解脈故曰散脈急不充於皮膚故腰痛而身熱志同簡按高及志以同陰以下六條為奇經八脈之義故有此説然衝脈不宜謂散脈恐是強解今從吳注義具於下文膝前骨肉分間吳云陽明之脈至氣街而合故令遺溲陽明之脈下膝臏中循脛外廉故刺其處張云按此節似指陽明經為散脈而王氏釋為太陰若乎有疑但本篇獨缺太陰刺法而下文有云上熱刺足太陰者若與此相照應及考之地機穴主治腰痛故今從王氏之注高雲膝前之骨犢鼻穴也及肉分間三里穴也絡外廉上廉穴也簡按張據馬説從王注雖似有理然考甲乙地機穴在膝下五寸焉得言膝前故樓氏綱目云王注謂地機者非也既云膝前骨肉分間絡外廉束脈當在三里陽陵泉三穴上之骨上與膝分間是穴橫刺三痏也三穴當是二穴或恐脫一穴名與此説頗有理今從吳以散脈為陽明之別絡從樓以膝前骨肉分間不拘於穴為膝骨上肉分間橫刺三痏之義高注三穴於束脈之義未切貼束脈吳云以繩堅束之視其波隴為痏簡按此注不可從肉裡之脈吳云未詳馬張依王注志云肉者分肉里者肌肉之文理也高雲里理同肉理肌肉之文理也肉理之脈外通於皮內通於筋腰痛不可以咳不能外通於皮也咳則筋縮急不能內通於筋也簡按諸説不一今且從王注太陽之外少陽絶骨之後甲乙後作端簡按本輸篇云陽輔外踝之上輔骨之前及絶骨之端也氣穴論云分肉二穴王注云在足外踝上絶骨之端三分筋肉分間陽維脈氣所發新校正云詳處所疑是陽輔今此節甲乙作絶骨之端明是陽輔況筋縮急膽病所主宜無疑焉高雲乃太陽附陽穴也此依甲乙云附陽太陽前少陽後而於筋縮急無所關宜從王注𠘧𠘧熊音殊如羽鳥飛馬雲成無己釋傷寒論以為伸頸之貌也張云憑伏貌志云短羽之鳥背強欲舒之象簡按通雅云説文𠘧鳥之短羽飛𠘧𠘧也孫愐收作𠘧韻會云有鉤挑者為几案之幾音寄不鉤挑者為𠘧音朱鳥短羽也鄭明選粃言云黃帝內經云腰痛挾脊痛至頭𠘧𠘧然𠘧音殳鳥之短羽者人病頭項強臂縮則似之與幾字不同幾字尾上引𠘧字則否此宜以音朱為正張似為𠘧字而釋蓋本於本事方本事方為几案之幾非也當考腰痛上寒以下三十八字又見於靈雜病篇痛下更有痛字吳云皮膚上寒是為寒包熱宜瀉其表張云上寒上熱皆以上體言也高雲此言腰痛寒熱亦刺三陽三陰不但三陽三陰之脈令人腰痛而始刺也上文言六氣而不及太陰故此亦不言太陰也簡按據靈樞當從吳注言三陽三陰而不言太陰者必是脫文上熱靈樞甲乙上上有痛字吳云皮膚上熱是為熱實而達於表宜瀉其里故刺足厥陰不可以俯仰吳云少陽之脈行於身之兩側故俯仰皆不利張同高雲陰陽樞轉不和故刺足少陽所以和其樞而使陰陽旋轉也中熱而喘張云少陰主水水病無以制火故中熱刺足少陰刺郤中張云刺足之少陰湧泉大鐘悉主之郤中委中也簡按吳云少陰之郤水泉也志云郤隙也謂經穴之空隙為郤陰郤者足少陰之築賓穴也並誤腰痛上寒不可顧志云此以下至引脊內廉刺足少陰系衍文凡六十二字愚按王氏所取之穴不過承襲前人或彼時俗在取非出於經旨也高雲衍文舊本注云古本並無王氏所添也簡按今從志高而不釋控䏚不可以仰馬雲控按也簡按繆刺論腰痛上有邪客於太陰之絡七字仰下有息字今甲乙仰上無俯字與新校正所引異控吳張仍王注今從之風論篇第四十二馬雲內論五臟六腑之風故名後世論風當祖此篇奈以中風及癘風偏枯各立為一門致使後人視中風為重傷風為輕不知此篇曰中曰傷無以異也汪昂云按風論痹論痿論分為三篇病源不同治法亦異今世多混同論治故丹溪著論辨之或為寒中吳此下補或為瘍或為不仁二句非也詳具於下文癘風熊音癘音例吳云利賴二音張云癩同或為偏枯滑云偏枯當作偏風下文以春甲乙云則為偏風是也或為風也千金作或為賊風滑云或當作均高雲或為風病之無常簡按下文有腦風目風漏風內風首風腸風泄風恐為風之間有脫字怢栗樓云怢陀骨切忽忘也見集韻栗懼也怢熊音他對切考字書並無振寒之義甲乙作解㑊於文理為要名曰寒熱簡按脈要精微論云風成為寒熱並謂虛勞寒熱即後世所謂風勞也寒中張云蓋風雖陽邪氣則寒肅是風之與寒名為同類但有陰陽之辨耳歲露篇曰四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開所以病變若此風氣與太陽俱入云云高雲風之傷人或為癘風者乃風氣與太陽俱入行諸太陽之脈俞脈經脈也俞腧穴也太陽之氣主通體今行諸脈俞而散於通體分肉之間分肉分腠之肌肉也散於分肉更與周身之衛氣相干風氣行於脈俞散於分肉干於衛氣則正氣不能通貫其道不利其道不利故使肌肉憤然䐜脹而有瘍瘍癘瘍也此肌肉有瘍因脈外之衛氣有所凝而不行故其肌肉癘瘍而亦有不仁也簡按此以下至有不仁也諸家併為論瘍及不仁故吳於篇首補為瘍為不仁二句而高獨接下文為癘證之瘍及不仁文理相貫頗覺勝於前注今從之與衛氣相干甲乙作悍邪時與衛氣相干肌肉憤䐜而有瘍熊音憤音忿發也䐜充人反瘍以章反瘡也吳云憤䐜腫起也瘍癰毒也簡按王注生氣通天論痤字云謂色赤䐜憤亦腫起之義巢源諸癩候云皰肉如桃核小棗蓋謂此類也有榮氣熱胕趙府本熊本氣作衛滑云有字衍胕腐同此段當作風寒客於脈而不去名曰癘風癘者榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰簡按此未知果是否録以存一説長刺節論云病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日發眉生而止針又四時氣篇云癘氣者素刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食無食他食並與此節相同曰大風曰癘氣即癘之謂耳或名曰寒熱滑本刪此五字簡按此衍文諸注屬強解以春甲乙云云以下五十七字吳移下文故風者百病之長也之上近是傷於邪者為脾風甲乙邪作風中於邪者為肺風甲乙中作傷邪作風下同亦為臟腑之風簡按馬吳張仍王注以風中五臟六腑之俞亦為臟腑之風二句為偏風之所由志高則接上文四時五臟之風為一節以亦字考之志高為是高雲各以五行之時日受邪而五臟之氣應之則為五臟之風若風中五臟六腑之俞穴傷其經脈亦為臟腑之風既曰傷於風復曰傷於邪以明風者邪氣也既曰傷於邪復曰中於邪以明傷者中之謂也此申明或內至五臟六腑而為臟腑之風者如此各入其門戶志圈各上為別段注云此論風邪偏客於形身而為偏風也門戶者血氣之門戶也簡按刺節真邪論云虛邪偏客於身半其入深內居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯由之推之門戶即榮衰弱之處志以為血氣之門戶近是偏風神巧萬全方云經有偏風候又有半身不遂候又有風偏枯候此三者大要同而古人別為之篇目蓋指風則謂之偏風指疾則謂之半身不遂其肌肉偏小者呼為偏枯腦風吳云腦痛也簡按醫説云腦風頭旋偏痛聖濟總録云腦戶者督脈足太陽之會也風邪客搏其經稽而不行則腦髓內弱故項背怯寒而腦戶多冷也方具於十五卷風入係頭甲乙注一本作頭系高本係作系云風入目系而至於頭則入目之門戶而為目風簡按改係作系若不作頭系則頭字無著落今據甲乙注改頭系頭系乃頭中之目系目風吳云目痛也張云或痛或癢或眼寒而畏風羞澀也漏風張云酒性溫散善開玄府酒後中風則汗漏不止故曰漏風病能論謂之酒風內風吳云今人遺精咳血寢汗骨蒸內風之所致也簡按評熱病論云勞風法在肺下與內風迥別王注恐誤張氏醫通云入房汗出中風嗽而面赤內經謂之內風脈浮緊小青龍脈沉緊真武湯新沐吳云沐濯首也張云一曰沐浴簡按和劑局方有洗頭風證治要訣於窗罅間梳洗卒然如中呼為簷風此亦首風之屬也腸風馬雲風久入於其中則為腸風其食有時不化而出也簡按吳張併為腸風下血之證非也泄風高雲久風外在腠理則為隱疹之泄風簡按此金匱要略所論與本篇泄風不同當考下文金匱云風氣相搏風強則為隱疹身體為癢癢為泄風久為痂癩張云自上文風氣循風府而上至此共七種所以明或為風也故有其病各異其名不同之義無常方然致有風氣也然千金作焉滑本刪致以下五字其病能張云凡致病之害皆謂之能志云病能者謂臟氣受邪能為形身作病也馬雲能耐同簡按義具於病能篇皏然馬吳皏音駢廣雅云皏白也王注原於玉篇晝日則差馬雲差瘥同吳云晝日起則肺葉垂而順故病瘥暮而臥則肺葉壅而脹故病甚志云晝則陽氣盛而勝邪暮則氣衰故病甚也簡按王注為是診在眉上其色白馬雲靈樞五色篇以為闕中者肺也高雲其診視之部在眉上闕庭之間其色皏然白者是也志云始言皏然白而復曰診在眉上其色白有似乎重見矣所謂皏然白者謂肺氣受風而臟氣之見於外也所謂診在眉上其色白者謂五臟之病色見於面也簡按當從高注下文四臟義並同焦絶馬雲心受邪正在中故上中下三焦之氣升降頗難而似有阻絶也張云唇舌焦燥津液干絶也簡按未詳張據王義姑從之善怒嚇赤色甲乙無嚇字作色赤樓云嚇字衍高雲木火相生故善以怒而嚇人簡按莊子秋水云鴟得腐鼠鵷雛過之仰而視之曰嚇司馬雲怒其聲恐其奪己也又五臟之風言情志者唯心肝二臟耳而於肝則云善悲又云善怒併為可疑今且仍王注診在口高本口作舌注云舌舊本訛口今改時憎女子吳云肝脈環陰器肝氣治則悅色而欲女子肝色衰則惡色而憎女子痝然張云浮慘貌簡按厖同義具於評熱病論脊痛甲乙脊上有腰字其色炲志云恐後人認為一色故曰蒼曰炲曰皏然曰微黃大意與五臟生成篇之論色同炲煙煤黑色也肌上高本肌作𦠄注云𦠄舊本訛肌今改肌兩頰肉也肌上顴也顴腎所主也簡按説文肌頰肉也五閲五使篇云腎病者顴與顏黑高注確有所據然幾幾通用故飢作飢機作機則肌不必改𦠄胃風簡按此腹中論所謂鼓脹之屬與和劑局方胃風湯之胃風醫説不伏水土之胃風不同聖濟總録有治方具於十七卷失衣則䐜脹吳云風寒助邪脈益凝澀故今䐜脹張云失衣則陽明受寒於外故為䐜脹簡按王注中熱恐誤食寒則泄千金泄上有洞字似是診形瘦而腹大高雲猶言診其形色則瘦診其腹上則大以明五臟診色六腑診形之義先風一日志云風者天之陽氣人之陽氣以應天之風氣諸陽之氣上出於頭故先一日則病甚男兆璜曰風將發而所舍之風亦發故先一日病甚人氣之通於天也張云陽性先而速也先至必先衰是以至其風日則病少愈聖濟總録云陽之氣以天地之疾風名之風行陽化頭者諸陽之會與之相應也方具於十五卷漏風聖濟總録云食酒中風則為漏風漏風之狀云云又曰身熱解墮汗出如浴惡風少氣病名酒風出病能論夫酒所以養陽酒入於胃與穀氣相薄熱盛於中其氣慓悍與陽氣俱泄使人腠理虛而中風令人多汗惡風不可單衣其喘息而少氣者熱重於肺客於皮毛也口乾善渴者汗出多而亡津液故也解墮而不能勞事者精氣耗竭不能營其四肢故也謂之漏風者汗出不止若器之漏久而不治轉為消渴方具於十三卷常不可單衣汪昂云汗多腠疏故常畏寒馬注作畏熱雖單衣亦欲卻之昂按既云畏熱下何以又言惡風乎高雲多汗表虛欲著復衣故常不可單衣也甚則身汗高本身作自注云自汗舊本訛身汗今改食則汗出者言身若無汗食入則汗出也甚則自汗者言身或多汗甚則自汗也甚猶多也簡按不必改自汗義自通泄風之狀簡按上文久風入中則為腸風飧泄外在腠理則為泄風本節則云多汗汗出泄衣上蓋此其汗泄甚於漏風新校正據千金改內風難必矣上漬其風吳云上漬半身之上汗多如浸漬也志四字為一句注云泄衣上則身濕既濕且冷一如水漬而有風故曰上漬其風也簡按四字未詳或恐是衍文吳云此不及腦風目風內風腸風飧泄者古亡之也言胃風而上文未嘗及者亦上文亡之也痹論篇第四十三高雲痹閉世血氣凝澀不行也有風寒濕三氣之痹有皮肌脈筋骨五臟外合之痹六腑有俞五臟亦有俞五臟有合六腑亦有合故有五臟六腑之痹榮衛流行則不為痹痹之為病或痛或不痛或不仁或寒或熱或燥或濕舉而論之故曰痹論痹之安生甲乙之作將合而為痹也張云痹者閉也觀陰陽別論曰一陰一陽結謂之喉痹至真要大論曰食痹而吐是皆閉塞之義可知也故風寒濕三氣雜至則壅閉經絡血氣不行而病為痹即痛風不仁之屬華他中藏經云痹者風寒暑濕之氣中於人臟腑之為也痹者閉也五臟六腑感於邪氣亂於真氣閉而不仁故曰痹鄭玄注易通卦驗云痹者氣不達為病簡按經中痹有四義有為病在於陰之總稱者見於壽夭剛柔篇有專為閉塞之義者如食痹喉痹是也有為麻痹之痹王注云𤸷痹者是也有為痛風歷節之義如本篇行痹痛痹著痹之類是也此他總不離乎閉塞之義學者宜細玩焉一切經音義引蒼頡篇云痹手足不仁也行痹馬雲其風氣勝者風以陽經而受之故為行痹之證如蟲行於頭面四體也張云風者善行數變故為行痹凡走注歷節疼痛之類皆是也簡按張依樓氏綱目下痛痹著痹同張氏醫通云行痹者走注無定風之用也越脾加朮附湯痛痹馬雲其寒氣勝者則寒以陰經受之故當為痛痹之證寒氣傷血而傷處作痛也張云陰寒之氣客於肌肉筋骨之間則凝結不散陽氣不行故痛不可當即痛風也張氏醫通云痛痹者痛無定處乃濕氣傷腎腎不生肝肝風挾濕流走四肢肩髃疼痛拘急浮腫金匱烏頭湯身體痛如欲折肉如錐刺刃割千金附子湯著痹馬雲其濕氣勝者則濕以皮肉筋脈而受之故當為著痹之證當沉著不去而舉之不痛也張云著痹者肢體重著不移或為頑木不仁濕從土化病多發於肌肉簡按陳氏三因方云腫滿重著為濕勝此似以著痹為濕腳氣矣志云靈樞有風痹傷寒論有濕痹是感一氣而為痹也本篇論風寒濕三氣錯雜而至相合而為痹也周痹篇曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是是寒痹先發而他痹復發也本篇論風氣勝者為行痹濕氣勝者為著痹是三氣雜合而以一氣勝者為主病也經論不同因證各別臨病之士各宜體認張氏醫通云著痹者痹著不仁或左或右半身麻木或面或頭或手臂或腳腿麻木不仁並宜神效黃耆湯以冬遇此者為骨痹樓云凡風寒濕所為行痹痛痹著痹之病冬遇此者為骨痹春遇此者為筋痹夏遇此者為脈痹長春遇此者為肌痹秋遇此者為皮痹皆以所遇之時所客之處命名非此行痹痛痹著痹之外又別有骨痹筋痹脈痹肌痹皮痹也重感於風寒濕之氣也甲乙無重字心下鼓馬雲鼓字為句心下鼓戰也高雲心虛則煩故煩則心下鼓鼓猶動也簡按王注鼓滿誤上為引如懷高雲經脈論云肝病丈夫㿉疝婦人少腹腫故上為引於下有如懷物之狀尻以代踵脊以代頭高雲尻尾骨也尾骨下蹲以代踵足骨痿也脊骨高聳以代頭天柱傾也簡按王以拘急釋之諸注並同高以痿弱解之義各別胞痹張云胞膀胱之脬也高雲即膀胱痹也簡按劉熙釋名云胞鞄也鞄空虛之言也主以虛承水汋也或曰膀胱言其體短而橫廣也知胞即是膀胱吳以女子之胞注之非也按之內痛若沃以湯簡按百病始生篇云積其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀並言肌熱之狀據此則內痛作兩髀似是上為清涕志云膀胱之脈從巔入腦腦滲則為涕上為清涕者太陽之氣痹閉於下不能循經而上升也張氏醫通云胞者膀胱之脬也膀胱氣閉則水道不行故按之內痛若以熱湯沃之小便得外熱之助方得稍通而猶滯澀不利則治宜溫助氣化可知膀胱之脈從巔入絡腦故上為清涕以太陽經氣不固而精氣上脫又須溫補無疑蓋緣精泄之後寒熱乘虛入於膀胱之內而致小便淋瀝不通莖中痛引穀道甚則臍腹脹痛此屬津液枯竭之故誤與利水藥必致喘逆脹急而死老人陰虛泉竭多有此證曾見膀胱脹破淋瀝無度時雖暫綬不久即斃又小便不禁門有治胞痹用腎瀝湯加減桑螵蛸散醫案一則當參考陰氣者靜則云云馬雲此言臟腑所以成痹者以其內傷為本而後外邪得以乘之也陰氣者營氣也陰氣精專隨宗氣以行於經脈之中惟其靜則五臟之神自藏而不消亡若躁則五臟之神消亡而不能藏矣所以有五痹者必重感於邪而成五臟之痹也至於六腑之所以成痹者何哉飲食固所以養人而倍用適所以害人故飲食自倍腸胃乃傷也腸胃既傷則邪得以乘俞入之而為痹矣按生氣通天論云陽氣者精則養神柔則養筋論衛氣也此節云云論營氣也王注分臟腑看書有法但不知陰氣為營氣耳簡按此十九字吳移於生氣通天論未知舊經果然否今且依馬注淫氣滑云王注云云如此則屬內傷非風寒濕三氣雜至而為外傷者宣明五氣篇云邪入於陰則為痹所謂邪者豈指淫氣而言耶馬雲邪氣浸淫喘息靡寧正以肺主氣惟痹聚在肺故喘息若是下文意並同志云此申明陰氣躁亡而痹聚於臟也淫氣者陰氣淫佚不靜藏也淫氣而致於喘息則肺氣不藏而痹聚在肺矣下文意並同吳云氣失其平謂之淫氣痹聚者風寒濕三氣凝聚也簡按生氣通天論云風客淫氣精乃亡邪傷肝也説文淫浸淫隨理也徐曰隨其脈理而浸漬也乏竭馬雲邪氣浸淫陰血乏竭正以肝主血惟痹聚在肝肌絶馬雲邪氣浸淫肌氣阻絶正以脾主肉惟痹聚在脾吳云肌肉斷裂也志云肌肉焦絶亦益內也馬雲或云亦益內作入房説亦通志云亦者言不止在皮肉筋骨之合於內也簡按馬或説屬未安醫通益作濫易已也張云風為陽邪可以散之故易已然則寒濕二痹愈之較難以陰邪留滯不易行也食飲居處高雲猶言食飲自倍居處失宜乃腑痹之病本也六腑亦各有俞馬雲六腑之分肉皆各有俞穴風寒濕之三氣外中其俞而內之飲食失節應之則邪氣循俞而入按三百六十五穴皆可以言俞今曰俞者凡六腑之穴可以入邪而王注止以足太陽在背之六俞穴為解則又理之不然者也五臟有俞六腑有合張云乃兼臟腑而互言也汪昂云按六腑前文只列腸痹胞痹三焦有名無形膽附於肝胃為臟腑之海故不復別言痹也各有所發各隨其過馬雲循臟腑經脈所行之分各有所發病之經乃隨其病之所在而刺之則或俞或合其病無有於不瘳也志云各隨其有過之處而取之簡按張以所發為井穴過字吳張高依王注讀為平聲並非也榮者水穀之精氣也張云榮氣者陰氣也由水穀精微之所化故為水穀之精氣衛氣篇曰精氣之行於經者為營氣正理論曰云云夫谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外故於臟腑脈絡則無所不至衛者水穀之悍氣也張云衛氣者陽氣也陽氣之至浮盛而疾故曰悍氣慓急也本臟篇曰衛氣者所以溫分肉充皮膚肥腠理司開闔者也衛氣篇曰其浮氣之不循經者為衛氣邪客篇曰衛氣者出其悍氣之栗疾而先行於四末分肉皮膚之間而不休者也皆與此節互有發明肓膜張云肓者凡腔腹肉理之間上下空隙之處皆謂之肓如刺禁論曰膈肓之上中有父母左傳曰膏之上肓之下者是皆言膈上也又腹中論曰其氣溢於大腸而著於肓肓之原在齊下九針十二原篇曰肓之原出於脖胦脹論曰陷於肉肓而中氣穴則肓之為氣不獨以胸膈為言可知也膜筋膜也簡按王注空虛之處吳注腹中論稍同張誤讀以為此注乃與舉痛論小腸膜原注略同不可從扁鵲傳搦荒説苑作肓莫即肓膜也散於胸腹甲乙散作聚故不為痹張云營衛之氣但不可逆故逆之則病從之則愈然非若皮肉筋骨血脈臟腑之有形者也無迹可著故不與三氣為合蓋無形亦無痹也有寒故痛也簡按王注全本於靈周痹篇文故不通諸注並依甲乙通作痛今從之皮膚不營張云逆調論曰榮氣虛則不仁衛氣虛則不用不營者血氣不至也馬雲以其皮膚之中少氣血以為之營運高同志云不能營養於皮膚陽氣少陰氣多張云凡病寒者不必盡由於外寒但陽氣不足陰氣有餘則寒從中生與病相益故為寒證志云此言寒熱者由人身之陰陽氣化也人之陽氣少而陰氣多則與病相益其陰寒矣病氣勝張兆璜云與病相益者言人之陰氣多而益其病氣之陰寒也病氣勝者言人之陽氣多而益其病氣之熱勝也陽遭陰故為痹熱吳遭作乘云舊作陽遭陰未當今依甲乙改陽乘陰為近理簡按甲乙無痹亦近是滑云或熱下有或燥問今此無答辭兩氣相感張云寒濕兩氣也脈要精微論曰陰氣有餘為多汗身寒其義即此張兆璜云陽熱盛者多汗出濡濕之汗又屬陰寒醫者審之不痛也汪昂云痛則血氣猶能周流五者為氣血不足皆重於痛故不復作痛諸解欠明逢寒則蟲馬雲蟲甲乙作急王氏以為如蟲行者非蓋風勝為行痹非逢寒也張云逢寒則筋攣故急逢熱則筋弛故縱也吳同簡按志仍王注高雲寒濕相薄故生蟲太誤巢源云凡痹之類逢熱則癢逢寒則痛痿論篇第四十四吳云痿與萎同弱而不用之意高雲承上篇痹證而論痿證也痿者四肢委弱舉動不能如委棄不用之意潘氏醫燈續焰云痿者委也足痿不用有委靡不振之義故字從委簡按痿專繫於四肢委弱之疾而有肺痿陰痿等證巢源作肺萎陰萎知是痿與萎同吳為明確蓋痿痹瘚三疾相類古多混同説文痿痹疾也前哀帝紀痿痹師古云痿亦痹病也枚乘七疑出輿入輦命名蹶痿之機此類是也故本經分三篇而詳論之筋膜張云膜猶幕也凡肉理臟腑之間其成片聯絡薄筋皆謂之膜所以屏障血氣者也凡筋膜所在之處脈絡必分血氣必聚故又謂之膜原亦謂之脂膜肺熱葉焦甲乙焦下更有焦字急薄著則甲乙著下更有著字吳云著留而不去也張云皮毛虛弱而為急薄熱氣留著不去志云靈樞云皮膚薄著毛腠夭焦著者皮毛燥著而無生轉之氣故曰著則生痿躄也痿躄吳云躄足不用也肺主氣氣病則不能充周於身故令手痿足躄汪昂云肺主皮毛傳精布氣肺熱葉焦則不能輸精於皮毛故虛弱急薄皮膚燥著而痿躄不能行猶木皮剝則不能行津於枝幹而枯也簡按史記韓王信傳僕之思歸如痿人不忘起張楫云痿不能行吳越春秋云寡人念吳猶躄者不忘走躄又作躃禮記釋文躃兩足不能行也由此觀之痿躄並足廢之疾然痿者痿弱之義躄者兩足不能行之稱自不能無別焉王則依疏五過論痿躄為攣之語釋為攣躄吳則分為手足之病俱似拘泥此據他臟之例當曰皮痿而曰痿躄者蓋肺為痿證之主也樞折挈吳云樞紐關節之處或折或挈志本挈一字句注云樞析即骨繇而不安於地骨繇者節緩而不收以上根結篇文故筋骨懸挈不收汪昂云樞紐之間如折如挈簡按説文挈懸持也推王意謂膝腕之樞紐失其懸持如折去也此注為長甲乙挈作瘈非膽泄甲乙膽下有熱字簡按奇病論膽虛氣上溢而口為之苦名膽疸肺者臟之長也志云臟真高於肺朝百脈而行氣於臟腑故為臟之長簡按病能論九針論並云肺者五臟六腑之蓋也肺熱葉焦吳此下補生痿躄三字簡按此據上文著則生痿躄之語亦未為得故曰吳云以下古語也馬張同志云謂下經本病篇有此語也以上論肺熱葉焦而成五臟之熱此下論五臟各有所因而自成脈肉筋骨之痿胞絡絶高本胞作包云包舊本訛胞今改悲哀太甚則心氣內傷故包絡絶包絡心包之絡也包絡絶則血外溢而陽熱之氣內動其發病也則心氣下崩下崩則數溲血也簡按此依新校正改字而其義則原於王及楊注頗見確實馬雲此胞絡者乃胞絡宮之胞字正婦人受胎之所彼心包絡之包字不從肉王注以胞為包者非評熱論云胞脈者屬心而絡於胞中故悲哀太甚則心系急胞之絡脈阻絶上下不交亢陽內動逼血下崩令人數為溺血也張同若依此説以胞為女子之胞則丈夫必無脈痿之證乖違甚矣志云胞之大絡即衝脈也亦為臆解但絶字宜從馬注為阻絶之義大經空虛張云血失則大經空虛無以滲灌肌肉榮養脈絡故先為肌肉頑痹而後傳為脈痿簡按志以為胞之大絡高同當從王注入房太甚宗筋弛縱馬雲思想既已無窮所願又不得遂其意久淫於外或至入房太甚宗筋弛縱高雲思想無窮所願不得則怫鬱於內肝氣傷矣意淫於外者其意淫縱於外不靜存也入房太甚宗筋弛縱者房勞過度陰器衰弱也簡按據下文使內也語筋痿之證因思想無窮所願不得意淫於外而又重之以房勞馬添一或字釋之高以四句為三款且以宗筋弛縱為陰痿並似乖於經旨白淫吳云今之濁帶也馬雲在男子為精滑在女子為白帶簡按本神篇云精傷則骨痠痿厥精時自下玉機真臟論云出白名曰蠱皆其義也聖濟總録云淫泆不守隨溲而下也有漸於濕馬雲漸音尖詩云漸車帷裳注漸漬也張云漸有由來也若有所留居處相濕吳云留久留於水也相伴也言居處之間或伴乎濕也張云相並也馬雲其居處又濕志云有濕濁之所留而居處又兼卑下外內相濕簡按相字難解姑從志肌肉濡漬甲乙漬作潰滑本同誤陽氣內伐馬雲衛氣內伐其陰氣簡按營衛生會篇云衛氣內伐擊也馬蓋原於此絡脈溢簡按此以外候言乃孫絡浮見也肉蠕動張云蠕音軟微動貌又曰蟲行貌主閏宗筋甲乙閏作潤馬吳並云閏潤同馬雲宗筋在人乃足之強弱所繫也但陽明實則宗筋潤陽明虛則宗筋縱世疑宗筋即為前陰按厥論有曰前陰者宗筋之所聚則宗筋不可以前陰言張云宗筋者前陰所聚之筋也為諸筋之會凡腰脊溪谷之筋皆屬於此故主束骨而利機關也簡按五音五味篇云宦者去其宗筋依此則張注似是然前陰是宗筋之所會故言斷其前陰而為去其宗筋但不可即謂宗筋為前陰也王注似詳備而有所未盡宜參考諸篇而始得其義據王所説痃癖痃氣橫弦豎弦之屬蓋宗筋努張之所致也束骨吳云束管攝也機關骨空論云俠髖為機膕上為關又據邪客篇兩肘兩腋兩髀兩膕者皆機關之室衝脈者經脈之海也五音五味篇云衝脈起於胞中上循脊裡為經絡之海動輸篇並海論云衝脈者為十二經之海陰陽總宗筋之會滑云愚謂此即厥論前陰者宗筋之所聚太陰陽明之所合之義也張云宗筋聚於前陰前陰者足三陰陽明少陽及衝任督蹺九脈之所會也九者之中則陽明為五臟六腑之海沖為經脈之海此一陰一陽總乎其間故曰陰陽總宗筋之會也簡按高雲陰陽陰蹺陽蹺陰維陽維也未若滑張二氏有所據也氣街志云氣街者腹氣之街甲乙一名氣衝簡按説文街四通道也又曰沖通道也知字異而義同帶脈經別篇云當十四椎出屬帶脈二十八難云帶脈者起於季脅回身一周楊注云帶之為言束也言總束諸脈使得調柔也回繞也繞身一周猶束帶焉不引吳云不能收引高雲不引者不能延引而環約也簡按吳義為長補其滎而通其輸吳云十二經有滎有輸所溜為滎所注為輸補致其氣也通行其氣也張云上文云獨取陽明此復云各補其滎而通其輸蓋治痿者當取陽明又必察其所受之經而兼治之也如筋痿者取陽明厥陰之滎輸脈痿者取陽明少陰之滎輸肉痿骨痿其治皆然高雲各補其在內之榮血而通其在外之輸穴正虛則補以調之邪實則瀉以調之志同簡按當仍吳張和其逆順馬雲補則逆取瀉則順取志云和其氣之往來也高雲逆者和之使順順者和之不使逆簡按陰陽應象大論陰陽反作病之逆從也吳注逆從不順也蓋此言逆順亦是不順之謂義始通以其時受月高雲肝主之筋心主之脈腎主之骨脾主之肉各以其四時受氣之月而施治之則病已矣受氣者筋受氣於春脈受氣於夏骨受氣於冬肉受氣於長夏也簡按吳改月作氣不可從厥論篇第四十五張云厥者逆也氣逆則亂故忽為眩僕脫絶是名為厥厥證之起於足者厥發之始也甚至猝倒暴厥忽不知人輕則漸蘇重則即死最為急候後世不能詳察但以手足寒熱為厥又有以腳氣為厥者謬之甚也簡按千金方凡例以厥為腳氣然王注已言及之則唐時有為其説者可知也考靈寒熱病篇曰厥痹者厥氣上及腹則死此特似指腳氣衝心雖仲景有寒厥熱厥之分亦以手足為言蓋彼以辨傷寒之寒熱耳實非若內經之所謂厥也觀大奇論曰暴厥者不知與人言調經論曰血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死繆刺論曰手足少陰太陰足陽明五絡俱竭令人身脈皆重而形無知也其狀若尸或曰尸厥若此者豈止於手足寒熱及腳氣之謂耶今人多不知厥證而皆指為中風也夫中風者病多經絡之受傷厥逆者直因精氣之內奪表裡虛實病情當辨名義不正無怪其以風治厥也醫中之害莫此為甚簡按厥爾雅作瘚説文亦作瘚云屰氣也從疒從屰從欠又云欮瘚或省疒史記扁倉傳作蹶劉熙釋名厥逆氣也顏師古注急就章云瘚者氣從下起上行叉心脅也厥有氣厥血厥痰厥酒厥臟厥蛔厥色厥等景嶽全書論之詳焉五指之表張云足指之端曰表集於足下而聚於足心簡按集聚同義然集有止之意國語有隼集於陳侯之庭而死是也聚乃散之反皆從內也張云其寒也非從外入皆由內而生也故凡病陽虛者必手足多寒皆從指端始前陰馬雲前陰者陰器也外腎也簡按寧氏折骨分經云睪丸外腎也屬足厥陰肝經又韻會云外腎為勢宮刑男子割勢據此則宦者去其宗筋者割去睪丸也下氣上爭不能復吳云下氣身半以下之氣也上爭者陽搏陰激身半以下之氣亦引而上爭也馬雲是在下之腎氣乃因強力而遂與上焦之氣相爭不能復如其舊高雲在下之陰氣上爭於陽致陽氣不能復復內藏也精氣溢下吳云陰精之氣湧溢泄出而下也志云陽氣上出則陰臟之精氣亦溢於下矣簡按上古天真論二八腎氣盛天癸至精氣溢瀉知是亦言精氣漏泄然彼由腎氣有餘此因上盛下虛義遞異邪氣因從之張云陽虛則陰勝為邪簡按吳云邪氣陽氣也以其失所目之為邪此解太誤若改陽字作陰則才通氣因於中汪昂云寒從內發即前不從外之意高雲陰寒之邪氣因於中而陽氣日衰簡按此一句諸説參差甲乙於作所而吳則以此四字移上文前陰者宗筋之所聚之上馬則改因作困張則以氣為上文之精氣邪氣志則為氣因於中焦水穀之所生並不甚清晰考上下文意汪高所釋似允當今姑從之滲營其經絡張兆璜云滲者滲於脈外營者營於脈中營氣宗氣皆精陽之氣營行於脈中諸陽之氣淡滲於脈外非獨衛氣之行脈外也手足為之寒也滑云張子和曰秋冬陰壯陽衰人或恃賴壯勇縱情嗜欲於秋冬之時則陽奪於內陰氣下溢邪氣上行陽氣既衰真精又竭陽不榮養陰氣獨行故手足寒發為寒厥也絡脈滿而經脈虛志云靈樞經脈篇曰飲酒者衛氣先行皮膚先充絡脈夫衛氣者水穀之悍氣也酒亦水穀悍熱之液故從衛氣先行皮膚從皮膚而充於絡脈是不從脾氣而行於經脈故絡脈滿而經脈虛也氣聚於脾中馬雲下氣上爭聚於脾中志云穀氣聚於脾中高同腎氣日衰陽氣獨勝宋本日作有吳作自甲乙勝作盛張氏醫通云論得寒厥之由以其人陽氣衰不能滲榮其經絡陽氣日損陰氣獨在故手足為之寒也附子理中湯論得熱厥之由則謂其人必數醉若飽以入房氣聚於脾中腎氣日衰陽氣獨勝故手足為之熱也加減腎氣丸腹脹滿甲乙無脹字馬雲下氣上爭而行之於上則下虛故氣在腹而不在足所以腹中脹滿也夫曰陰氣盛於上則腹滿者上文之寒厥高雲陰寒之氣盛於上則上下皆陰而陽氣虛於下下虛則腹脹滿以明腹滿而為寒厥之意簡按張云陰虛於下則脾腎之氣不化故腹為脹滿恐非陽氣盛於上新校正據甲乙作腹滿二字詳辨其義滑亦從之而馬吳諸家仍原文而解之簡按帝問有二或字故舉陰氣盛於上陽氣盛於上之兩端而答之則新校正似是而卻非馬雲乃上文之熱厥耳高雲陽熱之氣盛於上則下氣重上而邪氣逆逆則陽氣亂亂則心神不寧故暴不知人以明暴不知人而為熱厥之意下氣重上而邪氣逆吳云重平聲並也邪氣氣失其常之名也簡按腹中論云陽氣重上有餘於上此亦論厥逆也即是同義不知人也志云猝然昏瞶或僕撲也吳此下補逆之微者半日復逆之甚者一日復復則知人矣十九字簡按經文未知舊如此否要之不可定然矣厥狀病能馬雲能音耐禮運篇云聖人耐以天下為一家則能耐同吳云能猶形也張同志云病能者能為奇恆之病也簡按吳近是詳見病能論篇首腫首頭重簡按脈解篇腫腰膲痛著至教論干嗌喉塞乃與論語迅雷風烈楚辭吉月辰良並同字法腫志本作踵非眴僕甲乙作眩僕吳云眴目眩亂也僕顛仆也馬雲眴眩而仆倒乃上重下輕之證也陽明之厥汪昂云按陽明多血多氣詳本症病皆有餘與虛而厥者不同癲疾欲走呼簡按陰陽類論云罵詈妄行巔疾為狂王注以腎水不勝故胃氣盛而顛為狂蓋與此同證詳見宣明五氣篇後不利志云食飲入胃脾為轉輸逆氣在脾故後便不利脾不轉運則胃亦不和是以食則嘔而不得臥也口乾溺赤甲乙口作舌志云陰液不能上資是以口乾心痛肺金不能通調於下故溺赤水火陰陽之氣上下不爽故腹滿也涇溲簡按諸家不釋但張云涇音經水名義難通調經論王注云涇大便也溲小便也楊上善云涇作經婦人月經也吳云涇水行有常也溲溺溲也涇溲不利言常行之小便不利也數説亦未穩當靈本神篇亦有腹脹經溲不利之文經甲乙作涇蓋涇溲是小溲集韻涇去挺切泉也劉熙釋名水直波曰涇涇徑也言道徑也溲者二便之通稱國語少溲於豕牢史記倉公傳有大小溲語吳越春秋太宰嚭奉溲惡注溲即便也惡大便也故加涇字別於大便脈要精微論言小便為水泉此亦一證陰縮腫甲乙無腫字是以經取之吳云難經曰不盛不虛以經取之者是正經自病不中他邪也當自取其經六十九難正此謂也馬雲若不盛不虛則在膽取膽而不取之肝在肝取肝而不取之膽所謂自取其經也即名之曰經治又曰經刺太陰厥逆張云按六經之厥已具上文此復言者考之全元起本自本節之下另在第九卷中蓋彼此發明原屬兩篇之文乃王氏類移於此者非本篇之重復也治主病者張云謂如本經之左右上下及原輸等穴各有宜用當審其所主而刺之余準此虛滿嘔變下泄清吳云少陰腎也腎間命門之火虛衰不足以生脾土故令虛滿虛滿者中虛而滿也嘔變者水穀已變猶嘔逆而出蓋少陰在下故食至下焦其色已變猶嘔也泄清下泄澄徹清冷也志云少陰之氣上與陽明相合而主化水穀少陰氣厥以致中焦虛滿而變為嘔逆上下水火之氣不交故下泄清冷也按嘔變當作變嘔靈五味篇云若走骨多食之令人變嘔與此篇大義相同且有聲無物曰嘔故不當作嘔出變異之物解高雲有欲嘔之變證簡按佛典有變吐之語知是嘔變變嘔乃嘔逆之謂諸注恐屬強解前閉高雲前陰閉結譫言吳云肝藏魂魂失其守故譫言也不得前後張云或閉結不通或遺失不禁不得其常之謂也三陰俱逆則臟氣絶陽明脈解篇曰厥逆連經則生連臟則死此之謂也志云陰關於下也簡按此謂二便不通張注或遺失不禁誤僵仆高雲即上文發為眴僕之義嘔血善衄志云陽氣上逆則嘔血陽熱在上則衄血此太陽之氣厥逆於上以致迫血妄行高雲陽熱之氣不行皮毛內傷絡脈陽絡傷則血外溢故嘔血善衄簡按吳本無嘔血二字義不相蒙昆僭去之非也機關不利張云機關者筋骨要會之所也膽者筋其應少陽厥逆則筋不利故為此機關腰項之病發腸癰不可治張云腸癰發於少陽厥逆者相火之結毒也故不可治高雲少陽經厥氣逆則樞轉有乖故機關不利不能樞轉從外則發腸癰發腸癰則內郁之氣從癰而泄不可治少陽之主病當治陽明之腸癰此少陽厥逆病能發於陽明當治陽明故不言治主病者簡按高據仲景嘔家有癰膿不可治嘔膿儘自愈之例而釋之未知於經旨何如存備一説驚者死馬雲肝之病發為驚駭而膽與之為表裡故驚則死矣張云其毒連臟故當死喘咳身熱志云陽明氣厥則喘上逆則咳也陽明之氣主肌肉故厥則身熱善驚衄嘔血志云二陽發病主驚駭衄血嘔血者陽明乃悍熱之氣厥氣上逆則迫血妄行此病在氣而及於經血高雲聞水音則善驚熱迫於經則衄嘔血上文發腸癰不可治少陽當治陽明是治陽明之意已寓於上故此不言治主病者簡按腸癰治陽明未見所據其不言治主病者恐是脫文嘔沫吳云肺主治節行下降之令肺病則不能降故虛滿而咳虛滿之久必有留沫故嘔沫高雲肺氣滿咳不能四布其水津故善嘔沫手心主少陰高雲手心主厥陰包絡手少陰心經經厥氣逆皆有心痛之病喉者肺氣也心痛引喉則兩火上炎而爍金又兼身熱如焚如焰則死不可治馬雲邪客篇言心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則精神去神去則死此所以死不可治腰不可以俯仰吳云其脈屬於小腸小腸繫腰之部分故腰不可以俯仰張云四時氣篇曰邪在小腸者連睪系屬於脊故腰不可以俯仰也簡按王以為錯簡文吳張強為之解似不切貼痓馬雲按全元起本痓作痙痓音熾傷寒論有剛痓柔痓痙音敬風強病也此痓當以痙為是後世互書者非靈樞熱病篇第二十七節有風痙證高雲經脈篇云大腸手陽明之脈是主津液今手陽明經氣厥逆津液不榮於經脈故痓當資手陽明經之津液簡按張云痓謂手臂肩項強直也此蓋拘泥於本經之所流注故云爾
