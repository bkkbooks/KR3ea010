body:
  text: 卷六病能論篇第四十六馬雲能音耐禮樂記故不耐無樂其耐作能靈樞陰陽二十五人篇皆有能字古蓋耐能通用陰陽應象大論云病之形能也蓋病之形狀耐受故此以病能名篇張兆璜云病能者言奇病之形能也簡按吳釋前篇病能云能猶形也此解為是胃脘癰吳云吸門之下賁門之上受納水穀之脘名曰胃脘簡按聖濟總録云夫陰陽升降則榮衛流通氣逆而隔則留結為癰胃脘癰者由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃故胃脈沉細以陽氣不得下通故頸人迎甚盛令人寒熱如瘧身皮甲錯或咳或嘔或唾膿血觀伏梁之病亦有挾胃脘內癰者以其裹大膿血居腸胃之外故也方附於一百二十九卷當候胃脈滑云即脈要精微附上右外以候胃也馬雲右關吳張志同簡按附上右外尺膚之位而非脈之分位以寸關尺配五臟六腑者難經以後之説此言胃脈者必別有所候逆者甲乙作氣逆者人迎甚盛張云即終始篇等所云人迎三盛病在陽明之謂精有所之寄則安吳本作精有所倚則臥不安注云臟陰也主靜故臟有傷損則有不足之患陰精有所偏倚則有亢甚之害均之令人夜不安也簡按諸家順文解釋義難通吳據甲乙而刪改但精字仍舊文殆為明晰今從之不能懸其病吳云不能懸其病於空使之不我疾也馬雲懸者絶也按逆調論第六節有不得臥而息有音者諸證尤詳但此曰不安則不能安寢也與彼有異偃臥高雲正臥也評熱論云不能正偃者胃中不和也故舉而復問肺者臟之蓋也痿論云肺者臟之長也心之蓋也靈九針論云五臟之應天者肺肺者五臟六腑之蓋也右脈沉而緊左脈浮而遲馬雲此當見於兩尺也吳張同簡按本經無寸關尺之説此特言左右爾必非兩尺之謂也不然馬吳張並仍甲乙然作知志高從舊文釋之故屬強解此逆四時志云脈合四時故冬診之左右脈皆當沉緊今左脈反浮而遲是逆四時之氣矣病在腎頗關在肺吳云關關係也志云腎主冬氣而又反浮在左故當主病在腎頗關涉於肺當為腰痛之病簡按甲乙無關字奇病論云其盛在胃頗在肺句法正同腎為腰痛之病也甲乙無腎字頸癰癰疽篇云發於頸者名曰夭疽其癰大而赤黑不急治則熱氣下入淵腋前傷任脈內薰肝肺十餘日而死矣其真安在吳云真正治之法也簡按當仍甲乙作其治異等志云等類也高雲頸癰之名雖同而在氣在血則異類也癰氣之息馬雲以小針開除而去病者正以癰間有氣頓息不至甚也吳息改瘜云瘜腐肉也針鈹針也所以去針肉張云息止也癰有氣結而留止不散者治宜甲針以開除其氣氣行則癰愈矣高雲頸癰而氣之止息者其病在氣宜以針開通其氣而除去之此氣息成癰而有針刺之真法也頸癰而氣盛血聚者其病在血宜石刺出血而瀉之此血聚成癰而有石刺之真法也此所以同病異治而皆已也簡按説文瘜寄肉也徐鍇曰息者身外生之也故古謂賒賃生舉錢為息錢旋生土為息壤也方言作𦞜王釋為死肉吳則為腐肉無所考據張注允當今從之同病異治也吳此下補膚頑內陷者宜灸以引之十字云以上文有其問故僭補之張兆璜云陷下者又宜灸始言針灸而後止言針石者蓋此篇論五臟之相傳而腎臟之氣已傳於肝故止宜針宜石設或有回陷於腎者又常灸之此雖不明言蓋欲人意會讀者宜潛心參究不可輕忽一字簡按吳補固僭矣而張注亦鑿俱不可從狂靈癲狂篇云狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休通評虛實論云癲疾厥狂久逆之所生也又千金方云狂風罵詈撾斫人名熱陽風即怒狂也暴折而難決馬雲此人者因猝暴之頃有所挫折而事有難決志不得伸吳云暴折而抑之不得剖決志云決流行也高雲決散也簡按吳注為是陽明者常動馬雲靈動輸篇言是陽明獨動不休故凡衝陽即跗陽地倉大迎下關人迎氣衝之類皆有動脈不止而衝陽為尤甚巨陽少陽不動吳云巨陽有委中崑崙少陽有懸鐘聽會其脈皆不甚動於其不甚動者反動大疾此陽厥善怒而狂之候也動大疾馬雲大當作長簡按非也夫食入於陰張云五味入口而化於脾食入於陰也藏於胃以養五臟氣長氣於陽也生鐵洛張云即爐冶間錘落之鐵屑也其屬金其氣寒而重最能墜熱開結平木火之邪故可以下氣疾除怒狂也凡藥中用鐵精鐵華粉針砂鐵鏽水之類皆同此意簡按本草經作鐵落唐本注云落是鐵皮滋液黑於余鐵陶謂可以染皂云是鐵漿誤矣蘇頌圖經云鐵落者鍛家燒鐵赤沸砧上打落細皮屑俗呼為鐵花是也初煉去礦用以鑄寫器物者為生鐵再三銷拍可以作鍱者為鑐鐵亦謂之熟鐵此説是也別録云鐵落一名鐵液故王云為鐵漿非是生鐵液也高雲洛烙同烙飲者轉赤為烏也赤而烏可以平巨陽之氣迂謬尤甚聖濟總録云鐵落染皂鐵漿是上一味每服重湯內溫一盞飲之食後此不讀王注及唐本乃襲陶謬也為飲張云用水研浸可以為飲簡按唐本注云諸鐵療病並不入丸散皆煮取漿用之此云為飲亦煮取漿者與下氣疾也吳云寒而鎮重故下氣速氣下則不厥逆矣志云鐵乃烏金能伐肝木故下肝氣之疾速也李時珍云陽氣怫鬱而不得疏越少陽膽木挾三焦少陽相火巨陽陰火上行故使人易怒如狂其巨陽少陽之動脈可診之也奪其食不使胃火復助其邪也飲以生鐵落金以制木也木平則火降故曰下氣疾速氣即火也簡按列子湯問吳楚之國有大木焉其名為柚音柚碧樹而冬生實丹而味酸食其皮汁已憤厥之疾張湛注云氣疾也梁書姚察傳自免憂後因加氣疾蓋憤厥乃陽厥之類而氣疾所指不一凡狂易癲眩驚悸癇瘈心神不定之證宜概稱氣疾焉若以疾訓速或為效驗疾速之義或為逆氣疾速之謂乖謬亦甚澤瀉術各十分麋銜五分張云澤瀉味甘淡性微寒能滲利濕熱白朮味甘苦氣溫能補中燥濕止汗麋銜即薇銜一名無心草南人呼為吳風草味苦平微寒主治風濕十分者倍之也五分者減半也簡按蘇頌云凡古方云術者乃白朮也此方聖濟名澤瀉湯三因名麋銜湯並用白朮馬雲術即蒼朮非也麋銜本經作薇銜一名麋銜唐本注云一名鹿銜草言鹿有疾銜此草瘥陳嘉謨云麋鹿有疾銜此草瘥素問之名因此出時珍云據蘇説則薇銜麋銜當作鹿銜也此説誤麋鹿一類不必改作鹿劉㦎採天名精活麞遂有活鹿草之名麋果鹿之誤乎活鹿草當作活麞草也聖濟十分作二兩半五分作一兩一分陶氏序録云古稱惟有銖兩而無分名今則以十黍為一銖六銖為一分四分為一兩然則四分為一兩者六朝以降之事而此經云分者非分兩之分總録誤爾三因十分作一兩五分作半兩乃與張注符矣合以三指撮吳云合修合也三指撮言如三指寬一撮也簡按陶序例一撮者四刀圭也刀圭者十分方寸匕之一準如梧桐子大也此云三指撮者乃一方寸匕余也張云合以三指用三指撮合以約其數而為煎劑也考經文此謂散藥張注謬爾聖濟云上三味搗羅為散每服二錢匕沸湯調食後服三因亦云上為末每服二錢酒飲任調下食前服為後飯馬雲藥在飯後也誤所謂深之細者高以下二十四字移於前頸癰之下上經者以下六十九字移於前在陰陽奇恆中之下而為之注釋率屬牽強不可從奇病論篇第四十七吳云奇病特異於常之病也簡按凡風也痹也厥也痿也屬類頗多此篇所載重身聲喑息積疹筋等率皆奇特之病故以奇病名篇重身詩大雅大任有身毛傳身重也箋謂懷孕也馬重平聲九月而喑馬雲喑啞也醫書謂人之受孕者一月肝經養胎二月膽經養胎三月心經養胎四月小腸經養胎五月脾經養胎六月胃經養胎七月肺經養胎八月大腸經養胎九月腎經養胎十月膀胱經養胎先陰經而後陽經始於木而終於水以五行之相生為次也然以理推之則手足十二經之經脈晝夜流行無間無日無時而不共養胎氣也必無分經養胎之理今曰九月而喑蓋時至九月則妊胎已久兒體日長胞絡宮之絡脈繫於腎經者阻絶而不通故間有為之喑者非人人然也此乃阻絶之絶非斷絶之謂生氣通天論云大怒則形氣絶而血菀於上亦阻絶之絶靈經脈篇云腎足少陰之脈從腎上貫肝膈入肺中循喉嚨挾舌本張云喑聲啞不能出也簡按徐之才逐月養胎法見於千金方蕭氏女科經論云張嶟璜按喑謂有言而無聲故經曰不能言此不能二字非絶然不語之謂凡人之音生於喉嚨發於舌本因胎氣肥大阻腎上行之經以腎之脈入肺中循喉嚨系舌本喉者肺之部肺主聲音其人切切私語心雖有言而人不能聽故曰喑肺腎子母之臟故云不必治若大全解作不語則為心病以心主發聲為言也與子喑了不相干嶟璜所論如此然醫説引邵氏後聞見録云郝翁名允博陵人一婦人妊咽默不能言翁曰兒胞大經壅兒生經行則言矣不可毒以藥又引醫余云孕婦小語非病也聞如此者不須服藥臨産日但服保生丸四物湯之類産後便語亦自然之理非藥之功並是子喑喑乃舌喑腎之脈系舌本其理自明蕭所引卻是迂謬又考郭氏保慶集第九論有産後不語用七珍散則知不啻胎前有此證也胞絡張云胞中之絡衝任之絡也吳云謂子室中之支絡也系根系也刺法曰此以下止疹成也吳志為別章是成其疹吳云疹病也張志同簡按國語孤子寡婦疾疹傷寒例云小人觸冒必嬰暴疹王注恐非然後調之此四字宜據新校正刪之明是全注羼入諸家為原文釋之者何諸無用鑱石也志云鑱謂針石砭石也針經曰形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣是以身羸瘦者不可妄用針石腹中有形而泄之志云泄謂用針瀉之針經曰刺之害中而不去則精泄精泄則病益甚而恇按腹中胞積皆為有形在女子胞則無益其有餘在息積曰不可灸刺在伏梁曰不可動之是腹中有形者皆不可刺泄刺雖中病而有形之物不去則反泄其精氣正氣出而邪病反獨擅於其中故為疹成也簡按馬張仍王為重身之義非也脅下滿氣逆馬雲脅下脹滿氣甚喘逆息積吳云息積即息賁肺積也張云積不在中而在脅之下者初起微小久而至大則脅滿氣逆喘促息難故名息積今人有積在左脅之下俗名為痞者其即此證惟小兒為尤多蓋飲食過傷脾不及化則餘氣留滯而結聚於此其根正在脅間陽明病劇則上連於肺此其所以為息積也簡按百病始生篇云稽留不去息而成積據此則息謂生長出前漢宣帝紀師古注猶瘜肉之瘜也聖濟總録云夫消息者陰陽之更事也今氣聚脅下息而不消積而不散故滿逆為病然氣客於外不幹胃腑故不妨食特害於氣息也導引能行積氣藥力亦藉導引而行故也有方附於五十七卷此以息而不消積而不散解息積之義極是矣而至謂害於氣息則竟未免歧誤積為導引服藥高雲積漸次也須漸次為之導引而服藥導引運行也運行則經脈之虧者可復若但服藥則藥不能獨治也尺脈數甚簡按十三難云脈數尺之皮膚亦數丁氏注數心也所以臂內之皮膚熱也蓋與此同義筋急而見吳云身之大筋徑急也簡按王注為是疹筋吳云病筋也簡按聖濟總録云夫熱則筋緩寒則筋急今也肝氣內虛虛則生寒故筋急而見其尺脈數甚者蓋尺裡以候腹中其人腹急則尺脈見數數亦為虛以腹內氣虛故也氣既寒而筋急其色又見白黑是為寒甚之證有方附於四十二卷又外臺云痃癖發即兩筋弦急陳氏婦人良方云痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀名曰痃氣也慧琳一切經音義云痃病即腹中冷氣病也發即脈脹牽急如似弓弦故俗呼為痃氣病也據王注此即疹筋也名曰厥逆聖濟總録方附於五十一卷李氏蘭室祕藏有羌活附子湯羅氏衛生寶鑑有麻黃附子細辛湯危氏得效方有白附子散並治大寒犯腦頭痛帝曰善高雲三字衍文五氣之溢也吳云腥焦香臊腐也張云五味之所化也馬雲五臟之氣也志云五氣者土氣也土位中央在數為五在味為甘在臟為脾高同云溢泛溢也簡按萬曆本醫説作土氣志注為是王意亦當如此脾疸聖濟總録云夫食入於陰長氣於陽肥甘之過令人內熱而中滿則陽氣盛矣故單陽為疸也其證口甘久而弗治轉為消渴以熱氣上溢故也有方附於四十五卷食甘美而多肥甲乙作數食美而多食甘肥簡按甲乙為是枚乘七發甘脆肥濃命曰腐腸之藥轉為消渴吳轉作傳云傳日久傳變也消渴飲水善消而渴不止也以蘭除陳氣聖濟總録治脾疸口甘中滿蘭草湯蘭草一兩切上一味以水三盞煎取一盞半去滓分溫三服不拘時候張云蘭草性味甘寒其氣清香能生津止渴潤肌肉故可除陳積蓄熱之氣簡按李杲試效方有蘭香飲子蘭室祕藏名甘露膏治消渴飲水極甚善食而瘦王遜藥性纂要云素問所謂治之以蘭除陳氣者幽蘭建蘭之葉非蘭草澤蘭也建蘭幽蘭古所無此襲寇宗奭陳嘉謨之謬説耳口苦取陽陵泉此六字宜據新校正而刪之諸家費解夫肝者中之將也甲乙肝上有膽者中精之府六字與新校正所援異靈師傳篇云肝主為將六節臟象論云十二臟皆取決於膽本輸篇云肝合膽膽者中精之府五行大義引河圖文同蓋本節主膽而言甲乙文為正焉聖濟總録作夫膽為中正之官清淨之腑十一臟之所取決咽為之使咽為之使張云足少陽之脈上挾咽足厥陰之脈循喉嚨之後上入頏顙是肝膽之脈皆會於咽故咽為之使膽虛氣上溢甲乙無虛字吳虛作噓云噓氣氣上溢也汪昂云吳改膽虛作膽噓欠通氣上溢即噓字之義馬雲此膽氣以煩勞而致虛張云數謀慮不決則肝膽俱勞勞則必虛虛則氣不固故膽氣上溢簡按數謀慮不決宜膽氣怫鬱甲乙似是聖濟總録云數謀不斷則清淨者濁而擾矣故氣上溢而為口苦也經所謂是動則病口苦以氣為是動也有方附於四十二卷衛生寶鑑有龍膽瀉肝湯與東垣方不同膽募俞吳云膽募日月穴也膽俞在脊十椎下兩旁各一寸五分簡按甲乙云日月膽募也在期門下五分馬以為期門誤王注腹募背俞原於六十七難治在陰陽十二官相使中治吳改作論注云即靈蘭祕典所論也張同簡按王云今經已亡未知何是有癃者吳云癃不得小便也癃而一日數十溲者由中氣虛衰欲便則氣不能傳送出之不盡少間則又欲便而溲出亦無多也簡案口問篇云中氣不足溲便為之變陳氏三因方云淋古謂之癃名稱不同也癃者罷也淋者滴也今名雖俗於義為得此説非是戴侗六書故曰淋癃實一聲也漢殤帝諱淋故改癃為隆玉改隆慮縣為林慮縣蓋內經本草經皆用癃字作淋皆後人所改身熱如炭頸膺如格吳云身熱如炭胃主肌肉故也頸膺如格胃脈循喉嚨下乳內廉故也張云如格者上下不通若有所格也喘息氣逆馬雲其息喘其氣甚逆張云喘息者呼吸急促也氣逆者治節不行也細微如發甲乙無微字病在太陰其盛在胃頗在肺馬雲此病在太陰經之不足觀氣口微細之脈可知也其氣盛在於胃觀人迎躁盛之脈可知也六節臟象論靈樞終始禁服等篇皆以人迎三盛為病在陽明所以謂之其盛在胃也至於喘息氣逆頗關在肺然肺虛也非盛也特邪氣耳簡按參之於王説義尤明晰吳以太陰為脾張則為脾肺二臟與經旨左矣此所謂得五有餘甲乙無所謂二字五病之氣有餘也甲乙無五字此其身不表不里亦正死明矣甲乙無身字正死作死證巔疾張云即癲癇也本經巔癲通用於此節之義可見諸家釋為頂巔者非蓋兒之初生即有病癲癇者今人呼為胎里疾者即此未聞有胎病頂巔者也母有所大驚甲乙母下有數字張兆璜云胎中受病非止驚癇妊娠女子飲食起居大宜謹慎則生子聰俊無病長年高雲其氣上不下則精與驚氣並居既生以後故令子發為癲疾也此癲疾為先天奇病而屬於不治也痝然痝龐厖同玉篇大也乃狀浮起貌也龐又龐雜之龐故王兼二義而釋之詳見於評熱病論馬本痝作龎身無痛者吳云以其病不繫於表故身無痛腎風馬雲腎屬水故腎虛則水搐腎不宜感風故風在則體浮風熱則脈大風與水搏則脈緊脹滿則薄脾而不能食雖食亦少水熱穴論云腎者胃之關也關門不利故聚水而成其病則欲其能食也難矣高雲水因風動故名腎風簡按王注風論云腎臟受風則面痝然而腫而張則云非外感之風乃風由內生者內風之説未經見則不可從驚已心氣痿者死吳云腎邪陵心令人善驚若驚已而心氣猶壯是謂神正生之徒也驚已而心氣痿者是謂神亡死之屬也志云腎風非死證此病生在腎逆傳其所勝故死簡按痿馬張仍王義大奇論篇第四十八吳云前有奇病論此言大奇論者擴而大之也高本刪論字蓋以無問答之語也皆實即為腫張云滿邪氣壅滯而為脹滿也此言肝腎肺經皆能為滿若其脈實當為浮腫而辨如下文也簡按王以滿為脈氣滿實考文理張注為勝王注癰腫必是壅腫傳瀉之訛耳肺之雍馬雲按甲乙經雍作癰肺肝腎三經不宜生癰此雍斷宜作壅蓋言氣之壅滯也吳張並云雍壅同喘而兩胠滿吳本胠作脅張云胠音區腋下脅也腳下至少腹簡按馬志據原文不改腳為胠卻非跛易偏枯張云或為跛或掉易無力或偏枯不用是皆腎經壅滯不能運行所致簡按易是痿易狂易之易謂跛而變易其常王注恐謬心脈滿大張云火有餘也心主血脈火盛則血涸故癇瘛筋攣癇瘛筋攣甲乙瘛作痓張云癇音間癲癇也瘛音熾抽搐也攣音戀拘攣也高雲神氣不通於心包則癇神氣不行於骨節則瘛癇則筋攣於內瘛則筋攣於外也簡按下文云二陰急為癇厥通評虛實論云刺癇驚脈五靈經筋篇云癇瘛及痙寒熱病篇云暴攣癇眩足不任內經言癇者如此詳見通評虛實論注玉機真臟論云筋脈相引而急病名曰瘛王注筋脈受熱而自跳掣故名曰瘛靈邪氣臟腑病形篇云心脈急甚者為瘛瘲肝脈微澀為瘛攣筋痹瘛瘲詳見診要經終篇注並與本篇互發肝脈小急張云小為血不足急為邪有餘故為是病夫癇瘛筋攣一也而心肝二經皆有之一以內熱一以風寒寒熱不同血衰一也故同有是病肝脈騖暴熊音騖音務奔也志云騖疾走也又亂馳也簡按後漢光武帝紀注直騁曰馳亂馳曰騖志注據此有所驚駭馬雲金匱真言論云肝之病發驚駭脈不至若喑張云此特一時之氣逆耳氣通則愈矣吳云脈不至在諸病為危劇若其暴喑失聲則是肝木厥逆氣壅不流故脈不至耳不必治之厥還當自止簡按志圈脈上別為一章非小急不鼓皆為瘕馬雲瘕者假也塊似有形而隱見不常故曰瘕脈本急矣而其急中甚小又不鼓擊於手則是沉也必有積瘕在中故脈不和緩耳今三部之脈如此皆可以即其本部而決其為瘕也簡按巢源云瘕假也謂虛假可動也又云謂其有形假而推移也蓋癥瘕分而言之癥積也瘕聚也然癥積亦可稱瘕氣厥論虙瘕陰陽類論血瘕邪氣臟腑病形篇水瘕水脹篇石瘕厥病篇蟲瘕傷寒論固瘕神農本經蛇瘕倉公傳遺積瘕蟯瘕之類是也説文云瘕女病也蓋依於骨空論女子帶下瘕聚誤為此説耳郭璞注山海經瘕疾云蟲病也此亦因有蟲瘕蟯瘕而言並不可從李氏必讀云瘕遐也歷年遐遠之謂也歷年遐遠之病豈止於瘕聚乎石水張云此言水病之有陰陽也吳云沉脈行肌肉之下也石水者水凝不流結於少腹其堅如石也腎肝在下居少腹之分脈沉為在裡故腎肝俱沉為石水之象馬雲水氣凝結如石之沉故名為石水也陰陽別論有陰陽結邪多陰少陽名曰石水小腹腫靈邪氣臟腑病形篇有腎脈微大為石水起臍以下至小腹睡睡然上至胃脘死不治水脹篇黃帝有石水之問而岐伯無答必有脫簡皆是積聚之類簡按金匱要略云石水其脈自沉外證腹滿不喘尤怡注云石水水之聚而不行也因陰之盛而結於少腹故沉而不喘吳以為堅如石誤張氏醫通云腎肝並沉為石水真武湯主之風水馬雲蓄水冒風發為腫脹名曰風水見評熱論水熱穴論靈論疾診尺篇張云風水者遊行四體浮泛於上也並小弦欲驚張云肝腎並小真陰虛也小而兼弦本邪勝也氣虛膽怯故為欲驚皆為疝馬雲或結於少腹或結於睪丸或結於睪丸之上下兩旁腎肝二脈經歷之所皆是也積土以高大者曰山疝有漸積之義故名簡按説文云疝腹痛也劉熙釋名云心痛曰疝疝詵也先詵詵然上而痛也又曰疝詵也詵詵引小腹急痛顏師古急就篇注云疝腹中氣疾上下引也金匱要略云腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝樓氏綱目云疝名雖七寒疝即疝之總名也心疝高雲心脈搏滑急則心氣受邪故為心疝脈要精微論曰診得心脈而急病名心疝少腹當有形也肺疝志云肺脈當浮而反沉搏是肺氣逆聚於內而為肺疝矣高雲肺疝氣疝也簡按四時刺逆從論肺風疝有目無證不可得而知史倉公傳云氣疝客於膀胱難於前後溲而溺赤巢源氣疝乃七疝之一腹中乍滿乍減而痛名曰氣疝高以為氣疝者蓋肺主氣故也三陽急為瘕三陰急為疝志云此言疝瘕之病病三陰三陽之氣而見於脈也子繇曰瘕者假也假物而成有形疝字從山有艮止高起之象故病在三陽之氣者為瘕三陰之氣者為疝玉師曰瘕在腸胃之外故三陽急疝病五臟之氣故三陰急馬雲王注分瘕為血疝為氣者未的當知二病為氣血相兼也簡按三陽三陰據下文二陰二陽王注為是諸家亦仍王注二陰急為癇厥馬雲二陰者心也其脈來急正以心經受寒寒與血搏發而為癇為厥志云癇厥者昏迷僕撲卒不知人簡按癇厥唯是癇病志注為長二陽急為驚張云木邪乘胃故發為驚陽明脈解篇曰胃者土也故聞木音而驚者土惡木也是亦此義高本以二陰以下十一字移於前節若喑不治自已下非為腸澼久自已吳云外鼓者脈形向外而鼓也外鼓有出表之象故不必危之久當自止也馬雲此言心肝脾腎皆為腸澼而有死生之分者以脈與證驗之也腸澼者腸有所積而下之也然有下血者即今所謂失血有下白沫者即今所謂去積有下膿血者即今之所謂痢病在於腸均謂之腸澼也簡按高雲腸澼泄瀉也誤詳見於通評虛實論肝脈小緩張云肝脈急大則邪盛難愈今脈小緩為邪輕易治也血溫身熱者死張云腎居下部其脈本沉若小而搏為陰氣不足而陽邪乘之故為腸澼下血若其血溫身熱者邪火有餘真陰喪敗也故當死心肝澼高雲言心脈肝脈不和而病腸澼也亦如腎脈之腸澼下血也志云此承上文而言陰血盛者雖受陽薄尚為可治蓋重陰血以待陽也夫心主生血肝主藏血是以心肝二臟受陽盛之氣而為腸澼者亦下血如二臟同病則陰血盛而可以對待陽邪故尚為可治之證簡按諸家仍王義志意略異王注似妥皆鬲偏枯吳云凡脈貴於中和胃脈沉鼓澀偏於陰也外鼓大偏於陽也心脈小堅急亦偏於陰也鬲陰陽閉絶也偏枯半身不用也以其陰陽偏勝故為證亦偏絶也張云胃為水穀之海心為血脈之主胃氣既傷血脈又病故致上下痞鬲半身偏枯也簡按馬雲為膈證與偏枯高改皆作背並非志云鬲者里之鬲肉尤誤張氏醫通趙以德云胃與脾為表裡胃之陽虛則內從於脾從脾則脾之陰盛故胃脈沉鼓澀澀者少血多氣之診也胃之陽盛則脾之陰虛虛則不得與陽主內反從其胃越出部分而鼓大於臂之外大者多氣少血之候也心者元陽君主之宅生血生脈今因元陽不足陰寒乘之故心脈小堅急小者陽不足堅急者陰寒之象也夫心胃之三等脈見一即為偏枯心乃天真神機開發之本胃乃穀氣充天真之原一有相失則不能制其氣而宗氣散故分布不周不周經脈則偏枯不周五臟則喑喑者腎與包絡內絶也男子發左女子發右張云男子左為逆右為從女子右為逆左為從此逆證也志云從內而發於外故曰發簡按張注本於玉版論為是不喑張云若聲不喑舌可轉則雖逆於經未甚於臟乃為可治而一月當起若偏枯而喑者腎氣內竭而然其病必甚如脈解篇曰內奪而厥則為喑俳此腎虛也正以腎脈循喉嚨挾舌本故耳簡按王注原於奇病論重身九月而喑之義而釋之恐謬其從者張云若男發於右而不發於左女發於左而不發於右皆謂之從從順也高雲玉版論要曰男子右為從女子左為從其從者謂男子發於右女子發於左不同於上文之發也簡按王注左右互錯馬吳志同俱失經旨血衄甲乙作衄血張云搏脈弦強陰虛者最忌之凡諸人血鼻衄之疾其脈搏而身熱真陰脫敗也故當死懸鉤浮張云失血之證多陰虛陰虛之脈多浮大故懸鉤而浮乃其常脈無足慮也懸者不高不下不浮不沉如物懸空之義脈雖浮鉤而未失中和之氣也簡按懸乃懸空無根之象鉤浮乃陽盛陰虛之候十五難云脈之來疾去遲故曰鉤呂廣注云陽盛其脈來疾陰虛脈去遲也脈從下上至寸口疾還尺中遲環曲如鉤不似脈弦強而搏擊於指此乃亡血家之常脈若釋懸而為不浮不沉則於鉤浮之浮其謂之何吳既誤而張襲之耳吳又以常脈為平人不病常脈更誤如喘馬雲喘者氣湧而不和脈體如之張云如氣之喘言急促也高雲喘疾促不倫也脈至如喘失其常度故名曰暴厥申明暴厥者一時昏憒不知與人言簡按如甲乙作而如而通用出於莊七年左傳杜注下如數同浮合張云此下皆言死期也高雲浮合於皮膚之上如湯沸也諸家依王注豫不足也熊音豫與同微見馬雲微之為言僅也吳云始見也言始見此脈便期九十日死若見之已久則不必九十日矣所以在九十日者以時更季易天道變而人氣從之也志云士宗曰微對顯言微現此脈期以九十日而死若顯露之不逾時日矣後之交漆亦猶是也高雲微於皮膚之上見此數極之脈中按求之則不見也故至九十日而死經脈應月一月一周九十日者三周也簡按士宗即是高世栻前説似是豫奪也吳云奪失也草乾馬雲心精被奪火王於夏猶有可支至秋盡冬初心氣全衰故曰草乾而死如散葉吳云飄零不定之狀也木遇金而負遇秋而凋故深秋則死志云飄零虛散之象簡按今甲乙作叢棘省客吳云省問之客張云或去或來也塞者或無而止鼓者或有而搏是腎原不固而無所主持也懸去棗華張云棗華之候初夏時也懸者華之開去者華之落言於棗華開落之時火王而水敗馬雲懸去猶俗云虛度也吳移懸去於鼓字下簡按張注穩妥如丸泥張云泥彈之狀堅強短澀之謂志云往來流利如珠曰滑如丸泥者無滑動之象榆莢落張云榆錢也春深而落木王之時土敗者死馬雲秋冬之交也簡按本草蘇頌云榆三月生莢李時珍云未生葉時枝條間先生榆莢形狀似錢而小色白成串俗呼榆錢據此則張注為勝如橫格張云如橫木之格於指下長而且堅是為木之真臟而膽氣之不足也禾熟於秋金令王也故木敗而死簡按説文格木長貌王釋格為木蓋本於此若張注為橫木之格於指下則木之義於經文中無所取不知其意果何如張注全襲吳之誤如弦縷馬雲如弓弦之縷猶俗之所謂絃線也主堅急不和奇病論云胞脈者繫於腎蓋婦人受胎之所即胞絡宮張云如弦之急如縷之細真元虧損之脈也胞子宮也命門元陽之所聚也胞之脈繫於腎腎之脈系舌本胞氣不足當靜而無言今反善言是陰氣不張而虛陽外見時及下霜虛陽消敗而死矣如交漆馬吳高並云交當作絞志云交絞也張云如寫漆之交左右傍至纏綿不清也簡按左右傍至也下恐脫是其豫不足也一句故馬雲臟腑俱虛大體皆弱吳云陰陽亂也志云衝任之脈絶也高雲復申明胞精不足之意率屬臆解今甲乙漆作棘三十日死吳云月魄之生死以三十日為盈虛故陰氣衰者不能過其期也高雲經脈一周也少氣味韭英而死馬以少氣為句注云太陽為三陽三陽主於外今精氣不足故浮鼓肌中而欲出於外其勢不能入於陰也主少氣正以脈湧則氣乏也韭有英時冬盡春初也水已虧極安能至於盛春耶張同吳云少氣氣不足也少味液不足也韭至長夏而英長夏屬土太陽壬水之所畏也故死高雲氣為陽味為陰太陽有寒熱陰陽之氣太陽虛故少氣味英盛也韭英乃季春土王之時韭英而死土剋水也簡按少氣味未詳姑從馬説韭英吳高似是如頽土之狀志云頽土傾頽之土也脾主肌肉如頽土而按之不得者無來去上下之象高同五色先見黑志云土位中央而分主於四季當五色俱見而先見黃若五色之中而先見黑是土敗而水氣乘之矣白壘甲乙作白纍馬雲壘當作藟詩云綿綿葛藟藟亦葛之屬吳云壘者癮疹之高起者北方黑色主收藏西方白色主殺物故死張云壘藟同即蓬藟之屬藟有五種而白者發於春木王之時土當敗也簡按壘藟通不必改爾雅諸慮山櫐郭注云今江東呼櫐為藤似葛而粗大廣雅云藟藤也一切經音義引集訓云藤藟也藟謂草之有枝條蔓延如葛之屬也吳越間謂之藤本草馬志云藟者藤也則蓬藟明是藤蔓矣據此則藟所指不一未知白壘是何物張説難信吳讀為㾦㿔之㿔亦恐非志云玉師曰以經水如浮波心脈如火薪肝脈如散葉胃脈如泥丸太陽如湧泉肌脈如頽土皆以五行之氣效象形容蓋此乃五臟虛敗之氣變見於脈非五臟之病脈也懸雍高雲雍作癕虛腫之癕上浮本大也簡按諸注並不允蓋雍甕通山海經懸甕之山晉水出焉郭璞注云山腹有巨石如甕形因以為名甕亦作甕説文罌也廣雅瓶也蓋取其大腹小口而形容浮揣切之益大之象也甲乙雍作癰非浮揣切之益大馬雲懸雍本浮也揣切之際其脈益大而全無沉意張云浮短孤懸有上無下也志云揣度也先輕浮而度之再重按而切之其本益大簡按志注與經旨相反不可從吳揣下補無力二字贅十二俞之豫不足也甲乙豫上有氣字張云俞皆在背為十二經臟氣之所繫水凝而死陰氣盛而孤陽絶也水凝而死甲乙凝作凍如偃刀張云臥刀也浮之小急如刀口也按之堅大急如刀背也高雲偃息也刀金器也簡按高説未知何謂菀熟甲乙作寒熱諸本熟作熱張云此以五臟菀熱而發為寒熱陽王則陰消故獨並於腎也腰者腎之府腎陰既虧則不能起坐立春陽盛陰日以衰所以當死菀郁同簡按吳云熟熱之深謬甚如丸滑不直手張云如丸短而小也直當也言滑小無根而不勝按也馬吳並云直值同甲乙作著棗葉生而死張云大腸應庚金棗葉生初夏火王則金衰故死馬雲棗葉之時則先棗華之候矣如華甲乙作如春馬雲是似草木之華虛弱而按之無本也善恐不欲坐臥馬雲令人善恐以心氣不足也不欲坐臥以心氣不寧也張云小腸不足則氣通於心善恐不欲坐臥者心氣怯而不寧也行立常聽志云如耳作蟬鳴或如鐘磬聲皆虛證也季秋而死馬雲小腸屬火火王猶可生至季秋則衰極而死矣志云遇金水生旺之時而死脈解篇第四十九馬雲按此篇論病大抵出於靈樞經脈篇諸經為病篇內曰所謂者正以古有是語而今述之也高雲六氣主時始於厥陰終於太陽此舉三陽三陰經脈之病則太陽主春正月為春之首太陽為陽之首也少陽主秋九月為秋之終少陽為陽之終也陽明主夏五月為夏之中陽明居陽之中也三陰經脈外合三陽雌雄相應太陰合陽明故主十一月十一月冬之中也少陰合太陽故主十月十月冬之首也厥陰合少陽故主三月三月春之終也太陰為陰中之至陰故又主十二月十二月陰中之至陰也錯舉六經之病復以三陽三陰主四時之月而錯綜解之所以為脈解也腫腰脽痛脽熊音誰張同馬吳音疽張云尻臀也高本腫一字句云六元正紀大論曰太陽終之氣則病腰脽痛故太陽經脈之病有腫以及腰脽痛也簡按脽從肉音誰其音疽者睢鳩之睢從且馬吳誤脽説文尻也漢東方朔傳連脽尻注臀也蓋脽從肉故王釋為臀肉此四字即與厥論腫首頭重著至教論干嗌喉塞字法正同高注非正月太陽寅志云太陽為諸陽主氣生於膀胱水中故以太陽之氣為歲首楊慎丹鉛録云考緯書謂三皇三世伏羲建寅神農建醜黃帝建子至禹建寅宗伏羲商建醜宗神農周建子宗黃帝所謂正朔三而改也簡按此云正月太陽寅明是黃帝建寅而非建子緯書之言難信據也楊氏好讀內經盍論及於此耶病偏虛為跛者高本病上有所謂二字云舊本所謂二字誤傳出也下今改正偏虛猶偏枯大奇論云腎雍則髀䯒大跛易偏枯故申明所謂病偏虛為跛者東解地氣而出也東宋本作凍馬吳高志並同解下句吳刪而字云凍解解凍也高雲地凍始解地氣從下而上出也張云正月東風解凍簡按東作凍則而字不妥蓋謂陽氣自東方解地氣之凍而上出也所謂偏虛者所謂二字從高而刪之為是盛上而躍故耳鳴也高雲經筋篇云手太陽之筋其病應耳中鳴故申明所謂耳鳴者乃陽氣萬物盛上而躍躍則振動故耳鳴也狂巔疾張云巔癲同按經脈篇足太陽經脈條下作癲蓋古所通用也所謂甚者言陽邪盛也陽邪實於陽經則陽盡在上陰氣在下上實下虛故當為狂癲之病浮為聾高雲經脈篇曰手太陽之脈入耳中所生病者耳聾故申明所謂浮為聾者是逆氣上浮而為聾皆在氣也簡按馬雲脈浮則聾非故為喑也張云聲由氣發氣者陽也陽盛則聲大陽虛則聲微若陽盛已衰故喑啞不能言也內奪吳云內謂房勞也奪耗其陰也喑俳張云俳音排無所取義誤也當作痱正韻音沸廢也內奪者奪其精也精奪則氣奪而厥故聲喑於上體廢於下元陽大虧病本在腎腎脈上挾舌本下走足心故為是病高雲俳痱同音肥喑痱者口無言而四肢不收故曰此腎虛也簡按樓氏綱目引本節及王注俳作痱張注蓋原於此靈熱病篇云痱之為病也身無痛者四肢不收志亂不甚其言微知可治甚則不能言不可治也樓氏綱目云痱廢也痱即偏枯之邪氣深者痱與偏枯是二疾以其半身無氣營運故名偏枯以其手足廢而不收或名痱或偏廢或全廢皆曰痱也漢賈誼傳云闢者一面病痱者一方病師古注闢足病痱風病也本出於説文由此觀之痱即仲景中風篇所謂邪入於臟舌即難言者蓋痱是病名偏風是所因偏枯是病證必非有別也吳云俳陽事廢也非聖濟總録有喑俳門載治舌喑不能言足廢不能用腎虛弱其氣厥不至舌下地黃飲子等方具於五十一卷少陰不至者厥也張云此釋上文內奪而厥之義也少陰者腎脈也與太陽為表裡若腎氣內奪則少陰不至少陰不至者以陰虛無氣無氣則陽衰致厥之由也簡按王注太陰之氣逆上而行可疑心之所表也馬雲膽之脈行於脅而心之脈出於腋為心之表故為心脅痛也張云少陽屬木木以生火故邪之盛者其本在膽其表在心表者標也簡按張注仍王義今從之九月陽氣盡高雲若九月之時陽氣已盡而陰氣方盛少陽火氣不盛不能為心之表故有心脅痛之病也陰氣藏物也張云陰邪凝滯藏伏陽中喜靜惡動故反側則痛高雲經脈篇曰足少陽病不能轉側故申明所謂不可反側者九月陰氣方盛陰氣所以藏物也物藏則不動故少陽經脈有不可反側之病也草木畢落而墮文選潘嶽寡婦賦木落葉而隕枝李善注云毛萇詩傳曰隕墜也千金方蒲黃湯主療小兒落床墮地氣盛而陽之下長吳云氣盛氣盛於陰也之往也下下體也陽之下謂陽氣往下如少陽之脈出膝外廉行於兩足是也長生長也陽為動物長於兩足故令躍相薄張云薄氣相薄也吳云薄摩蕩也水火相惡高雲厥為陰為水乃水火相惡又木能生火故聞木音則惕然而驚也簡按本節所解與陽明脈解篇異義所謂客孫脈云云高雲出處未詳大抵皆陽明之病孫脈孫絡脈也其孫絡太陰也高雲陽明之脈不從下行而並於上並於上者則其孫絡之脈合脾之大絡而為太陰也陽明並於上故頭痛鼻鼽孫絡太陰故腹腫也簡按此一句難通故吳改作其頭之孫絡腹之太陰也十字張以為太陰者言陰邪之盛非陰經之謂俱臆見也高注稍妥姑從之上走心而為噫馬雲宣明五氣論曰心為噫又口問篇云寒氣客於胃厥逆從下上散復出於胃故為噫夫素問言心而靈樞言胃則此篇兼言陰氣走於胃胃走於心見三經相須而為噫也三經謂心脾胃故嘔也張云脾胃相為表裡胃受水穀脾不能運則物盛滿而溢故為嘔得後與氣熊音得後謂得大便也氣謂快氣馬雲後者圊也氣者肛門失氣也張同云陽氣出則陰邪散故快然如衰一陽下動冬至候也故應十一月之氣簡按吳云氣謂噯氣誤陽氣皆傷吳云傷者抑而不揚之意高雲承秋之肅殺也嘔咳上氣喘也張云陽根於陰陰根於陽互相倚也若陰中無陽沉而不升則孤陽在上浮而不降無所依從故為嘔咳上氣喘也按前章列本節義於手太陰肺病條下此則言於腎經正以肺主氣腎主精精虛則氣不歸元即無所依從之義簡按此原於吳注而更詳焉色色馬高雲二字衍文吳改作邑邑云愁苦不堪貌張云當作邑邑不安貌秋氣至微霜下萬物俱衰陰陽未定故內無所主而坐起不常目則䀮䀮無所見以陰肅陽衰精氣內奪故應深秋十月之候簡按邑邑與悒悒通史記商君傳云安能邑邑待數十百年悒説文不安也張注本此志載高説云色色猶種種也色色不能猶言種種不能自如也此解不通今從張注陰陽內奪志云秋氣始至則陽氣始下而未盛於內陰氣正出而陰氣內虛則陰陽之氣奪於內矣煎厥吳云陽氣不治者陽氣不舒也肝氣當治而未得者木性不得條達也肝志怒故善怒煎厥者怒志煎熬厥逆也張云按煎厥一證在本篇言陽虛陰盛在生氣通天論言陰虛陽盛可見煎厥有陰陽二證簡按此與少陰不相干涉乃屬少陽厥陰之病則為可疑諸家不言及於此者何高獨以少陰君火之陽氣不治而釋之此乃運氣家之言竟不免牽強焉張以陽氣不治為陽虛不可從陽氣入吳云陽邪入薄於腎故善恐張云陰氣將藏未藏而陽邪入之陰陽相薄則傷腎而為恐馬雲宣明五氣篇曰精氣並於腎則為恐也胃無氣故惡聞食臭也張云胃無氣胃氣敗也胃氣所以敗者腎為胃關腎中真火不足不能溫養化原故胃氣虛而惡聞食臭也此即經脈篇飢不欲食之義故變於色也張云色以應日陽氣之華也陰勝於陽則面黑色變故應秋氣此即經脈篇面如漆柴之義高雲地色地蒼之色如漆柴也因秋時肅殺之氣內奪其精華故至冬則變於色而黑如地色也咳則有血者陽脈傷也高雲經脈篇云腎病咳唾則有血故申明所謂咳則有血者乃陰血乘於陽位陽脈不歸於陰故曰陽脈傷也陰血乘陽脈不歸陰則陽脈滿十月之時陽氣未盛於上未當盛時而脈滿則陽氣內逆故滿則咳咳則有血而且見於鼻也張云陽脈傷者上焦之脈傷也蓋腎脈上貫肝膈入肺中故咳則血見於口衄則血見於鼻也㿗疝高雲猶㿉疝也言高腫也經脈篇云厥陰病丈夫㿉疝婦人少腹腫簡按王氏資生經云千金曰氣衝主㿗明堂下經曰治㿉疝則是㿗即㿉疝也巢源云㿉者陰核氣結腫大也詳見於陰陽別論頽疝注厥陰者辰也張云辰季春也五陽一陰陰氣將盡故屬厥陰陰邪居於陽末則為㿗疝少腹腫故應三月之氣三月一振吳云振物性鼓動也張云陽氣振也高雲經脈篇云厥陰病腰痛不可以俯仰故申明所謂腰脊痛不可以俯仰者三月之時振動發生草木向榮而華秀故三月一振榮華生機雖盛猶未暢達故萬物一皆俯而不仰也一俯而不仰也馬雲凡俯者不可以仰仰者不可以俯故肝應其時腰痛之病俯仰似難也所謂㿗癃疝膚脹高雲出處未詳大抵皆厥陰之病㿗㿗疝也癃溺閉也㿗癃疝膚脹者陰器腫不得小便則膚脹也簡按靈水脹篇云膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹皮不變此其候也曰陰亦盛曰吳本作由張云此復明癃疝腫脹之由在陰邪盛也陰盛則陽氣不行故為此諸證張兆璜云曰所謂曰者者是設為之問辭下文是答辭故增一曰字以別之簡按上文並無增一曰字者特於末節而有之可疑吳本似是而吳云陰亦盛者言陽固盛而陰亦盛也此注恐非亦字承上文㿗疝及腰脊痛而下之蓋與平人氣象論一呼脈再動一吸脈亦再動之亦同義嗌乾馬雲陰陽相薄而在內為熱中在上為嗌乾也高雲經脈篇云足厥陰病甚則嗌乾手厥陰病心中熱刺要論篇第五十馬雲刺要者刺針之要法故名篇吳云要至約之理也各至其理志云理者皮膚肌肉之文理無過其道張云應淺不淺應深不深皆過其道也高雲無過其皮肉脈骨之道中其道毋容過也毫毛腠理志云毫毛腠理者鬼門元府也高雲毫毛中之腠理也簡按文選西京賦注引聲類及廣韻云毫長毛也志玄府之解未為得王注詳焉秋病溫瘧甲乙瘧下有熱厥二字志云肺主秋收之令秋時陽氣下降陰氣外出妄動其肺則收令化薄陰陽之氣反相得於外而為溫瘧矣動謂動其臟氣也溯溯然甲乙作淅淅然志云逆流而上曰溯溯溯然者氣上逆而寒栗也簡按溯溯然於義難協今從甲乙而改之皮部論溯然甲乙又作淅然煩不嗜食甲乙煩下有滿字吳云脾氣不運則中氣不化故令煩脾病則不磨故令不嗜食冬病脹腰痛吳云冬月無以奉藏而病脹與腰痛矣銷鑠胻酸甲乙作消濼高雲酸作痠吳云銷鑠者骨髓日減如五金遇火而銷鑠也簡按枚乘七發雖有金石之堅猶將銷鑠而挺解也李善注云賈逵國語注曰鑠銷也甲乙消濼蓋與骨空論淫濼同義金匱虛勞篇足酸削此二字本見於周禮鄭注巢源作痠𤺊知酸痠通用不必改痠不去矣馬雲不能行動而去也簡按三部九候論脫肉身不去者死王注云猶行去也刺齊論篇第五十一馬雲齊者後世劑同刺以為劑猶以藥為劑故名篇簡按一切經音義云劑限考聲云分段也韻詮云分劑也三蒼云分齊也知是齊劑同限劑分劑之義蓋刺之淺深有限有分故曰刺齊吳高如字讀為齊一之謂非刺骨者無傷筋云云高雲欲知其分必先知其非分如刺骨者刺入骨分無傷其筋刺筋者刺入筋分無傷其肉刺肉者刺入肉分無傷其脈脈有絡脈有經脈上篇脈居肉後經脈也此篇脈居肉先絡脈也刺脈者刺入脈分無傷其皮此言刺宜深者勿淺淺則非分矣簡按下文云刺肉無傷脈者至脈而去不及肉也即脈淺肉深與前篇刺肉無傷脈義相乖故高有經脈絡脈之説然經文無明據恐是兩篇各一家之言高注似強解刺皮者無傷肉云云高雲以上文層次言之當云刺皮者無傷脈今不言脈者以脈不止絡脈復有經脈絡脈在肉前經脈居肉後言肉而脈在其中故曰刺皮者刺入皮分無傷其肉刺肉者刺入肉分無傷其筋刺筋者刺入筋分無傷其骨此言刺宜淺勿深深則非分矣簡按此亦似牽強然從前諸家順文解釋無於經文參差處而致思者如高可謂善讀古書者矣至筋而去不及骨也張云病在骨者直當刺骨勿傷其筋若針至筋分索氣而去不及於骨則病不在肝攻非其過是傷筋也簡按以下三項宜以此例焉馬雲此明言上文前四句之義也至脈而去不及肉也盧冶云脈在肉中肉在溪谷脈有脈道理路各別者也所謂至脈而去不及肉者謂刺在皮膚絡脈之間不及里之筋骨非針從脈而再入於肉也是以略去刺脈無傷肉句者使後學之意會也簡按是屬影撰然高注全本於此要之上文宜云刺皮者無傷脈刺脈者無傷肉而不及之至於此亦無傷脈刺脈之言實可疑焉所謂刺皮無傷肉者張云刺皮過深而中肉者傷其脾氣簡按以下二項宜以此例焉馬雲此明言首節末三句之義也刺禁論篇第五十二禁數志云數幾也言所當禁刺之處有幾也高雲數條目也帝承上二篇之意謂刺要刺齊其中必有所禁故願聞禁數要害高雲言各所要亦各有所害當詳察也志云五臟有緊要為害之處要害二字當知非刺中五臟顧炎武日知録云南越尉他傳發兵守要害處按漢書西南夷傳注師古曰要害者在我為要於敵為害也此解未盡要害謂攻守必爭之地我可以害彼彼可以害我謂之害人身亦有要害素問岐伯對黃帝曰脈有要害後漢來歙傳中臣要害肝生於左肺藏於右高雲人身面南左東右西肝主春生之氣位居東方故肝生於左肺主秋收之氣位居西方故肺藏於右心部於表腎治於裡志云部分也心為陽臟而主火火性炎散故心氣分部於表腎為陰臟而主水水性寒凝故腎氣主治於裡脾為之使高雲脾土王於四季主運行水穀以溉五臟故為之使志云脾主為胃行其津液以灌四旁故為之使胃為之市志云心為陽中之太陽故部於表腎為陰中之太陰故治於裡蓋以四臟之氣分左右表裡上下脾胃居中故為之市膈肓吳云膈膈膜也肓膈上無肉空處也志云膈膈膜也內之膈肉前連於胸之鳩尾旁連於腹脅後連於脊之十一椎肓者即募原之屬其原出於臍下名曰脖胦高雲肓臍旁肓俞穴也簡按吳注腹中論云腔中無肉空隙之處名曰肓又注痹論云肓腔中空虛無肉之處也張則襲其説云肓者凡腔腹肉理之間上下空隙之處皆謂之肓並因誤讀王注云布散於胸腹之中空虛之處熏其肓膜王意豈以肓為空虛之處乎而張於本節則全依楊義楊注原於説文蓋古來相傳之説宜無異論志云募原之屬高雲肓俞皆臆造已當與舉痛論及痹論參考小心馬雲心之下有心包絡其形有黃脂裹心者屬手厥陰經自五椎心俞之下而推之則包絡當垂至第七節而止蓋心為君主為大心而包絡為臣為小心也吳云脊共二十一節此言七節下部之第七節也其旁乃兩腎所繫左為腎右為命門命門者相火也相火代心君行事故曰小心張同昂云旁者兩腎也中者命門也按心者性之郛腎者命之根兩腎中間一點真陽乃生身之根蒂義取命門蓋以此也中有相火能代心君行事故曰小心楊上善云云吳亦主其説蓋心君無為吾人一日動作云為皆命門之相火也馬注云云若依此解旁字似無著落志云七節之旁膈俞之間也小微也細也中有小心者謂心氣之出於其間極微極細高同簡按甲乙亦作志心王似指心包絡楊則為十四椎旁腎俞而又云得名為志者心之神也而陰陽類論上空志心王以為小心楊以為入腎志於心神之義楊注彼此義異未太明晰且凡脊椎從上數而至下未有從下數而云某椎者亦覺不允背腧篇心俞在五焦當作椎下同之間膈俞在七焦之間而心包俞經文無所考銅人等以心椎旁為厥陰俞王馬未為得矣吳張雖主楊然命門昉見於難經相火固是運氣家之言並非本經之義志高杜撰無論矣竊疑雲七節之旁云上空既非心包又非腎必有別所指也舉數説以俟考從之有福逆之有咎馬雲順其所而不傷則有福逆其所而傷之則有咎所謂要害之當察者以此刺中肝五日死馬雲五日疑作三日乃木生數也高同其動為語張云無故妄言也簡按宣明五氣篇云心為噫肝為語腎為嚏肺為咳脾為吞全本甲乙作欠非刺中肺三日死馬雲三疑為五王注釋診要經終篇以為金生數四日畢當至五日而死者是也高同刺中膽一日半死馬雲膽為六腑之一當別於五臟故另為一節一日半死以其為生數之半也張云凡十一臟者皆取決於膽是謂中正之官奇恆之腑傷之者其危極速嘔出於胃而膽證忌之木邪犯土見則死矣高雲邪氣臟腑病形篇云膽病者嘔宿汁故其動為嘔嘔膽氣虛也中大脈馬雲刺衝陽脈也衝陽穴為胃經之原傷寒論以為趺陽之脈高雲胃足陽明之脈下足跗其支者別跗上入足大指交於足太陰刺跗上刺胃脈也中大脈中傷大指之經脈也中大脈而血出不止則太陰之脈不能循大指而上故死簡按大脈蓋謂衝脈之別靈動輸篇云衝脈並少陰之經下入內踝之後入足下其別者斜入踝出屬跗上入大指之間注諸絡以溫足脛又逆順肥瘦篇云其前者伏行出跗屬下循跗入大指間滲諸絡而溫肌肉其已如此今刺而中傷之則所以致死也中去聲溜脈甲乙溜作流馬雲溜流同按本輸篇云溜於魚際則溜與流同所謂溜脈者凡脈與目流通者皆是也又按大惑論云五臟六腑之精皆上注於目而為之精論疾診尺篇云赤脈從上下者太陽病從下上者陽明病從外走內者少陽病此皆溜脈之義也吳張義同志云溜脈者脈之支別浮見於皮膚之間者也高雲陰陽相過之脈也簡按志高注未見所據今從馬義腦戶志云督脈從腦戶而上至於百會囟會乃頭骨兩分內通於腦若刺深而誤中於腦者立死舌下張云舌下脈者任脈之廉泉穴足少陰之標也中脈太過血出不止則傷腎腎虛則無氣故令人喑按憂恚無言篇曰足之少陰上繫於舌絡於橫骨終於會厭脈解篇曰內奪而厥則為喑俳此腎虛也然則喑本於腎無所疑矣馬雲王注以為脾脈者無義刺足下布絡中脈馬雲布絡者凡足之六經皆有絡脈也誤中其脈而血又不出則必邪不得散而為腫矣王注止以為然谷之中者鑿之甚也吳云浮淺散見之絡中脈則過於深矣簡按中王讀如字非為腫張云若血不出氣必隨針而壅故為腫也刺郤中大脈馬雲郤中之下有一中字去聲張云郤足太陽委中穴也刺委中而中其大脈傷陰氣於陽經故令人仆倒且脫色也簡按郤下句志高為浮郤穴非僕脫色吳云太陽為諸陽之會故令如此簡按經脈篇云甚者瀉之則悶悶甚則僕不得言悶則急坐之也俱是後世所謂針暈也詳見於針灸聚英等刺氣街中脈王注中如字諸家讀為去聲今從之為腫鼠僕甲乙僕作𪖈千金作鼷馬雲僕當作鼷刺氣街者血中其脈而血又不出則血氣並聚於中故內結為腫在鼠鼷之中也張同吳云僕僕也刺之中脈血不得出則為腫如鼠僕焉簡按馬注為是但僕不必改鼷鼷説文小鼠也𪖈玉篇鼠名巢源附骨疽候云産婦女人喜著鼠𦢂髂頭䏶膝間知是僕𦢂𪖈同義即鼠鼷也志高以為鼠鼷僕參非根蝕熊音蝕音食如蠶食葉張云乳房乃胸中氣血交湊之室故刺乳上之穴而誤中乳房則氣結不散留而為腫腫則必潰且並乳根皆蝕而難於愈也簡按根謂乳房之根非乳根穴吳云生膿根而內蝕非漢書西羌傳疽食浸淫莫知所限又後漢董卓傳潰癰雖痛勝於內食刺缺盆中內陷志云缺盆在喉旁兩橫骨陷中若缺盆然故以為名刺缺盆中者刺手陽明大腸脈也手陽明之脈下入缺盆絡肺下屬大腸內陷氣泄者脈內陷而氣反泄於內也針經曰人之所生成者血脈也故為之治針必大其身而圓其末令可以按脈勿陷以致其氣蓋刺之要氣至而有效若內陷而氣反下泄則為咳喘之逆證矣經云氣上衝胸喘不能久立病在大腸蓋大腸為肺之腑也簡按志仍王注缺盆中句吳馬張高依前例以為中其內陷之脈恐泥高雲刺之過深則為內陷下俱仿此刺手魚腹內陷志云魚腹在手大指下如魚腹之圓壯手太陰之魚際穴也肺主氣而與大腸為表裡脈內陷則血不得散氣不得出故為腫以上論手足頭項胸背皆有要害之處簡按諸家魚腹句內陷句為是刺陰股中大脈張云陰股大脈足太陰箕門血海之間吳云脾腎肝三脈皆行於陰股志云陰股足少陰經脈所循之處大脈大絡也高雲厥陰之脈起於足大指循陰股而上刺陰股中傷大指之經脈故血出不止簡按諸説不一吳似允當內漏甲乙無內字吳云內漏脈氣他泄而漏也張云膿生耳底是為內漏刺膝臏出液馬雲犢鼻在膝臏之下則犢鼻兩旁之上為膝臏也張云臏膝蓋骨也簡按白虎通云臏膝蓋骨也聖濟總録云髀樞下端為膝蓋骨者左右共二無勢多液志云膝乃筋之會液者所以灌精濡空竅者也刺膺中陷中肺馬雲次中字去聲刺膺中之穴如足陽明胃經氣戶庫房屋翳膺窗足少陰腎經俞府或中之類乃誤中雲門中府則肺氣上泄故為病喘息而逆仰首而息也簡按此總言膺中諸穴蓋肺位於胸膺中故誤中肺則為云云證不必中府雲門二穴肘中張云手太陰之尺澤厥陰之曲澤者是也氣歸之張云氣泄於此則氣歸之志云內陷者不能瀉出其邪而致氣歸於內也氣不得出則血不得散故不能屈伸也簡按王注惡氣恐非刺陰股下三寸馬雲此言刺肝穴而誤使內陷者當遺溺也王注為腎經之絡今按肝經有陰包穴治遺溺在膝上四寸則正當股下三寸之處腎經無穴張云陰股之脈足三陰也皆上聚於陰器惟少陰之在股間者有經無穴其在氣衝下三寸者足厥陰之五里也主治腸中熱滿不得溺若刺深內陷令人遺溺不禁當是此穴然厥陰之陰包陽明之箕門皆治遺溺若刺之太深則溺反不止矣腋下脅間宋本腋作掖馬吳張並同高本作腋注云腋舊本訛掖今改手厥陰心包之脈循胸出脅上抵腋下刺腋下脅間刺心包之脈也刺之過深中傷內陷脈不循經上迫於肺故令人咳簡按腋字説文所無作掖為正腋下脅間諸家仍王言令人咳則王注為是腨腸馬雲腨腸足魚腹中承筋穴俗云腳肚吳云腨足腹也張云足肚也肉厚氣深不易行散故刺而內陷則為腫志云俗名腿肚匡上陷骨中脈馬雲匡目眶也俗云眼眶陷骨謂匡骨也脈乃目之系也中去聲高雲匡上目眶之上眉間也陷骨絲竹空穴眉後陷骨也簡按匡眶同史記淮南王安傳涕滿匡而橫流是也甲乙絲竹空在眉後陷者中足少陽脈氣所發外臺一名目窖高注似是為漏為盲張云流淚不止而為漏視無所見而為盲諸家並同刺關節中液出馬雲中平聲高雲關節骨節交會之機關淖液澤注於骨骨屬屈伸若刺關節中傷其液致液出而不能淖澤注骨故不得屈伸此舉刺之要害皆為刺禁者如此簡按高中讀為去聲非刺志論篇第五十三馬雲志者記也篇內言虛實之要及瀉實補虛之法當記之不忘故名篇吳改虛實要論云舊作刺志論今以篇內之言無當僭改簡按篇首論虛實而篇末結以針法補瀉之義斯為刺志也改易篇名卻無謂矣氣實形實氣虛形虛馬雲凡氣與形谷與氣脈與血相稱者為常而相反者為病也氣者人身之氣也如營氣衛氣是也形者人之形體也次節岐伯以身字代形字氣實則形實氣虛則形虛此其相稱者為常而相反則為病矣然此氣之虛實必於脈而驗之但不可即謂氣為脈也觀下文有血脈對舉者可知王注引陰陽應象大論之形歸氣以驗其虛實之同甚有見至以氣為脈氣則非矣氣虛身熱馬吳高並依甲乙氣字上補氣盛身寒四字是脈少血多吳少作小馬雲少當作小張云脈盛血少者陽實陰虛也脈少血多者陽虛陰實也簡按血之多少蓋察面而知之得之傷寒馬雲此傷寒者初時所感之寒至於日久則寒亦為熱矣故熱論曰凡熱病者皆傷寒之類也水熱穴論帝曰人傷於寒而傳於熱何也岐伯曰夫寒感則身熱張云按熱論篇曰人之傷於寒也則為病熱本節復以身寒者為傷寒身熱者為傷暑其説若乎相反不知四時皆有傷寒而傷暑惟在夏月病不同時者自不必辨惟於夏至之後有感寒暑而同時為病者則不可不察其陰陽也蓋陰邪中人則寒集於表氣聚於裡故邪氣盛實而身本因寒也暑邪中人則熱觸於外氣傷於中故正氣疲困而因熱無寒也此夏月寒暑之明辨故以二者並言於此非謂凡患傷寒者皆身寒無熱也得之有所脫血濕居下也張云谷入多者胃熱善於消穀也脫血者亡其陰也濕居下者脾腎之不足亦陰虛也陰虛則無氣故谷雖入多而氣則少也高雲夫谷入多而氣反少者其內則得之有所脫血或濕邪居下之病簡按血脫液干水濕歸下並胃中津乏故消穀善飢與傷寒論抵當湯治證其理略同王注以脫血濕居下為一事恐非谷入少而氣多張云邪在胃則不能食故谷入少邪在肺則息喘滿故氣多胃及與肺吳刪與字飲中熱也吳云有痰飲者脈來弦小有中熱者血出必多張云脈小者血應少而反見其多必或酒或飲中於熱而動之也高雲夫脈小血反多者其內必飲酒中熱之病酒行絡脈故血多行於外而虛於內故脈小昂云按靈素皆無痰字惟此處有飲字簡按中讀如字高注義長脈有風氣水漿不入張云風為陽邪居於脈中故脈大水漿不入則中焦無以生化故血少吳云此上皆釋反者為病之詞入實者左手開針空也吳云空上聲馬雲大凡用針之法右手持針左手掐穴方其入針瀉實之時則左手掐穴開針空以瀉之及其去針補虛之時則左手閉穴閉針空以補之張云入實者刺實也入虛者刺虛也簡按據上文虛者氣出也入虛當是出虛滑吳張志高並作右手開針空非也當仍王及馬注針解篇第五十四馬雲按靈樞有九針十二原篇而小針篇正所以解九針十二原篇之針法此篇與小針解篇大同小異故亦謂之針解篇愚故以小針解篇之詞參入而釋之高本篇作論蓋以其有岐黃問答之語也菀陳馬雲靈樞作宛郁也張云本經宛菀通用通作郁疾按之馬雲此補法也小針解云徐而疾則實言徐納而疾出也則以入針為徐而不以出針為徐與此解不同徐按之馬雲此瀉法也小針解云疾而徐則虛者言疾納徐出也亦與此不同寒溫氣多少也吳云寒為虛溫為實氣少為虛氣多為實志云言實與虛者謂針下寒而氣少者為虛邪氣已去也針下熱而氣多者為實正氣已復也疾不可知也馬雲其寒溫多少至疾而速正恍惚於有無之間真不可易知也知病先後也吳云先後有標本之辨故察之工勿失其法馬雲小針解曰為虛與實若得若失者言補者佖音必滿貌然若有得也瀉則恍然若有失也義與此亦異離其法也張云粗工為離其法耳補瀉之時甲乙此下有以針為之四字九針十二原篇同與氣開闔相合也馬雲其針入之後若針下氣來謂之開可以迎而瀉之氣過謂之闔可以隨而補之針與氣開闔相合也簡按此本於王注諸家並同陰氣隆至吳此下補針下寒三字知病之內外也馬雲言病深則針深病淺則針淺分病之內外也深淺其候等也吳云四肢孔穴與胸背之孔穴雖有遠近不同其淺深取氣則一也高雲深則遠淺則近其候氣之法與深淺等簡按高注近是無邪下馬雲邪斜同高雲十二原論云正指直刺無針左右神在秋毫屬意病者夫正指直刺無針左右是義無斜下也下膝三寸也本輸篇云入於下陵下陵膝下三寸䯒骨外三里也唯云膝下似無準千金云在膝頭骨節下三寸資生云犢鼻下三寸跗之新校正據骨空論作跗上馬張高並從其説吳云跗拊誤拊重按也拊之者以物重按於三里分也蓋三里趺陽一脈相通重按其三里則趺陽之脈不動其穴易辨志云跗之者足跗上之衝陽脈也簡按馬張吳雖改字不同其意本於王義今考唯云所謂跗之者舉膝分易見也而無按三里則趺上之脈止之説則不可從疑是跗上脫低字之上脫取字靈邪氣臟腑病形篇云三里者低跗取之巨虛者舉足取之而全本作低胻可以證也巨虛馬雲巨虛上廉張同簡按甲乙云在三里下三寸本輸篇云下三里三寸為巨虛上廉明堂下經云在胻骨外大筋內筋骨之間陷者中銅人一名上巨虛下廉吳云陷上為巨虛上廉陷下為巨虛下廉上下相去三寸簡按本輸篇云復下上廉三寸為巨虛下廉帝曰余聞九針馬雲此節當與靈樞九針論第一節參看人脈應人吳云內營外衛人在氣交之中之象也張云動靜有期盛衰有變位於天地之中人之象也人筋應時高雲人筋十二足筋起於足指手筋起於手指手足為四肢一如十二月分四時故人筋應時合氣簡按新校正引別本氣作度近是應野志云陰陽應象大論云地有九野人有九竅九野者九州之分野也人之三百六十五絡猶地之百川流注通會於九州之間三百六十五節氣小針解云節之交三百六十五會者絡脈之滲灌諸節者也子華子云一身之為骨凡三百有六十精液之所朝夕也由此觀之與三百六十五絡所指自異心意應八風此以下至應之九必有脫誤應五音六律張云發之多齒之列耳之聰目之明五聲之抑揚清濁皆紛紜不亂各有條理故應五音六律志云發齒耳目共六齒又為六六之數而發之數不可數矣律呂之數推而廣之可千可萬而萬之外不可數矣應地吳云人之十二脈外合十二水血以象陰水之類也氣以詬之血以濡之脈行而不已水流而不息是其應地者也人肝目應之九吳張以此六字與下文二百二十三字共為蠹簡殘缺必有遺誤是也志至九竅三百六十五為注釋高以九之一字連下為爛文而注人肝目應之五字並不可從長刺節論篇第五十五高雲靈樞官針篇云刺有十二節刺節真邪論云刺有五節長猶廣也所以廣五節十二節之刺故曰長刺節高本刪論字簡按長者觸類而長之之長易繫辭高注為是馬吳以為長於刺法之義誤刺家不診張云善刺者不必待診但聽病者之言則發無不中此以得針之神者為言非謂刺家概不必診也十二原篇又曰凡將用針必先診脈視氣之劇易乃可以治其義為可知矣聽病者言吳云聽病者其所苦而刺之頭疾痛高雲因病在頭卒然而痛也為藏針之馬雲言頭痛者其病在腦腦即骨也乃深入其針如藏物然張云藏言里也即深入其針之謂志云藏隱也謂隱針而藏刺之也蓋頭之皮肉最薄易至於骨故至骨而無傷骨簡按藏字未詳吳依全本刪之似是上無傷骨肉及皮吳上作止連上句是皮者道也馬雲皮乃經脈往來之路不可傷也簡按王注是陰刺馬雲按官針篇云五曰陽刺靈樞作揚陽刺者正納一旁納四而浮之以治寒氣之博大者也十曰陰刺陰刺者左右率刺之以治寒厥足踝後少陰也今本篇陰刺之法乃是陽刺則陽誤作陰張高同大臟吳作本臟注云寒熱之氣深而專於一臟者求其本臟而刺之簡按馬張並依王為五臟是臟會吳云刺俞之迫臟者以其為臟氣所會集也與刺之要高本寒熱去下句刺之下句注云止與刺者中病即止之意下凡言止者皆止與刺也無論陽刺陰刺大要髮針之時貴淺出其血以通絡脈也簡按與字未妥高注稍通血小者甲乙作而一字今從之深之馬雲深當作淺吳云腐腫外腫也大為陽毒其患淺小為陰毒其患深刺者亦視其小大深淺而刺之也張同高雲多血多膿血也大癰多血當淺刺之小者小癰也癰小未潰毒氣在內當深刺之簡按血小者三字據甲乙改作而一字義自分明不須費解皮𩩻馬雲內經中有應用肉旁者每以骨旁代之有應用骨旁者每以肉旁代之則𩩻可作腯左傳桓公六年隨季梁諫追楚師而公言牲牷肥腯腯亦肥意皮腯原非穴名愚意自少腹之皮肥厚以下盡其少腹內取穴而止張云當作皮䯏䯏骨端也蓋謂足厥陰之章門期門二穴皆在橫皮肋骨之端也及下至小腹而止者如足陽明之天樞歸來足太陰之府舍衝門足少陰之氣穴四滿皆主奔豚積聚等病吳亦作䯏注云當是肋骨之端大包穴之分簡按𩩻字書無所考熊音徒骨切蓋以為腯字腯音突馬説本此志高並同新校正引釋者作皮䯏苦末反今考卷末釋音光抹切張注從之䯏集韻骨端也今仍張注兩旁四椎間馬雲乃手厥陰心包絡之俞也張高同吳云當是膏肓之穴處志同簡按千金方厥陰俞在第四椎下兩旁各一寸半甲乙不載故王云據經無俞知古經無此穴髂髎熊音上口亞反腰骨也下力條反諸注並依王義云居髎穴也簡按髂又作髂玉篇腰骨也王履小易賦云腰當監骨之上兮監骨下則尻椎可度腰骨曰膃烏老切膃上曰髂程式醫彀云尻上橫者為腰藍骨藍骨上為腰骨一名膃音襖膃上為髂沈彤釋骨云骶之上挾脊十七節至二十節起骨曰腰髁骨曰兩踝其旁臨兩股者曰監骨曰大骨曰髂今依玉篇及王注沈説為是甲乙居髎在章門下八寸三分監骨上當作下字誤陷者中季脅肋間馬引王注京門作章門志仍之恐誤甲乙云京門在監骨下當作上字誤腰中挾脊季肋下一寸八分導腹中氣吳云導引也導引腹中熱氣下入少腹則病已也少腹兩股間高雲衝門穴也簡按甲乙云衝門上去大橫五寸在府舍下橫骨兩端約文中諸注不指言穴名為肝腎穴者是腰髁骨間馬本無骨字張云凡腰中在後在側之成片大骨皆曰髁骨在後者足太陽之所行在側者足少陽之所行高雲背十三椎下外旁肓門穴也簡按高注非是病起筋炅志云筋舒而病起筋熱而病已高雲刺之得宜則病起筋熱病起筋熱則病已病已而止刺也簡按高注義通吳刪病起二字大分小分馬雲氣穴論曰肉之大會為谷則合谷陽谷等為大分肉之小會為溪則解溪俠溪等為小分癰發若變靈官針篇云疾淺針深內傷良肉皮膚為癰吳云變其常也馬雲當發癰而有他變也諸分且寒且熱高雲病在諸陽脈而且寒且熱則邪氣乘於經脈矣諸分而且寒且熱則邪氣乘於分肉矣分肉之邪經脈之邪兩相交併病名曰狂簡按上文且寒且熱四字疑衍名曰狂張云且寒且熱者皆陽邪亂其血氣熱極則生寒也故病為狂歲一發不治張云陰勝則為癲病歲一發月一發者氣深道遠有宿本也故不易治月四五發者暴疾耳其來速其去亦速此為可治者也其無寒者馬雲若至於無寒則為病已之兆張云若其無寒者則癲疾亦有陽邪或瀉或補當用針調之也按甲乙經曰刺諸分其脈尤寒者以針補之是乃言為陰證病風且寒且熱馬雲此即風論之所謂寒熱證也吳云炅汗出者寒去獨熱而汗出也數過數次也刺諸分理絡脈者貴乎多刺也汗既出而猶寒熱則邪盛而患深非可以旦夕除者必三日一刺百日始已大風馬雲即風論及靈四時氣篇皆謂之癘也癘音癩刺肌肉張云所以泄陽分之毒風從汗散也刺骨髓張云所以泄陰分之風毒也鬚眉生而止針吳云風毒去盡營衛皆復鬚眉重生而止針矣高雲凡二百日則天干二十周鬚眉生而止針
