body:
  text: 卷七皮部論篇第五十六吳云皮外諸經之分部也高雲皮之十二部也手足三陽三陰十二經絡之脈皆在於皮各有分部脈有經紀馬雲脈有經紀故靈樞有經脈篇筋有結絡故靈樞有經筋篇骨有度量故靈樞有骨度篇者是也以經脈為紀志云紀記也欲知皮之分部當以所見之絡脈分之然當以經脈為紀害蜚馬雲陽明而曰害蜚者陽氣自盛萬物陽極則有歸陰之義故曰害蜚物之飛者尤為屬陽也如詩經有四月莠蔞及本草至夏則草枯而有夏枯草之類吳云害與闔同所謂陽明為闔是也蜚蠢動也蓋陽明者面也面者午也五月陽氣蠢動而一陰氣上與陽始爭是闔其陽也張云蜚古飛字蜚者飛揚也言陽盛而浮也凡盛極者必損故陽之盛也在陽明陽之損也亦在陽明是以陽明之陽名曰害蜚高雲陽明之陽行身之前而主闔闔則不開有害於飛故名曰害蜚蜚猶開也簡按諸注未允蓋害盍闔古通用爾雅釋言害盍也郭注盍何不也或作害莊子則陽篇云闔嘗舍之注何不試舍其所為乎爾雅釋宮闔謂之扉疏闔扇也説文曰闔門扇也一曰閉也蜚音扉害蜚即是闔扉門扇之謂離合真邪論云陽明為闔義相通害讀為胡臘切上下同法甲乙上上有十二經三字陽主外陰主內吳二句移於為紀者之下張云絡為陽故主外經為陰故主內如壽夭剛柔篇曰內有陰陽外亦有陰陽在內者五臟為陰六腑為陽在外者筋骨為陰皮膚為陽也凡後六經之上下五色之為病其陰陽內外皆同此樞持甲乙持作杼吳云樞樞軸也所謂少陽為樞是也持把持也蓋少陽居於表裡之間猶持樞軸也張云樞樞機也持主持也少陽居三陽表裡之間如樞之運而持其出入之機故曰樞持簡按據甲乙樞杼即樞軸詩小雅小東大東杼柚其空柚軸同淮南説林訓黼黻之美在於杼軸上下同法甲乙無此四字下同皆少陽之絡也吳此下補五色診視如上六字在陰者主出出甲乙作外吳刪故在陽以下十九字云與上文不相承僭去之張云邪必由絡入經故其在陽者主內言自陽分而入於內也在陰者主出以滲於內言出於經而滲入於臟也此邪氣之序諸經之皆然者出字義非外出之謂説文曰出進也象草木益滋上出達也觀下文少陰經云其出者從陰內注於骨與此出字同意志云在外六經之氣從陽而內在內經脈之氣從陰而外出於皮膚復從皮膚而入肌肉筋骨以滲於臟腑募原之間而內通於五臟此論經脈之氣環轉無端蓋從內而外也高雲皮絡之邪過盛則入客於經絡為陽主外絡盛客經則陽氣內入故在陽者主內經為陰主內陽氣內入則陰氣外出故在陰者主出出而復入以滲於內此陰陽經絡外內出入不獨手足少陽為然而諸經皆然簡按上文云陽主外陰主內則似義相戾故張引説文訓出為進殆屬強解今姑仍高義關樞馬雲蓋少陽為樞而此太陽為三陽最在外則此太陽為關樞也陰陽離合論以陽明為闔太陽為開而此以太陽為關關者闔也蓋彼就表之表而言而此對少陽而言耳吳云關固衛也少陽為樞轉布陽氣太陽則約束而固衛其轉布之陽故曰關樞張云陰陽離合論曰太陽為開辭異而義同也高雲太陽之陽行身之背而主開故名曰關樞關猶系也樞轉始開開之繫於樞也簡按老子善閉者無關楗而不可開説文關以橫木持門戶也由是觀之關無開之義吳注為長蓋陰陽離合論開闔樞則以形層而言此篇則以皮部而言此所以不能無異也且害蜚樞持關樞之類為三陽三陰之稱者不過藉以見神機樞轉之義亦宜無深意焉樞儒吳云儒當作臑手少陰之脈下循臑內後廉足少陰之脈上股內後廉皆柔軟肉勝之處故曰臑樞臑者樞機運於臑內也所謂三陰離合少陰為樞是也張云儒説文柔也王氏曰順也少陰為三陰開闔之樞而陰氣柔順故名曰樞儒高雲少陰之陰從腨膕而上注胸中而止樞轉神機區別水火故名曰樞儒儒猶區也簡按諸注亦未允儒新校正引甲乙作檽似是檽音軟或作㮕又作栭爾雅栭謂之楶注即櫨也疏謂斗拱也蒼頡篇云櫨拱柱上木也柱上承鬥之曲木也見一切經音義少陰之陰取名於樞上柱頭之檽故曰樞檽歟今本甲乙作樞儒皆少陰之絡也吳此下補五色診視如陽明七字其出者從陰內注於骨吳云出謂出於陽經也出於陽則入於陰入於陰故注於骨張云謂出於經而入於骨即前少陽經云在陰者主出以滲於內之義心主之陰高雲心主手厥陰心主包絡也手足無分上下同法故舉手之厥陰以明之是足之厥陰亦同於手足之厥陰也害肩馬雲肩重也萬物從陰而沉而此陰氣有以殺之故曰害肩吳云厥陰脈上抵腋下故曰害肩害闔同蓋言闔聚陰氣於肩腋之分所謂厥陰為闔是也張云肩任也載也陽主乎運陰主乎載陰盛之極其氣必傷是陰之盛也在厥陰陰之傷也亦在厥陰故曰害肩然則陽明曰害蜚此曰害肩者即陰極陽極之義高雲心主之陰起於胸中而主闔闔則不能外任故名曰害肩肩猶任也簡按諸注亦未允蓋肩枅同枅也説文枅屋櫨也徐鍇云柱上橫木承棟者橫之似笄也説文又曰關門欂櫨也爾雅釋宮曰關謂之槉注柱上欂也亦名枅疏柱上方木是也集韻枅或作枅闔枅者謂闔扉上容樞之枅與關蟄吳云關封也所謂太陰為關是也簡按陰陽離合論太陰為開而吳云為關誤也蟄蟄蟲也蓋太陰者里也里者子也十一月萬物氣皆藏於中猶封蟄也張云關者固於外蟄者伏於中高雲太陰之陰循足脛交出厥陰之前而主開故曰關蟄蟄猶藏也藏而後開開之關於蟄也簡按諸注亦未允甲乙蟄作執蓋蟄是槷之訛槷闑同穀梁傳昭八年以葛覆質以為槷範寧注槷門中臬釋文槷門橛也爾雅橛謂之闑周禮考工記鄭注闑古文作槷乃門中橛也關槷者取義於門中之橛左右之扉所合處歟廩於腸胃吳云廩舍也簡按王注為是溯然甲乙作淅然吳云溯淅同灑淅惡寒也張云溯然豎起也寒栗貌溯音素逆流曰溯簡按從甲乙為是感虛乃陷下甲乙感作盛似是盛下句肉爍吳云肉熱也張云銷鑠也簡按逆調論肉爍王注爍言消也是䐃破吳云䐃者肩肘髀厭皮肉也䐃破者人熱盛則反側多而皮破也詳見玉機真臟論注毛直而破張云液不足而皮毛枯稿也不與吳云不及也言邪客皮部則部中壅滯經氣不及而生大病也張云若不預為之治則邪將日深而變生大病也與預同高雲若腑臟之氣不與於皮而生大病也與去聲簡按甲乙作不愈義尤明顯經絡論篇第五十七吳作經絡色診論無常變也吳常下句是陽絡之色變無常張云脈度篇曰經脈為里支而橫者為絡絡之別者為孫故合經絡而言則經在裡為陰絡在外為陽若單以絡脈為言則又有大絡孫絡在內在外之別深而在內者是為陰絡陰絡近經色則應之故分五行以配五臟而色有常也淺而在外者是為陽絡陽絡浮顯色不應經故隨四時之氣以為進退而變無常也觀百病始生篇曰陽絡傷則血外溢陰絡傷則血內溢其義可知何近代諸家之注吳馬皆以六陰為陰絡六陽為陽絡豈陽經之絡必無常陰經之絡必無變乎皆誤也淖澤甲乙澤作滜注音皋考滜澤同詩鶴鳴九皋毛傳皋澤也史記天官書其色大圜黃滜注音澤淖出陰陽別論此皆常色謂之無病甲乙皆作其馬雲八字當在從四時而行也之下吳志並同簡按張高順文注釋非是謂之寒熱張云五色俱見則陰陽變亂失其常矣故為往來寒熱之病吳此下補此皆變色謂之有病八字氣穴論篇第五十八吳云人身孔穴皆氣所居故曰氣穴願卒聞之張云卒盡也稽首再拜對吳刪此五字溢意張云溢暢達也吳去因請溢意以下至岐伯再拜而起曰一百二十六字逡巡志云退讓貌簡按郭璞爾雅注云逡巡卻去也文選注引目以明耳以聰矣馬雲目以耳以俱已同聖人易語良馬易御簡按語御押韻蓋此古諺未足以論也高雲今余所訪問者亦真數之發蒙解惑真數之外未足以論也簡按枚乘七發況直眇少煩悶酲醲病酒之徒哉故曰發蒙解惑不足以言也李善注素問黃帝曰發蒙解惑未足以論也所引本篇文背與心相控而痛云云志云心謂心胸也控引也背與心相控而痛者陰陽相引而為痛也此先論陰陽二氣總屬任督之所主吳云以下計八十七字按其文義與上下文不相流貫僭去之張云共計八十七字按其文義與上下文不相流貫新校正疑其為骨空論文脫誤於此者是十椎及上紀馬雲十椎之十當作大下同按脊屬督脈一經但十椎下無穴當是大椎也張云十椎督脈之中樞也此穴諸書不載惟氣府論督脈氣所發條下王氏注曰中樞在第十椎節下間與此相合可無疑也志云十椎在大椎下第七椎乃督脈至陽穴蓋大椎上尚有三椎總數之為十椎也高仍馬注簡按今從張注背胸邪系陰陽左右張云此詳言上文背與心相控而痛者悉由任督二脈之為病也馬雲邪斜同在後為背在前為胸在背為陽在胸為陰正以背與胸斜系陰陽左右如此故為前後之病又背之督脈斜出尻脈絡胸脅支心貫膈上肩如天突之上又斜下肩交背大椎之下是以必刺天突大椎胃脘關元耳高仍馬邪讀為斜張志為邪氣之邪簡按馬義為長脈滿起高雲經脈滿盈從而起也臟俞五十穴馬雲此與靈樞本輸篇同下文腑俞同中呂兩旁張云呂膂同大椎上兩旁各一馬雲即大杼穴新校正以為大椎旁無穴意者亦若今人以項之高骨為大椎耳吳云當是天柱二穴在挾項後髮際大筋外廉陷中志與馬同張引王及新校正云今於大椎上旁按之甚痠必當有穴意者甲乙等經猶有未盡簡按甲乙大杼項第一椎下兩旁各一寸五分明是大椎上非大杼之謂今從張注目瞳子浮白二穴諸家並仍王注為膽經二穴果然則二穴上闕各一字或云是甲乙經所載足陽明四白穴骨空論曰督脈上系兩目之下中央氣府論曰面鼽骨空各一皆謂之也此説近是兩髀厭張云謂髀樞骨分縫中即足少陽環跳穴也沈氏經絡全書云謂之樞者以楗骨轉動如戶之樞也亦曰髀關簡按厭於協切靨同經脈篇云足少陽之脈繞毛際橫入髀厭中是犢鼻馬雲去膝臏下胻骨上俠解大筋陷中形如牛鼻故名簡按骨空論云胻骨空在輔骨之上端王注犢鼻穴也耳中多所聞根結篇云少陽結於窗籠窗籠者耳中也張云即聽宮也刺節真邪論云刺其聽宮枕骨高雲腦後左右玉枕穴即枕骨也簡按諸家仍王注今亦從之背俞志云謂膈俞穴在大椎下第七椎間各開中行一寸五分高同簡按諸家仍王注今亦從之分肉高雲臍上水分穴兩旁滑肉門為分肉簡按此屬臆解不可從刺腰痛論云刺肉裡之脈在太陽之外少陽絶骨之後王注分肉主之穴在足外踝直上絶骨之端如後二分筋肉分間陽維脈氣所發與此注少異踝上橫高雲踝上橫紋之解溪穴簡按此説亦未見所據水俞在諸分張云水屬陰多在肉理諸分之間故治水者當取諸陰分如水俞五十七穴者是也高雲水氣不行則皮膚脹滿故水俞在諸分諸分周身肌腠之分理也熱俞在氣穴張云熱為陽多在氣聚之穴故治熱者當取諸陽分如熱俞五十九穴者是也高雲熱氣有餘則經脈消爍故熱俞在氣穴氣穴陽氣循行之穴孔也兩骸厭中二穴馬骸字下句注云灸寒熱之法其穴皆在兩骸之中骨空論曰輔骨上橫骨下為楗俠髖為機膝解為骸關俠膝之骨為連骸骸下為輔輔上為膕膕上為關橫骨為枕則骸之為義在膝解也厭中即前環跳穴王注以上節骸字連為骸厭則上節兩字可讀乎甚非張云兩骸厭中謂膝下外側骨厭中足少陽陽關穴也骸音鞋説文脛骨吳同志云兩骸厭中二穴謂足少陽之陽陵泉也高雲兩骸形身左右也環跳二穴當身左右厭中即上文髀厭分中環跳穴也簡按甲乙陽關在陽陵泉上三寸犢鼻外陷者中則張注為是今從之天府下五寸靈本輸篇云尺動脈在五里五輸之禁也王所引針經文見玉版篇凡三百六十五穴吳云自臟俞至此並重復共得四百零七穴除重復約得三百五十八穴蓋世遠經殘不可考也馬雲通共計之有三百五十七穴其天突大椎上脘關元俱在內天突關元環跳俱重復想有脫簡故不全耳張云自臟俞五十穴至此共三百六十五穴若連前天突十椎胃脘關元四穴則總計三百六十九穴內除天突關元及頭上二十五穴俱系重復外實止三百四十二穴蓋去古既遠相傳多失志云自天突十椎上紀關元至厭中二穴共計三百六十四穴然內多重復高雲自天突至天府下五寸共三百六十六穴此乃不除重復一歲三百六十五日而有奇周天三百六十五度四分度之一則三百六十六數相吻合也簡按以上諸説紛紜不一今查之自臟俞至五里凡三百五十七穴遊針之居張云針所遊行之處也志云遊針者謂得針之道而以神遇之若遊刃然恢恢乎有餘地矣以溢奇邪以通榮衛馬雲奇邪者不正之邪也一值此邪則漸至外為發熱而內為少氣須當急瀉無怠以通營衛可也張云溢注也滿也奇異也邪自皮毛而溢於絡者以左注右以右注左其氣無常處而不入於經是為奇邪表裡之氣由絡以通故以通營衛高雲繆刺論云邪入舍於孫絡不得入於經流溢於大絡而生奇病奇邪猶奇病也奇邪在絡故孫絡以溢奇邪溢泛溢猶外出也孫絡之所以溢奇邪者以孫絡合大絡而通榮衛也簡按高注義長然以上下文義求之以通營衛四字恐衍營衛稽留吳云稽遲也氣竭血著吳云著著同凝結而不流也溪谷之會張云肉之會依乎骨骨之會在乎節故大節小節之間即大會小會之所而溪谷出乎其中凡分肉之間溪谷之會皆所以行榮衛之大氣者也説文泉出通川為谷又詩有穀風詩詁風自谷出也宋均曰無水曰谷有水曰溪故溪谷之在天地則所以通風水在人身則所以通血氣簡按王充論衡云投一寸之針布一丸之艾於血脈之蹊篤病有瘳蓋蹊即溪谷之溪大氣馬雲即宗氣靈五味篇云大氣積於胸中刺節真邪篇云宗氣流於海張云以行榮衛之大氣者也高雲宗氣也積於胸中以司呼吸而合於皮毛者也簡按今從馬高注外破大膕吳作大䐃張云膕當作䐃誤也蓋䐃可稱大膕不必稱大也簡按馬志高並隨文為解非也卷肉吳云卷音捲簡按新校正全本作寒肉疑是搴訛搴亦縮也溪谷三百六十五穴會吳云此又言溪谷亦三百六十五穴蓋在諸經孫絡之內非復別有三百六十五穴張云有骨節而後有溪谷有溪谷而後有穴腧人身骨節三百六十五而溪谷穴腧應之故曰穴會亦應一歲之數小痹淫溢循脈往來張云邪在孫絡邪未深也是為小痹志云脈謂孫絡脈也帝乃闢左右吳刪闢以下二十三字於義似是金蘭之室志云藏之於心也簡按此不過尊奉而珍寶之之謂志注鑿矣三百六十五脈張云即首節三百六十五穴會之義傳注十二絡脈非獨十四絡脈也高雲並注於絡絡大絡也靈樞經脈論有手太陰少陰心主太陽陽明少陽之別足太陽陽明少陽太陰少陰厥陰之別並任脈之別督脈之別為十四大絡故曰傳注十四絡脈非獨手足三陰三陽之十二絡脈也四舊本訛二二舊本訛四今改內解瀉於中張云解解散也即刺節真邪篇解結之謂瀉瀉去其實也中者五臟也此言絡雖十二而分屬於五臟故可解瀉於中左右各五故云十脈高雲十四絡脈外合孫絡則有三百六十五會內合五臟則有左右五俞之十脈故曰內解瀉於中者十脈所以承十四絡脈而申明內通五臟之俞脈以補上文孫絡之未盡者又如此氣府論篇第五十九馬雲氣府者各經脈氣交會之府也故有言本經而他經之穴入其中者止論脈氣所發所會不以本經別經為拘也其穴有多少亦不拘於本經故耳前篇論穴故名氣穴而此論脈氣所發故名曰氣府也高刪論字此亦以無問答也七十八穴吳云下文考得九十一穴多一十三穴此與近世不同近世左右共一百二十六穴張云詳考本經下文共得九十三穴內除督脈少陽二經其浮氣相通於本經而重見者凡十五穴則本經止七十八穴近世經絡相傳足太陽左右共一百二十六穴即下文各經之數亦多與今時者不同入發至項三寸半馬雲謂大杼風門二穴也蓋自後項上至入發則自入發至項而下計有三寸半許其數正如二穴所在也中乃督脈旁有四行俱足太陽經穴故曰旁五二穴各開中行一寸半則在左之穴至在右之穴共相去三寸也按入發者入後髮際也在後曰項在側曰頸在前曰喉新校正以入發為前髮際故欲以項字更為頂字且以囟會至百會百會至後頂俱有三寸之説又以半字為衍何其強也今如愚注則王注自明新校正不必贅矣馬雲項當作頂自眉上入發曲差穴也自曲差上行至頂中通天穴則三寸半也並通天而居中者督脈之百會也百會為太陽督脈之會故此以為言百會居中而前後共五穴左右凡五行故曰旁五自百會前至囟會後至強間左右至少陽經穴相去各三寸共五五二十五穴如下文者也高雲頂舊本訛項今改頂前項穴也自攢竹入髮際至前頂其中有神庭上星囟會故長三寸半前頂在中行次兩行外兩行故旁五言自中及旁有五行也簡按甲乙神庭在髮際直鼻上星在直鼻中央入髮際一寸囟會在上星後一寸前頂在囟會後一寸五分凡四穴通三寸半高注似是浮氣吳云陽氣浮於巔頂之上者也張云言脈氣之浮於巔也項中大筋兩旁各一高雲風池二穴風府兩旁各一高雲天柱二穴以明上文外兩旁在項中大筋兩旁名為風池者各一內兩旁在風府穴兩旁名為天柱者各一也簡按此與王注互異甲乙天柱在俠項後髮際大筋外廉陷者中足太陽脈氣所發又云風池在顳顬後髮際陷者中由此觀之王注為是十五間各一吳云間兩骨之間自大椎至胞肓凡十五肋故曰十五間十五間各一者今甲乙經所載十三穴並去脊三寸附分云云與王注同左右合成二十六穴近世有膏肓二穴在魄戶之次晉漢而上率未有也曰十五間各一當得三十穴方是不然則五當作三矣簡按張加大杼膏肓二穴為十五穴馬以五臟六腑之俞中膂內俞白環俞為十五俞志高同然膏肓晉以上無所見而五臟六腑之俞乃出下文故並不可從兩角上吳云角謂額角張云耳角也高雲頭角也沉氏釋骨云額之中曰顏曰庭其旁曰額角巔之旁嶄然起者曰頭角亦曰角經筋篇云足少陽之筋循耳後上額角交巔上彤按耳上近巔者乃頭角非額角也故額角為頭角之訛簡按據沈之説此所言兩角亦頭角之謂天衝穴在耳後髮際二寸故張云耳角誤鋭發高雲即鬢髮鋭熊音睿面鼽骨馬鼽𮪪同王下文鼽骨注云鼽頄也頄面顴也高雲面上鼻氣旁通之處故曰面鼽簡按𮪪字書無考或恐是頰字高説亦未見所據蓋是杜撰沉氏釋骨云目之下起骨曰䪼其下旁高而大者曰面鼽骨曰顴骨亦曰大顴亦曰頄鼽頄古通用挾臍廣三寸各三高三寸作二寸注云挾臍與臍相併也廣開廣也挾臍廣二寸天樞穴也各三乃天樞外陵大巨左右各三凡六穴簡按高據甲乙等改二寸似是然而遺滑肉門一穴何諸下臍二寸挾之各二高作三寸注云下臍三寸關元穴也下臍三寸挾之乃外兩旁之水道歸來氣衝左右各三簡按若作二寸則闕氣衝一穴故高作三寸然而氣衝穴下文舉之則不可從伏菟吳本作伏兔鼽骨下各一高雲即上文面鼽骨空之下兩巨髎穴簡按甲乙顴髎在面頄骨下廉陷者中則舊注為是張云鼽當作頄顴髎二穴也張注前面鼽骨云頄同而此改字疏甚耳郭上各一高雲郭匡郭也曲掖上高雲肩端尖骨從後下陷是為曲掖簡按曲掖蓋謂肘掖曲彎之處猶曲䐐之曲臑俞肩臑之後大骨之下腋之曲彎上是穴高注恐非柱骨上陷者各一高雲柱骨項骨也柱骨上陷者兩肩井穴也簡按肩井在肩上陷者中即是項骨外旁安得言項骨上陷者此必別有所指諸注並同今無可考上天窗四寸高雲浮白穴也簡按與前注異未知孰是小指本高雲指本指頭也肘以下至手小指本謂肘骨之下從側而下至小指之頭簡按新校正以本為爪甲之本卻非大迎骨空各一吳云一出足陽明一出乎此豈手陽明足陽明二經所併發者乎甲乙為晚出之書未足據也角上各一吳云頷厭穴也張同高雲頭角之上兩天衝穴也簡按王注前文足少陽耳前角下各一云謂懸釐二穴而此注亦云懸釐誤矣吳以角為額角高為頭角故其説不一甲乙頷厭在曲周顳顬上廉周銅人作角懸釐在曲周顳顬下廉銅人天衝在耳後入髮際二寸則吳注為得項中足太陽之前高雲足太陽之脈下項行身之背今在足太陽項中之前乃人迎之下氣舍二穴簡按在後曰項在側曰頸在前曰喉今氣舍在頸不可云項中足太陽之前也當從王注挾扶突各一高雲承上文氣舍而言故曰挾扶突謂氣舍扶突穴相併也簡按此注亦非肩貞下三寸分間各一高雲肩貞下三寸消濼穴也分間即肩貞分肉之間天宗臑俞穴也面中三高雲面之中央從鼻至唇有素髎水溝兌端三穴簡按此本於張注諸家載齦交而不載兌端齦交在唇內齒上不宜言面中今從張高及旁十五穴吳云從大椎至長強十三穴又會陽在兩旁各一共十五穴張云會陽二穴屬足太陽經在尻尾兩旁故曰及旁共十六穴本經連會陽則二十九穴也𦙆下諸本作骶下熊音丁計反張云骶音底尾骶也鳩尾下三寸胃脘五寸胃脘馬雲言鳩尾下一寸曰巨闕又下一寸半曰上脘今曰三寸者正以鳩尾上之蔽骨數起也鳩尾下三寸半為胃之中脘今五寸者字之訛也張云鳩尾心前蔽骨也胃脘言上脘也自臍上至上脘五寸故又曰五寸胃脘此古經顛倒文法也高本鳩尾下三寸句胃脘五寸句胃脘以下句注云鳩尾下三寸自鳩尾之下有巨闕上脘中脘三穴當三寸也胃脘五寸自上脘至臍中有中脘建里下脘水分臍中五穴當五寸也胃脘以下指臍中也志注義同至橫骨六寸半一馬雲言自中脘以下有建里下脘水分神闕陰交氣海石門關元中極曲骨等穴共計一十三寸今曰六寸半一者疑當為二六寸半者二則為十三寸也張云骨度篇曰𩩲骬以下至天樞長八寸天樞以下至橫骨長六寸半正合此數一謂一寸當有一穴此上下共十四寸半故亦有十四穴自鳩尾至曲骨是也高雲自胃脘以下之臍中由中極至兩旁橫骨有陰交氣海石門關元中極五穴五寸中極至橫骨約寸半余當六寸半一分也自鳩尾至兩橫骨凡十五穴此任脈任於前而為中行腹脈之法簡按從鳩尾下三寸至於此諸注未清晰今姑仍張義吳改作鳩尾下三寸胃脘四寸胃脘八寸臍中以下至橫骨五寸十四俞腹脈法也蓋舊經文當如此然竟不免為肆臆矣下陰別一吳云陰別任脈至陰而支別也張云自曲骨之下別絡兩陰之間為沖督之會故曰陰別高雲下陰下於陰前會陰穴也別一上文橫骨不通會陰別從曲骨至會陰之一穴簡按下陰別蓋會陰一名高注恐非齦交一志云齦交穴一在唇內齒下齦縫中蓋上古以齦交有二督脈之齦交入上齒任脈之齦交入下齒也以上下之齦齒相交故名齦交高雲齒縫任督之交故曰齦交簡按齦交有二其説難依據考上文諸穴則其誤自明足少陰舌下志云謂腎脈之上通於心循喉嚨挾舌本而舌下有腎經之穴竅也簡按刺瘧論云舌下兩脈者廉泉也根結篇云少陰根於湧泉結於廉泉知是任脈廉泉之外有腎經廉泉故王云足少陰舌下二穴薛氏口齒類要云舌下廉泉穴此屬腎經馬張以任脈廉泉釋之疏矣毛中急脈一吳云少陰舌下厥陰毛中四穴古無穴名張云急脈在陰毛之中凡疝氣急痛者上引小腹下引陰丸即急脈之驗厥陰脈氣所發也今甲乙針灸等書俱失此穴馬同圖翼云按此穴自甲乙經以下諸書皆無是遺誤也經脈篇云足厥陰循股陰入毛中過陰器又曰其別者循脛上睪結於莖然此厥陰之正脈而會於陽明者也簡按志云謂肝經之脈起於大指叢毛之際而肝氣之弦急也高雲曲骨穴也並非手少陰各一志云言三百六十五穴之中有心脈之穴二也高雲左右少衝各一簡按吳馬張依王注似是手足諸魚際吳云凡手足黑白肉分之處如魚腹色際皆曰魚際張云手足掌兩旁豐肉處皆謂之魚此舉諸魚際為言者蓋四肢為十二經發脈之本故言此以明諸經氣府之綱領也簡按志云手之魚際肺之脈氣所發足之魚際脾之脈氣所發也高同此説不可從凡三百六十五穴也吳云凡三百九十八穴除去重出四穴實多二十九穴張云共三百八十六穴除重復十二穴仍多九穴簡按志高強合三百六十五穴之數不可憑焉骨空論篇第六十吳云空孔同骨空髓空也馬雲骨必有空空即穴也故名篇風從外入高雲風從外入傷太陽通體之皮膚故令人振寒從皮膚而入於肌腠故汗出隨太陽經脈上行故頭痛周身肌表不和故身重大風頸項痛志云此言風邪入於經者亦當治其風府也夫風傷衛衛氣一日一夜大會於風府是以大風之邪隨衛氣而直入於風府者致使其頭項痛也簡按馬引長刺節論以大風為癘風誤風府在上椎吳云言在項骨第一節上椎也張同高雲項上高起第一椎為大椎項上平坦第一椎為上椎大椎至尾骶共二十一節大椎之上另有二節也簡按甲乙諸書並云風府在入髮際一寸而此云在上椎又靈本輸篇云頸中央之脈名曰風府若其入發中則不宜云在上椎又云頸中央況本篇下文云髓空在脊骨上空在風府上則知風府不入發中甲乙等説可疑矣録以俟考志以上椎為大椎誤甚厭之馬雲厭壓同吳云以手按其穴也簡按説文曰擪大指按也譩嘻熊音依熙痛聲也志云蓋意為脾志喜為心志心有所憶謂之意意之所在神亦隨之簡按此説可謂鑿矣譩嘻又作噫嘻詩周頌噫嘻成王毛傳噫嘆也嘻和也鄭箋噫嘻有所多大之聲也左傳定八年嘻速駕杜注嘻懼聲正義曰噫嘻皆是嘆聲猶云嗟嗟也説文嘻痛也徐鍇云痛而呼之言也從風憎風馬雲此言感風惡風者吳云病由於風則憎風志云從風迎風也失枕吳云失枕者風在頸項頸痛不利不能就枕也張同高折一字句至正灸脊中連上為失枕治法注云夜臥失枕患在肩上橫骨間伸舒不能故如折也簡按高注非是巢源失枕候云失枕頭項有風在於筋脈間因臥而氣血虛者值風發動故失枕是也又和劑指南云諸風挫枕轉筋者皆因氣虛項筋轉側不得筋絡不順疼痛乃亦失枕之謂肩上橫骨馬雲肩上橫骨間乃肩尖端上行兩叉骨罅間陷中名巨骨穴王注以為缺盆穴者恐缺盆難治失枕吳同張云或為足少陽之肩井穴亦主頸項之痛折使榆臂榆宋本作揄諸本誤作榆者本於熊本馬雲折音舌禮雜記大夫不揄絞玉藻夫人揄狄其揄俱讀為搖此言折臂者當有灸之之法也凡人折臂者使人自搖其臂而曲之上與肘齊即臂脊之中而灸之以疏通其肘臂之氣蓋細詳之乃三陽絡之所也系手少陽三焦經腕後臂外四寸灸七壯禁針按督脈十一椎下有脊中此穴與折臂無義故為臂脊之中王注以為此節治上節失枕者尤非吳云折使謂手拘攣而曲其所使也榆臂如榆枝之掉搖其臂也是風在手陽明使然故令齊其肘正灸臂脊之中蓋手陽明大腸經之分也張云折痛如折也榆當作揄引也謂使病者引臂下齊肘端以度脊中乃其當灸之處蓋即督脈之陽關穴也在第十六椎下志云折者謂脊背磬折而不能伸舒也榆讀作搖謂搖其手臂下垂齊肘尖而正對於脊中以灸脊中之節穴高雲搖臂平肘則脊中有窩當正灸脊中毋他求也簡按諸説不知何是脈要精微論王注折髀云髀如折又注折腰云腰如折也馬張解折字蓋本於此揄引也出於説文而靈邪氣臟腑病形篇云取諸外經者揄申而從之則張注有所據焉陽關穴甲乙千金外臺並不載但銅人云伏而取之八髎本篇下文云尻骨空在髀骨之後相去四寸王云是謂尻骨八髎穴也又刺腰痛論云腰痛引少腹控䏚不可以仰刺腰尻交者兩踝胂上王注腰尻交者謂髁下尻骨兩旁四骨空左右八穴俗呼此骨為八髎骨也當考甲乙千金及十四經發揮諸書鼠瘻寒熱吳云鼠瘻寒氣陷脈為瘻其形如鼠也為病令人寒熱簡按靈寒熱篇云寒熱瘰癧在於頸腋者皆何氣使生岐伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者也張注云瘰癧者其狀纍然而歷貫上下也故於頸腋之間皆能有之因其形如鼠穴塞其一復穿其一故又名鼠瘻蓋寒熱之毒留於經脈所以聯絡不止一曰結核連續者為瘰癧形長如蜆蛤者為馬刀朱震亨云瘰癧不作寒熱者可生稍久轉為潮熱者危是也淮南説山訓貍頭愈鼠雞頭已瘻説文癙漏創也瘻腫也一曰久創知是二字俱漏瘡之謂蓋其狀纍然未潰者為瘰病已潰而膿不止者為鼠瘻寒府在附膝外解營張云凡寒氣自下而上者必聚於膝是以膝臏最寒故名寒府營窟也當是足少陽經之陽關穴在陽陵泉上一寸蓋鼠瘻在頸腋之間病在肝膽故當取此以治之吳云營空也志云鼠瘻寒熱病也其本在臟其末上出於頸腋之間寒府者膀胱為腎臟寒水之腑也病在臟而還取之腑者謂陰臟之邪當從陽氣以疏泄也營營穴也謂所取寒府之穴在附於膝之外筋營間之委中穴也高本解營各一字句注云太陽膀胱寒水為腎之腑故還刺寒府寒府太陽經脈也附膝外膝外側也解骨解膝外側之骨縫也榮榮俞足小指本節之通谷穴也簡按太陽寒水運氣家之言不可從營窟也乃外解之穴也禮運冬則居營窟夏則居櫓巢孟子騰文公篇下者為巢上者為營窟下文云齊下之營明是營乃窟之義張注為是鼠瘻之患在於頸腋而取之於膝外解營故曰還刺拜志云拜揖也取膝上外解之委中者使之拜則膝挺而後直其穴易取也簡按吳澄禮記纂言云周禮九拜一曰拜先跪兩膝著地次拱兩手到地乃俯其首不至於地其首懸空俱與腰平荀子所謂平衡曰拜是也周禮謂之空首尚書謂之拜手與凡經傳記單言拜者皆謂此拜也考説文手著胸曰揖儀禮鄉飲酒禮注推手曰揖引手曰厭禮玉藻注揖之謂小俯也由此觀之拜與揖遞別志以揖釋拜誤跪志云跪則足折而湧泉之穴宛在於足心之橫紋間矣簡按釋名云跪危也兩膝隱地體危倪也禮記鄭注坐皆訓跪然記云授立不跪授坐不立莊子亦云跪坐而進之則跪與坐又有小異跪有危義故兩膝著地伸腰及股而勢危者為跪蓋此以跟著尻聳身者也更引身而起者為長跪蓋膝著地伸腰者也兩膝著地以尻著跖而稍安者為坐也詳見朱子文集六十八卷及日知録任脈者起於中極張云以下任沖督脈皆奇經也起言外脈之所起非發源之謂也下仿此簡按楊玄操注二十八難云任者妊也此是人之生養之本故曰位中極之下長強之上李時珍云任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海上頤循面入目吳云難經甲乙無此六字蓋略之也衝脈者起於氣街楊玄操云沖者通也言此脈下至於足上至於頭通受十二經之氣血故曰沖焉虞庶云素問曰衝脈起於氣街難經曰起於氣衝又針經穴中兩存其名沖街之義俱且通也李時珍云衝脈起於會陰挾臍而行直衝於上為諸脈之衝要故曰十二經脈之海並少陰之經張云衝脈起於氣街並足少陰之經會於橫骨大赫等十一穴挾臍上行至胸中而散此言衝脈之前行者也然少陰之脈上股內後廉貫脊屬腎衝脈亦入脊內為伏沖之脈然則衝脈之後行者當亦並少陰無疑也逆順肥瘦篇曰衝脈者五臟六腑之海也其下者注少陰之大絡出於氣街又云其下者並於少陰之經滲三陰動輸篇云衝脈者十二經之海也與少陰之大絡起於腎下出於氣街簡按虞庶云素問曰並足少陰之經難經卻言並足陽明之經簡按痿論與陽明合於宗筋況少陰之經挾臍左右各五分陽明之經挾臍左右各二寸氣衝又是陽明脈氣所發如此推之則衝脈自氣衝起在陽明少陰二經之內挾臍上行其理明矣李時珍云足陽明去腹中行二寸少陰去腹中行五分衝脈行於二經之間也內結七疝馬雲內者腹也腹之中行乃任脈所行之脈路則宜其為病若是難經二十九難云其內苦結男子為七疝女子為瘕聚七疝乃五臟疝及狐疝㿗疝也出於刺逆從篇脈要精微論大奇論脈解篇陰陽別論靈邪氣臟腑病形篇等吳云七疝寒水筋血氣狐頽也張注四時刺逆從篇云七疝者乃總諸病為言如本篇所言者六也狐疝風及五臟風疝邪氣臟腑病形篇所言者一也㿉疝蓋以諸經之疝所屬有七故云七疝若狐㿗沖厥之類亦過為七疝之別名耳後世如巢氏所敘七疝則曰厥癥寒氣盤肘狼虞庶難經注依巢氏釋之至張子和非之曰此俗工所立謬名也於是亦立七疝之名曰寒水筋血氣狐㿗吳注本之學者當以經旨為宗簡按七疝考經文其目未明顯姑從馬張之義王永輔惠濟方以石血陰氣妒肌疝癖為七疝亦未知何據李中梓必讀別立七疝之名分㿉與㿗誤甚帶下瘕聚吳云帶下白赤帶下也瘕聚氣痛不常之名馬雲瘕聚者乃積聚也大奇論曰三陽急為瘕按後世有八瘕者亦因七疝之名而遂有八瘕名色即蛇瘕脂瘕青瘕黃瘕燥瘕血瘕狐瘕鱉瘕是也內經無之志云瘕者假血液而時下汁沫聚者氣逆滯而為聚積也高雲帶下濕濁下淫也瘕聚血液內瘀也簡按赤白帶下昉見於病源而古所謂帶下乃腰帶以下之義疾繫於月經者總稱帶下史記扁鵲為帶下醫金匱有帶下三十六病之目可以見也虞庶注二十九難云瘕者謂假於物形是也逆氣裡急張云衝脈挾臍上行至於胸中故其氣不順則隔塞逆氣血不和則胸腹裡急也簡按丁德用注二十九難云逆氣腹逆也裡急腹痛也巢氏病源云裡急腹裡拘急也督脈者起於少腹楊玄操注二十八難云督之為言都也是人陽脈之都綱李時珍云督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海張云少腹小腹也簡按莊子養生主緣督以為經釋文李頤云督中也朱子云督舊以為中蓋人身有督脈循脊之中貫徹上下見醫書故衣背當中之縫亦謂之督見深衣注皆中意也考督又作𧝴裻劉熙釋名曰自臍以下曰水腹水汋所聚也又曰少腹少小也比於臍上為小也太平御覽云腹下旁曰少腹御覽之説非也骨中央張云橫骨下近外之中央也系廷孔吳云廷孔陰廷之孔也張云廷正也直也廷孔言正中之直孔即溺孔也志云廷孔陰戶也溺孔之端陰內之産門也此言督脈起於少腹之內故舉女子之産戶以明之當知男子之督脈亦起於少腹內宗筋之本處也簡按廷挺同産門挺出故曰廷孔志注為是張訓正也直也以為溺孔誤王三字連讀以端為上端産戶在溺孔之下並非是篡間甲乙作纂張云篡初患切交篡之義謂兩便爭行之所即前後二陰之間也簡按李時珍八脈考釋音篡初患切陰下縫間也蓋篡當作纂甲乙為是説文纂似組而赤蓋兩陰之間有一道縫處其狀如纂組故謂之纂張以篡奪之篡釋之非少陰上股內樓氏綱目云自少陰上股內至目十五字必有脫簡否則古注衍文其少腹直上者張云按此皆任脈之道而本節列為督脈五音五味篇曰任脈衝脈皆起於胞中上循背裡為經絡之海然則前亦督也後亦任也故啓玄子引古經云云沖疝五臟生成篇云有積聚在腹中有厥氣名曰厥疝史記倉公傳云齊郎中令循病衆醫皆以為蹶入中而刺之臣意診之曰湧疝也令人不得前後溲蓋與此同證異名後世或呼為奔豚疝氣是治在骨上志云骨謂脊背之骨穴也高同簡按與諸注異未詳孰是在齊下營志云營謂腹間之肉穴也高雲乃少腹以下骨中央督脈所起之部也漸者上俠頤也志云漸者謂督脈之入喉者上唇齒而漸分為兩岐挾頤入目當於漸上俠頤之處而刺之高雲此復申明衝脈之為病也靈樞五音五味篇云衝脈任脈皆起於胞中其浮而外者會於咽喉別而絡唇口是衝脈不但至胸中而亦上頤循面故復舉衝脈之病以明之簡按前注併為治陽明之脈而上文言上頤循面者任也高引五音五味篇以為衝脈非是蹇膝高雲蹇難也蹇膝膝難進也膝蹇故伸不能屈簡按説文蹇跛也釋名云蹇跛蹇也病不執事役也高訓難見易蹇卦治其楗張云股骨曰楗詳見後文治其楗者謂治其膝輔骨之上前陰橫骨之下蓋指股中足陽明髀關等穴也治其機張云挾臀兩旁骨縫之動處曰機即足少陽之環跳穴也暑解吳云熱蓄骨解也張云因立暑中而肢體散解不收者當治其骸關謂足少陽之陽關穴也簡按王引一經似是拇指熊音拇音母大拇指吳云小拇指也足太陽經所出故治其膕張同志云足之拇指厥陰肝經之井滎厥陰之脈上膕內廉故當治其膕高雲足大指也簡按説文拇將指也急就篇顏師古注拇大指也一名將指吳注誤如物隱者馬雲如膝中有物隱於內者當治其關疑是承扶穴也系足太陽膀胱經尻臀下陰紋中高雲隱猶藏也膝痛如物隱者痛而高腫如物內藏也背內吳云謂太陽經之氣穴背俞之類也志高同簡按馬張仍王注定為大杼穴恐非治陽明中俞髎吳云俞髎謂六俞之穴井滎輸原經合取其所宜也張云王氏注為三里愚謂指陽明輸穴當是陷谷耳高雲髎骨穴也中俞足陽明輸穴也五輸之穴前有井榮後有經合輸居中故曰中俞髎足中指間陷谷穴也若別馬雲謂三里穴而欲取別穴吳云若胻痛支別者宜治巨陽滎通谷少陰滎然谷也張云若再別求治法則足太陽之滎穴通谷足少陰之滎穴然谷皆可以治前證簡按於文義張注近是淫濼張云滑精遺瀝也如本神篇曰精傷則骨痠痿厥精時自下即此節之謂高雲淫極也濼寒也淫濼脛痠極寒而脛痠削也熊音濼力毒反簡按此狀脛痠之貌也靈厥病篇風痹淫濼又云股脛淫濼巢源皮膚淫躍又云淫淫躍躍肘後方云風尸者淫躍不知痛之所在本草黑字云貍骨主風疰尸疰鬼疰毒氣在皮中淫躍如針刺者千金隱軫六十四種風淫液走入皮中巢源注病肌肉淫奕又淫奕皮膚去來擊痛文選枚乘七發血脈淫濯手足惰窳李善注淫濯謂過度而且大也又曰濯大也龍龕手鑑云㿑音藥淫病也療病消也並是淫濼之濼蓋淫濼淫躍淫液淫奕淫濯並同張高之解固牽強而王注亦屬未安又靈厥病篇注馬雲風痹者其邪氣淫泆消爍病難得愈張云淫濼者淫浸日深之謂二説亦通治少陽之維張云維絡也經脈篇云少陽之別名曰光明去踝五寸坐不能起取之所別簡按扁鵲傳中經維絡知維乃絡之謂輔骨上橫骨下為楗吳云輔骨膝輔骨橫骨腰橫骨是楗為股骨也張同高雲上文云蹇膝伸不屈治其楗所謂楗者輔骨上橫骨下為楗股脛皆有輔骨乃大骨之旁骨此輔骨股內旁骨也橫骨臍下小腹兩旁之骨也簡按輔骨有二經文無所考可疑矣沈彤釋骨云自兩髂而下在膝以上者曰髀骨曰股骨其直者曰楗考枯骨象髀樞在關旁納機不在機端而説者名髀骨為髀樞骨又以為楗骨下誤甚考楗通作鍵説文楗距門也顏氏家訓曰蔡雍月令章句云鍵關牡也所以止扉楗骨之義蓋取於此張云楗音健剛木似未切貼挾髖為機吳云髖兩股間也俠髖相接之處為機張云髖尻也即脽臀也一曰兩股間也機樞機也挾臀之外即楗骨上運動之機故曰挾髖為機當環跳穴處是也高雲上文云坐而膝痛治其機所謂機者挾髖為機挾並也髖臀上兩旁側骨也沈承之經絡全書云髖腰胯骨也亦謂之踝即腰踝骨腰旁挾脊平立陷者中按之有骨機關處動者是也沈彤雲關之旁曰髀樞亦曰樞機者髀骨之入樞者也簡按髖説文髀上也廣雅釋名並云髂也髂腰骨也兩股間謂之髖未見所據膝解為骸關張云骸音鞋説文云脛骨也脛骨之上膝之節解也是為骸關高雲上文云立而暑解治其骸關所謂骸關者膝後分解之處沈彤雲按即膝外解上下之輔骨蓋名關本取兩骨可開闔之義故指骨解與兩骨並通連骸張云膝上兩側皆有挾膝高骨與骸骨相接連故曰連骸骸下為輔張云連骸下高骨是為內外輔骨高雲骸下即骸關之下沈彤雲挾膝之骨曰輔骨內曰內輔外曰外輔其專以骸上為輔者骨空論云骸下為輔下乃上之訛也則膝旁不曰輔而曰連骸骸上者𩩋之上端也簡按詩有乃棄爾輔正義云輔是可解脫之物蓋如今人縛杖於輻以防輔車也左傳有輔車相依韓非十過篇夫虞之有虢也如車之有輔輔依車輔亦依車可知輔即夾車軸故假為頰車又假為挾膝之稱也又據彤説骸上為輔則下文輔上為膕亦當作輔下為膕此必不然輔上為膕張云輔骨上向膝後曲處為膕別委中穴也膕上為關張云膕上骨節動處即所謂骸關也高雲上文云膝如物隱者治其關所謂關者膕上為關腿曲處之上也頭橫骨為枕張云腦後橫骨為枕骨高雲上文云膝痛不可屈伸治其背內背上通枕骨故不釋背內而釋頭橫骨為枕知頭橫骨為枕則知脊直骨為背矣簡按高屬強解志云骨之精髓從枕骨之髓空而會於腦故論膝䯒之骨而曰頭橫骨為枕言骨氣之上下相通也此説稍通然以上下文義求之蓋有他篇釋周身骨節之名者此其斷文以上文有楗機骸關等之名後人次於此者所以上文無治其枕之説也一切經音義云䪴聲類云項中有所枕也考聲腦後骨也今謂之玉䪴知枕又作䪴左右各一行高本作二行注云行音杭舊本訛左右各一行今改二行伏兔上兩行行五乃左右各二行行五則四五二十俞其俞在膕踝上各一行行六穴則左右十二俞其俞在足是水俞五十七穴而本於腎也簡按考下篇水熱穴論若一行則不合五十七之數今從之腦後五分高作三分在顱際鋭骨之下吳刪在字高雲在懸顱穴之際懸顱在頭兩旁鋭骨之下鋭骨尖骨也簡按懸顱在曲角顳顬中不得言腦後諸家仍王為風府今亦從之齗基下吳云言一空在口內上齗之基張云唇內上齒縫中曰齗交則下齒縫中當為齗基今曰齗基下者乃頤下正中骨罅也馬同云系任脈經簡按下頤當在承漿下吳注似指齦交復骨馬雲在項後之中復有骨之上即喑門穴也吳云項有三骨中骨之次又復一骨故云中復骨下蓋大椎穴也張云即大椎上骨節空也復當作伏蓋項骨三節不甚顯簡按張注為是然伏復通用骨蒸復連或作伏連一伏時本是一復時則不必改字尻骨下空馬吳張並仍新校正為長強今從之數髓空在面挾鼻張云數數處也在面者如足陽明之承泣巨髎手太陽之顴髎足太陽之睛明手少陽之絲竹空足少陽之瞳子髎聽會挾鼻者如手陽明之迎香等皆在面之骨空也當兩肩簡按甲乙大迎一名髓空故王以為大迎髆中之陽吳云髆陽髆之外也張云髆肩髆也中之陽肩中之上嵎也即手陽明肩髃之次志云陽外側也簡按説文髃肩甲也臂骨空在臂陽去踝四寸張云臂陽臂外也去踝四寸兩骨之間手少陽通間之次也亦名三陽絡吳云臂有兩骨去踝四寸許髓空在其間臂陽臂外也簡按甲乙三陽絡在臂上大交脈支溝上一寸而甲乙又云支溝在脘後二寸兩骨之間陷者中如此則不合去踝四寸之數可疑矣吳不指言某穴似是股際骨空吳云股際骨前陰曲骨也張云毛中動下謂曲骨兩旁股際足太陰衝門動脈之下也高雲股際陰股交會之際股際骨空在毛中動下乃動脈之下跨縫間也簡按曲骨在毛際今曰毛中不可定為曲骨穴尻骨空志云尻骨臀骨也髀骨在股骨之上少股兩旁突起之大骨前下連於橫骨後連於尻骨高雲尻骨尾骨也髀骨臀側骨也髀之後相去四寸正當尻骨空之處簡按以上骨空諸家定為某穴唯志高不注穴名蓋有所見也扁骨有滲理湊張云扁骨者對圓骨而言凡圓骨內皆有髓有髓則有髓孔但若扁骨則有血脈滲灌之理湊而內無髓吳同高雲扁骨胸脊相交之肋骨也志同簡按扁骨概通體扁骨而言張注為是易髓無空吳云但有滲灌之腠無復髓孔也故變易無體則無孔也高雲易交易也扁骨有淡滲之紋理湊會於胸脊其內則無髓孔申明滲理湊者髓之交易也無髓孔者兩頭無空也簡按高似穩貼馬張志仍王灸寒熱之法張云此下灸寒熱之法多以虛勞為言然當因病隨經而取之也壯數千金方云凡言壯數者若丁壯病根深篤可倍於方數老少羸弱可減半沈括筆談云醫用艾一灼謂之一壯以壯人為法也其言若干壯壯人當依此數老幼羸弱量力減之橛骨簡按説文橛弋也又𩪗尻骨也知橛骨即是𩪗骨本或作撅非陷者灸之張云陷下之處即經氣之不足者肩上陷者灸之高雲五臟六腑之俞皆在於背故視背俞其俞內陷者則於左右以灸之視之之法須舉其臂肩舉臂肩而背上陷者即灸之簡按諸家以肩髃釋之拘矣以下高不指言穴名腨下陷脈張云足太陽承山穴也動如筋者張云此結聚也但隨其所有而灸之不必拘於俞穴吳云此非謂穴乃肉間結核也掌束骨下高雲束骨橫骨也掌束骨下猶言掌下束骨謂橫骨縫中大陵二穴樓氏綱目云王注陽池未詳是否簡按甲乙陽池在手表上脘中陷者中大陵在掌兩筋間陷者中亦未知孰是犬所齧張云犬傷令人寒熱者古有灸法如此吳云古別有灸法故云然也簡按千金翼云狂犬咬人令人吮去惡血盡灸百壯後日日灸百日止銅人經云外丘治猘犬所傷毒不出發寒熱速以三壯艾可灸齧處立愈齧本作齧非二十九處張云自犬齧之上共計二十九處犬傷者無定處故不在數內簡按高合犬齧處二為二十九處然經文無犬齧處二文不可從今考自大椎至巔上一合左右共二十七處加犬所齧為二十八處知如新校正所言跗上之下去灸之二字者誤也傷食灸之傷食諸家為飲食傷之義高獨改食作蝕注云若灸二十九處乃傷爛如蝕陽氣下陷則當灸之牽強甚矣視其經之過於陽者吳云刺以瀉其陽藥以和其陰張云陽邪之盛者也水熱穴論篇第六十一馬雲論治水治熱之穴故名篇胕腫吳云浮腫曰胕張同高雲胕腫者皮肌脹滿水氣不行簡按胕音符山海經竹山有草焉其名曰黃雚浴之已疥又可以已胕郭璞注云治胕腫也馬則云其胕必腫誤腎汗出經脈別論云持重遠行汗出於腎玄府者汗空也馬雲汗空雖細微最為玄遠故曰玄張云汗屬水水色玄汗之所居故曰玄府從孔而出故曰汗空然汗由氣化出乎玄微是亦玄府之義分為相輸馬雲此二經之分本為相輸相應俱受其病者以水氣之留也張云言水能分行諸氣相為輸應而俱受病者正以水氣同類水病則氣應氣病則水應留而不行俱為病志云此水分為相輸而上下俱受病者蓋腎俞之循尻而下復循腹而上貫肺中水氣之留於經俞故也高雲腎氣上升肺氣下降上下分行相為輸布今俱受病者乃水氣之所留聚也伏兔上各二行簡按伏兔諸家以為足陽明經穴恐非也此蓋謂膝上有肉起如兔之狀故名之又據輔骨考之取義於車伏兔輹一名伏兔又作轐考工記鄭注轐伏兔也賈疏云漢時名今人謂之車屐也志云上謂伏兔上非上下之上也此説可從行五蓋今無可考諸注為腹上亦恐非高雲並伏兔之穴在內旁兩行其一有血海陰陵泉地機築賓交信五穴其一有陰包曲泉膝關中都蠡溝五穴以上諸穴並在膝下不得言伏兔上注高誤耳三陰之所交張云三陰肝脾腎三陰也三經所交俱結於腳故足太陰有三陰交高作三陰交之所結於腳也注云三陰交舊本訛三陰之所交今改正兩行並行三陰交總結於下上連於脛下貫於腳故曰三陰交之所結於腳也簡按今仍舊文經脈篇云足太陰交出厥陰之前上膝股內前廉足少陰上股內後廉足厥陰交出太陰之後上膕內廉循股入毛中此所謂三陰所交結於腳是也踝上各一行行六志云謂照海水泉大鐘大溪然谷湧泉六穴也高雲謂三陰交漏谷商丘公孫太白大都六穴名曰太衝志云夫聖人南面而立前曰廣明後曰大沖大沖之地名曰少陰少陰根起於湧泉是泉在地之下從至陰而湧出故曰腎者至陰也帝曰春取絡脈分肉高雲本輸篇云春取絡脈諸榮大筋分肉之間故問春取絡脈之分肉刺極淺者何也簡按本輸篇四時氣篇寒熱病篇終始篇四時刺逆從論診要經終篇並論四時刺法本節最詳而義互異然與水熱穴義不太涉疑是他篇錯簡夏取盛經分腠高雲四時氣篇云夏取盛經孫絡取分間絶皮膚故問夏取盛經分腠刺稍深者何也脈瘦氣弱馬雲臟氣始長其脈尚瘦其氣尚弱志高同陽氣留溢甲乙留作流熱熏分腠甲乙作溫於腠內絶膚而病去馬雲用刺法者必取此盛經分腠以治之先以左手按絶其皮膚而右手刺之即病去者邪尚淺也吳云絶其邪氣於膚間高雲夏時亦有絶皮膚取孫絡之病故又言絶膚而病去者邪居淺也今所謂取盛經者乃盛陽之經脈不在皮膚也秋取經輸馬雲各經之經穴輸穴也高雲四時氣篇云秋取經輸邪在腑取之合故問秋取經輸刺之深者何也收殺高雲收收斂殺肅殺也取輸以瀉陰邪高雲時方清肅故陰氣初勝白露乃下故濕氣及體陰氣初勝則陰氣未盛濕氣及體則未能深入故取輸以瀉陰濕之邪俞經輸也所以答帝秋取經俞之問取合以虛陽邪高雲秋時亦有陽邪內入之病若果陽氣在合則取合以虛陽邪所以然者秋時陽氣始衰故當更取於合不但取於經輸也簡按馬雲此節帝分明以經輸為問而伯乃對言所取在合其陰經則取輸要知伯之所答者為是而帝之所問者誤也此説不可從皇甫士安既云是謂始秋之治變是也故曰冬取井滎吳云故曰古語也冬時既取其在下之井滎則下無逆陰故春時木氣升發亦無鼽衄之患也高雲金匱真言論云冬不按蹻春不鼽衄不按蹻者使之藏取井滎者亦使之藏故不曰冬不按蹺而冬取井滎也馬雲按此篇秋曰治合則陽氣尚在合而治之冬曰井滎以陰邪欲下逆而出之其春必刺絡脈分肉處夏必刺盛經分腠矣難經以春為刺井夏為刺滎秋為刺經冬為刺合與此大反要知經之所言者是而難經則非也簡按靈順氣一日分為四時篇冬刺井春刺滎夏刺輸長夏刺經秋刺合又本輸篇云春滎夏輸秋合冬井並與此篇同新校正云與九卷義相通即是也領別札記仲尼燕居鄭注領猶治也膺俞高雲膺中第一俞兩旁俞府穴也簡按甲乙俞府在巨骨下去璇璣旁各二寸陷者中宜是言膺中第一俞而甲乙中府一名膺中俞則高注卻非背俞高雲背中第一俞兩旁肺俞穴也簡按與舊注異未知孰是新校正亦疑王注其説不一髓空志云即橫骨穴所謂股際骨空在毛中動下高雲骨空論云髓空在腦後三分鋭骨之下懸顱二穴簡按甲乙大迎一名髓孔若為督脈之腰俞則不合此八者之數王注恐非志注亦無徵然若為懸顱大迎等穴則並在頭部不宜次於委中之下亦似可疑熱之左右也吳云左右習近也馬雲皆治熱之左右穴也調經論篇第六十二馬雲內言病有虛實宜善調其經神有餘甲乙神下有有字下文氣下血下形下志下並同精氣王引針經見靈決氣篇云腠理發泄汗出溱溱是謂津谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液文少異易繫辭云精氣為物疏陰陽精靈之氣氤氳積聚而為萬物也春秋繁露云氣之清者為精治身者以積精為寶十六部志云十六部之經脈也手足經脈十二蹻脈二督脈一任脈一共十六部高雲謂兩肘兩臂兩膕兩股身之前後左右頭之前後左右也簡按高勝於舊注脾藏肉高雲脾藏身形之肉則形有餘不足脾所主也而此成形吳此作各志意通甲乙通下有達字吳補調字成身形五臟甲乙無身字及五臟二字五臟之道皆出於經隧吳云道路也隧田間之水道也謂之經隧者經脈流行之道也簡按王據於左傳杜注闕地通道曰隧吳本於周禮隧人職義並通血氣未並張云並偏聚也邪之中人久而不散則或並於氣或並於血病乃甚矣神之微張云此外邪之在心經也浮淺微邪在脈之表神之微病也出血吳刪二字勿之深斥吳云斥刺也張云斥棄除也高雲斥開拓也簡按今從高注按而致之吳云以按摩致氣於其虛絡勿釋吳云勿已也著針勿斥志云著針者如以布𢅎著之乃從單布上刺謂當刺之極淺而勿推內其針簡按此謂著針於病處勿開拓而泄其氣也王注為是移氣於不足高雲微泄其邪移氣於不足之氣而補簡按新校正引甲乙太素刪不字馬雲移邪氣於不足立非息利少氣馬雲本神篇言肺虛則鼻息不利少氣即本文之少氣也實則喘喝胸盈仰息即本文之喘咳上氣也高雲息利鼻氣出入也白氣微泄高雲猶言微虛也瀉其經隧張云瀉其經隧者謂察其有餘之脈瀉其邪氣而已志云經隧大絡也高雲通經脈之隧道故必無傷其經簡按楊注似是適人必革張云適至也革變也先行按摩之法欲皮膚之氣流行也次出針而視之曰我將深之欲其恐懼而精神內伏也適人必革者謂針之至人必變革前説而刺仍淺也如是則精氣既伏於內邪氣散亂無所止息而泄於外故真氣得其所矣志云出針出而淺之也視之視其淺深之義也曰我將深之適人之邪淺客於皮必與正氣相格庶邪散而正氣不泄故曰我將深之謂將持內之而使精氣自伏復放而出之令邪無散亂迎之隨之以意和之無所休息使邪氣泄於皮毛腠理而真氣乃相得復於肌表此用針淺深之妙法也簡按張注本楊志注似允當然其旨未明晰今亦仍楊義精氣自伏高雲精氣退伏不濡空竅也邪氣散亂者散亂於經邪無從出也無所休息者正虛邪盛病無已時也惟刺之極淺使邪氣泄於腠理從腠理而外泄故真氣乃相得簡按此與舊注相乖不可從不足則恐今甲乙作不足則慧孫絡水溢甲乙水作外脈大疾出其針吳云脈大者留針之久氣至而脈漸大也簡按高疾字下句非涇溲吳云涇水行有常也溲溺溲也涇溲不利言常行之小便不利也簡按諸注並誤詳見於厥論微風吳云肌肉蠕動肌肉間如蟲行動也風為動物故動者命曰微風高雲風邪入於肌肉則肌肉蠕動命曰微風言微風在肌肉也腹脹飧泄張云腎藏志水之精也水化寒故腎邪有餘則寒氣在腹而為腹脹飧泄腎氣不足則陰虛陽勝而為厥逆上衝本神篇曰腎藏精精舍志腎氣虛則厥實則脹骨節有動甲乙動作傷吳此下補則骨節有微風六字瀉然筋血者馬吳張並云然筋當作然谷志云然謂然谷穴在足踝下之兩經間高作筋間故曰然筋簡按本輸篇云腎溜於然谷然骨之下者也繆刺論云刺足內踝之下然骨之前出血據此則楊注為是刺未並高雲血氣未並五臟安定骨節有動故問刺未並奈何邪所乃能立虛簡按不必從甲乙改字王注義通氣血以並以甲乙作已以已同陰陽相傾張云並偏勝也傾傾陷也氣為陽故亂於衛血為陰故逆於經陰陽不和則氣血離居故實者偏實虛者偏虛彼此相傾也血並於陰氣並於陽吳云血並於陰臟是為重陰氣並於陽腑是為重陽驚狂癲狂也志云此言血分氣分之為陰陽也脈外氣分為陽脈內血分為陰陰血滿之於外陽氣注於脈中是為陰陽勻平如血並居於陰則陰盛而血實心主血脈故陰盛則驚氣並於陽則陽盛而氣實陽盛則發狂也血並於陽氣並於陰吳云血並於陽則表寒氣並於陰則裡熱炅中熱中也心煩惋惋甲乙作悶吳云心火為陰邪所蔽故煩惋善怒吳云陽並於下部則肝木為陽所炙故善怒善忘張云血並於下則陰氣不升氣並於上則陽氣不降陰陽離散故神亂而喜忘志云靈樞經曰清濁之氣相干亂於胸中是為大悗傷寒論曰其人喜忘者必有蓄血宜抵當湯下之如是血氣離居何者為實高本作如血氣離居是何者為實注云舊本如是二字相連今改簡按不必改字義自通消而去之馬雲溫則消釋而易行高雲消不凝也去流也絡之與孫脈吳作孫絡注云絡正絡也孫絡支絡也志云絡者經脈之支別也孫脈者乃孫絡之脈別經者簡按今仍志俱輸於經輸甲乙作注大厥張云上文言血與血並氣與氣並偏虛偏實也此言血與氣並並者為實不並者為虛也血氣並走於上則上實下虛下虛則陰脫陰脫則根本離絶而下厥上竭是為大厥志云氣復反則生謂復歸於下也蓋陽氣生於下而升於上血氣並逆則氣機不轉而暴死反則旋轉而復生何道從來高雲從何道來簡按天真論病安從來字法同皆有俞會吳云經穴有俞有會也馬雲六陽經六陰經皆有俞穴所會志云俞者謂三百六十五俞穴乃血脈之所流注會者謂三百六十五會乃神氣之所遊行皆陰陽血氣之所輸會者也高雲俞會者五五二十五俞六六三十六俞與周身陰陽血氣相會合也陰陽勻平甲乙作紃平簡按紃音旬説文圜採也義不相協得之風雨寒暑簡按據下文宜云風雨寒濕輸於大經脈馬雲皮部論云邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也繆刺論云邪之客於形也必先合於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈義同皮膚不收吳云不收者肌膚虛浮不收斂也此由濕勝所致張云皮膚不收而為縱緩肌肉堅緊而為削瘦高雲不收汗出而不閉密也簡按寒主收斂此云不收則與肌肉緊緊相反甲乙太素近是聶闢氣不足馬雲乃肌肉僻積之意根結篇有腸胃聶闢是主腸胃而言張云凡言語輕小曰聶足弱不能行曰闢志云聶㒤同闢積也高雲肌肉皮膚聶聶然而闢動也簡按聶闢褶襞也儀禮襚者以褶禮記衣有襞折曰褶通作褶一切經音義云褶皺之涉知獵二反褶猶褶疊也亦細褶王注義同甲乙不足下有血澀二字喜怒不節張云按下文以喜則氣下為虛而此節所重在怒故曰實也觀陰氣上逆之意言怒可知又舉痛論曰怒則氣上正此之謂簡按下文云喜則氣下則此喜字衍新校正為是淮南精神訓云人大怒傷陰大喜墜陽熏滿簡按今仍甲乙作動臟形氣衰少吳云形氣陰氣也衰少虛也穀氣不盛馬雲形氣衰少而飲食隨減所以穀氣不盛也志云飲食勞倦則傷脾脾主肌肉故形氣衰少也水穀入胃由脾氣之轉輸脾不運行則穀氣不盛矣下脘不通志云上焦不能宣五穀之味下焦不能受水穀之津高雲上焦不能宣五穀味故上焦不行下脘不能化谷之精故下脘不通熱氣熏胸中甲乙無熱氣二字玄府不通志云玄府毛竅之汗空也毫毛之腠理閉塞則衛氣不得泄越而為熱矣故外熱張云上焦之氣主陽分也故外傷寒邪則上焦不通肌表閉塞衛氣鬱聚無所流行而為外熱所謂人傷於寒則病為熱此外感證也昂云此即今人外感傷寒之症獨留則血凝泣吳留下更增一留字凝則脈不通吳凝上增一泣字脈甲乙作腠理似是脈盛大以澀張云寒留中焦陽氣乃去經脈凝滯故盛大而澀蓋陽脈流利多滑不滑則無陽可知簡按厥氣上逆故脈盛大血凝泣故脈澀馬雲此節脈若作外診之脈理宜沉澀今曰盛大而澀恐是在中之脈非外見者昂云按陰盛中寒血澀之人何以反得盛大之脈並誤血氣以並病形以成甲乙以作已次節並同用形哉吳云言因其形之長短闊狹肥瘦而施刺法也志云用以也言當以調其形形者皮膚肌肉哉者未盡之辭雖曰用形哉必因天之四時簡按今仍吳注多少高下吳云如曰以月生死為痏數繆刺論多少之謂也春時俞在頸項夏時俞在胸脅秋時俞在肩背冬時俞在腰股金匱真言論高下之謂也如利其戶簡按如而同下文如利其路之如亦同諸家措而不釋何諸必切而出吳云切切脈之切謂以指輕按而親切之所以散其正氣也張云必切中其疾而後出針高雲切按也必切而出謂右手持針左手必切其穴而使之外出大氣乃屈馬雲大邪之氣也見熱論中高雲大氣即相併之盛氣也持針勿置吳云言持針勿使放置也志云持針在手勿置之意外以定其迎隨之意氣出針入吳云人氣呼出之時則陽氣升於表於此時內針者欲其致氣易也熱不得還吳云熱針下所致之氣熱也簡按志以為熱邪非動氣候時張云動氣者氣至為故也候時者如待所貴不知日暮也馬雲離合真邪論與此篇所論補瀉之法聯屬成文庶幾學者熟讀熟玩又與官針篇第六節參看其講解之辭見八正神明論言虛實者有十馬雲神氣血肉志各有虛實是計之有十也絡三百六十五節張云所謂節者神氣之所會也以穴俞為言志云乃筋骨之會必被經脈吳云被及也故得六腑通雅云故固古通周語咨於故實史世家作固實調之絡張云癰疽篇曰血和則孫脈充滿溢乃注於絡脈而後注於經脈百病始生篇曰陽絡傷則血外溢陰絡傷則血內溢本論曰孫絡外溢則經有留血故病在血者當調之絡也燔針劫刺熊音燔音煩燒焚也馬雲見經筋篇吳燔上補病在筋三字注云燔針者內針之後以火燔之暖耳不必赤也高雲治痹證也經筋篇有十二筋痹證皆治以燔針劫刺痹發於陰故刺其下也及與急者謂筋痹也焠針藥尉吳云焠針者用火先赤其針而後刺不但暖也此治寒痹之在骨也張同簡按玉篇火入水謂之焠史天官書火與水合為焠然則焠針燒針而入水者乎官針篇云焠刺者刺燔針則取痹也王注燔針則云燒針注焠針則云火針知是燔針焠針即火針也荀子解蔽篇注焠灼也千金方云火針亦用鋒針油火燒之務在猛熱不熱即於人有損也針灸聚英云經曰焠針者以麻油滿盞燈草令多如大指許叢其燈火燒針頻以麻油蘸其針燒令通紅用方有功若不紅者反損於人又有煨針溫針意與火針有少異吳云藥尉者以藥之辛熱者尉其處也筋骨病有淺深之殊故古人治法亦因以異病不知所痛吳云病不知所痛者濕痹為患而無寒也故濕勝為痹寒勝為痛今不知所痛濕痹明矣高雲痹病在五臟之外合者必痛若痹病不知所痛則從奇經之脈而上故曰兩蹺為上兩蹺為上馬雲刺兩蹺之上張云二穴俱當取之故曰為上簡按志高並從馬非也謹察其九候簡按上文云九候若一命曰平人若不一則為病脈故謹察之前後貫串以明九候之不可不察也針道備矣甲乙備作畢
