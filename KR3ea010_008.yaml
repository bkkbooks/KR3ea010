body:
  text: 卷八繆刺論篇第六十三馬雲邪客於各經之絡則左痛取右右痛取左與經病異處故以繆刺名篇據靈樞官針篇第三節則巨刺亦左取右右取左特有經穴絡穴不同耳張云繆異也簡案繆廣韻靡幼切禮大傳注紕繆猶錯也王注從之蓋左病刺右右病刺左交錯其處故曰繆刺極於五臟簡按極至也見詩周頌注如此則治其經焉張云邪氣自淺入深而極於五臟之次者當治其經治經者十二經穴之正刺也尚非繆刺之謂入舍於孫絡甲乙絡作脈據上文當從甲乙大絡吳云十二經支注之大絡難經所謂絡脈十五絡是也高雲流溢傳注也氣穴論云孫絡之脈別經者並注於絡傳注十四絡脈者是也奇病張云病在支絡行不由經故曰奇病志云奇病者謂病氣在左而證見於右病氣在右而證見於左蓋大絡乃經脈之別陽走陰陰走陽者也與經相干馬雲其邪客大絡左注於右右注於左上下左右與經相干其實不得入於經而止布於四末志云經脈篇曰手太陰之別並太陰之經直入掌中手少陰之別循經入於心中蓋大絡俱並經附行故曰與經相干高雲經經隧也經隧者五臟六腑之大絡也故與經相干而輸布於手足之四末其氣左右流行無有常處經隧相干故不入於經俞不入於經俞刺其絡脈故命曰繆刺簡案據諸家之義干預也即干涉之干必巨刺之吳云巨刺大經之刺也志云巨大也謂當以長針取之亦左取右而右取左也簡案官針篇無長針取之之說今從吳注繆處馬雲繆者異也王注以所刺之穴如紕繆綱紀者非岐伯自有明旨吳云與經脈常行之處差繆也高雲脈度篇云經脈為里支而橫者為絡故絡病者其痛與經脈繆處繆處異處也謂經脈之痛深而在裡絡脈之痛支而橫居病在於絡左右紕繆故命曰繆刺邪客於足少陰之絡馬雲腎經絡穴大鐘也簡按張吳諸家不指言其穴蓋絡泛言一經之絡也馬每絡注某穴恐非無積者高雲脹滿有積當刺其胸脅若無積者病少陰之絡上走心包故當刺然骨之前簡按吳云積五臟積也五臟真氣不足而後病積若復刺出其血是重虛矣故在禁志云無積者無盛血之結也並誤然骨之前高骨作谷注云谷舊本訛骨今改下二然谷之谷仿此簡按本輸篇云腎溜於然谷然骨之下者也不必改字如食頃張云食頃一飯頃也後仿此簡按王立飢之解不通不已左取右甲乙無不已二字簡按此已係於絡病何待其不已而繆刺之甲乙為是取五日已甲乙無取字張云病新發者邪未深也雖不即愈亦不過五日而已邪客於手少陽之絡甲乙作少陰之絡注云一作少陽刺手中指次指馬雲中指之次指即第四指也去爪甲上如韭葉者即關衝穴也高雲中指次指即小指次指手少陽關衝井穴也志云當刺中指心包絡之中衝次指手少陽之關衝簡按甲乙注中指當小指張吳亦據新校正作小指本輸篇關衝者手小指次指之端也氣府論肘以下至手小指次指本各六俞熱病篇取手小指次指爪甲下去端如韭葉厥病篇取手小指次指爪甲上與肉交者諸篇言關衝穴者如是當從新校正如韭葉志注本輸篇云上古如韭葉今時如大米許簡按甲乙少澤手小指之端去爪甲一分以此推之凡云如韭葉者當以一分為準卒疝高雲經脈篇曰足厥陰之別其病氣逆則睪腫卒疝故邪客於足厥陰之絡令人卒疝暴痛與肉交者志云即去端如韭許男子立已女子有頃已吳云男子以陽用事故已速女子以陰用事故已稍遲志云女子之生不足於血故有頃男子之血盛故立已刺外踝下甲乙下作上吳云金門京骨通谷三痏也高雲三痏者通谷為滎束骨為輸京骨為原也簡按據甲乙蓋謂跗陽穴跗陽在踝上三寸邪客於臂掌之間高雲經脈篇曰心主手厥陰心包絡之脈下臂入掌中病則臂肘攣急掌中熱故邪客於臂掌之間不可得屈刺其踝後馬雲當刺心經之通里穴也張云手厥陰經也踝後者以兩踝言踝中之後則內關也內關為手厥陰之絡故當取之志同高雲先以指按之按之而痛乃刺之簡按考文義不宜定為某穴故王不注高為得矣以月死生為數吳云望前為月生望後為月死此以應痛為痏不拘穴法張云月之死生隨日盈縮以為數也故自初一至十五月日以盈為之生數當一日一痏一痏即一刺也至十五日漸增至十五痏矣自十六至三十日月日以縮為之死數當日減一刺故十六日止十四痏減至月終惟一刺矣蓋每日一刺以朔望為進止也志云手厥陰心主主血脈是謂待時而調之也高雲由微而盛如月之生故漸多之由盛而微如月之衰故漸減之月郭空則無治也邪客於足陽蹺之脈馬本無足字高雲脈度篇云蹺脈從足至目屬目內眥故邪客於足陽蹺之脈令人目痛從內眥始外踝之下半寸所高雲僕參穴也簡按甲乙云申脈陽蹺所生也在足外踝下陷者中容爪甲許又云僕參在跟骨下陷者中則知舊注為是如行十里頃而已志云蹺健善行如行十里則蹺脈之氣已周高雲蹺脈屬奇經其行最疾故如人行十里之頃而痛病可已簡按據漢書賈捐之傳吉行五十里之數而度之即得一時三刻有奇人有所墮墜馬雲此言惡血為病當有繆刺之法利藥吳云先宜飲利瘀血藥也上傷厥陰之脈張云凡墮墜者必病在筋骨故上傷厥陰之脈肝主筋也下傷少陰之絡腎主骨也刺然骨之前出血即少陰絡也然骨之前血脈簡按諸注仍原文而注之不必從新校正刺足跗上動脈張云足厥陰之輸太衝穴也王氏謂為陽明之衝陽似與此無涉志高不注穴名善悲驚不樂吳云厥陰之病連於肝則驚少陰之病逆於亶中則不樂故刺法相侔也張云墮跌傷陰神氣散失故善悲驚不樂志高與張同簡按吳注近是中指爪甲上吳仍王注改作小指注云關衝穴也為手少陽井手少陽之絡從耳後入耳中故刺之簡按馬張高並從新校正為是其不時聞者吳云絶無所聞者為實不時聞者為虛虛而刺之是重虛也張云時或有聞者尚為可治其不聞者絡氣已絶刺亦無益故不可刺也簡按若吳注所言則當云其時不聞者疏甚耳中生風吳云生風如風之號也志云加耳鳴之風生也簡按千金方耳中颼颼是也凡痹往來高雲此言往來行痹不涉經脈但當繆刺其絡脈不必刺其腧穴也凡痹往來謂之行痹其行無常處者邪在分肉之間不涉經脈也簡按千金方風痹遊走無定處名曰血痹此亦邪在於血絡者痛而刺之張云謂隨痛所在求其絡而繆刺之也志同高雲凡痹必痛痛而刺之簡按今從張注用針者隨氣盛衰以為痏數吳本十一字為注文云舊作大文僭改為細注月生一日一痏甲乙月上有以月死生為數六字高雲上文手厥陰心包主血脈故以月死生為痏數此言痹痛則衝任之血不能熱肉充膚淡滲皮毛故亦以月死生為痏數篇中繆刺無痏數皆以月死生為痏數也邪客於足陽明之經馬吳張並依新校正經作絡志仍原文云此言經脈之互交者亦當以繆取也經謂陽明之經脈也高同簡按據王注及志高則刺大經之病也似與巨刺無別今亦仍新校正足中指次指馬從王注吳云足陽明之脈有入中指內間者有入中指外間者有入大指間者此言刺足中指次指乃中指及次指也次指是厲兌穴中指則不必穴也張云中指次指皆足陽明所出之經即厲兌穴次也志云足陽明之脈下入中指外間其支者別跗上入大指間出其端故當取中指間之內庭大指次指間之厲兌高雲中指次指即大指次指也爪甲上與肉交者足陽明厲兌井穴也簡按高以自大指當第三指者為中指則與王注異而考本輸篇胃出於厲兌厲兌者足大指內次指之端也本篇下文則云足陽明中指爪甲上一痏明是足以第二指為中指而與手之中指不同當以甲乙為是溫衣飲食志云咳者邪干肺也故宜溫衣及溫暖飲食若形寒飲冷是為重傷矣氣上走賁上簡按新校正引楊玄操是也丁德用云胃言若虎賁之士圍達之象故曰賁門也況胃者圍也主倉廩故別名太倉今考詩注賁大也胃已名太倉賁門蓋取於此若以虎賁之賁則義不葉馬以下諸注仍新校正唯高本於王六刺立已左刺右右刺左高雲左刺右右刺左六字衍文簡按下文嗌中腫云云亦邪客於足少陰者故以此六字為衍文然嗌中腫二十八字王所移於此未可果為衍文不能內唾高雲內猶咽也腰痛引少腹控䏚吳云足太陰濕土也濕病者先注於腰故腰痛太陰之筋聚於陰器循腹裡結脅故引少腹控䏚張云足太陰之絡上入布胸脅而筋著於脊故為病加此控引也高雲經脈論云脾之大絡名曰大包出淵液布脅胸實則身盡痛虛則百節盡皆縱令人腰痛引少腹身盡痛之意也控䏚不可以仰息布胸脅百節盡皆縱之意也腰尻之解兩胂之上是腰俞吳據新校正刪是腰俞三字注云腰尻之解腰俞一穴也兩胂上脾俞二穴也馬雲腰俞在中行二十一椎之下則無左右斷是白環俞也張云腰俞止一穴居中本無左右此言左取右右取左者必腰俞左右即足太陽之下髎穴也高雲解骨縫也胂上髁胂之上即髀股也申明腰尻之解兩胂之上腰俞是也蓋腰尻之解屬於腰俞兩腰之上即腰俞兩旁之下也簡按刺腰痛論云腰痛引少腹控䏚不可仰刺腰尻交者兩髁胂上以月生死為痏數王注腰尻交者謂髁下尻骨兩旁四骨空左右八穴俗呼此骨為八髎骨也今由此攻之是腰俞三字衍而其義則張注為得矣邪客於足太陽之絡張云足太陽經挾脊抵腰中故拘攣脊急其筋從腋後入腋下故引脅而痛應手如痛如甲乙作而吳云此不拘穴俞而刺謂之應痛穴治諸經刺之所過者不病過王平聲馬雲蓋經旨以病為有過也高之下病下並句注云治諸經刺之謂治諸經之病則正刺其經也所過者不病謂諸經所過之道不為邪客而不病也簡按舊注義長刺其通脈甲乙作過脈馬雲刺其聽宮穴也耳聾以下十六字高移上文邪客於手陽明之絡後注云刺之病不已更刺中指之中衝中指中衝主通脈出於耳前故曰耳聾云云蓋手陽明之脈上頸貫頰在於耳前通脈出耳前通心主包絡之脈而出於耳前之手陽明也簡按據上文刺之所過者通字作過似是齒齲刺手陽明熊音齲丘禹反齒病也高雲齒齲齒腐痛也說文齒蠹也釋名齲朽也蟲齧之齒缺朽也高本此以下十七字連下文繆傳引上齒以下四十八字移前節邪客於足陽明之經令人鼽衄云云條之後甲乙陽明下有立已二字邪客於五臟之間吳云五臟之間謂五臟絡也張云邪客於五臟之間必各引其經而痛但見病處各取其井而繆刺之高雲邪客於五臟之間其病也經脈絡脈相引而痛有時來出於絡脈有時但止於經脈故時來時止五刺已志云五臟之氣平也繆傳引上齒吳云病本在下齒今繆傳於上齒也志云謂手陽明之邪繆傳於足陽明之脈也足陽明之脈入上齒中此邪客於手陽明之經別而繆傳於足陽明之脈致引入上齒齒唇寒痛甲乙無痛字視其手背脈馬雲蓋指手陽明之絡穴偏歷也簡按諸家不注某穴此泛言手背不必指一穴也足陽明中指爪甲上一痏足上甲乙有刺字高本一上有各字云舊本無各字今臆補此五絡皆會於耳中志云耳者宗脈之所聚也張兆璜云宗脈者宗氣所出之脈也即胃之大絡出於乳下聚於耳中上絡左角馬雲絡於左耳之額角志云肝主血而居左其氣直上於巔頂也後刺手心主馬雲心包絡之井在中指端名曰中衝吳張同簡按上文不及心主厥陰是必錯出新校正為是高雲刺手心主少陰鋭骨之端各一痏心手少陰掌後高骨大陵俞穴也心者君主之官故曰心主此注可疑心主謂心包乃手厥陰也今引君主之官而為心經殆屬牽強以竹管吹其兩耳甲乙管作筒耳下有中字鬄其左角金匱甲乙鬄作剔高雲鬄剃同俗作剃方一寸肘後方作二寸外臺作方寸匕燔治金匱作燒末張云燒製為末也灌之立已金匱已作起切而從之甲乙從作循調之張云病在經者治從其經但審其虛實而調之調者如湯液導引之類皆是也調之而不調然後刺其經脈是謂經刺亦曰巨刺有痛而經不病者吳云身有痛處而其經脈所至之分不皆病者是為絡病非經病也則繆刺之此繆刺之數也吳云數猶言節目也張云凡此刺經者刺大絡者刺皮部血絡者各有其治所以辨繆刺之術數也四時刺逆從論篇第六十四簡按篇中無問答之語宜刪論字陰痹志云痹者閉也血氣留著於皮肉筋骨之間為痛也簡按王以陰為寒故依痹論寒勝者為痛痹之義而釋之新校正則以為王以痛為痹之通訓卻非也狐疝風張云滑為陽邪有餘而病風者熱則生風也疝者前陰少腹之病男女五臟皆有之狐之晝伏夜出陰獸也疝在厥陰其出入上下不常與狐相類故曰狐疝風此非外入之風乃以肝邪為言也高雲氣病為疝血病為積滑主氣盛澀主少血故厥陰脈滑則病狐疝又曰風者氣動風生風主氣也下文肺風脾風心風腎風肝風皆氣動風生之義簡按本臟篇云腎下則腰尻痛不可以俯仰為狐疝經脈篇云肝所生病者狐疝遺溺而本篇系以風者壽夭剛柔篇云病在於陰者謂之痹病在於陽者謂之風凡脈滑為陽有餘今脈滑者並以風稱之其義可知矣陳氏三因方云寒疝之氣注入㿗中按陳誤以㿗為陰囊故其言如此名曰狐疝亦屬㿗疝葛氏傷寒直格云狐疝言狐者疝氣之變化隱見往來不可測如狐也張注本於此楊上善之解恐非隱軫馬雲當作癮疹吳云隱軫即癮疹張同簡按釋名疹展也癢搔之捷展起也乃知疹借而作軫後世從疒作疹也馬注誤厥陰為陰痹為狐疝風太陰為肉痹為脾風疝太陽為骨痹為腎風疝少陽為筋痹為肝風疝其理固明矣而至少陰為皮痹為肺氣疝陽明為脈痹為心風疝者則與常例異蓋此篇以三陰三陽單配乎五臟故與他篇之例不同也舊注或以運氣之義而釋之率不可從肺痹痹論云皮痹不已復感於邪內舍於肺肺痹者煩滿喘而嘔馬雲腎為肺之子其水上逆於肺母故皮為肺之合今腎有餘當病皮痹癮疹其病在表也不足當為肺痹其病在裡也肺風疝大奇論云肺脈沉搏為肺疝病積溲血馬雲其脈若滑則當病肺風疝外感之邪也其脈若澀則當病有積及溲血內傷之邪也張云澀為心血不足故經滯而為積聚血亂而為溲血也脾痹吳云太陰濕土之氣也其氣有餘則濕勝脾主肌肉奠位乎中故肉痹寒中不足則土氣弱故病脾痹簡按痹論云肌痹不已復感於邪內舍於脾脾痹者四肢解墮發咳嘔汁上為大塞所謂肌痹即肉痹脾風疝馬雲其脈若滑則病脾風疝外感之邪也其脈若澀則當有積及心腹時滿內傷之邪也張云太陰脈滑則土邪有餘脾風疝者即㿗腫重墜之屬病在濕也脈痹馬雲陽明者足陽明胃經也胃乃心之子有餘則病脈痹以心主脈脈主半表也不足則病心痹心主裡也簡按吳張以陽明燥金之氣有餘不足而釋之此運氣家之言不可藉以解經也心痹痹論云脈痹不已復感於邪內舍於心心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐王注心下痹恐非心風疝馬雲其脈若滑則病心風疝外感之邪也其脈若澀則病積時善驚內傷之邪也簡按脈要精微論云診得心脈而急病名心疝少腹當有形也腎痹痹論云骨痹不已復感於邪內舍於腎腎痹者善脹尻以代踵脊以代頭腎風疝馬雲其脈若滑則病腎風疝外感之邪也其脈若澀則病積時癲疾內傷之邪也肝痹痹論云筋痹不已復感於邪內舍於肝肝痹者夜臥則驚多飲數小便上為引如懷肝風疝馬雲其脈若滑則病肝風疝外感之邪也其脈若澀則病積時筋急目痛內傷之邪也人氣在脈張云春時天地氣動水泉流行故人氣亦在經脈溢入孫絡吳此下增孫絡二字張云夏時氣盛故溢入孫絡而充皮膚所以人氣在孫絡內溢肌中馬雲長夏者六月建未之月其氣在肌肉者正以長夏經脈絡脈皆盛內溢肌中所以人氣在肌肉也皮膚引急馬雲秋氣在皮膚者正以秋時天氣始收人之腠理閉塞皮膚引急所以人氣在皮膚也通於五臟高雲冬氣之所以在骨髓者蓋以冬者氣機蓋藏血氣在中內著骨髓通於五臟臟者藏也惟冬主藏故通五臟而冬氣在骨髓不可為度志云謂天有六淫之邪而人有形層六氣之化也如邪留於外則為皮肉筋骨之痹合於內則為心肝脾肺之痹矣如留於氣分則為疝留於血分則為積矣如身中之陽盛則為熱虛寒則為寒矣此皆吾身中陰陽之變化也高雲四地主氣各有常度至其變化也不可為度闢除吳云闢音闢馬雲闢闢同環逆馬雲血氣旋逆吳云血氣環於經即逆而上為浮氣也志云環逆者逆其轉環也言血氣之從經而絡從絡而皮從皮膚而復環轉於肌中也張云血氣環周皆逆不相運行故為喘滿上氣按本篇與前診要經終論義同文異但彼分四時此分五時故有刺肌肉之謂然本篇春夏冬三時皆闕刺秋分皮膚等義意者以長夏近秋故取肌肉即所以刺秋分也後仿此簡按張本於新校正其說似傅會然春夏冬並闕刺秋分亦可疑焉春刺筋骨高雲筋連於骨故曰筋骨內著馬雲著著同內卻吳云令血氣卻弱是以善恐志云血氣虛卻於內矣陽明脈虛則恐如人將捕之血氣上逆張云夏刺冬分則陰虛於內陽勝於外故令人血氣逆而善怒志云夏氣浮長於上而反逆之使下則氣鬱不疏而使人善怒也上逆當作下逆簡按今從舊文善忘吳云心生脈秋刺經脈而虛其經則經脈虛而心氣亦虛矣故善忘氣不外行張據全本作氣不衛外注云氣虛不能衛外氣屬陽陽虛故臥不欲動令人目不明志云蓋五臟之精皆注於目而為之睛冬者血氣在中內著骨髓通於五臟血氣內脫則五臟皆虛故令人目不明也大痹張云當陽氣伏藏之時而刺其陽分則陽氣外泄陽虛陰勝故留為大痹志云大痹者臟氣虛而邪痹於五臟也善忘吳云陽氣者精則養神今陽氣竭絶則神亡矣故善忘與精相薄吳云精真氣也薄邪正摩蕩之名精氣不轉吳云精氣不變張云精氣不致轉變矣志云精氣不逆回矣高雲不轉內存也簡案轉恐薄之訛依其臟之所變候知其死也吳變下句馬高同吳云變謂臟氣變動為病也馬雲依其臟之所變以候知其死耳高雲依其臟之所變病以候其動候其動而知其死也張候下句志同張云見其變動之候則識其傷在某臟故可知其死期簡按據王注變下句為是標本病傳論篇第六十五馬雲本篇前二節論標本後八節論病傳故名篇靈樞以病本篇論標本以病傳篇論病之所傳分為二篇其義全同病有標本刺有逆從馬雲標者病之後生本者病之先成此乃病體之不同也逆者如病在本而求之於標病在標而求之本從者如在本求本在標求標此乃治法之不同也必別陰陽馬雲必別病在陰經陽經吳同張云陰陽二字所包者廣如經絡時令氣血疾病無所不在前後相應馬雲前後者背腹也其經絡互相為應吳云謂經穴前後刺之氣相應也志云有先病後病也逆從得施吳云逆者反治從者正治得施謂施治無失也標本相移馬雲施逆從之法以移標本之病吳云刺者或取於標或取於本互相移易有逆取而得者吳云言標本逆從之刺各有所宜治非一途取也高雲有逆取而得者即在本求標在標求本也有從取而得者即在標求標在本求本也正行無問馬雲乃正行之法而不必問之於人也吳本問改作間注云標本得施無間可議也諸注同馬義言一而知百病之害吳云一者本也百者標也馬雲言一病而遂知百病之害高雲言一標本逆從而知百病之害治得為從吳云此釋逆從二字之義張云得相得也猶言順也志云如熱與熱相得寒與寒相得也高雲不知標本治之相反則為逆識其標本治之得宜始為從簡按張注穩貼先病而後逆者治其本馬雲凡先生病而後病勢逆者必先治其初病之為本若先病勢之逆而後生他病者則又以病勢逆之為本而先治之也吳云此二逆字皆是嘔逆張云有因病而致血氣之逆者有因逆而致變生之病者有因寒熱而生為病者有因病而生為寒熱者但治其所因之本原則後生之標病可不治而自愈矣先熱而後生中滿者治其標靈樞熱作病滑云此句當作先病而後生熱者治其標蓋以下文自有先病而後生中滿者治其標之句矣此誤無疑先病而後泄者治其本高雲必且調之乃治其他病所以重其中土也簡按本疑標誤泄者脾胃虛敗所致故宜治其標下文云先泄而後生他病者治其本且調之乃治其他病其義自明先病而後生中滿者治其標張云諸病皆先治本而惟中滿者先治其標蓋以中滿為病其邪在胃胃者臟腑之本也胃滿則藥食之氣不能行而臟腑皆失其所稟故先治此者亦所以治本也人有客氣有同氣馬雲蓋以人之病氣有二病本不同而彼此相傳者謂之客氣有二病之氣本相同類而彼此相傳者謂之同氣簡按全本同作司似是蓋客氣謂邪氣司氣謂真氣歟小大不利治其標本病篇作小大便下同吳云小大二便不利危急之候也雖為標亦先治之病發而有餘高雲病發而邪氣有餘則本而標之申明本而標之者先治其邪氣之本後治正氣之標此治有餘之法也謹察間甚吳云間差間也甚益甚也張云間者言病之淺甚者言病之重也間者並行甚者獨行張云間者言病之淺甚者言病之重也病淺者可以兼治故曰並行病甚者難容雜亂故曰獨行高雲如邪正之有餘不足疊勝而相間者則並行其治並行者補瀉兼施寒熱互用也如但邪氣有餘但正氣不足而偏甚者則獨行其治獨行者專補專瀉專寒專熱也先小大不利而後生病者治其本吳十三字移於上文小大利治其本之下是冬夜半夏日中張注病傳篇云心火畏水故冬則死於夜半陽邪亢極故夏則死於日中蓋衰極亦死盛極亦死五日而脹病傳篇云五日而之胃吳云脹胃病也脹者由於閉塞不通使然此土氣敗絶升降之機息即痞脹也冬日入夏日出馬雲冬之日入在申申雖屬金金衰不能扶也夏之日出在寅木旺火將生肺氣已絶不待火之生也志云日出氣始生日入氣收引肺主氣故終於氣之出入也高雲冬日入氣不內歸也夏日出氣不外達也冬日入夏早食早病傳篇作蚤張本亦作蚤馬雲蚤與早同冬之日入在申以金旺木衰也夏之早食在卯以木旺氣反絶也背𦛗馬雲𦛗膂同腎自傳於膀胱腑故背𦛗筋痛小便自閉冬人定夏晏食高雲冬之人定在戌夏之晏食亦在戌皆土不生旺而死也簡按晏晚也淮南天文訓日至於桑野是謂晏食未詳王注何據三日腹脹吳云腹脹由腎與膀胱俱病中宮無能化氣且腎中相火虛衰不生胃土使然也簡按馬張並仍王注蓋五臟相傳皆以相剋傳之則舊注為是三日兩脅支痛張云即三日而上之心也手心主之別下淵腋三寸入胸中故兩脅支痛簡按吳云土敗而乘之故兩脅支痛志高並同今從王注冬大晨夏晏晡馬雲冬之大明在寅末木旺水衰也夏之晏晡以向昏土能剋水也吳云冬大晨辰也夏晏晡戌也土主四季水之畏也五日身體重馬雲據理當以靈樞五日而上之心者為正乃水剋火也張云病傳篇曰五日而上之心此云身體重者疑誤簡按志高並仍原文而釋之非冬夜半後夏日昳馬雲冬夜半在子土不勝水也夏之日昳在未土正衰也日昳者日晏也志云夜半後者土敗而水勝也夏日昳者乃陽明所主之時土絶而不能生也一日腹脹一日身體痛吳云腹脹胃病也身體痛脾病也馬雲腎復傳於小腸故為腹脹小腸傳於脾故身體痛病傳篇一日而上之心乃腑傳於臟其理為正張云即一日而之小腸一日而之心腑傳臟也心主血脈故為身體痛簡按據上文吳注為正然如本節以腹脹為胃病以身體痛為脾病則義不相協今仍張注冬雞鳴夏下晡馬雲冬之雞鳴在醜醜土剋水也夏之下晡在申金衰不能生水也吳云冬雞鳴醜也夏下晡未也太陰主丑未乃土氣也膀胱壬水畏其剋制張同間一臟止病傳篇甲乙並無止字志云以上諸病如是相勝克而傳者皆有速死之期非刺之可能救也或間一臟相傳而止不復再傳別臟者乃可刺也假如心病傳肝肺病傳脾此乃子行乘母至肝臟脾臟而止不復再勝克相傳於他臟者可刺也假如心病傳脾肺病傳腎乃母行乘子得母臟之生氣不死之證也如心病傳腎肺病傳心肝病傳肺此從所不勝來者為微邪乃可刺也著至教論篇第六十六吳云著明也聖人之教謂之至教明堂禮記明堂位明堂也者明諸侯之尊卑也前漢郊祀志武帝元封元年濟南人公玉帶上黃帝時明堂圖明堂制詳見大戴禮白虎通獨斷誦而頗能解太平御覽頗作不足以治群僚張云群僚之情易通侯王之意難測所以有不同也馬雲外紀載紀官舉相則王侯此時已有之簡按書皋陶謨百僚師師百工惟時孔傳僚工皆官也不足至侯王足下太平御覽有以字受樹天之度志云所謂立端於始表正於中蓋立端表以測天之四時陰陽星辰日月之度以著於經書乃傳於後世高雲上古樹八尺之臬參日影之斜正長短以定四時故願得受樹天之度以定四時之陰陽即以四時陰陽合之星辰日月分別明辨以彰璣衡之經術四時陰陽合之吳改作合之四時陰陽疑於二皇馬吳張高並據全本疑作擬馬雲二皇者伏羲神農也吳云神農常以醫藥為教今又上通神農著至言以為教是神農既皇又一皇也高雲不但上通神農且擬於二皇二皇伏羲神農也此伏羲神農黃帝之書謂之三墳一脈相傳言大道也疑殆扁鵲傳拙者疑殆論語闕疑闕殆夫三陽天為業馬雲三陽手太陽小腸經足太陽膀胱經業事也上下手足也三陽在人為表之表其尊為父事與天同張云此三陽者統手足六陽為言簡按張以下文三陽獨至又云三陽者至陽也之三陽為太陽此注非合而病至馬雲手足太陽經不循常脈合而為病則陽氣太盛諸部陰陽各經皆被偏害吳云若上下之氣失其常道不以應天為業則必內患外邪合而病至而偏害於陰陽也三陽莫當吳云言其義無當於心也諸家仍王義三陽獨至張云此三陽獨至者雖兼手足太陽而尤以足太陽為之主故曰獨至內無正馬雲正亦期也吳云內無痛苦可正正預期也張云內無名目可正高雲並於外則外無期譬於墮溺不可為期並於內則內無正神轉不回回則不轉乃失其正不中經紀吳云病不中經常綱紀張同簡按諸家並仍王義恐非診無上下以書別吳七字句診云診無上下之殊及可以書記先別者張同馬雲書即前陰陽傳也志云故不能以脈經上下篇之書別簡按王注為穩當臣治疏愈說意而已高雲說作悅治理也疏遠也謂理治其言疏遠愈甚不過悅其大意而已簡按疏王注為稀諸家仍王意今從之三陽者至陽也張云太陽至盛之陽故曰至陽積並則為驚吳云積並數並也驚今之癇也馬雲二經積並即手太陽之裡為心足太陽之裡為腎心失神腎失志則皆為驚駭礔礰熊音劈歷吳云霹靂同病至如礔礰之迅簡按張衡西京賦礔礰激而增響是也滂溢熊音泛也上普郎反下逸說文滂沛也干嗌喉塞熊音嗌音益咽也吳云陽氣滂溢於諸經乾涸其嗌而喉中壅塞馬雲其嗌乾其喉塞正以心腎之脈皆上通於嗌喉也直心吳改作為病二字馬雲凡三陽併合則必直當其心張云謂邪氣直衝心膈也高雲三陽積併為病謂之三陽直心亢害已極故坐不得起臥志云直當也便身全吳云臥則經氣約束故身安全馬雲便是身患三陽之病之人也簡按馬張志高以坐不得起臥者為一句注意率同皆以全為辭王為安全之義恐非然而不若甲乙作身重為勝矣且以知天下張云且猶將也謂欲知天下之要道尤當別陰陽應四時陽言不別陰言不理高雲陽猶明也陰猶隱也明言之不能如黑白之別隱言之不能如經綸之理其中更有精微世主學盡矣張云邪並於陽則陽病並於陰則陰病陰陽俱病故傷五臟臟傷於內則筋骨消於外也醫道司人之命為天下之所賴故曰世主不明不別於道何有是使聖人之學泯矣志云傳世之主學盡矣腎且絶吳云此上必有諸經衰絶之候蓋闕之今惟存腎絶一條爾簡按此注是高雲史臣記雷公殫心帝教而深思弗釋也公聞帝教既竭心思求之不得中心如焚一似腎且絶可謂強解矣惋惋日暮吳云惋音婉腎者水臟水畏土日暮則陽明胃土主事故惋惋不安張云真陰且絶故惋惋不已憂疑終日志云惋惋驚歎貌從容不出吳云腎主骨骨氣衰弱故雖從容閒暇不欲出戶人事不殷吳云腎主喜靜故雖人事之來不欲以身殷受也志云殷盛也高雲一切人事不殷殷猶勤也簡按漢書平當傳師古注人事者人情也莊子其不殷注殷中也此云人事不殷蓋謂心志迷妄與人情不相主當也示從容論篇第六十七馬雲從容系古經篇名見第二節本篇詳示從容之義故名篇吳云篇內論病情有難知者帝示雷公從人之容貌而求合病情其長其少其壯容不類也高雲聖人治病循法守度援物比類從容中道帝以此理示諸雷公故曰示從容及於比類馬雲觀前後篇內俱有比類系古經篇名然實以比方相類為義水所從行吳云水謂五液也此皆人之所生指膽胃以下十四端而言高雲五臟主藏精者故曰水治之過失吳云言五臟六腑七情五液皆人所賴以生治之者恆有過有失也張云凡治過於病謂之過治不及病謂之失不得其中皆治之過失也志本失作矣子別試吳云別謂往時也張云別試通者謂素之所通也其有未通者當請問其所不知耳志云別者謂未通天道也高雲既誦脈經當於脈經辨別而試通之簡按諸注義未穩蓋別試者謂脈經上下篇之外別有所通試論之也下文子言上下以對何也語可見耳窈冥熊音窈烏絞反深也吳云窈冥者義理玄妙非書傳之陳言也脾虛浮似肺張云脾本微軟病而虛浮則似肺矣腎本微沉病而小浮則似脾矣肝本微弦病而急沉散則似腎矣脈有相類不能辨之則以此作彼致於謬誤此皆工之不明所以時多惑亂也按王氏曰浮而緩云云此詳言五臟脈體以明本節之義也所以診法有從部位察臟氣者有從脈體察臟氣者得其義則妙無不在學者當於此而貫通焉從容得之馬雲若明從容篇比類之則窈冥之妙傳矣吳云從人之容色而求病情斯得之矣志云從容者天之道也天道者陰陽之道也簡按詩都人士箋云從容猶休燕也正義云休燕閒暇之處中庸云從容中道聖人也家語哀公問云夫誠不勉而中不思而得從容中道聖人所以定體也廣雅云舉動也考數義王以安緩釋之乃為允當怯然熊音怯去劫反畏也夫從容之謂也吳云帝言若是者宜從其人之容貌而合之病情也張云引經語也如下文志云此言經脈之當求之於氣也夫從容者氣之謂也高雲比類者同類相比辨別其真必從容而得之故曰夫從容之謂也簡按今從高注年少則求之於經張云年少者每忽風寒勞倦所受在經簡按志以年長年少年壯為長女中女少女以為三陰之義注義迂回不可從夫浮而弦張云腎脈宜沉浮則陰虛水以生木弦則氣泄故為腎之不足也簡按仲景云弦則為減即此義也水道不行張云精所以成形所以化氣水道不行則形氣消索故怯然少氣也一人之氣病在一臟也吳云一人之氣病在一臟一臟不再傷故三臟俱行不在法也張云凡此皆一人之氣病在腎之一臟耳即如上文雷公所問頭痛者以水虧火炎也筋攣者腎水不能養筋也骨重者腎主骨也噦噫者腎脈上貫肝膈陰氣逆也腹滿者水邪侮土也時驚者腎藏志志失則驚也不嗜臥者陰虛目不瞑也病本於腎而言三臟俱行故非法也志高義同三臟俱行簡按行字諸家無解蓋謂病之行也此何物也高雲此何故也簡按物訓故未見所據子所能治知亦衆多吳云帝言子所能者治所知之病亦衆人之所稱歟張云言子之所能余亦知其多但以此病為傷肺則失之矣簡按張似是譬以鴻飛亦衝於天吳云譬之鴻飛亦常沖天然有時而下不常高爾張云雖所之任意而終莫能得其際亦猶長空浩渺之難測耳高雲粗工妄治而愈是千慮一得譬以鴻飛亦衝於天簡按張注似稍通沖翀同化之冥冥馬雲化字恐當是托世本訛也吳云變化於冥冥莫測之境張同志云察造化之冥冥何必守經吳云何必執守經常哉去胃外歸陽明也吳云去其胃腑而外歸陽明經也二火不勝三水吳云二火猶言二陽謂胃也三水猶言三陰謂脾也言太陰之氣外歸陽明陽明不勝太陰是以脈亂而失其常常脈浮緩今失而為浮大虛矣高同馬張仍王由失以狂也簡按孟子王由足用為善由與猶通王注本此高為從之義非是經脈傍絶張云肺臟損壞則治節不通以致經脈有所偏絶是失吾過矣吳云是失二字為句名曰診輕吳張據太素輕作經張云明引形證比量異同以合從容之法故名曰診經乃至道之所在也馬志高從王注恐非疏五過論篇第六十八馬雲疏陳也內有五過故名篇吳云篇內論診治五過為工者宜疏遠之因以名篇簡按楚辭九歌疏石蘭兮為芳注疏布陳也馬蓋本於此閔閔乎吳云玄遠莫測之貌高雲閔閔憂之至也帝嘆道之遠大幽深而聖人之術循經守數事有五過四德醫工不可不知故語雷公以發明之論裁志意吳云論裁人之志意必有法則張云裁度也志云當先度其志意之得失醫事周禮醫師職云醫師掌醫之政令聚毒藥以共醫事脫營衛生寶鑑論脫營不治證當參考陳氏外科正宗云失榮者先得後失始富終貧亦有雖居富貴其心或因六欲不遂損傷中氣鬱火相凝隧痰失道停結而成其患多生面項之間初起微腫皮色不變日久漸大堅硬如石推之不移按之不動半載一年方生陰痛氣血漸衰形容瘦削破爛紫斑滲流血水或腫泛如蓮穢氣熏蒸晝夜不歇平生疙瘩愈久愈大越潰越堅犯此俱為不治此乃脫營之一證也五氣留連馬雲五氣者五臟之精氣也灑酒然熊音蘇浪反寒貌此亦治之一過也簡按據下文例亦字衍毀沮張云沮將魚切壞也高雲沮音殂義通毀沮猶死亡也厥氣上行滿脈去形張云厥氣逆氣也凡喜怒過度而傷其精氣者皆能令人氣厥逆而上行氣逆於脈故滿脈精脫於中故去形陰陽應象大論有此四句必以比類奇恆吳云謂比量類例於奇異及庸常之證也高雲奇異也恆常也異於恆常之病必比類相參從容知之三常張云即常貴賤常貧富常苦樂之義封君敗傷吳云謂嘗封君為事毀敗而中傷者簡按封君乃封國之君敗傷謂削除之類追悔已往以致病也故貴脫勢吳云故家貴族也高雲故猶昔也故貴脫勢謂昔者身貴今則脫勢也馬義同不能動神吳云醫不能嚴戒其非竦動其神而令從命外為柔和萎弱至於亂失天常必知終始吳云終始謂今病及初病也張云謂原其始要其終也高雲必知經脈之終始有知餘緒吳云謂有知之後諸凡餘事也張云謂察其本知其末也志云謂更知灸刺補瀉之緒端高雲餘緒者經脈虛實之病也簡按今從張注當合男女吳云謂男女氣血不同其脈與證亦當符合也張云男女有陰陽之殊脈色有逆順之別故必辨男女而察其所合也志云謂針刺之要男內女外堅拒勿出謹守勿內是謂得氣高雲當合男女而並論之男女者陰陽血氣也應象大論云陰陽者血氣之男女此其義也簡按合字義未穩妥姑仍王注離絶菀結高雲或陰陽血氣之離絶或陰陽血氣之鬱結簡按此注似是然與下文血氣離守支矣不如舊注為得嘗富大傷張云謂甚勞甚苦也高雲如人嘗富一旦失之則大傷其神魂故傷敗結留薄歸陽膿積寒炅張云故舊也言舊之所傷有所敗結血氣留薄不散則鬱而成熱歸於陽分故膿血蓄積令人寒炅交作也從容人事張云從容於人事從容周詳也經道吳云常道也張同高雲明經脈之道也簡按高注非診必副矣吳云副全也張云副稱也簡按張本於廣雅氣內為寶張云氣內者氣之在內者也即元氣也凡治病當先求元氣之強弱元氣既明大意見矣過在表裡張云求元氣之病而無所得然後察其過之在表在裡以治之菀熟馬吳張並作菀熱簡按大奇論菀熟亦誤癰發六腑志云在內者五臟為陰六腑為陽謂菀熱在內而癰發於在外之皮肉間也與經相明吳云經謂經旨聖道之所載也張云即下文上經下經之謂上經下經揆度奇恆義見病能論五中吳云五內也決以明堂審於終始馬雲明堂部位之義詳見靈樞五色等篇張云明堂面鼻部位也終始靈樞篇名也吳云決取正也明堂王者朝諸侯布政之所人身腔之中有天君主於其內十二官分司守職與王者嚮明布政之堂居然無兩故謂明堂終始謂始病及今病也志云臟腑經脈之始三陰三陽已絶之終高雲經脈終始簡按張終始之解吳明堂之釋並誤馬雲按帝言五過四德而今四德不具亦公不復問故帝未之答歟馬說如此四德未詳何義而吳以治病之道氣內為寶以下為一德守數據治以下為二德診病不審以下為三德上經下經以下為四德而張則以必知天地一節為一德五臟六腑雌雄一節為二德從容人事一節為三德審於部分一節為四德志高則並不言及蓋以經文不明顯其義難尋也徵四失論篇第六十九吳云徵證也篇內證作醫四失故以名篇志云徵者懲創醫之四失言以雜合耶吳云謂雜採衆說而合之己意也張云雜合衆說而不能獨斷也外內相失吳云外之病情內之神志兩者相失張云以彼我之神不交心手之用不應也故時有疑惑致乎危殆妄作離術宋本離作雜馬志高本同吳云離術別術也張同簡按今從宋本坐之厚薄張云坐處也志云薄厚謂肌肉之厚薄高本坐作土注云土舊本作坐今改簡按高本近是不明尺寸之論診諸注診字接下句是吳云千里之外言其遠也尺寸人事言其近也謂世人求道於遠常馳騖於千里之外不明尺寸之近無遑人事之淺也志云言世人多誇大其語而不明寸尺之微失寸尺之毫釐而有千里之謬蓋人之日用事物飲食起居莫不有理如失其和平皆能為病診無人事之審是忽近而圖遠也無人事張云即前篇貴賤貧富守數據治之謂高雲謂昧昧以診不知人之病情也從容之葆志云葆寶同言治診之道惟天理人事之為葆也簡按脈要精微論虛靜為保甲乙保作寶史記留侯世家注史記珍寶字作葆志注有所據王訓平未詳所本馬雲保同吳云草木叢生謂葆見燕世家注蓋生機之不可遏者也張云葆韜藏也莊子齊物論葆光之葆並於經旨未允當今從志坐持寸口吳云居然持寸口之脈張云若理數未明而徒持寸口則五臟之脈且不能中志刪坐字高雲坐猶定也持即診也簡按張釋坐為徒於文義為是診不中五脈吳云診不中於五臟百病所起始以診字以下十字為一句張云五臟之脈且不能中又焉知百病之所起乃始知自怨其無術而歸咎於師傳之未盡簡按張注為是經脈別論五脈氣少胃氣不平王注五臟脈少汝不知道之諭受以明為晦馬志高並受下句志云如不受師之傳諭不明道之體原是以天道之明而為晦矣陰陽類論篇第七十八極莊子田子方揮斥八極神氣不變又天運天有六極五常音義司馬雲六極四方上下也青中主肝高雲在色為青在中主肝且復侍坐諸本且作旦當改一陽為遊部張云少陽在側前行則會於陽明後行則會於太陽出入於二陽之間故曰遊部志云遊部者遊行於外內陰陽之間外內皆有所居之部署此知五臟終始吳云由表而入則始太陽次少陽終陽明由里而出則始陽明次少陽終太陽言五臟者陽該陰也張云有陽則有陰有表則有里睹此三陽之義則五臟之終始可類求而知矣三陽為表張云三陽誤也當作三陰三陰太陰也太陰為諸陰之表故曰三陰為表按陰陽離合論曰太陰為關痿論曰肺主身之皮毛師傳篇曰肺為之蓋脾者主為衛是手足三陰皆可言表也下文所謂三陽三陰者明列次序本以釋此故此節當為三陰無疑王氏而下皆曰三陽太陽也二陰少陰也少陰與太陽為表裡故曰三陽為表二陰為里其說若是然六經皆有表裡何獨言二經之表裡於此耶蓋未之詳察耳一陰至絶作朔晦馬雲王注以一陰至絶為讀作朔晦為讀又以卻具合以正其理為句義不通當言一陰至絶作為讀晦朔卻具為讀合以正其理為句豈知一陰至絶而有復作之理朔晦相生之妙卻具於其中而正此厥陰之理也正者證也簡按王注義尤明備馬說卻非也王所引靈樞文出陰陽系日月篇以正其理張云終始循環氣數具合故得以正其造化之理矣弦急懸不絶張云懸浮露如懸也少陽之脈其體乍數乍疏乍短乍長今則弦急如懸其至不絶兼之上乘胃經此木邪之勝少陽病也按以上三陽為病皆言弦急者蓋弦屬於肝厥陰脈也陰邪見於陽分非危則病故特舉為言三陰者六經之所主也張云三陰太陰也上文云三陽為表當作三陰者其義即此三陰之臟脾與肺也肺主氣朝會百脈脾屬土為萬物之母故三陰為六經之主上空志心吳改作志上控心注云志謂腎氣也脾為坤土有母萬物之象故六經受栽於脾而後治是為六經所主今其氣上交於太陰寸口脈來搏而沉是脾家絶也脾絶則腎無所畏氣上凌心控引心痛腎主志故曰志上控心馬雲所謂三陰者在手則為手太陰肺經也為手足六經之所主正以百脈朝會皆交於手太陰經也夫太陰之脈浮澀為本今見伏脈又似鼓不浮是腎脈干肺也腎之神為志肺虛則腎虛其志亦空虛無依耳曰上空者蓋腎神上薄也曰志心者志雖腎之神而實心之所之之謂也張云交於太陰謂三陰脈至氣口也肺主輕浮脾主和緩其本脈也今見伏鼓不浮則陰盛陽衰矣當病上焦空虛而脾肺之志以及心神為陰所傷若致不足故上空志心按陰陽應象大論曰肺在志為憂脾在志為思心在志為喜是皆五臟之志也簡按吳空作控據王注而其注則依楊義然楊空字缺詳要之此一節義不清晰張義略通二陰至肺張云言腎脈之至氣口也經脈別論曰二陰搏至腎沉不浮者是也腎脈上行其直者從腎上貫肝膈入肺中出氣口是二陰至肺也腎主水得肺氣以行降下之令通調水道其氣歸膀胱也肺在上腎在下脾胃居中主其升降之柄故曰外連脾胃也外者腎對脾言即上文三陰為表二陰為里之義一陰獨至張云厥陰脈勝也經脈別論曰一陰至厥陰之治是也厥陰本脈當軟滑弦長陰中有陽乃其正也若一陰獨至則經絶於中氣浮於外故不能鼓鉤而滑而但弦無胃生意竭矣簡按張注經絶氣浮為句不鼓鉤而滑為句志高同吳改作一陰獨至鉤而滑經絶氣浮不鼓不可從頌得簡按頌似用切音誦一陰為獨使馬雲一陰者即厥陰也厥陰為里之遊部將軍謀慮所以為獨使也張云使者交通終始之謂陰盡陽生惟厥陰主之故為獨使三陽一陰太陽脈勝馬雲此言膀胱與肝為病者膀胱勝而肝負也三陽者足太陽膀胱經也一陰者足厥陰肝經也膀胱主病而肝來侮之則木來乘水當是時膀胱為表肝為里膀胱邪盛有自表之裡之勢肝經不得而止之致使內亂五臟之神外有驚駭之狀金匱真言論曰肝其病發驚駭高太陽改作太陰簡按高注義乖今仍舊文二陰二陽病在肺高二陽作三陽注云太陽之氣主皮毛者肺之合故二陰三陽相合病在肺也二陰合三陽而病肺則三陽有餘二陰不足故少陰脈沉也簡按舊注義通未必改字諸家仍王勝肺傷脾張云土邪傷水故足少陰之脈沉沉者氣衰不振之謂然胃為脾腑脾主四肢火既勝肺胃復連脾脾病則四肢亦病矣簡按高雲勝肺猶言肺氣勝也誤甚客遊於心脘下空竅堤閉塞不通馬心脘下句空竅堤句注云少陰之氣客遊於心脘之下水來侮火也然陰氣上游胃不能制腸胃空竅為堤閉塞不通高雲空竅汗孔之竅也堤猶路也少陰少陽相合陰勝其陽故病出於少陰之腎少陽三焦之脈散絡心包出於胃脘今少陰之氣客遊於心脘下是陰客於陽水勝其火致三焦不能出氣以溫肌腠一似空竅之路閉塞不通吳陰氣以下十字句堤閉塞不通五字句注云二陰少陰腎氣也一陽少陽膽氣也二氣相搏水不勝火病出於腎腎病則氣逆而上實於心脘下之空竅如堤防之橫塞胸中不得通塞張同堤下為句簡按王陰氣客遊於心句脘下空竅句今考文義高注似是但堤字注未穩當從舊注四肢別離吳云胸中病則四肢無以受氣故若別離於身不為己有也張云清陽實四肢陽虛則四肢不為用一陰一陽代絶云云高此一項移於上文一陰為獨使之下注云舊本在四肢別離下今改正於此張云代絶者二臟氣傷脈來變亂也肝膽皆木木生心火病以陽衰則陰氣至心矣吳云陰氣動氣也上下無常者作輟無時也出入不知者端倪莫測也簡按吳陰氣之解未見所本皆在吳云在寸口也張云皆病也簡按志高以二陽三陰為句以至陰皆在為句而注皆在為脾胃之氣皆在於中其說迂回叵從陰不過陽馬雲胃脾肺經為病則在陰經者不能出過於陽以為和在陽經者不能入止於陰以為和陰陽之氣並至阻絶張云陰不過陽則陰自為陰不過入於陽分也陽氣不能止陰則陽自為陽不留止陰分也浮為血瘕沉為膿胕吳浮沉改置馬雲胕腐同張云脈浮者病當在外而為血瘕脈沉者病當在內而為膿胕正以陰陽表裡不相交通故脈證之反若此陰陽皆壯下至陰陽張云陰陽皆壯則亢而為害或以孤陰或以孤陽病之所及下至陰陽蓋男為陽道女為陰器隱曲不調俱成大病也上合昭昭下合冥冥張云昭昭可見冥冥可測有陰陽之道在也吳云昭昭天之道也冥冥地之陰也言脈之陰陽合天地也遂合歲首張合作至高雲五臟五行始於木而終於水猶四時始於春而終於冬遂合今日孟春之歲首簡按陰陽皆壯以下文六句與下文不相冒且旨趣曖昧難曉疑是他篇錯簡今姑仍張注在理已盡草與柳葉皆殺馬雲冬三月之病死證悉見在理已盡亦可延至地有草柳有葉之時其人始殺者何也有死徵而有死脈也以物生而人死故亦以殺名之向使交春之初陽脈亦絶有同陰脈止期在孟春而已安能至此草柳俱見之日乎張云在理已盡謂察其脈證之理已無生意也以冬之病而得此則凡草色之青柳葉之見陰陽氣易皆其死期故云皆殺也簡按今仍王注春陰陽皆絶馬依太素刪春字吳張志高並順文釋之今從馬陽殺馬雲春三月為病者正以其人秋冬奪於所用陰氣耗散不能勝陽故春雖非盛陽交春即病為陽而死名曰陽殺張云春月陽氣方升而病在陽者故曰陽殺殺者衰也高雲春三月之病陽氣不生故曰陽殺殺猶絶也簡按馬張之注義相反今詳馬據王注為病熱而釋之義似長仍從之草乾馬雲若使其脈陰陽俱絶則不能滿此三月而始死也期在舊草尚干之時即應死矣無望其草生柳葉之日也簡按王以降併為深秋之節然陰陽皆絶者安有從春至深秋而始死之理乎雖舊草尚干之解未允當姑從馬說以俟後考至陰不過十日張云脾腎皆為至陰夏三月以陽盛之時而脾腎傷極則真陰敗絶天干易氣不能堪矣故不過十日也高雲此夏三月之病而有短期也六月長夏屬於至陰時當至陰陽氣盡浮於外夏三月而病不愈交於至陰不過十日死李云金匱真言論曰脾為陰中之至陰五臟六腑之本也以至陰之臟而當陽極之時苟犯死症期在十日陰陽交期在溓水熊音溓音廉薄也張云溓音斂清也馬雲其脈陽中有陰是謂陰陽交也則脾未全絶期在七月水生之候其水溓靜之日而死矣吳云陰脈見於陽陽脈見於陰陰陽交易其位謂之陰陽交溓水仲秋水寒之時也言陰陽交易既失其常時當溓水則天地不交之時也脈與天地相違短期不在是乎高雲溓濂同若越長夏而至於秋則為陰陽交夏三月之病而交於秋期在濂水而死濂猶清也中秋水天一色之時也簡按溓薄冰也潘嶽寡婦賦水溓溓以微凝乃言冬初之時也正韻濂音廉與溓同一曰薄也其為清之義未見所據三陽俱起馬雲三陽者足太陽膀胱經也膀胱病脈俱起則膀胱屬水秋氣屬金金能生水當不治自已也吳云俱起手足俱起也高雲三陽謂太陽陽明少陽故曰俱後三陽謂太陽二陰謂少陰故曰獨也陰陽交合者馬雲若膀胱有陽病而見陰脈有陰病而見陽脈是陰陽相合其證當行立坐臥俱不寧也以金為主當善調之而愈吳云謂陰陽之氣交至合而為病也陰陽兩傷血氣俱損衰弱已甚故令動止艱難立則不能坐坐則不能起也張云秋氣將斂未斂故有陰陽交合為病者則或精或氣必有所傷而致動止不利蓋陽勝陰故立不能坐陰勝陽故坐不能起三陽獨至李云陽當作陰陰病而當陰盛則孤陰不生矣冰堅如石之候不能再生即上文三陽俱起不治自愈下文二陰期在盛水則此為三陰無疑期在石水張云三陽獨至陽亢陰竭之候也陰竭在冬本無生意而孤陽遇水終為撲滅故期在冰堅如石之時也二陰獨至張云二陰全元起本作三陰即所謂三陰並至有陰無陽也盛水者正月雨水之候孤陰難以獨立故遇陽勝之時則不能保其存也方盛衰論篇第七十一馬雲內有不足有餘虛實等義皆所以較其盛衰也吳云方比也比方陰陽多少五度強弱何者為盛何者為衰也氣之多少張云多少言盛衰也高雲氣陰陽之氣也人身陰陽之氣有多而盛有少而衰陽從左陰從右張云陽氣主升故從乎左陰氣主降故從乎右高雲嚮明而治左陽右陰故陽從左陰從右老從上少從下張云老人之氣先衰於下故從上者為順少壯之氣先盛於下故從下者為順蓋天之生氣必自下而升而人氣亦然也故凡以老人而衰於上者其終可知少壯而衰於下者其始可知皆逆候也高雲四時之氣秋冬為陰從上而下春夏為陽從下而上故老從上少從下蓋老為秋冬之陰少為春夏之陽也是以春夏歸陽為生馬雲春夏或病或脈歸陽為生若陰病陰脈如秋冬者為死張云春夏以陽盛之時或證或脈皆當歸陽為生若得陰候如秋冬者為逆為死反之則歸秋冬為生馬雲反之則秋冬歸陰為生若陽病陽脈如春夏者為死是以人之氣有多少逆之則皆能為厥也張云反之謂秋冬也秋冬以陰盛陽衰之時故歸陰為順曰生然不曰歸春夏為死者可見陰中有陽未必至害而陽為陰賊乃不免矣高雲人身春夏之時其氣歸陽為生歸秋冬之陰為死若反之則歸秋冬為死者歸秋冬反為生反之而生氣之逆也是以陰陽之氣無論多少若逆之則皆為厥矣一上不下張云陽逆於上而不下則寒厥到膝老人陽氣從上膝寒猶可少年之陽不當衰而衰者故最畏陰勝之時老人陽氣本衰是其常也故於秋冬無慮焉高雲陰陽之氣不相順接便為厥如陰氣一上陽氣不下則陰盛陽虛故寒厥到膝頭痛巔疾吳云此謂巔疾有巔崩偃仆之義張云上實下虛故病如此志云愚謂此下當有少者春夏生老者春夏死句或簡脫耶求陽不得求陰不審張云厥之在人也謂其為陽則本非陽盛謂其為陰則又非陰盛故皆不可得蓋以五臟隔絶無徵可驗若居曠野無所聞若伏空室無所見乃病則綿綿不解勢甚凋敝若弗能終其日者豈真陰陽之有餘者耶綿綿乎屬不滿日張云綿古綿字高雲今綿綿一息之微屬望其生若不能滿此一日矣簡按詩大雅疏綿綿微細之辭王蓋取氣息綿惙之義屬高讀為矚也是以少氣之厥趙府本熊本少氣作少陰馬吳張並從之志高仍原文簡按據王注及下文是為少氣之語則知作少陰誤也籍籍馬雲衆多也吳云積尸狀張云多驚惕也志云狼籍也簡按狼籍披離雜亂貌前江都易王傳國中口語籍籍志注為是菌香脈經作園苑千金作園花志云香菌之小者蓋雖有生氣而無根簡按此注非也廣雅菌薰也其葉謂之蕙又屈原離騷雜申椒與菌桂兮蜀都賦菌桂臨岩知全注為得陽物志云龍也乃龍雷之火遊行也陽氣有餘陰氣不足吳云凡人陽氣不足陰氣有餘則當晝而寐若陽氣有餘陰氣不足則當夕而夢張云所以為厥為夢者皆陽不附陰之所致五診吳云五內見證也陰陽三陰三陽也以在經脈吳云在察也經脈十二經之脈也馬高同簡按書舜典在璇璣玉衡注在察也今從吳注十度馬雲度人度民之度俱入聲余皆去聲志並去聲注云度量也十度者度人脈度臟度肉度筋度俞度陰陽氣度上下度民度君度卿也高以下文度民君卿四字移於陰陽氣盡之下注云十度一曰度人二曰度脈三曰度臟四曰度肉五曰度筋六曰度俞七曰度陰陽氣盡八曰度民九曰度君十曰度卿民不得同卿卿不得同於君就其心志而揆度之簡按王義允當故馬吳張從之脈度臟度肉度筋度俞度張云脈度者如經脈脈度等篇是也臟度如本臟腸胃平人絶谷等篇是也肉度如衛氣失常等篇是也筋度如經筋篇是也俞度如氣府氣穴本輸等篇是也度數也散陰頗陽吳云頗跛同陰陽散亂偏頗也簡按玉篇頗不平也偏也王注非脈脫不具吳云脈或不顯也張云此其脈有所脫而陰陽不全具矣診無常行張云診此者有不可以陰陽之常法行也蓋謂其當慎耳吳云不拘於一途也診必上下度民君卿張云貴賤尊卑勞逸有異膏粱藜藿氣質不同故當度民君卿分別上下以為診至陰虛天氣絶馬雲地位乎下為至陰若至陰虛則天氣絶而不降何也以其無所升也天位乎上為至陽若至陽盛則地氣無自而足何也以其無所降也此設言也故人有陽氣陽氣者衛氣也人有陰氣陰氣者營氣也能使陰陽二氣交會於一處者惟至人乃能行之吳云至陰脾也天氣肺也高雲至陰太陰也至陰虛則人之地氣不升地氣不升天氣絶至陽太陽也至陽盛則人之天氣有餘天氣有餘故地氣不足必陰陽並交無有虛盛陽氣先至陰氣後至張云凡陰陽之道陽動陰靜陽剛陰柔陽唱陰隨陽施陰受陽升陰降陽前陰後陽上陰下陽左陰右數者為陽遲者為陰表者為陽里者為陰至者為陽去者為陰進者為陽退者為陰發生者為陽收藏者為陰陽之行速陰之行遲故陰陽並交者必陽先至而陰後至是以聖人之持診者在察陰陽先後以測其精要也六十首吳云六十年之歲首也言論陰陽之變與常乃盡於六十年間也張云禁服篇所謂通於九針六十篇之義今失其傳矣高雲奇脈恆脈脈勢不同六十日而更一氣乃以六十為首也簡按十六難云脈有三部九候有陰陽有輕重有六十首呂廣曰首頭首也蓋三部從頭者脈輒有六十首蓋諸注並屬附會今仍王義診合微之事吳云合於幽微也志云聲合五音色合五行脈合陰陽也張云參諸診之法而合其精微也章五中之情吳云五中五臟也張云章明也志云五內之情志也簡按馬雲五中者古經篇名非義具下文王注定五度之事馬雲即前十度也吳張同志云五度者度神之有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足也高雲五度即上文之五診也簡按馬注似是切陰不得陽張云言人生以陽為主不得其陽焉得不亡如陰陽別論曰所謂陰者真臟也見則為敗敗必死矣所謂陽者胃脘之陽也平人氣象論曰人無胃氣死脈無胃氣死是皆言此陽字守學不湛張云湛明也本於馬注若但知得陽而不知陽中有陰及陰平陽祕之道者是為偏守其學亦屬不明志云湛甚也吳湛作知高作諶注云諶信也簡按湛訓明無所考然於文義為得故治不久張云不明緩急之用安望其久安長治而萬世不殆哉高雲左右上下先後不能盡知故日治其病而人不久用之有絶絶諸本作紀當改吳云紀法也張云紀條理也起所有餘吳云起病之始也有餘客邪有餘不足正氣不足言病之所起雖云有餘然亦可以知其虛而受邪矣張云起興起也言將治其有餘當察其不足蓋邪氣多有餘正氣多不足若只知有餘而忘其不足取敗之道也脈事因格吳云格者窮至其理也言揆度病情之高下而脈事因之窮至其理也馬雲度其事之上下脈之因革則診法無不備矣簡按馬讀格為革因革乃沿革之義其意不通是以診有大方吳云此下論作醫之方大方大法也坐起有常張云舉動不苟而先正其身身正於外心必隨之故診之大方必先乎此出入有行吳云行去聲德行也醫以活人為事其於出入之時念念皆真無一不敬則德能動天誠能格心故可以轉運周旋而無往弗神矣司八正邪吳云司推步也張云司候也高雲司主也簡按司伺同前灌夫傳太后亦已使候司則知張之義確矣視其大小吳云大小二便也張同志云視脈之大小高同合之病能馬雲病能讀為病耐陰陽應象大論云病之形能也張云能情狀之謂簡按能古與態通視息視意吳云視息視其呼吸高下也視意視其志趣遠近苦樂憂思也志云視息者候呼吸之往來脈之去至也視意者閉戶塞牖系之病者數問其情以從其意也不失條理張云條者猶干之有枝理者猶物之有脈即脈絡綱紀之謂亡言妄期吳亡作妄高雲亡言無徵之言也簡按今從吳注解精微論篇第七十二高雲純粹之至曰精幽渺之極曰微闡發陰陽水火神志悲泣以及水所從生涕所從出神志水火之原非尋常問答所及故曰解精微陰陽刺灸湯藥所滋行治有賢不肖志滋作資灸下資下句高同唯滋仍原文注云陰陽之刺灸湯藥之所滋但行治有賢不肖未必能十全毚愚僕漏之問僕漏吳作朴陋吳云謂毚弱愚昧朴野鄙陋也張云毚妄也漏當作陋問不在經故毚愚朴陋自歉之辭朴舊作僕音赴按全元起本作朴於義為妥今改從之簡按說文毚狡兔也故王訓狡然張注為允貼今從之道之所生也馬吳高生作在吳云道無往而不在高雲道之所在有如下文所云也有德也吳云行道而有得於心謂之德高雲德猶得也簡按太素為是水宗者積水也吳云水宗水之始也張云水之原也高雲宗猶聚也水之聚者漸積而成故曰水宗水積於下其性陰柔故曰積水者至陰也水宗甲乙作衆精似是是精持之也張云五液皆宗於腎故又曰宗精精能主持水道則不使之妄行矣名曰志悲甲乙名曰作又名神氣傳於心以下三句吳改作神氣上傳於心精下傳於腎志心志俱悲非也下文同泣涕者腦也吳改作泣而出涕者腦也張云泣涕者因泣而涕也涕出於腦腦者精之類為髓之海故屬乎陰故腦滲為涕簡按鼻淵後世呼為腦漏其實非腦之漏泄乃腦中濁涕下而不止也是以水流吳云水謂泣也其行類也甲乙無行字急則俱死死吳本作化橫行也吳云橫流也張云言其多也簡按不必改行為流神不慈也說文慈愛也左傳文十八年宣慈惠和正義慈者愛出於心恩被於物也惋則沖陰吳云惋悽慘意氣也沖陰逆衝於腦也張云惋慘郁也高雲惋惋哀戚也志云惋惋驚動貌簡按惋惋為謰語非也蓋襲馬本句讀之訛厥則目無所見吳云經言也夫人以下釋經也足寒則脹張云並偏聚也火獨光陽之亢也厥因氣逆故陰陽各有所並並則陽氣不降陰氣不升故上為目無所見而下為足寒陰中無陽故又生脹滿之疾目眥盲張云一水目之精也五火即五臟之厥陽並於上者也眥當作視簡按吳仍甲乙刪眥字今從之是以氣衝風吳氣下補並於目三字志高本並無氣字張云天之陽氣為風人之陽氣為火風中於目則火氣內燔而水不能守故泣出也簡按志高本似是夫火疾風生張云陽之極也陽極則陰生承之乃能致雨人同天地之氣故風熱在目而泣出義亦無兩簡按今據甲乙太素刪火字高雲愚觀上論七篇詞古義深難於詮解然久久玩索得其精微則奧旨自顯曩歲偶於友人齊頭見新刊素問一部紙板甚精潔名人為之序其篇什倒置刪削全文末卷七篇置之不録謂詞義不經似屬後人添贅而非黃帝之文噫如是之人妄論聖經貽誤後昆良足悲也簡按明徐常吉諸家要指亦云天元紀諸篇皆推明天地陰陽之理信非聖人不能作著至教以下或後人依仿為之運氣七篇王氏所補詳論於卷首而著至教以下文辭艱澀略似與前諸篇其體不同然義理深奧旨趣淵微甲乙太素並收之則斷然為舊經之文矣徐說不足憑耳
